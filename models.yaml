# NanoSIEM — Available Models
#
# Catalog for managed deployments. Synced into `available_models` by the
# nanosiem model-catalog sync service.
#
# Optional per-model fields:
#   - context_window: tokens
#   - supports_temperature: false for thinking-default / reasoning models
#     that reject the `temperature` request field (Anthropic Opus 4.7,
#     OpenAI GPT-5 family, OpenAI o-series). Omit (or set true) for normal
#     chat models. Defaults to true on the column.

models:
  - model_id: gemini/gemini-3.1-pro-preview
    display_name: Gemini 3.1 Pro Preview
    context_window: 1048576

  - model_id: gemini/gemini-3.1-flash-lite-preview
    display_name: Gemini 3.1 Flash Lite Preview
    context_window: 1048576

  - model_id: anthropic/claude-opus-4-7
    display_name: Claude Opus 4.7
    context_window: 200000
    supports_temperature: false

  - model_id: openai/gpt-5.5
    display_name: GPT-5.5
    context_window: 1000000
    supports_temperature: false
