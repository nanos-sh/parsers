name: zeek
display_name: Zeek Network Monitor
version: "1.0.0"
description: "Parses Zeek (Bro) JSON logs including conn, dns, http, ssl, files, x509, smtp, ssh, rdp, pe, notice, weird, intel, dpd, tunnel, sip, snmp, ftp, kerberos, ntlm, smb_files, smb_mapping, and dce_rpc logs"
match_values:
  - zeek
  - bro
  - zeek_json
  - corelight
category: network
vendor: "Zeek Project"
product: "Zeek"
parser_vrl: |
  # Zeek (Bro) Network Security Monitor Parser
  # Supports all major Zeek JSON log types dispatched via _path field

  .udm = {}
  .ext = {}
  .metadata = {}

  raw_log = string!(.message)
  parsed, err = parse_json(raw_log)

  if err == null {
      # ---------------------------------------------------------------
      # Determine log type from _path field
      # ---------------------------------------------------------------
      log_type = ""
      if exists(parsed._path) {
          log_type = to_string(parsed._path) ?? ""
      } else if exists(parsed."@path") {
          log_type = to_string(parsed."@path") ?? ""
      }
      .ext.zeek_log_type = log_type

      # ---------------------------------------------------------------
      # Timestamp: Zeek ts is epoch seconds with microsecond decimal
      # ---------------------------------------------------------------
      if exists(parsed.ts) {
          ts_float = to_float(parsed.ts) ?? null
          if ts_float != null {
              ts_int = to_int!(ts_float)
              .udm.timestamp = from_unix_timestamp(ts_int) ?? now()
          } else {
              .udm.timestamp = now()
          }
      } else {
          .udm.timestamp = now()
      }

      # ---------------------------------------------------------------
      # Common connection fields (id.orig_h, id.resp_h, etc.)
      # Present in most Zeek logs except files, x509, pe
      # ---------------------------------------------------------------
      if exists(parsed."id.orig_h") {
          .udm.src_ip = to_string(parsed."id.orig_h") ?? null
      }
      if exists(parsed."id.orig_p") {
          .udm.src_port = to_int(parsed."id.orig_p") ?? null
      }
      if exists(parsed."id.resp_h") {
          .udm.dest_ip = to_string(parsed."id.resp_h") ?? null
      }
      if exists(parsed."id.resp_p") {
          .udm.dest_port = to_int(parsed."id.resp_p") ?? null
      }
      if exists(parsed.proto) {
          .udm.protocol = upcase(to_string(parsed.proto) ?? "")
      }
      if exists(parsed.uid) {
          .udm.session_id = to_string(parsed.uid) ?? null
      }

      # ---------------------------------------------------------------
      # Device metadata
      # ---------------------------------------------------------------
      .udm.vendor = "Zeek Project"
      .udm.product = "Zeek"
      .udm.vendor_product = "Zeek Network Monitor"

      # ---------------------------------------------------------------
      # Dispatch on log type
      # ---------------------------------------------------------------
      if log_type == "conn" {
          # --- conn.log ---
          .udm.action = "connection"
          .udm.category = "network"

          if exists(parsed.duration) {
              .udm.duration = to_float(parsed.duration) ?? null
          }
          if exists(parsed.orig_bytes) {
              .udm.bytes_out = to_int(parsed.orig_bytes) ?? null
          }
          if exists(parsed.resp_bytes) {
              .udm.bytes_in = to_int(parsed.resp_bytes) ?? null
          }
          if exists(parsed.orig_pkts) {
              .udm.packets_out = to_int(parsed.orig_pkts) ?? null
          }
          if exists(parsed.resp_pkts) {
              .udm.packets_in = to_int(parsed.resp_pkts) ?? null
          }
          if exists(parsed.conn_state) {
              .udm.status = to_string(parsed.conn_state) ?? null
          }
          if exists(parsed.service) {
              .ext.service = to_string(parsed.service) ?? null
          }
          if exists(parsed.history) {
              .ext.conn_history = to_string(parsed.history) ?? null
          }
          if exists(parsed.missed_bytes) {
              .ext.missed_bytes = to_int(parsed.missed_bytes) ?? null
          }
          if exists(parsed.orig_ip_bytes) {
              .ext.orig_ip_bytes = to_int(parsed.orig_ip_bytes) ?? null
          }
          if exists(parsed.resp_ip_bytes) {
              .ext.resp_ip_bytes = to_int(parsed.resp_ip_bytes) ?? null
          }
          if exists(parsed.local_orig) {
              .ext.local_orig = parsed.local_orig
          }
          if exists(parsed.local_resp) {
              .ext.local_resp = parsed.local_resp
          }
          if exists(parsed.tunnel_parents) {
              .ext.tunnel_parents = parsed.tunnel_parents
          }

      } else if log_type == "dns" {
          # --- dns.log ---
          .udm.action = "dns_query"
          .udm.category = "network"

          if exists(parsed.query) {
              .udm.query = to_string(parsed.query) ?? null
          }
          if exists(parsed.qtype_name) {
              .udm.query_type = to_string(parsed.qtype_name) ?? null
              .udm.record_type = to_string(parsed.qtype_name) ?? null
          }
          if exists(parsed.rcode_name) {
              .udm.status = to_string(parsed.rcode_name) ?? null
          }
          if exists(parsed.answers) {
              answers_arr = array!(parsed.answers)
              first_answer = get!(answers_arr, [0])
              if first_answer != null {
                  .udm.answer = to_string(first_answer) ?? null
              }
              # Join all answers
              answer_strings = []
              for_each(answers_arr) -> |_idx, val| {
                  s = to_string(val) ?? ""
                  if s != "" {
                      answer_strings = push(answer_strings, s)
                  }
              }
              if length(answer_strings) > 0 {
                  .udm.dns_answers = join!(answer_strings, ", ")
              }
          }
          if exists(parsed.trans_id) {
              .ext.trans_id = to_int(parsed.trans_id) ?? null
          }
          if exists(parsed.rtt) {
              .ext.rtt = to_float(parsed.rtt) ?? null
          }
          if exists(parsed.qclass_name) {
              .ext.qclass_name = to_string(parsed.qclass_name) ?? null
          }
          if exists(parsed.AA) {
              .ext.dns_aa = parsed.AA
          }
          if exists(parsed.TC) {
              .ext.dns_tc = parsed.TC
          }
          if exists(parsed.RD) {
              .ext.dns_rd = parsed.RD
          }
          if exists(parsed.RA) {
              .ext.dns_ra = parsed.RA
          }
          if exists(parsed.Z) {
              .ext.dns_z = to_int(parsed.Z) ?? null
          }
          if exists(parsed.TTLs) {
              .ext.dns_ttls = parsed.TTLs
          }
          if exists(parsed.rejected) {
              .ext.dns_rejected = parsed.rejected
          }
          if exists(parsed.rcode) {
              .ext.rcode = to_int(parsed.rcode) ?? null
          }
          if exists(parsed.qtype) {
              .ext.qtype = to_int(parsed.qtype) ?? null
          }
          if exists(parsed.qclass) {
              .ext.qclass = to_int(parsed.qclass) ?? null
          }

      } else if log_type == "http" {
          # --- http.log ---
          .udm.action = "http_request"
          .udm.category = "web"

          if exists(parsed.method) {
              .udm.http_method = to_string(parsed.method) ?? null
          }
          if exists(parsed.host) {
              .udm.url_domain = to_string(parsed.host) ?? null
          }
          if exists(parsed.uri) {
              .udm.uri_path = to_string(parsed.uri) ?? null
          }
          if exists(parsed.user_agent) {
              .udm.http_user_agent = to_string(parsed.user_agent) ?? null
          }
          if exists(parsed.referrer) {
              .udm.http_referrer = to_string(parsed.referrer) ?? null
          }
          if exists(parsed.status_code) {
              .udm.http_status_code = to_int(parsed.status_code) ?? null
          }
          if exists(parsed.username) {
              .udm.user = to_string(parsed.username) ?? null
          }

          # Build full URL
          http_host = to_string(parsed.host) ?? ""
          http_uri = to_string(parsed.uri) ?? ""
          if http_host != "" {
              resp_p = to_int(parsed."id.resp_p") ?? 80
              if resp_p == 443 {
                  .udm.url = "https://" + http_host + http_uri
              } else {
                  .udm.url = "http://" + http_host + http_uri
              }
          }

          # Response MIME types -> http_content_type (take first)
          if exists(parsed.resp_mime_types) {
              mime_arr = array!(parsed.resp_mime_types)
              first_mime = get!(mime_arr, [0])
              if first_mime != null {
                  .udm.http_content_type = to_string(first_mime) ?? null
              }
          }

          if exists(parsed.status_msg) {
              .ext.http_status_msg = to_string(parsed.status_msg) ?? null
          }
          if exists(parsed.trans_depth) {
              .ext.trans_depth = to_int(parsed.trans_depth) ?? null
          }
          if exists(parsed.version) {
              .ext.http_version = to_string(parsed.version) ?? null
          }
          if exists(parsed.origin) {
              .ext.http_origin = to_string(parsed.origin) ?? null
          }
          if exists(parsed.request_body_len) {
              .ext.request_body_len = to_int(parsed.request_body_len) ?? null
          }
          if exists(parsed.response_body_len) {
              .ext.response_body_len = to_int(parsed.response_body_len) ?? null
          }
          if exists(parsed.info_code) {
              .ext.info_code = to_int(parsed.info_code) ?? null
          }
          if exists(parsed.info_msg) {
              .ext.info_msg = to_string(parsed.info_msg) ?? null
          }
          if exists(parsed.tags) {
              .ext.http_tags = parsed.tags
          }
          if exists(parsed.password) {
              .ext.http_password = to_string(parsed.password) ?? null
          }
          if exists(parsed.proxied) {
              .ext.proxied = to_string(parsed.proxied) ?? null
          }
          if exists(parsed.orig_fuids) {
              .ext.orig_fuids = parsed.orig_fuids
          }
          if exists(parsed.orig_filenames) {
              .ext.orig_filenames = parsed.orig_filenames
          }
          if exists(parsed.orig_mime_types) {
              .ext.orig_mime_types = parsed.orig_mime_types
          }
          if exists(parsed.resp_fuids) {
              .ext.resp_fuids = parsed.resp_fuids
          }
          if exists(parsed.resp_filenames) {
              .ext.resp_filenames = parsed.resp_filenames
          }

      } else if log_type == "ssl" {
          # --- ssl.log ---
          .udm.action = "ssl_connection"
          .udm.category = "network"

          if exists(parsed.server_name) {
              .udm.url_domain = to_string(parsed.server_name) ?? null
          }
          if exists(parsed.version) {
              .ext.ssl_version = to_string(parsed.version) ?? null
          }
          if exists(parsed.cipher) {
              .ext.ssl_cipher = to_string(parsed.cipher) ?? null
          }
          if exists(parsed.curve) {
              .ext.ssl_curve = to_string(parsed.curve) ?? null
          }
          if exists(parsed.resumed) {
              .ext.ssl_resumed = parsed.resumed
          }
          if exists(parsed.last_alert) {
              .ext.ssl_last_alert = to_string(parsed.last_alert) ?? null
          }
          if exists(parsed.next_protocol) {
              .ext.ssl_next_protocol = to_string(parsed.next_protocol) ?? null
          }
          if exists(parsed.established) {
              .ext.ssl_established = parsed.established
              est = parsed.established
              if est == true {
                  .udm.status = "established"
              } else {
                  .udm.status = "failed"
              }
          }
          if exists(parsed.ssl_history) {
              .ext.ssl_history = to_string(parsed.ssl_history) ?? null
          }
          if exists(parsed.cert_chain_fps) {
              .ext.cert_chain_fps = parsed.cert_chain_fps
          }
          if exists(parsed.client_cert_chain_fps) {
              .ext.client_cert_chain_fps = parsed.client_cert_chain_fps
          }
          if exists(parsed.sni_matches_cert) {
              .ext.sni_matches_cert = parsed.sni_matches_cert
          }
          if exists(parsed.validation_status) {
              .ext.ssl_validation_status = to_string(parsed.validation_status) ?? null
          }
          if exists(parsed.ja3) {
              .ext.ja3 = to_string(parsed.ja3) ?? null
          }
          if exists(parsed.ja3s) {
              .ext.ja3s = to_string(parsed.ja3s) ?? null
          }

      } else if log_type == "files" {
          # --- files.log ---
          .udm.action = "file_transfer"
          .udm.category = "file"

          if exists(parsed.filename) {
              .udm.file_name = to_string(parsed.filename) ?? null
          }
          if exists(parsed.sha256) {
              .udm.file_hash = to_string(parsed.sha256) ?? null
          }
          if exists(parsed.seen_bytes) {
              .udm.file_size = to_int(parsed.seen_bytes) ?? null
          }
          if exists(parsed.mime_type) {
              .udm.http_content_type = to_string(parsed.mime_type) ?? null
          }
          if exists(parsed.md5) {
              .ext.md5 = to_string(parsed.md5) ?? null
          }
          if exists(parsed.sha1) {
              .ext.sha1 = to_string(parsed.sha1) ?? null
          }
          if exists(parsed.source) {
              .ext.file_source = to_string(parsed.source) ?? null
          }
          if exists(parsed.fuid) {
              .ext.fuid = to_string(parsed.fuid) ?? null
          }
          if exists(parsed.depth) {
              .ext.file_depth = to_int(parsed.depth) ?? null
          }
          if exists(parsed.analyzers) {
              .ext.analyzers = parsed.analyzers
          }
          if exists(parsed.duration) {
              .ext.file_duration = to_float(parsed.duration) ?? null
          }
          if exists(parsed.local_orig) {
              .ext.local_orig = parsed.local_orig
          }
          if exists(parsed.is_orig) {
              .ext.is_orig = parsed.is_orig
          }
          if exists(parsed.total_bytes) {
              .ext.total_bytes = to_int(parsed.total_bytes) ?? null
          }
          if exists(parsed.missing_bytes) {
              .ext.missing_bytes = to_int(parsed.missing_bytes) ?? null
          }
          if exists(parsed.overflow_bytes) {
              .ext.overflow_bytes = to_int(parsed.overflow_bytes) ?? null
          }
          if exists(parsed.timedout) {
              .ext.timedout = parsed.timedout
          }
          if exists(parsed.extracted) {
              .ext.extracted = to_string(parsed.extracted) ?? null
          }
          if exists(parsed.extracted_cutoff) {
              .ext.extracted_cutoff = parsed.extracted_cutoff
          }
          if exists(parsed.extracted_size) {
              .ext.extracted_size = to_int(parsed.extracted_size) ?? null
          }

          # files.log uses tx_hosts/rx_hosts instead of id.*
          if exists(parsed.tx_hosts) {
              tx = array!(parsed.tx_hosts)
              first_tx = get!(tx, [0])
              if first_tx != null {
                  .udm.src_ip = to_string(first_tx) ?? null
              }
              .ext.tx_hosts = parsed.tx_hosts
          }
          if exists(parsed.rx_hosts) {
              rx = array!(parsed.rx_hosts)
              first_rx = get!(rx, [0])
              if first_rx != null {
                  .udm.dest_ip = to_string(first_rx) ?? null
              }
              .ext.rx_hosts = parsed.rx_hosts
          }
          if exists(parsed.conn_uids) {
              conn_arr = array!(parsed.conn_uids)
              first_uid = get!(conn_arr, [0])
              if first_uid != null {
                  .udm.session_id = to_string(first_uid) ?? null
              }
              .ext.conn_uids = parsed.conn_uids
          }

      } else if log_type == "notice" {
          # --- notice.log ---
          .udm.action = "alert"
          .udm.category = "security"

          if exists(parsed.note) {
              .udm.signature = to_string(parsed.note) ?? null
          }
          if exists(parsed.msg) {
              .ext.description = to_string(parsed.msg) ?? null
          }
          if exists(parsed.sub) {
              .ext.notice_sub = to_string(parsed.sub) ?? null
          }
          if exists(parsed.src) {
              src_val = to_string(parsed.src) ?? null
              if src_val != null {
                  .udm.src_ip = src_val
              }
          }
          if exists(parsed.dst) {
              dst_val = to_string(parsed.dst) ?? null
              if dst_val != null {
                  .udm.dest_ip = dst_val
              }
          }
          if exists(parsed.p) {
              .udm.dest_port = to_int(parsed.p) ?? null
          }
          if exists(parsed.actions) {
              actions_arr = array!(parsed.actions)
              action_strings = []
              for_each(actions_arr) -> |_idx, val| {
                  s = to_string(val) ?? ""
                  if s != "" {
                      action_strings = push(action_strings, s)
                  }
              }
              if length(action_strings) > 0 {
                  .ext.notice_actions = join!(action_strings, ", ")
              }
          }
          if exists(parsed.suppress_for) {
              .ext.suppress_for = to_float(parsed.suppress_for) ?? null
          }
          if exists(parsed.peer_descr) {
              .ext.peer_descr = to_string(parsed.peer_descr) ?? null
          }
          if exists(parsed.n) {
              .ext.notice_n = parsed.n
          }
          if exists(parsed.fuid) {
              .ext.fuid = to_string(parsed.fuid) ?? null
          }
          if exists(parsed.file_mime_type) {
              .ext.file_mime_type = to_string(parsed.file_mime_type) ?? null
          }
          if exists(parsed.file_desc) {
              .ext.file_desc = to_string(parsed.file_desc) ?? null
          }
          if exists(parsed.email_dest) {
              .ext.email_dest = to_string(parsed.email_dest) ?? null
          }
          if exists(parsed."remote_location.country_code") {
              .ext.remote_country = to_string(parsed."remote_location.country_code") ?? null
          }
          if exists(parsed."remote_location.region") {
              .ext.remote_region = to_string(parsed."remote_location.region") ?? null
          }
          if exists(parsed."remote_location.city") {
              .ext.remote_city = to_string(parsed."remote_location.city") ?? null
          }

          # Severity mapping for notice types
          note_str = to_string(parsed.note) ?? ""
          if contains(note_str, "Intel::") {
              .udm.severity = "high"
          } else if contains(note_str, "Notice::") {
              .udm.severity = "medium"
          } else if contains(note_str, "Weird::") {
              .udm.severity = "low"
          } else {
              .udm.severity = "medium"
          }

      } else if log_type == "smtp" {
          # --- smtp.log ---
          .udm.action = "email"
          .udm.category = "email"

          if exists(parsed.mailfrom) {
              .udm.sender = to_string(parsed.mailfrom) ?? null
              mf = to_string(parsed.mailfrom) ?? ""
              mf_parts = split(mf, "@", limit: 2)
              mf_domain = get!(mf_parts, [1])
              if mf_domain != null {
                  .udm.sender_domain = to_string(mf_domain) ?? null
              }
          }
          if exists(parsed.rcptto) {
              rcpt_arr = array!(parsed.rcptto)
              first_rcpt = get!(rcpt_arr, [0])
              if first_rcpt != null {
                  .udm.recipient = to_string(first_rcpt) ?? null
                  rcpt_str = to_string(first_rcpt) ?? ""
                  rcpt_parts = split(rcpt_str, "@", limit: 2)
                  rcpt_domain = get!(rcpt_parts, [1])
                  if rcpt_domain != null {
                      .udm.recipient_domain = to_string(rcpt_domain) ?? null
                  }
              }
              .ext.rcptto = parsed.rcptto
          }
          if exists(parsed.subject) {
              .udm.subject = to_string(parsed.subject) ?? null
          }
          if exists(parsed.msg_id) {
              .udm.message_id = to_string(parsed.msg_id) ?? null
          }
          if exists(parsed.helo) {
              .ext.smtp_helo = to_string(parsed.helo) ?? null
          }
          if exists(parsed.from) {
              .ext.smtp_from = to_string(parsed.from) ?? null
          }
          if exists(parsed.to) {
              .ext.smtp_to = parsed.to
          }
          if exists(parsed.cc) {
              .ext.smtp_cc = parsed.cc
          }
          if exists(parsed.reply_to) {
              .ext.smtp_reply_to = to_string(parsed.reply_to) ?? null
          }
          if exists(parsed.date) {
              .ext.smtp_date = to_string(parsed.date) ?? null
          }
          if exists(parsed.in_reply_to) {
              .ext.smtp_in_reply_to = to_string(parsed.in_reply_to) ?? null
          }
          if exists(parsed.x_originating_ip) {
              .ext.x_originating_ip = to_string(parsed.x_originating_ip) ?? null
          }
          if exists(parsed.first_received) {
              .ext.first_received = to_string(parsed.first_received) ?? null
          }
          if exists(parsed.second_received) {
              .ext.second_received = to_string(parsed.second_received) ?? null
          }
          if exists(parsed.last_reply) {
              .ext.last_reply = to_string(parsed.last_reply) ?? null
          }
          if exists(parsed.path) {
              .ext.smtp_path = parsed.path
          }
          if exists(parsed.user_agent) {
              .udm.http_user_agent = to_string(parsed.user_agent) ?? null
          }
          if exists(parsed.tls) {
              .ext.smtp_tls = parsed.tls
          }
          if exists(parsed.fuids) {
              .ext.fuids = parsed.fuids
          }
          if exists(parsed.is_webmail) {
              .ext.is_webmail = parsed.is_webmail
          }
          if exists(parsed.trans_depth) {
              .ext.trans_depth = to_int(parsed.trans_depth) ?? null
          }

      } else if log_type == "ssh" {
          # --- ssh.log ---
          .udm.action = "ssh_session"
          .udm.category = "authentication"

          if exists(parsed.auth_success) {
              auth_val = parsed.auth_success
              if auth_val == true {
                  .udm.auth_result = "success"
              } else {
                  .udm.auth_result = "failure"
              }
              .ext.auth_success = parsed.auth_success
          }
          if exists(parsed.auth_attempts) {
              .ext.auth_attempts = to_int(parsed.auth_attempts) ?? null
          }
          if exists(parsed.direction) {
              .udm.direction = to_string(parsed.direction) ?? null
          }
          if exists(parsed.client) {
              .ext.ssh_client = to_string(parsed.client) ?? null
          }
          if exists(parsed.server) {
              .ext.ssh_server = to_string(parsed.server) ?? null
          }
          if exists(parsed.cipher_alg) {
              .ext.ssh_cipher = to_string(parsed.cipher_alg) ?? null
          }
          if exists(parsed.mac_alg) {
              .ext.ssh_mac = to_string(parsed.mac_alg) ?? null
          }
          if exists(parsed.compression_alg) {
              .ext.ssh_compression = to_string(parsed.compression_alg) ?? null
          }
          if exists(parsed.kex_alg) {
              .ext.ssh_kex = to_string(parsed.kex_alg) ?? null
          }
          if exists(parsed.host_key_alg) {
              .ext.ssh_host_key_alg = to_string(parsed.host_key_alg) ?? null
          }
          if exists(parsed.host_key) {
              .ext.ssh_host_key = to_string(parsed.host_key) ?? null
          }
          if exists(parsed.version) {
              .ext.ssh_version = to_int(parsed.version) ?? null
          }

      } else if log_type == "rdp" {
          # --- rdp.log ---
          .udm.action = "rdp_session"
