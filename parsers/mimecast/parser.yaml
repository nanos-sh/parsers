name: mimecast
display_name: Mimecast
version: "1.0.0"
description: "Parses Mimecast email security logs including receipt, process, delivery, URL protection, and attachment protection events"
match_values:
  - mimecast
  - mimecast_email
category: security
vendor: "Mimecast"
product: "Email Security"
parser_vrl: |
  # Mimecast Email Security Parser
  # Parses receipt, URL protection, and attachment protection events

  # Initialize required structures
  .udm = {}
  .ext = {}
  .metadata = {}

  # Set defaults
  .udm.timestamp = now()
  .udm.vendor = "Mimecast"
  .udm.product = "Email Security"
  .udm.vendor_product = "Mimecast Email Security"

  # Get raw log content
  raw_log = to_string(.message) ?? ""

  # Parse JSON
  parsed, err = parse_json(raw_log)

  if err == null {
      event_type = to_string(parsed.type) ?? "unknown"

      # --- Timestamp (common to all types) ---
      if exists(parsed.datetime) {
          ts, ts_err = parse_timestamp(string!(parsed.datetime), "%+")
          if ts_err == null {
              .udm.timestamp = format_timestamp!(ts, format: "%Y-%m-%d %H:%M:%S")
          }
      }

      if event_type == "receipt" {
          # ============= RECEIPT LOG =============
          .udm.category = "email"

          # Sender
          if exists(parsed.Sender) {
              .udm.sender = string!(parsed.Sender)
              parts = split(string!(parsed.Sender), "@")
              if length(parts) == 2 {
                  .udm.sender_domain = parts[1]
              }
          }

          # Recipient
          if exists(parsed.Rcpt) {
              .udm.recipient = string!(parsed.Rcpt)
              r_parts = split(string!(parsed.Rcpt), "@")
              if length(r_parts) == 2 {
                  .udm.recipient_domain = r_parts[1]
              }
          }

          # Subject
          if exists(parsed.Subject) {
              .udm.subject = string!(parsed.Subject)
          }

          # Message ID
          if exists(parsed.MsgId) {
              .udm.message_id = string!(parsed.MsgId)
          }

          # Source IP
          if exists(parsed.IP) {
              .udm.src_ip = string!(parsed.IP)
          }

          # Action
          if exists(parsed.Act) {
              .udm.event_type = string!(parsed.Act)
          }

          # Direction
          if exists(parsed.Dir) {
              .ext.direction = string!(parsed.Dir)
          }

          # Spam score
          if exists(parsed.SpamScore) {
              .ext.risk_score = string!(parsed.SpamScore)
          }

          # Spam info
          if exists(parsed.SpamInfo) {
              .ext.spam_info = string!(parsed.SpamInfo)
          }
          if exists(parsed.SpamLimit) {
              .ext.spam_limit = string!(parsed.SpamLimit)
          }

          # Attachment info
          if exists(parsed.AttNames) {
              att_names = string!(parsed.AttNames)
              if att_names != "" {
                  .udm.file_name = att_names
              }
          }
          if exists(parsed.AttCnt) {
              .ext.attachment_count = string!(parsed.AttCnt)
          }

          # Message size
          if exists(parsed.MsgSz) {
              .ext.message_size = string!(parsed.MsgSz)
          }

          # TLS info
          if exists(parsed.TlsVer) {
              .ext.tls_version = string!(parsed.TlsVer)
          }
          if exists(parsed.Cphr) {
              .ext.cipher = string!(parsed.Cphr)
          }

          # Virus found
          if exists(parsed.VirusFound) {
              vf = string!(parsed.VirusFound)
              if vf != "" {
                  .ext.virus_found = vf
                  .udm.severity = "high"
              }
          }

          # SPF/DKIM/DMARC
          if exists(parsed.SpamProcessingDetail) {
              spd = parsed.SpamProcessingDetail
              if exists(spd.spf.allow) {
                  .ext.spf_pass = to_string(spd.spf.allow) ?? ""
              }
              if exists(spd.dkim.allow) {
                  .ext.dkim_pass = to_string(spd.dkim.allow) ?? ""
              }
              if exists(spd.dmarc.allow) {
                  .ext.dmarc_pass = to_string(spd.dmarc.allow) ?? ""
              }
          }

          # Account
          if exists(parsed.acc) {
              .ext.account = string!(parsed.acc)
          }

      } else if event_type == "url_protect" {
          # ============= URL PROTECTION =============
          .udm.category = "email_threat"

          # URL
          if exists(parsed.url) {
              .udm.url = string!(parsed.url)
          }

          # Category/result
          if exists(parsed.category) {
              .udm.category = string!(parsed.category)
          }
          if exists(parsed.scanResult) {
              .ext.scan_result = string!(parsed.scanResult)
          }

          # Action
          if exists(parsed.action) {
              .udm.event_type = string!(parsed.action)
          }

          # Source IP
          if exists(parsed.sendingIp) {
              .udm.src_ip = string!(parsed.sendingIp)
          }

          # Recipient / Sender
          if exists(parsed.userEmailAddress) {
              .udm.recipient = string!(parsed.userEmailAddress)
              r_parts = split(string!(parsed.userEmailAddress), "@")
              if length(r_parts) == 2 {
                  .udm.recipient_domain = r_parts[1]
              }
          }
          if exists(parsed.fromUserEmailAddress) {
              .udm.sender = string!(parsed.fromUserEmailAddress)
              s_parts = split(string!(parsed.fromUserEmailAddress), "@")
              if length(s_parts) == 2 {
                  .udm.sender_domain = s_parts[1]
              }
          }

          # Subject / Message ID
          if exists(parsed.Subject) {
              .udm.subject = string!(parsed.Subject)
          }
          if exists(parsed.messageId) {
              .udm.message_id = string!(parsed.messageId)
          }

          # Route
          if exists(parsed.route) {
              .ext.direction = string!(parsed.route)
          }

          # Account
          if exists(parsed.acc) {
              .ext.account = string!(parsed.acc)
          }

      } else if event_type == "attachment_protect" {
          # ============= ATTACHMENT PROTECTION =============
          .udm.category = "email_threat"

          # File info
          if exists(parsed.fileName) {
              .udm.file_name = string!(parsed.fileName)
          }
          if exists(parsed.fileHash) {
              .udm.file_hash = string!(parsed.fileHash)
          }
          if exists(parsed.fileExt) {
              .ext.file_extension = string!(parsed.fileExt)
          }

          # Result / action
          if exists(parsed.result) {
              .udm.category = string!(parsed.result)
          }
          if exists(parsed.actionTriggered) {
              .udm.event_type = string!(parsed.actionTriggered)
          }

          # Details
          if exists(parsed.details) {
              .ext.details = string!(parsed.details)
          }
          if exists(parsed.definition) {
              .ext.policy_definition = string!(parsed.definition)
          }

          # Sender / recipient
          if exists(parsed.senderAddress) {
              .udm.sender = string!(parsed.senderAddress)
              s_parts = split(string!(parsed.senderAddress), "@")
              if length(s_parts) == 2 {
                  .udm.sender_domain = s_parts[1]
              }
          }
          if exists(parsed.recipientAddress) {
              .udm.recipient = string!(parsed.recipientAddress)
              r_parts = split(string!(parsed.recipientAddress), "@")
              if length(r_parts) == 2 {
                  .udm.recipient_domain = r_parts[1]
              }
          }

          # Subject / message ID
          if exists(parsed.subject) {
              .udm.subject = string!(parsed.subject)
          }
          if exists(parsed.messageId) {
              .udm.message_id = string!(parsed.messageId)
          }

          # Route
          if exists(parsed.route) {
              .ext.direction = string!(parsed.route)
          }

          # Account
          if exists(parsed.acc) {
              .ext.account = string!(parsed.acc)
          }

      } else {
          .udm.category = "email"
          .ext.raw_type = event_type
      }

  } else {
      .metadata.parse_error = to_string(err)
  }

  # Set parser name
  .metadata.parser = "mimecast"

  # Preserve raw log
  .message = raw_log
