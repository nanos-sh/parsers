name: infoblox_dhcp
display_name: Infoblox DHCP
version: "1.2.0"
description: "Parses Infoblox DHCP logs including DISCOVER, OFFER, REQUEST, ACK, RELEASE, NAK, and INFORM messages"
category: network
vendor: "Infoblox"
product: "DHCP"
parser_vrl: |
  # Infoblox DHCP Parser
  # Parses standard dhcpd logs from Infoblox appliances

  # Initialize required structures
  .udm = {}
  .ext = {}
  .metadata = {}

  # Set default values
  .udm.timestamp = now()
  .metadata.parser = "infoblox_dhcp"

  # Get raw log content
  raw_log = string!(.message)

  # 1. Parse Syslog Header
  # Pattern example: "Jan 25 13:13:12 infoblox02 dhcpd[1236]: DHCPDISCOVER from..."
  syslog_regex = r'^(?P<ts>[A-Z][a-z]{2}\s+\d+\s+\d+:\d+:\d+)\s+(?P<host>\S+)\s+(?P<proc>[^:]+):\s+(?P<body>.*)$'
  syslog_parsed, err = parse_regex(raw_log, syslog_regex)

  if err == null && syslog_parsed != null {
      if exists(syslog_parsed.host) {
          .udm.dvc = string!(syslog_parsed.host)
      }

      if exists(syslog_parsed.ts) {
          ts_str = string!(syslog_parsed.ts)
          current_year = format_timestamp!(now(), "%Y")
          full_ts = ts_str + " " + current_year
          ts, ts_err = parse_timestamp(full_ts, "%b %d %H:%M:%S %Y")
          if ts_err == null {
              .udm.timestamp = format_timestamp!(ts, format: "%Y-%m-%d %H:%M:%S")
          }
      }

      if exists(syslog_parsed.body) {
          body = string!(syslog_parsed.body)

          type_match, _ = parse_regex(body, r'^(?P<type>[A-Z]+)')

          dhcp_type = "unknown"
          if type_match != null {
              dhcp_type = string!(type_match.type)
              .udm.event_type = downcase(dhcp_type)
          }

          if dhcp_type == "DHCPDISCOVER" {
              discover_match, _ = parse_regex(body, r'from (?P<mac>[0-9a-fA-F:]{17}) via (?P<interface>\S+)')
              if discover_match != null {
                  .udm.src_mac = string!(discover_match.mac)
                  .ext.server_interface = string!(discover_match.interface)
              } else {
                  discover_simple, _ = parse_regex(body, r'from (?P<mac>[0-9a-fA-F:]{17})')
                  if discover_simple != null {
                      .udm.src_mac = string!(discover_simple.mac)
                  }
              }

          } else if dhcp_type == "DHCPOFFER" {
              offer_match, _ = parse_regex(body, r'on (?P<ip>[\d\.]+) to (?P<mac>[0-9a-fA-F:]{17}) via (?P<interface>\S+)')
              if offer_match != null {
                  .udm.src_ip = string!(offer_match.ip)
                  .udm.src_mac = string!(offer_match.mac)
                  .ext.server_interface = string!(offer_match.interface)
              }

          } else if dhcp_type == "DHCPREQUEST" {
              req_match, _ = parse_regex(body, r'for (?P<ip>[\d\.]+) from (?P<mac>[0-9a-fA-F:]{17}) via (?P<interface>\S+)')
              if req_match != null {
                  .udm.src_ip = string!(req_match.ip)
                  .udm.src_mac = string!(req_match.mac)
                  .ext.server_interface = string!(req_match.interface)
              }

          } else if dhcp_type == "DHCPACK" {
              ack_full, _ = parse_regex(body, r'on (?P<ip>[\d\.]+) to (?P<mac>[0-9a-fA-F:]{17}) \((?P<hostname>.*?)\) via (?P<interface>\S+)')
              if ack_full != null {
                  .udm.src_ip = string!(ack_full.ip)
                  .udm.src_mac = string!(ack_full.mac)
                  .udm.src_host = string!(ack_full.hostname)
                  .ext.server_interface = string!(ack_full.interface)
              } else {
                  ack_simple, _ = parse_regex(body, r'on (?P<ip>[\d\.]+) to (?P<mac>[0-9a-fA-F:]{17}) via (?P<interface>\S+)')
                  if ack_simple != null {
                      .udm.src_ip = string!(ack_simple.ip)
                      .udm.src_mac = string!(ack_simple.mac)
                      .ext.server_interface = string!(ack_simple.interface)
                  }
              }

          } else if dhcp_type == "DHCPRELEASE" {
              rel_full, _ = parse_regex(body, r'of (?P<ip>[\d\.]+) from (?P<mac>[0-9a-fA-F:]{17}) \((?P<hostname>.*?)\) via (?P<interface>\S+)')
              if rel_full != null {
                  .udm.src_ip = string!(rel_full.ip)
                  .udm.src_mac = string!(rel_full.mac)
                  .udm.src_host = string!(rel_full.hostname)
                  .ext.server_interface = string!(rel_full.interface)
              } else {
                  rel_simple, _ = parse_regex(body, r'of (?P<ip>[\d\.]+) from (?P<mac>[0-9a-fA-F:]{17}) via (?P<interface>\S+)')
                  if rel_simple != null {
                      .udm.src_ip = string!(rel_simple.ip)
                      .udm.src_mac = string!(rel_simple.mac)
                      .ext.server_interface = string!(rel_simple.interface)
                  }
              }

          } else if dhcp_type == "DHCPNAK" {
              nak_match, _ = parse_regex(body, r'on (?P<ip>[\d\.]+) to (?P<mac>[0-9a-fA-F:]{17}) via (?P<interface>\S+)')
              if nak_match != null {
                  .udm.src_ip = string!(nak_match.ip)
                  .udm.src_mac = string!(nak_match.mac)
                  .ext.server_interface = string!(nak_match.interface)
                  .udm.description = "DHCP Request Denied"
              }

          } else if dhcp_type == "DHCPINFORM" {
              inform_match, _ = parse_regex(body, r'from (?P<ip>[\d\.]+) via (?P<interface>\S+)')
              if inform_match != null {
                  .udm.src_ip = string!(inform_match.ip)
                  .ext.server_interface = string!(inform_match.interface)
              }
          }
      }
  } else {
      .metadata.parse_error = "syslog_regex_failed"
  }

  .message = raw_log
