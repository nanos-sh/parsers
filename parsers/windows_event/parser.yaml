          .udm.user_domain = string(event_data.TargetDomainName) ?? null
          .udm.user_id = string(event_data.TargetSid) ?? null

          status_4768 = downcase(string(event_data.Status) ?? "")
          .udm.auth_result = if status_4768 == "0x0" { "success" } else { "failure" }
          .ext.status = status_4768

          .ext.service_name = string(event_data.ServiceName) ?? null
          .ext.service_sid = string(event_data.ServiceSid) ?? null
          .ext.ticket_options = string(event_data.TicketOptions) ?? null
          .ext.pre_auth_type = string(event_data.PreAuthType) ?? null

          # Ticket encryption type mapping
          enc_type = downcase(string(event_data.TicketEncryptionType) ?? "")
          .ext.ticket_encryption_type_raw = enc_type
          .ext.ticket_encryption = if enc_type == "0x17" { "RC4-HMAC (potentially Kerberoasting)" } else if enc_type == "0x12" { "AES256" } else if enc_type == "0x11" { "AES128" } else if enc_type == "0x18" { "RC4-HMAC-EXP" } else if enc_type == "0x3" { "DES-CBC-MD5" } else if enc_type == "0x1" { "DES-CBC-CRC" } else { enc_type }

          ip_addr = string(event_data.IpAddress) ?? ""
          # Strip ::ffff: prefix for IPv4-mapped IPv6 addresses
          if starts_with(ip_addr, "::ffff:") {
              ip_addr = slice!(ip_addr, 7)
          }
          if ip_addr != "" && ip_addr != "-" {
              .udm.src_ip = ip_addr
          }
          ip_port = string(event_data.IpPort) ?? ""
          if ip_port != "" && ip_port != "0" {
              .udm.src_port = to_int(ip_port) ?? null
          }

          .ext.cert_issuer_name = string(event_data.CertIssuerName) ?? null
          .ext.cert_serial_number = string(event_data.CertSerialNumber) ?? null
          .ext.cert_thumbprint = string(event_data.CertThumbprint) ?? null
      }

      # === 4769 - Kerberos Service Ticket (TGS-REQ) ===
      if event_id == 4769 {
          .udm.action = "kerberos_service_ticket"
          .udm.category = "authentication"
          .udm.auth_type = "Kerberos"
          .udm.user = string(event_data.TargetUserName) ?? null
          .udm.user_domain = string(event_data.TargetDomainName) ?? null

          status_4769 = downcase(string(event_data.Status) ?? "")
          .udm.auth_result = if status_4769 == "0x0" { "success" } else { "failure" }
          .ext.status = status_4769

          .ext.service_name = string(event_data.ServiceName) ?? null
          .ext.service_sid = string(event_data.ServiceSid) ?? null
          .ext.ticket_options = string(event_data.TicketOptions) ?? null
          .ext.logon_guid = string(event_data.LogonGuid) ?? null
          .ext.transmitted_services = string(event_data.TransmittedServices) ?? null

          enc_type = downcase(string(event_data.TicketEncryptionType) ?? "")
          .ext.ticket_encryption_type_raw = enc_type
          .ext.ticket_encryption = if enc_type == "0x17" { "RC4-HMAC (potentially Kerberoasting)" } else if enc_type == "0x12" { "AES256" } else if enc_type == "0x11" { "AES128" } else if enc_type == "0x18" { "RC4-HMAC-EXP" } else if enc_type == "0x3" { "DES-CBC-MD5" } else if enc_type == "0x1" { "DES-CBC-CRC" } else { enc_type }

          ip_addr = string(event_data.IpAddress) ?? ""
          if starts_with(ip_addr, "::ffff:") {
              ip_addr = slice!(ip_addr, 7)
          }
          if ip_addr != "" && ip_addr != "-" {
              .udm.src_ip = ip_addr
          }
          ip_port = string(event_data.IpPort) ?? ""
          if ip_port != "" && ip_port != "0" {
