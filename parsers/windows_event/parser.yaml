          .udm.user_domain = string(event_data.SubjectDomainName) ?? null
          .udm.user_id = string(event_data.SubjectUserSid) ?? null
          .udm.session_id = string(event_data.SubjectLogonId) ?? null
          .ext.share_name = string(event_data.ShareName) ?? null
          .ext.share_local_path = string(event_data.ShareLocalPath) ?? null
          .ext.access_mask = string(event_data.AccessMask) ?? null
          .ext.access_list = string(event_data.AccessList) ?? null

