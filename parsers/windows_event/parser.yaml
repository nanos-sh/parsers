          .ext.handle_id = string(event_data.HandleId) ?? null
          .ext.resource_attributes = string(event_data.ResourceAttributes) ?? null

          process_name_full = string(event_data.ProcessName) ?? ""
          if process_name_full != "" {
              .udm.process_path = process_name_full
              parts = split(process_name_full, "\\")
              if length(parts) > 0 {
                  .udm.process_name = get(parts, [length(parts) - 1]) ?? null
