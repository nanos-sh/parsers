          .ext.access_mask = string(event_data.AccessMask) ?? null
          .ext.access_list = string(event_data.AccessList) ?? null

          # Extract file_name from RelativeTargetName
          rel_path = string(event_data.RelativeTargetName) ?? ""
          if rel_path != "" {
              parts = split(rel_path, "\\")
              if length(parts) > 0 {
                  .udm.file_name = get(parts, [length(parts) - 1]) ?? null
              }
          }

          ip_addr = string(event_data.IpAddress) ?? ""
          if ip_addr != "" && ip_addr != "-" {
              .udm.src_ip = ip_addr
          }
          ip_port = string(event_data.IpPort) ?? ""
