      # === PowerShell Events (400/403/4103/4104) ===
      if event_id == 4104 {
          .udm.action = "powershell_script_block"
          .udm.category = "process"
          .ext.script_block_text = string(event_data.ScriptBlockText) ?? null
          .ext.script_block_id = string(event_data.ScriptBlockId) ?? null
