      }

      # === 4719 - Audit Policy Changed ===
      if event_id == 4719 {
          .udm.action = "audit_policy_changed"
          .udm.category = "policy"
          .udm.user = string(event_data.SubjectUserName) ?? null
          .udm.user_domain = string(event_data.SubjectDomainName) ?? null
          .ext.subcategory = string(event_data.SubcategoryGuid) ?? null
          .ext.audit_policy_changes = string(event_data.AuditPolicyChanges) ?? null
