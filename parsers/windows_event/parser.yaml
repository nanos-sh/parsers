name: windows_event
display_name: Windows Event Log
version: "1.0.0"
description: "Parses Windows Event Logs from Vector native windows_event_log source, Winlogbeat JSON, and NXLog JSON formats. Covers Security, System, and Application channels with specific field extraction for logon (4624/4625), process creation (4688), service install (4697/7045), Kerberos (4768/4769/4771), account management (4720-4726), group changes (4728/4732/4756), share access (5140/5145), audit log cleared (1102), and more."
match_values:
  - windows_event
  - winlogbeat
  - windows
  - win_event
  - winevent
category: endpoint
vendor: "Microsoft"
product: "Windows"
parser_vrl: |
  # Windows Event Log Parser
  # Supports: Vector native (event_id), Winlogbeat JSON (winlog.event_id), and NXLog flattened JSON (EventID)
  .udm = {}
  .ext = {}
  .metadata = {}

  raw_log = string!(.message)
  parsed, err = parse_json(raw_log)

  if err == null {
      # ---------------------------------------------------------------
      # Detect format: Winlogbeat vs NXLog
      # ---------------------------------------------------------------
      is_winlogbeat = exists(parsed.winlog)
      is_vector_native = exists(parsed.event_id) && exists(parsed.channel) && !exists(parsed.winlog)

      event_id = 0
      event_data = {}
      computer_name = ""
      channel = ""
      provider_name = ""

      if is_winlogbeat {
          # --- Winlogbeat format ---
          winlog = object!(parsed.winlog)

          event_id = to_int(winlog.event_id) ?? 0
          # Fallback: some versions put it under event.code
          if event_id == 0 {
              if exists(parsed.event) {
                  event_id = to_int(object!(parsed.event).code) ?? 0
              }
          }

          if exists(winlog.event_data) {
              event_data = object!(winlog.event_data)
          }

          computer_name = string(winlog.computer_name) ?? ""
          channel = string(winlog.channel) ?? ""
          provider_name = string(winlog.provider_name) ?? ""

          # Timestamp from @timestamp (ISO8601)
          if exists(parsed."@timestamp") {
              ts, ts_err = parse_timestamp(string!(parsed."@timestamp"), "%+")
              if ts_err == null {
                  .udm.timestamp = ts
              }
          }

          # Agent hostname as fallback src_host
          if exists(parsed.agent) {
              agent = object!(parsed.agent)
              if exists(agent.hostname) {
                  .ext.agent_hostname = string!(agent.hostname)
              }
          }

          # Winlog process info (the logging process, not the event subject)
          if exists(winlog.process) {
              wl_proc = object!(winlog.process)
              if exists(wl_proc.pid) {
                  .ext.winlog_process_pid = to_int(wl_proc.pid) ?? null
              }
          }

          # Record ID
          if exists(winlog.record_id) {
              .ext.record_id = to_int(winlog.record_id) ?? null
          }

      } else if is_vector_native {
          # --- Vector native windows_event_log source format ---
          # Fields at top level: event_id, channel, event_data, computer, provider_name, etc.
          event_id = to_int(parsed.event_id) ?? 0

          if exists(parsed.event_data) && is_object(parsed.event_data) {
              event_data = object!(parsed.event_data)
          }

          computer_name = string(parsed.computer) ?? string(parsed.host) ?? ""
          channel = string(parsed.channel) ?? ""
          provider_name = string(parsed.provider_name) ?? ""

          # Timestamp (ISO8601)
          if exists(parsed.timestamp) {
              ts, ts_err = parse_timestamp(string!(parsed.timestamp), "%+")
              if ts_err == null {
                  .udm.timestamp = ts
              }
          }

          # Record ID
          if exists(parsed.record_id) {
              .ext.record_id = to_int(parsed.record_id) ?? null
          }

          # Task name (e.g. "Logon", "Logoff", "Process Creation")
          # Not stored in ext — redundant with udm.action which captures the meaning

          # Keywords (e.g. "Audit Success", "Audit Failure")
          if exists(parsed.keyword_names) && is_array(parsed.keyword_names) {
              .ext.keyword_names = join!(array!(parsed.keyword_names), ", ")
          }

          # Level
          if exists(parsed.level) {
              .ext.level = string(parsed.level) ?? null
          }

          # Process ID of the logging process
          if exists(parsed.process_id) {
              .ext.logging_process_id = to_int(parsed.process_id) ?? null
          }

          # Provider GUID
          if exists(parsed.provider_guid) {
              .ext.provider_guid = string(parsed.provider_guid) ?? null
          }

          # Source host from agent enrichment
          if exists(parsed.src_host) {
              .udm.src_host = string(parsed.src_host) ?? ""
          }

      } else {
          # --- NXLog flattened format ---
          event_id = to_int(parsed.EventID) ?? 0

          computer_name = string(parsed.Hostname) ?? ""
          channel = string(parsed.Channel) ?? ""
          provider_name = string(parsed.SourceName) ?? ""

          # NXLog timestamp
          if exists(parsed.EventTime) {
              ts, ts_err = parse_timestamp(string!(parsed.EventTime), "%Y-%m-%d %H:%M:%S")
              if ts_err == null {
                  .udm.timestamp = ts
              }
          }

          # For NXLog, the entire parsed object acts as event_data
          event_data = parsed
      }

      # ---------------------------------------------------------------
      # Common fields
      # ---------------------------------------------------------------
      .udm.signature_id = to_string(event_id)
      .udm.src_host = computer_name
      .ext.channel = channel
      .ext.provider = provider_name

      if !exists(.udm.timestamp) {
          .udm.timestamp = now()
      }

      .udm.vendor = "Microsoft"
      .udm.product = "Windows"

      # ---------------------------------------------------------------
      # Helper: extract filename from full Windows path
      # (used repeatedly below)
      # ---------------------------------------------------------------

      # ---------------------------------------------------------------
      # LogonType mapping helper
      # ---------------------------------------------------------------
      logon_type_str = string(event_data.LogonType) ?? ""
      logon_type_name = if logon_type_str == "2" { "Interactive" } else if logon_type_str == "3" { "Network" } else if logon_type_str == "4" { "Batch" } else if logon_type_str == "5" { "Service" } else if logon_type_str == "7" { "Unlock" } else if logon_type_str == "8" { "NetworkCleartext" } else if logon_type_str == "9" { "NewCredentials" } else if logon_type_str == "10" { "RemoteInteractive" } else if logon_type_str == "11" { "CachedInteractive" } else { null }

      # ---------------------------------------------------------------
      # Event-specific field extraction
      # ---------------------------------------------------------------

      # === 4624 - Successful Logon ===
      if event_id == 4624 {
          .udm.action = "logon_success"
          .udm.category = "authentication"
          .udm.auth_result = "success"
          .udm.user = string(event_data.TargetUserName) ?? null
          .udm.user_domain = string(event_data.TargetDomainName) ?? null
          .udm.user_id = string(event_data.TargetUserSid) ?? null
          .udm.session_id = string(event_data.TargetLogonId) ?? null
          .udm.src_user = string(event_data.SubjectUserName) ?? null
          .udm.src_nt_domain = string(event_data.SubjectDomainName) ?? null
          .ext.subject_logon_id = string(event_data.SubjectLogonId) ?? null
          .ext.subject_user_sid = string(event_data.SubjectUserSid) ?? null

          if logon_type_name != null {
              .udm.auth_type = logon_type_name
          }
          .ext.logon_type = logon_type_str

          ip_addr = string(event_data.IpAddress) ?? ""
          if ip_addr != "" && ip_addr != "-" {
              .udm.src_ip = ip_addr
          }
          ip_port = string(event_data.IpPort) ?? ""
          if ip_port != "" && ip_port != "0" {
              .udm.src_port = to_int(ip_port) ?? null
          }

          .ext.logon_process = string(event_data.LogonProcessName) ?? null
          .udm.authentication_method = string(event_data.AuthenticationPackageName) ?? null
          .ext.workstation_name = string(event_data.WorkstationName) ?? null
          .ext.logon_guid = string(event_data.LogonGuid) ?? null
          .ext.transmitted_services = string(event_data.TransmittedServices) ?? null
          .ext.lm_package_name = string(event_data.LmPackageName) ?? null
          .ext.key_length = string(event_data.KeyLength) ?? null
          # Resolve Windows %% parameter insertion strings
          imp_raw = string(event_data.ImpersonationLevel) ?? ""
          .ext.impersonation_level = if imp_raw == "%%1831" { "Anonymous" } else if imp_raw == "%%1832" { "Identification" } else if imp_raw == "%%1833" { "Impersonation" } else if imp_raw == "%%1834" { "Delegation" } else if imp_raw == "%%1835" { "Denied" } else if imp_raw == "%%1836" { "System" } else if imp_raw == "%%1837" { "Not Available" } else if imp_raw == "%%1838" { "Default" } else if imp_raw == "%%1839" { "Not Available" } else if imp_raw == "%%1840" { "Anonymous" } else if imp_raw == "%%1841" { "Identify" } else if imp_raw == "%%1842" { "Impersonate" } else if imp_raw == "%%1843" { "Delegate" } else if imp_raw != "" { imp_raw } else { null }
          elev_raw = string(event_data.ElevatedToken) ?? ""
          .ext.elevated_token = if elev_raw == "%%1842" { "Yes" } else if elev_raw == "%%1840" { "No" } else if elev_raw == "%%1841" { "No" } else if elev_raw == "%%1843" { "Default" } else if elev_raw != "" { elev_raw } else { null }
      }

      # === 4625 - Failed Logon ===
      if event_id == 4625 {
          .udm.action = "logon_failure"
          .udm.category = "authentication"
          .udm.auth_result = "failure"
          .udm.user = string(event_data.TargetUserName) ?? null
          .udm.user_domain = string(event_data.TargetDomainName) ?? null
          .udm.src_user = string(event_data.SubjectUserName) ?? null
          .udm.src_nt_domain = string(event_data.SubjectDomainName) ?? null

          if logon_type_name != null {
              .udm.auth_type = logon_type_name
          }
          .ext.logon_type = logon_type_str

          ip_addr = string(event_data.IpAddress) ?? ""
          if ip_addr != "" && ip_addr != "-" {
              .udm.src_ip = ip_addr
          }
          ip_port = string(event_data.IpPort) ?? ""
          if ip_port != "" && ip_port != "0" {
              .udm.src_port = to_int(ip_port) ?? null
          }

          .ext.logon_process = string(event_data.LogonProcessName) ?? null
          .udm.authentication_method = string(event_data.AuthenticationPackageName) ?? null
          .ext.workstation_name = string(event_data.WorkstationName) ?? null
          # Resolve Windows %% failure reason codes
          fr_raw = string(event_data.FailureReason) ?? ""
          .ext.failure_reason_code = if fr_raw == "%%2304" { "Unknown" } else if fr_raw == "%%2305" { "No" } else if fr_raw == "%%2306" { "Yes" } else if fr_raw == "%%2307" { "Workstation" } else if fr_raw == "%%2308" { "Server" } else if fr_raw == "%%2309" { "Domain Controller" } else if fr_raw == "%%2310" { "Logon type not granted" } else if fr_raw == "%%2311" { "Account time restriction" } else if fr_raw == "%%2312" { "Account disabled" } else if fr_raw == "%%2313" { "Unknown user name or bad password" } else if fr_raw != "" { fr_raw } else { null }

          # Map Status/SubStatus to human-readable failure reasons
          status_code = downcase(string(event_data.Status) ?? "")
          sub_status_code = downcase(string(event_data.SubStatus) ?? "")
          .ext.status = status_code
          .ext.sub_status = sub_status_code

          failure_reason = if sub_status_code == "0xc000006a" { "wrong_password" } else if sub_status_code == "0xc0000064" { "no_such_user" } else if sub_status_code == "0xc0000234" { "account_locked" } else if sub_status_code == "0xc0000072" { "account_disabled" } else if sub_status_code == "0xc000006d" { "bad_password" } else if sub_status_code == "0xc000006e" { "restricted_logon" } else if sub_status_code == "0xc000006f" { "outside_logon_hours" } else if sub_status_code == "0xc0000070" { "unauthorized_workstation" } else if sub_status_code == "0xc0000071" { "password_expired" } else if sub_status_code == "0xc0000133" { "clock_skew" } else if sub_status_code == "0xc0000224" { "password_change_required" } else if status_code == "0xc000006d" { "bad_password" } else if status_code == "0xc0000064" { "no_such_user" } else if status_code == "0xc0000234" { "account_locked" } else if status_code == "0xc0000072" { "account_disabled" } else { null }

          if failure_reason != null {
              .udm.result = failure_reason
              .ext.failure_reason = failure_reason
          }
      }

      # === 4634/4647 - Logoff ===
      if event_id == 4634 || event_id == 4647 {
          .udm.action = "logoff"
          .udm.category = "authentication"
          .udm.user = string(event_data.TargetUserName) ?? null
          .udm.user_domain = string(event_data.TargetDomainName) ?? null
          .udm.user_id = string(event_data.TargetUserSid) ?? null
          .udm.session_id = string(event_data.TargetLogonId) ?? null
          .ext.logon_type = logon_type_str
      }

      # === 4648 - Explicit Credentials ===
      if event_id == 4648 {
          .udm.action = "explicit_credentials"
          .udm.category = "authentication"
          .udm.src_user = string(event_data.SubjectUserName) ?? null
          .udm.src_nt_domain = string(event_data.SubjectDomainName) ?? null
          .udm.dest_user = string(event_data.TargetUserName) ?? null
          .udm.dest_nt_domain = string(event_data.TargetDomainName) ?? null
          .ext.target_server_name = string(event_data.TargetServerName) ?? null
          .ext.target_info = string(event_data.TargetInfo) ?? null
          .ext.subject_logon_id = string(event_data.SubjectLogonId) ?? null

          process_name_full = string(event_data.ProcessName) ?? ""
          if process_name_full != "" && process_name_full != "-" {
              .udm.process_path = process_name_full
              parts = split(process_name_full, "\\")
              if length(parts) > 0 {
                  .udm.process_name = get(parts, [length(parts) - 1]) ?? null
              }
          }

          ip_addr = string(event_data.IpAddress) ?? ""
          if ip_addr != "" && ip_addr != "-" {
              .udm.src_ip = ip_addr
          }
          ip_port = string(event_data.IpPort) ?? ""
          if ip_port != "" && ip_port != "0" {
              .udm.src_port = to_int(ip_port) ?? null
          }
      }

      # === 4672 - Special Privileges Assigned ===
      if event_id == 4672 {
          .udm.action = "special_privileges_assigned"
          .udm.category = "authorization"
          .udm.user = string(event_data.SubjectUserName) ?? null
          .udm.user_domain = string(event_data.SubjectDomainName) ?? null
          .udm.user_id = string(event_data.SubjectUserSid) ?? null
          .udm.session_id = string(event_data.SubjectLogonId) ?? null
          raw_privs = string(event_data.PrivilegeList) ?? ""
          if raw_privs != "" {
              parts = split(raw_privs, r'\s+')
              cleaned = filter(parts) -> |_i, v| { v != "" }
              .ext.privileges = join!(cleaned, ", ")
          }
      }

      # === 4688 - Process Creation ===
      if event_id == 4688 {
          .udm.action = "process_create"
          .udm.category = "process"

          new_process = string(event_data.NewProcessName) ?? ""
          if new_process != "" {
              .udm.process_path = new_process
              parts = split(new_process, "\\")
              if length(parts) > 0 {
                  .udm.process_name = get(parts, [length(parts) - 1]) ?? null
              }
          }

          .udm.process = string(event_data.CommandLine) ?? null

          parent_process = string(event_data.ParentProcessName) ?? ""
          if parent_process != "" {
              .udm.parent_process_path = parent_process
              .udm.parent_process = parent_process
              parts = split(parent_process, "\\")
              if length(parts) > 0 {
                  .udm.parent_process_name = get(parts, [length(parts) - 1]) ?? null
              }
          }

          .udm.user = string(event_data.SubjectUserName) ?? string(event_data.TargetUserName) ?? null
          .udm.user_domain = string(event_data.SubjectDomainName) ?? string(event_data.TargetDomainName) ?? null
          .udm.user_id = string(event_data.SubjectUserSid) ?? string(event_data.TargetUserSid) ?? null
          .udm.session_id = string(event_data.SubjectLogonId) ?? string(event_data.TargetLogonId) ?? null

          # Process IDs - handle hex format (0x1234)
          new_pid_str = string(event_data.NewProcessId) ?? ""
          if new_pid_str != "" {
              .udm.process_id = to_int(new_pid_str) ?? null
          }

          parent_pid_str = string(event_data.ProcessId) ?? ""
          if parent_pid_str != "" {
              .udm.parent_process_id = to_int(parent_pid_str) ?? null
          }

          .ext.token_elevation_type = string(event_data.TokenElevationType) ?? null
          .ext.mandatory_label = string(event_data.MandatoryLabel) ?? null

          # Map MandatoryLabel SID to integrity level
          mandatory_label = string(event_data.MandatoryLabel) ?? ""
          .udm.process_integrity_level = if mandatory_label == "S-1-16-0" { "Untrusted" } else if mandatory_label == "S-1-16-4096" { "Low" } else if mandatory_label == "S-1-16-8192" { "Medium" } else if mandatory_label == "S-1-16-8448" { "MediumPlus" } else if mandatory_label == "S-1-16-12288" { "High" } else if mandatory_label == "S-1-16-16384" { "System" } else { null }
      }

      # === 4689 - Process Termination ===
      if event_id == 4689 {
          .udm.action = "process_terminate"
          .udm.category = "process"
          process_name_full = string(event_data.ProcessName) ?? ""
          if process_name_full != "" {
              .udm.process_path = process_name_full
              parts = split(process_name_full, "\\")
              if length(parts) > 0 {
                  .udm.process_name = get(parts, [length(parts) - 1]) ?? null
              }
          }
          .udm.user = string(event_data.SubjectUserName) ?? null
          .udm.user_domain = string(event_data.SubjectDomainName) ?? null
          .udm.session_id = string(event_data.SubjectLogonId) ?? null
          .udm.status = string(event_data.Status) ?? null

          pid_str = string(event_data.ProcessId) ?? ""
          if pid_str != "" {
              .udm.process_id = to_int(pid_str) ?? null
          }
      }

      # === 4697 - Service Installed (Security log) ===
      if event_id == 4697 {
          .udm.action = "service_installed"
          .udm.category = "service"
          .udm.user = string(event_data.SubjectUserName) ?? null
          .udm.user_domain = string(event_data.SubjectDomainName) ?? null
          .udm.user_id = string(event_data.SubjectUserSid) ?? null
          .udm.session_id = string(event_data.SubjectLogonId) ?? null
          .udm.service_name = string(event_data.ServiceName) ?? null
          .udm.service_path = string(event_data.ServiceFileName) ?? null
          .ext.service_type = string(event_data.ServiceType) ?? null
          .ext.service_start_type = string(event_data.ServiceStartType) ?? null
          .ext.service_account = string(event_data.ServiceAccount) ?? null
      }

      # === 7045 - Service Installed (System log) ===
      if event_id == 7045 {
          .udm.action = "service_installed"
          .udm.category = "service"
          .udm.service_name = string(event_data.ServiceName) ?? null
          .udm.service_path = string(event_data.ImagePath) ?? null
          .ext.service_type = string(event_data.ServiceType) ?? null
          .ext.service_start_type = string(event_data.StartType) ?? null
          .ext.service_account = string(event_data.AccountName) ?? null
      }

      # === 4720 - User Account Created ===
      if event_id == 4720 {
          .udm.action = "account_created"
          .udm.category = "account_management"
          .udm.src_user = string(event_data.SubjectUserName) ?? null
          .udm.src_nt_domain = string(event_data.SubjectDomainName) ?? null
          .udm.dest_user = string(event_data.TargetUserName) ?? null
          .udm.dest_nt_domain = string(event_data.TargetDomainName) ?? null
          .udm.user_id = string(event_data.TargetSid) ?? null
          .ext.subject_logon_id = string(event_data.SubjectLogonId) ?? null
          .ext.sam_account_name = string(event_data.SamAccountName) ?? null
          .ext.display_name = string(event_data.DisplayName) ?? null
          .ext.user_principal_name = string(event_data.UserPrincipalName) ?? null
          .ext.primary_group_id = string(event_data.PrimaryGroupId) ?? null
          .ext.password_last_set = string(event_data.PasswordLastSet) ?? null
          .ext.account_expires = string(event_data.AccountExpires) ?? null
          .ext.user_account_control = string(event_data.UserAccountControl) ?? null
      }

      # === 4722 - User Account Enabled ===
      if event_id == 4722 {
          .udm.action = "account_enabled"
          .udm.category = "account_management"
          .udm.src_user = string(event_data.SubjectUserName) ?? null
          .udm.src_nt_domain = string(event_data.SubjectDomainName) ?? null
          .udm.dest_user = string(event_data.TargetUserName) ?? null
          .udm.dest_nt_domain = string(event_data.TargetDomainName) ?? null
          .udm.user_id = string(event_data.TargetSid) ?? null
      }

      # === 4723 - Password Change Attempt ===
      if event_id == 4723 {
          .udm.action = "password_change_attempt"
          .udm.category = "account_management"
          .udm.src_user = string(event_data.SubjectUserName) ?? null
          .udm.src_nt_domain = string(event_data.SubjectDomainName) ?? null
          .udm.dest_user = string(event_data.TargetUserName) ?? null
          .udm.dest_nt_domain = string(event_data.TargetDomainName) ?? null
          .udm.user_id = string(event_data.TargetSid) ?? null
      }

      # === 4724 - Password Reset ===
      if event_id == 4724 {
          .udm.action = "password_reset"
          .udm.category = "account_management"
          .udm.src_user = string(event_data.SubjectUserName) ?? null
          .udm.src_nt_domain = string(event_data.SubjectDomainName) ?? null
          .udm.dest_user = string(event_data.TargetUserName) ?? null
          .udm.dest_nt_domain = string(event_data.TargetDomainName) ?? null
          .udm.user_id = string(event_data.TargetSid) ?? null
      }

      # === 4725 - User Account Disabled ===
      if event_id == 4725 {
          .udm.action = "account_disabled"
          .udm.category = "account_management"
          .udm.src_user = string(event_data.SubjectUserName) ?? null
          .udm.src_nt_domain = string(event_data.SubjectDomainName) ?? null
          .udm.dest_user = string(event_data.TargetUserName) ?? null
          .udm.dest_nt_domain = string(event_data.TargetDomainName) ?? null
          .udm.user_id = string(event_data.TargetSid) ?? null
      }

      # === 4726 - User Account Deleted ===
      if event_id == 4726 {
          .udm.action = "account_deleted"
          .udm.category = "account_management"
          .udm.src_user = string(event_data.SubjectUserName) ?? null
          .udm.src_nt_domain = string(event_data.SubjectDomainName) ?? null
          .udm.dest_user = string(event_data.TargetUserName) ?? null
          .udm.dest_nt_domain = string(event_data.TargetDomainName) ?? null
          .udm.user_id = string(event_data.TargetSid) ?? null
      }

      # === 4728/4732/4756 - Group Membership Changes ===
      # 4728 = member added to global group
      # 4732 = member added to local group
      # 4756 = member added to universal group
      if event_id == 4728 || event_id == 4732 || event_id == 4756 {
          .udm.action = if event_id == 4728 { "member_added_global_group" } else if event_id == 4732 { "member_added_local_group" } else { "member_added_universal_group" }
          .udm.category = "account_management"
          .udm.user = string(event_data.MemberName) ?? string(event_data.MemberSid) ?? null
          .udm.src_user = string(event_data.SubjectUserName) ?? null
          .udm.src_nt_domain = string(event_data.SubjectDomainName) ?? null
          .ext.group_name = string(event_data.TargetUserName) ?? null
          .ext.group_domain = string(event_data.TargetDomainName) ?? null
          .ext.group_sid = string(event_data.TargetSid) ?? null
          .ext.member_sid = string(event_data.MemberSid) ?? null
          .ext.subject_logon_id = string(event_data.SubjectLogonId) ?? null
      }

      # === 4729/4733/4757 - Group Membership Removed ===
      if event_id == 4729 || event_id == 4733 || event_id == 4757 {
