      # === 4946/4947/4948/4950 - Windows Firewall Rule Changes ===
      if event_id == 4946 || event_id == 4947 || event_id == 4948 || event_id == 4950 {
          .udm.action = if event_id == 4946 { "firewall_rule_added" } else if event_id == 4947 { "firewall_rule_modified" } else if event_id == 4948 { "firewall_rule_deleted" } else { "firewall_settings_changed" }
          .udm.category = "firewall"
          .udm.rule_name = string(event_data.RuleName) ?? null
          .ext.rule_id = string(event_data.RuleId) ?? null
          .ext.rule_attr_value = string(event_data.RuleAttr) ?? null
          .ext.profile = string(event_data.ProfileChanged) ?? null
