          .ext.task_name = string(event_data.TaskName) ?? null
      }
      if event_id == 4700 {
          .udm.action = "scheduled_task_enabled"
          .udm.category = "process"
          .udm.user = string(event_data.SubjectUserName) ?? null
          .ext.task_name = string(event_data.TaskName) ?? null
      }
      if event_id == 4701 {
          .udm.action = "scheduled_task_disabled"
          .udm.category = "process"
