          .udm.action = "dcom_permission_error"
          .udm.category = "application"
          .udm.severity = "low"
          .udm.user_id = string(event_data.param7) ?? null
          .ext.clsid = string(event_data.param5) ?? null
          .ext.appid = string(event_data.param6) ?? null
      }

      # === 16384/16394 - Software Protection / Licensing ===
      if (event_id == 16384 || event_id == 16394) && downcase(channel) == "application" {
          .udm.action = "software_protection"
          .udm.category = "application"
      }

      # ---------------------------------------------------------------
      # Surface message for all events that have one
      # ---------------------------------------------------------------
      raw_message = string(parsed.message) ?? ""
      if raw_message != "" && !exists(.udm.message) {
          .udm.message = raw_message
      }

      # ---------------------------------------------------------------
      # Improved fallback: extract common fields for unhandled event IDs
      # ---------------------------------------------------------------
      if !exists(.udm.action) || .udm.action == null {
          # Derive category from channel
          ch = downcase(channel)
          if contains(ch, "security") {
              .udm.category = "security"
          } else if contains(ch, "system") {
              .udm.category = "system"
          } else if contains(ch, "application") {
              .udm.category = "application"
          } else if contains(ch, "powershell") {
              .udm.category = "process"
          } else if contains(ch, "defender") {
              .udm.category = "threat"
          }

          # Try to extract user from common event_data patterns
          if exists(event_data.SubjectUserName) {
              .udm.user = string(event_data.SubjectUserName) ?? null
              .udm.user_domain = string(event_data.SubjectDomainName) ?? null
          } else if exists(event_data.TargetUserName) {
              .udm.user = string(event_data.TargetUserName) ?? null
              .udm.user_domain = string(event_data.TargetDomainName) ?? null
          }

          # Try to extract IP
          if exists(event_data.IpAddress) {
              ip = string(event_data.IpAddress) ?? ""
              if ip != "" && ip != "-" {
                  .udm.src_ip = ip
              }
          }
      }

      # === NXLog-specific extra fields ===
      if !is_winlogbeat {
          if exists(parsed.EventType) {
              .ext.event_type = string!(parsed.EventType)
          }
          if exists(parsed.Message) && !exists(.ext.original_message) {
              .ext.original_message = string!(parsed.Message)
          }
          if exists(parsed.AccountType) {
              .udm.user_type = string!(parsed.AccountType)
          }
          # NXLog may provide SourceAddress directly
          if exists(parsed.SourceAddress) {
              src = string!(parsed.SourceAddress)
              if src != "" && src != "-" {
                  .udm.src_ip = src
              }
          }
          # NXLog may provide AccountName
          if exists(parsed.AccountName) && !exists(.udm.user) {
              .udm.user = string!(parsed.AccountName)
          }
          if exists(parsed.Domain) && !exists(.udm.user_domain) {
              .udm.user_domain = string!(parsed.Domain)
          }
      }

      # ---------------------------------------------------------------
      # Fallback action label for unhandled event IDs
      # ---------------------------------------------------------------
      if !exists(.udm.action) || .udm.action == null {
          .udm.action = downcase(channel) + "_" + to_string(event_id)
      }

      # Clean up raw fields that are already mapped to UDM/ext
      # to prevent them leaking into the ext JSON column as duplicates
      del(.event_id)
      del(.computer)
      del(.provider_name)
      del(.timestamp)
      del(.event_data)
      del(.activity_id)
      del(.version)
      del(.task)
      del(.thread_id)
      del(.keywords)
      del(.host)
      del(.task_name)
      del(.channel)
      del(.level)
      # Note: level_value and string_inserts kept in ext — useful for analysis
      del(.keyword_names)
      del(.record_id)
      del(.process_id)
      del(.provider_guid)
      del(.qualifiers)
      # Note: do NOT del(.message) — it's the raw log stored in the message column

      # ---------------------------------------------------------------
      # Severity mapping from Windows keywords/levels
      # ---------------------------------------------------------------
      if is_winlogbeat {
          if exists(parsed.winlog.keywords) {
              keywords = parsed.winlog.keywords
              if is_array(keywords) {
                  kw_str = join!(array!(keywords), ",")
                  if contains(downcase(kw_str), "failure") {
                      .udm.severity = "medium"
                  }
              }
          }
          if exists(parsed.winlog.level) {
              level = downcase(string(parsed.winlog.level) ?? "")
              if level == "critical" {
                  .udm.severity = "critical"
              } else if level == "error" {
                  .udm.severity = "high"
              } else if level == "warning" {
                  .udm.severity = "medium"
              }
          }
      }

      # Vector native format severity mapping
      if is_vector_native {
          if exists(parsed.keyword_names) && is_array(parsed.keyword_names) {
              kw_str = downcase(join!(array!(parsed.keyword_names), ","))
              if contains(kw_str, "failure") {
                  .udm.severity = "medium"
              }
          }
          level = downcase(string(parsed.level) ?? "")
          if level == "critical" {
              .udm.severity = "critical"
          } else if level == "error" {
              .udm.severity = "high"
          } else if level == "warning" {
              .udm.severity = "medium"
          }
      }

      # Bump severity for known high-value events
      if event_id == 1102 {
          .udm.severity = "high"
      }

  } else {
      .metadata.parse_error = to_string(err)
  }

  .message = raw_log
