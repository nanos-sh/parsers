      }

      # === 1001 - Windows Error Reporting ===
      if event_id == 1001 && downcase(channel) == "application" {
          .udm.action = "error_report"
          .udm.category = "application"
          .ext.fault_bucket = string(event_data.param1) ?? null
      }

      # === 1002 - Application Hang ===
