      }
      if event_id == 4103 {
          .udm.action = "powershell_module_logging"
          .udm.category = "process"
          .ext.payload = string(event_data.Payload) ?? null
      }

      # === Defender Events (1006/1007/1116/1117) ===
      if event_id == 1116 || event_id == 1006 {
          .udm.action = "malware_detected"
          .udm.category = "threat"
          .udm.severity = "high"
          .ext.threat_name = string(event_data."Threat Name") ?? string(event_data.ThreatName) ?? null
          .ext.severity_name = string(event_data."Severity Name") ?? string(event_data.SeverityName) ?? null
          .ext.path = string(event_data.Path) ?? string(event_data."Path") ?? null
          .udm.user = string(event_data."Detection User") ?? null
      }
      if event_id == 1117 || event_id == 1007 {
          .udm.action = "malware_action_taken"
          .udm.category = "threat"
          .ext.threat_name = string(event_data."Threat Name") ?? string(event_data.ThreatName) ?? null
          .ext.action_name = string(event_data."Action Name") ?? string(event_data.ActionName) ?? null
          .ext.path = string(event_data.Path) ?? null
      }

      # ---------------------------------------------------------------
      # Application Channel Events
      # ---------------------------------------------------------------

      # === 1000 - Application Error (crash) ===
      if event_id == 1000 && downcase(channel) == "application" {
          .udm.action = "application_crash"
          .udm.category = "application"
          .udm.severity = "high"
          .udm.process_name = string(event_data.param1) ?? null
          .ext.app_version = string(event_data.param2) ?? null
          .ext.faulting_module = string(event_data.param3) ?? null
