name: azure_activity
display_name: Azure Activity Log
version: "1.1.0"
description: "Parses Azure Monitor Activity Logs including operations, status, caller identity, resources, and cloud context"
match_values:
  - azure_activity
  - azure_activity_log
category: cloud
vendor: "Microsoft"
product: "Azure"
parser_vrl: |
  # Azure Activity Log Parser
  # Parses JSON-formatted Azure Monitor Activity Logs

  # Initialize required structures
  .udm = {}
  .ext = {}
  .metadata = {}

  # Set defaults
  .udm.timestamp = now()

  # Get raw log content
  raw_log = to_string(.message) ?? ""

  # Parse JSON
  parsed, err = parse_json(raw_log)

  if err == null {
      # --- Core Fields ---

      # Timestamp
      if exists(parsed.eventTimestamp) {
          ts, ts_err = parse_timestamp(string!(parsed.eventTimestamp), "%+")
          if ts_err == null {
              .udm.timestamp = format_timestamp!(ts, format: "%Y-%m-%d %H:%M:%S")
          }
      }

      # Action / Operation
      if exists(parsed.operationName.value) {
          .udm.action = string!(parsed.operationName.value)
      } else if exists(parsed.eventName.value) {
          .udm.action = string!(parsed.eventName.value)
      }

      # Status
      if exists(parsed.status.value) {
          status_val = downcase(string!(parsed.status.value))
          .udm.status = if status_val == "succeeded" {
              "success"
          } else if status_val == "failed" {
              "failure"
          } else {
              status_val
          }
          .ext.azure_status = string!(parsed.status.value)
      }

      # HTTP Status Code
      if exists(parsed.properties.statusCode) {
          .udm.http_status_code = to_int(parsed.properties.statusCode) ?? null
      } else if exists(parsed.subStatus.value) {
          .udm.http_status_code = to_int(parsed.subStatus.value) ?? null
      }

      # --- Network & Identity ---

      # Source IP
      if exists(parsed.httpRequest.clientIpAddress) {
          .udm.src_ip = string!(parsed.httpRequest.clientIpAddress)
      } else if exists(parsed.claims.ipaddr) {
          .udm.src_ip = string!(parsed.claims.ipaddr)
      }

      # User / Caller
      if exists(parsed.caller) {
          .udm.user = string!(parsed.caller)
          .udm.src_user = string!(parsed.caller)
      } else if exists(parsed.claims."http://schemas.xmlsoap.org/ws/2005/05/identity/claims/name") {
          .udm.user = string!(parsed.claims."http://schemas.xmlsoap.org/ws/2005/05/identity/claims/name")
      } else if exists(parsed.claims."http://schemas.xmlsoap.org/ws/2005/05/identity/claims/upn") {
          .udm.user = string!(parsed.claims."http://schemas.xmlsoap.org/ws/2005/05/identity/claims/upn")
      }

      # Caller Type
      if exists(parsed.callerType) {
          .udm.src_user_type = string!(parsed.callerType)
      }

      # HTTP Method & URL
      if exists(parsed.httpRequest.method) {
          .udm.http_method = string!(parsed.httpRequest.method)
      }
      if exists(parsed.httpRequest.uri) {
          .udm.url = string!(parsed.httpRequest.uri)
      }
      if exists(parsed.httpRequest.clientRequestId) {
          .ext.client_request_id = string!(parsed.httpRequest.clientRequestId)
      }

      # --- Cloud Resource Context ---
      .udm.cloud_provider = "azure"

      if exists(parsed.tenantId) {
          .udm.cloud_account_id = string!(parsed.tenantId)
          .udm.namespace = "azure:" + string!(parsed.tenantId)
      } else {
          .udm.namespace = "azure:"
      }

      sub_name = if exists(parsed.subscriptionName) { string!(parsed.subscriptionName) } else { null }
      sub_id = if exists(parsed.subscriptionId) { string!(parsed.subscriptionId) } else { null }

      if sub_name != null {
          .udm.cloud_account_name = sub_name
      }
      if sub_id != null {
          .ext.subscription_id = sub_id
      }

      if exists(parsed.resourceGroupName) {
          .ext.resource_group = string!(parsed.resourceGroupName)
      }
      if exists(parsed.resourceLocation) {
          .udm.cloud_region = string!(parsed.resourceLocation)
      }

      if exists(parsed.resourceId) {
          .udm.resource_id = string!(parsed.resourceId)
          .udm.object = string!(parsed.resourceId)
      }
      if exists(parsed.resourceName) {
          .udm.resource_name = string!(parsed.resourceName)
      }

      if exists(parsed.resourceProviderName.value) {
          .udm.cloud_service = string!(parsed.resourceProviderName.value)
      }
      if exists(parsed.resourceType.value) {
          .udm.resource_type = string!(parsed.resourceType.value)
      }

      if exists(parsed.correlationId) {
          .udm.transaction_id = string!(parsed.correlationId)
          .metadata.correlation_id = string!(parsed.correlationId)
      }

      if exists(parsed.category.value) {
          .udm.category = string!(parsed.category.value)
      }
      if exists(parsed.level) {
          .udm.severity = downcase(string!(parsed.level))
      }

      # --- Extended Fields ---
      if exists(parsed.operationId) {
          .ext.operation_id = string!(parsed.operationId)
      }
      if exists(parsed.resourceTypeFriendly) {
          .ext.resource_type_friendly = string!(parsed.resourceTypeFriendly)
      }
      if exists(parsed.changeType) {
          .udm.change_type = string!(parsed.changeType)
      }
      if exists(parsed.mfaAuthenticated) {
          .udm.mfa_used = if to_bool(parsed.mfaAuthenticated) ?? false { 1 } else { 0 }
      }

      if exists(parsed.claims) {
          if exists(parsed.claims.appid) {
              .ext.app_id = string!(parsed.claims.appid)
          }
          if exists(parsed.claims.iss) {
              .ext.issuer = string!(parsed.claims.iss)
          }
      }

      if exists(parsed.properties) {
          if exists(parsed.properties.statusMessage) {
              .ext.status_message = string!(parsed.properties.statusMessage)
          }
          if exists(parsed.properties.serviceRequestId) {
              .ext.service_request_id = string!(parsed.properties.serviceRequestId)
          }
          if exists(parsed.properties.deletedResourceId) {
              .ext.deleted_resource_id = string!(parsed.properties.deletedResourceId)
          }
          if exists(parsed.properties.deletedResourceType) {
              .ext.deleted_resource_type = string!(parsed.properties.deletedResourceType)
          }
      }

  } else {
      .metadata.parse_error = to_string(err)
  }

  .metadata.parser = "azure_activity"
  .message = raw_log
