name: aws_guardduty
display_name: AWS GuardDuty
version: "1.0.0"
description: "Parses AWS GuardDuty findings including network, IAM, S3, and malware detections"
match_values:
  - aws_guardduty
  - guardduty
category: cloud
vendor: "Amazon"
product: "GuardDuty"

parser_vrl: |
  raw_log = string!(.message)
  parsed = parse_json!(raw_log)

  # Core finding fields
  .signature = to_string(parsed.type) ?? null
  .ext.finding_id = to_string(parsed.id) ?? null
  .ext.finding_arn = to_string(parsed.arn) ?? null
  .ext.schema_version = to_string(parsed.schemaVersion) ?? null
  .ext.title = to_string(parsed.title) ?? null
  .ext.description = to_string(parsed.description) ?? null
  .ext.partition = to_string(parsed.partition) ?? null

  # Severity mapping: GuardDuty uses 0-10 scale
  raw_severity = to_float(parsed.severity) ?? 0.0
  .ext.risk_score = raw_severity
  if raw_severity >= 7.0 {
    .severity = "high"
  } else if raw_severity >= 4.0 {
    .severity = "medium"
  } else {
    .severity = "low"
  }

  # Cloud context
  .cloud_account_id = to_string(parsed.accountId) ?? null
  .cloud_region = to_string(parsed.region) ?? null
  .cloud_provider = "aws"
  .cloud_service = "GuardDuty"

  # Timestamps
  created_str = to_string(parsed.createdAt) ?? null
  if created_str != null {
    ts, ts_err = parse_timestamp(created_str, format: "%Y-%m-%dT%H:%M:%S%.fZ")
    if ts_err == null {
      .timestamp = ts
    }
  }
  .ext.updated_at = to_string(parsed.updatedAt) ?? null

  # Resource: IAM access key details
  access_key = parsed.resource.accessKeyDetails
  if access_key != null {
    .user = to_string(access_key.userName) ?? null
    .ext.access_key_id = to_string(access_key.accessKeyId) ?? null
    .ext.principal_id = to_string(access_key.principalId) ?? null
    .user_type = to_string(access_key.userType) ?? null
  }

  # Resource: Instance details
  instance = parsed.resource.instanceDetails
  if instance != null {
    .ext.instance_id = to_string(instance.instanceId) ?? null
    .ext.instance_type = to_string(instance.instanceType) ?? null
    .ext.launch_time = to_string(instance.launchTime) ?? null
    .ext.availability_zone = to_string(instance.availabilityZone) ?? null
    .ext.image_id = to_string(instance.imageId) ?? null

    # Extract first network interface details
    interfaces = array(instance.networkInterfaces) ?? []
    first_iface = get(interfaces, [0]) ?? null
    if first_iface != null {
      .dest_ip = to_string(first_iface.privateIpAddress) ?? null
      .ext.public_ip = to_string(first_iface.publicIp) ?? null
      .ext.private_dns = to_string(first_iface.privateDnsName) ?? null
      .ext.public_dns = to_string(first_iface.publicDnsName) ?? null
      .ext.vpc_id = to_string(first_iface.vpcId) ?? null
      .ext.subnet_id = to_string(first_iface.subnetId) ?? null
      .ext.network_interface_id = to_string(first_iface.networkInterfaceId) ?? null
    }
  }

  # Resource: S3 bucket details
  s3_buckets = array(parsed.resource.s3BucketDetails) ?? []
  first_bucket = get(s3_buckets, [0]) ?? null
  if first_bucket != null {
    .ext.s3_bucket_name = to_string(first_bucket.name) ?? null
    .ext.s3_bucket_arn = to_string(first_bucket.arn) ?? null
    .ext.s3_bucket_type = to_string(first_bucket.type) ?? null
    .resource_type = "S3"
    .resource_name = to_string(first_bucket.name) ?? null
  }

  # Service details
  service = parsed.service
  if service != null {
    .ext.detector_id = to_string(service.detectorId) ?? null
    .ext.event_count = to_int(service.count) ?? null
    .ext.service_name = to_string(service.serviceName) ?? null

    # Action details
    action = service.action
    if action != null {
      action_type = to_string(action.actionType) ?? ""

      if action_type == "AWS_API_CALL" {
        api_action = action.awsApiCallAction
        if api_action != null {
          .action = to_string(api_action.api) ?? null
          .ext.api_service = to_string(api_action.serviceName) ?? null
          .ext.caller_type = to_string(api_action.callerType) ?? null

          remote_ip = api_action.remoteIpDetails
          if remote_ip != null {
            .src_ip = to_string(remote_ip.ipAddressV4) ?? null
            .ext.src_org = to_string(remote_ip.organization.org) ?? null
            .ext.src_isp = to_string(remote_ip.organization.isp) ?? null
            .ext.src_asn = to_string(remote_ip.organization.asn) ?? null
            .enriched_src_country = to_string(remote_ip.country.countryName) ?? null
            .ext.src_city = to_string(remote_ip.city.cityName) ?? null
          }
        }
      } else if action_type == "NETWORK_CONNECTION" {
        net_action = action.networkConnectionAction
        if net_action != null {
          .direction = to_string(net_action.connectionDirection) ?? null
          .protocol = downcase(to_string(net_action.protocol) ?? "")

          remote_ip = net_action.remoteIpDetails
          if remote_ip != null {
            .src_ip = to_string(remote_ip.ipAddressV4) ?? null
            .enriched_src_country = to_string(remote_ip.country.countryName) ?? null
          }

          local_port = net_action.localPortDetails
          if local_port != null {
            .dest_port = to_int(local_port.port) ?? null
          }

          remote_port = net_action.remotePortDetails
          if remote_port != null {
            .src_port = to_int(remote_port.port) ?? null
          }
        }
      } else if action_type == "DNS_REQUEST" {
        dns_action = action.dnsRequestAction
        if dns_action != null {
          .ext.dns_domain = to_string(dns_action.domain) ?? null
          .url_domain = to_string(dns_action.domain) ?? null
        }
      } else if action_type == "PORT_PROBE" {
        port_probe = action.portProbeAction
        if port_probe != null {
          .ext.port_probe_blocked = to_bool(port_probe.blocked) ?? null
        }
      }
    }

    # Evidence / threat intel
    evidence = service.evidence
    if evidence != null {
      threat_details = array(evidence.threatIntelligenceDetails) ?? []
      first_threat = get(threat_details, [0]) ?? null
      if first_threat != null {
        .ext.threat_list_name = to_string(first_threat.threatListName) ?? null
        threat_names = array(first_threat.threatNames) ?? []
        first_threat_name = get(threat_names, [0]) ?? null
        if first_threat_name != null {
          .ext.threat_name = to_string!(first_threat_name)
        }
      }
    }

    .ext.is_sample = to_bool(service.additionalInfo.sample) ?? null
  }

  .vendor = "Amazon"
  .product = "GuardDuty"
  .category = "security"

  del(.message)
