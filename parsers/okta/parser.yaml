name: okta
display_name: Okta
version: "1.0.0"
description: "Parses Okta System Log events from /api/v1/logs including authentication, user lifecycle, group membership, policy evaluation, and administrative actions"
match_values:
  - okta
  - okta_system
  - okta_syslog
category: security
vendor: "Okta"
product: "Identity Cloud"
parser_vrl: |
  # Okta System Log Parser
  # Parses JSON events from the Okta /api/v1/logs endpoint

  # Initialize required structures
  .udm = {}
  .ext = {}
  .metadata = {}

  # Set defaults
  .udm.timestamp = now()
  .udm.vendor = "Okta"
  .udm.product = "Identity Cloud"
  .udm.vendor_product = "Okta Identity Cloud"

  # Get raw log content
  raw_log = to_string(.message) ?? ""

  # Parse JSON
  parsed, err = parse_json(raw_log)

  if err == null {
      # --- Timestamp ---
      if exists(parsed.published) {
          ts, ts_err = parse_timestamp(string!(parsed.published), "%+")
          if ts_err == null {
              .udm.timestamp = format_timestamp!(ts, format: "%Y-%m-%d %H:%M:%S")
          }
      }

      # --- Event Type / Action ---
      if exists(parsed.eventType) {
          .udm.action = string!(parsed.eventType)
      }

      # --- Display Message ---
      if exists(parsed.displayMessage) {
          .ext.display_message = string!(parsed.displayMessage)
      }

      # --- Severity ---
      if exists(parsed.severity) {
          sev = downcase(string!(parsed.severity))
          .udm.severity = sev
      }

      # --- Event UUID ---
      if exists(parsed.uuid) {
          .ext.event_uuid = string!(parsed.uuid)
          .metadata.event_id = string!(parsed.uuid)
      }

      # --- Version ---
      if exists(parsed.version) {
          .ext.event_version = to_string(parsed.version) ?? ""
      }

      # --- Legacy Event Type ---
      if exists(parsed.legacyEventType) {
          .ext.legacy_event_type = string!(parsed.legacyEventType)
      }

      # --- Actor ---
      if exists(parsed.actor) {
          actor = parsed.actor

          if exists(actor.alternateId) {
              .udm.src_user = string!(actor.alternateId)

              # Extract user domain from alternateId (part after @)
              alt_id = string!(actor.alternateId)
              parts = split(alt_id, "@")
              if length(parts) == 2 {
                  .udm.user_domain = parts[1]
                  .udm.user_name = parts[0]
              }
          }

          if exists(actor.displayName) {
              .ext.actor_display_name = string!(actor.displayName)
          }

          if exists(actor.id) {
              .ext.actor_id = string!(actor.id)
              .udm.user_id = string!(actor.id)
          }

          if exists(actor.type) {
              .udm.user_type = string!(actor.type)
          }
      }

      # --- Outcome ---
      if exists(parsed.outcome) {
          outcome = parsed.outcome

          if exists(outcome.result) {
              raw_result = downcase(string!(outcome.result))

              # Normalize result
              result_val = if raw_result == "success" {
                  "success"
              } else if raw_result == "failure" {
                  "failure"
              } else if raw_result == "skipped" {
                  "skipped"
              } else if raw_result == "allow" {
                  "allow"
              } else if raw_result == "deny" {
                  "deny"
              } else {
                  raw_result
              }

              .udm.result = result_val

              # Set status based on result
              .udm.status = if raw_result == "success" || raw_result == "allow" {
                  "success"
              } else if raw_result == "failure" || raw_result == "deny" {
                  "failure"
              } else {
                  raw_result
              }

              # Map auth_result for authentication events
              event_type = to_string(parsed.eventType) ?? ""
              if starts_with(event_type, "user.session") || starts_with(event_type, "user.authentication") || contains(event_type, "auth") || contains(event_type, "login") || contains(event_type, "sso") {
                  .udm.auth_result = result_val
              }
          }

          if exists(outcome.reason) {
              reason = to_string(outcome.reason) ?? ""
              if reason != "" && reason != "null" {
                  .ext.outcome_reason = reason
              }
          }
      }

      # --- Client ---
      if exists(parsed.client) {
          client = parsed.client

          # Source IP
          if exists(client.ipAddress) {
              .udm.src_ip = string!(client.ipAddress)
          }

          # Device
          if exists(client.device) {
              .ext.client_device = string!(client.device)
          }

          # Zone
          if exists(client.zone) {
              zone_val = to_string(client.zone) ?? ""
              if zone_val != "" && zone_val != "null" {
                  .ext.client_zone = zone_val
              }
          }

          # User Agent
          if exists(client.userAgent) {
              ua = client.userAgent

              if exists(ua.rawUserAgent) {
                  .udm.http_user_agent = string!(ua.rawUserAgent)
              }

              if exists(ua.os) {
                  .ext.client_os = string!(ua.os)
              }

              if exists(ua.browser) {
                  .ext.client_browser = string!(ua.browser)
              }
          }

          # Geographical Context
          if exists(client.geographicalContext) {
              geo = client.geographicalContext

              if exists(geo.city) {
                  .ext.geo_city = string!(geo.city)
              }
              if exists(geo.state) {
                  .ext.geo_state = string!(geo.state)
              }
              if exists(geo.country) {
                  .ext.geo_country = string!(geo.country)
              }
              if exists(geo.postalCode) {
                  .ext.geo_postal_code = string!(geo.postalCode)
              }

              if exists(geo.geolocation) {
                  if exists(geo.geolocation.lat) {
                      .ext.geo_lat = to_string(geo.geolocation.lat) ?? ""
                  }
                  if exists(geo.geolocation.lon) {
                      .ext.geo_lon = to_string(geo.geolocation.lon) ?? ""
                  }
              }
          }
      }

      # --- Authentication Context ---
      if exists(parsed.authenticationContext) {
          auth_ctx = parsed.authenticationContext

          if exists(auth_ctx.credentialType) {
              .udm.auth_type = string!(auth_ctx.credentialType)
          }

          if exists(auth_ctx.authenticationProvider) {
              .udm.authentication_service = string!(auth_ctx.authenticationProvider)
          }

          if exists(auth_ctx.credentialProvider) {
              .ext.credential_provider = string!(auth_ctx.credentialProvider)
          }

          if exists(auth_ctx.externalSessionId) {
              .udm.session_id = string!(auth_ctx.externalSessionId)
          }

          if exists(auth_ctx.interface) {
              .ext.auth_interface = string!(auth_ctx.interface)
          }

          if exists(auth_ctx.issuer) {
              issuer_val = to_string(auth_ctx.issuer) ?? ""
              if issuer_val != "" && issuer_val != "null" {
                  .ext.auth_issuer = issuer_val
              }
          }

          # Detect MFA usage from credentialType or event type
          cred_type = downcase(to_string(auth_ctx.credentialType) ?? "")
          if cred_type == "otp" || cred_type == "sms" || cred_type == "push" || cred_type == "totp" || cred_type == "webauthn" || cred_type == "signed_nonce" {
              .udm.mfa_used = "true"
          }

          event_type = to_string(parsed.eventType) ?? ""
          if contains(event_type, "mfa") || contains(event_type, "auth_via_mfa") {
              .udm.mfa_used = "true"
          }
      }

      # --- Target Array ---
      if exists(parsed.target) && is_array(parsed.target) {
          targets = array!(parsed.target)
          idx = 0
          user_target_found = false
          app_target_found = false

          # Encode full target array for reference
          .ext.targets = encode_json(parsed.target)

          target_len = length(targets)
          # Iterate targets - find first User and first AppInstance
          if target_len > 0 {
              t0 = targets[0]
              if exists(t0.type) {
                  t0_type = string!(t0.type)
                  if t0_type == "User" && !user_target_found {
                      if exists(t0.alternateId) {
                          .udm.dest_user = string!(t0.alternateId)
                      }
                      if exists(t0.displayName) {
                          .ext.target_user_display_name = string!(t0.displayName)
                      }
                      if exists(t0.id) {
                          .ext.target_user_id = string!(t0.id)
                      }
                      user_target_found = true
                  } else if t0_type == "AppInstance" && !app_target_found {
                      if exists(t0.displayName) {
                          .udm.app = string!(t0.displayName)
                      }
                      if exists(t0.id) {
                          .udm.app_id = string!(t0.id)
                      }
                      if exists(t0.alternateId) {
                          .ext.app_alternate_id = string!(t0.alternateId)
                      }
                      app_target_found = true
                  } else if t0_type == "UserGroup" {
                      if exists(t0.displayName) {
                          .ext.target_group_name = string!(t0.displayName)
                      }
                      if exists(t0.id) {
                          .ext.target_group_id = string!(t0.id)
                      }
                  } else if t0_type == "Policy" {
                      if exists(t0.displayName) {
                          .ext.target_policy_name = string!(t0.displayName)
                      }
                      if exists(t0.id) {
                          .ext.target_policy_id = string!(t0.id)
                      }
                      if exists(t0.alternateId) {
                          .ext.target_policy_alternate_id = string!(t0.alternateId)
                      }
                  }
              }
          }

          if target_len > 1 {
              t1 = targets[1]
              if exists(t1.type) {
                  t1_type = string!(t1.type)
                  if t1_type == "User" && !user_target_found {
                      if exists(t1.alternateId) {
                          .udm.dest_user = string!(t1.alternateId)
                      }
                      if exists(t1.displayName) {
                          .ext.target_user_display_name = string!(t1.displayName)
                      }
                      if exists(t1.id) {
                          .ext.target_user_id = string!(t1.id)
                      }
                      user_target_found = true
                  } else if t1_type == "AppInstance" && !app_target_found {
                      if exists(t1.displayName) {
                          .udm.app = string!(t1.displayName)
                      }
                      if exists(t1.id) {
                          .udm.app_id = string!(t1.id)
                      }
                      if exists(t1.alternateId) {
                          .ext.app_alternate_id = string!(t1.alternateId)
                      }
                      app_target_found = true
                  } else if t1_type == "UserGroup" {
                      if exists(t1.displayName) {
                          .ext.target_group_name = string!(t1.displayName)
                      }
                      if exists(t1.id) {
                          .ext.target_group_id = string!(t1.id)
                      }
                  } else if t1_type == "Policy" {
                      if exists(t1.displayName) {
                          .ext.target_policy_name = string!(t1.displayName)
                      }
                      if exists(t1.id) {
                          .ext.target_policy_id = string!(t1.id)
                      }
                      if exists(t1.alternateId) {
                          .ext.target_policy_alternate_id = string!(t1.alternateId)
                      }
                  }
              }
          }

          if target_len > 2 {
              t2 = targets[2]
              if exists(t2.type) {
                  t2_type = string!(t2.type)
                  if t2_type == "User" && !user_target_found {
                      if exists(t2.alternateId) {
                          .udm.dest_user = string!(t2.alternateId)
                      }
                      if exists(t2.displayName) {
                          .ext.target_user_display_name = string!(t2.displayName)
                      }
                      if exists(t2.id) {
                          .ext.target_user_id = string!(t2.id)
                      }
                  } else if t2_type == "AppInstance" && !app_target_found {
                      if exists(t2.displayName) {
                          .udm.app = string!(t2.displayName)
                      }
                      if exists(t2.id) {
                          .udm.app_id = string!(t2.id)
                      }
                      if exists(t2.alternateId) {
                          .ext.app_alternate_id = string!(t2.alternateId)
                      }
                  } else if t2_type == "UserGroup" {
                      if exists(t2.displayName) {
                          .ext.target_group_name = string!(t2.displayName)
                      }
                      if exists(t2.id) {
                          .ext.target_group_id = string!(t2.id)
                      }
                  } else if t2_type == "Policy" {
                      if exists(t2.displayName) {
                          .ext.target_policy_name = string!(t2.displayName)
                      }
                      if exists(t2.id) {
                          .ext.target_policy_id = string!(t2.id)
                      }
                  }
              }
          }
      }

      # --- Transaction ---
      if exists(parsed.transaction) {
          tx = parsed.transaction

          if exists(tx.id) {
              .ext.transaction_id = string!(tx.id)
          }

          if exists(tx.type) {
              .ext.transaction_type = string!(tx.type)
          }
      }

      # --- Debug Context ---
      if exists(parsed.debugContext.debugData) {
          debug = parsed.debugContext.debugData

          if exists(debug.requestId) {
              .ext.request_id = string!(debug.requestId)
              .metadata.request_id = string!(debug.requestId)
          }

          if exists(debug.requestUri) {
              .ext.request_uri = string!(debug.requestUri)
          }

          if exists(debug.url) {
              .ext.debug_url = string!(debug.url)
          }

          if exists(debug.dtHash) {
              .ext.dt_hash = string!(debug.dtHash)
          }

          if exists(debug.authnRequestId) {
              .ext.authn_request_id = string!(debug.authnRequestId)
          }

          if exists(debug.behaviors) {
              .ext.behaviors = string!(debug.behaviors)
          }

          if exists(debug.policyType) {
              .ext.policy_type = string!(debug.policyType)
          }

          if exists(debug.rule) {
              .ext.policy_rule = string!(debug.rule)
          }

          if exists(debug.factor) {
              .ext.factor = string!(debug.factor)
          }

          if exists(debug.factorResult) {
              .ext.factor_result = string!(debug.factorResult)
          }

          if exists(debug.logOnlySecurityData) {
              .ext.log_only_security_data = to_string(debug.logOnlySecurityData) ?? ""
          }

          if exists(debug.risk) {
              .ext.risk = to_string(debug.risk) ?? ""
          }

          if exists(debug.threatSuspected) {
              .ext.threat_suspected = to_string(debug.threatSuspected) ?? ""
          }
      }

      # --- Request / IP Chain ---
      if exists(parsed.request) {
          req = parsed.request

          if exists(req.ipChain) && is_array(req.ipChain) {
              ip_chain = array!(req.ipChain)
              .ext.ip_chain = encode_json(req.ipChain)

              # Use the first IP in the chain as src_ip if not already set
              if !exists(.udm.src_ip) || .udm.src_ip == null {
                  if length(ip_chain) > 0 {
                      first_ip = ip_chain[0]
                      if exists(first_ip.ip) {
                          .udm.src_ip = string!(first_ip.ip)
                      }
                  }
              }

              # If multiple IPs in chain, capture the last as potential proxy/origin
              if length(ip_chain) > 1 {
                  .ext.proxy_detected = "true"
                  last_idx = length(ip_chain) - 1
                last_ip = get!(ip_chain, [last_idx])
                  if exists(last_ip.ip) {
                      .ext.origin_ip = string!(last_ip.ip)
                  }
              }
          }
      }

      # --- Security Context ---
      if exists(parsed.securityContext) {
          sec = parsed.securityContext

          if exists(sec.asNumber) {
              .ext.as_number = to_string(sec.asNumber) ?? ""
          }
          if exists(sec.asOrg) {
              .ext.as_org = string!(sec.asOrg)
          }
          if exists(sec.isp) {
              .ext.isp = string!(sec.isp)
          }
          if exists(sec.domain) {
              .ext.security_domain = string!(sec.domain)
          }
          if exists(sec.isProxy) {
              .ext.is_proxy = to_string(sec.isProxy) ?? ""
          }
      }

      # --- Category Enrichment ---
      # Derive a normalized category from the eventType for easier searching
      event_type = to_string(parsed.eventType) ?? ""
      if starts_with(event_type, "user.session") || starts_with(event_type, "user.authentication") {
          .udm.category = "authentication"
          .udm.authentication_service = "Okta"
      } else if starts_with(event_type, "user.lifecycle") {
          .udm.category = "user_management"
      } else if starts_with(event_type, "user.account") {
          .udm.category = "account_management"
      } else if starts_with(event_type, "group.") {
          .udm.category = "group_management"
      } else if starts_with(event_type, "policy.") {
          .udm.category = "policy"
      } else if starts_with(event_type, "application.") {
          .udm.category = "application"
      } else if starts_with(event_type, "system.") {
          .udm.category = "system"
      } else if contains(event_type, "admin") {
          .udm.category = "admin"
      } else {
          .udm.category = "other"
      }

      # Set authentication_method from credentialType if available
      if exists(parsed.authenticationContext.credentialType) {
          .udm.authentication_method = string!(parsed.authenticationContext.credentialType)
      }

  } else {
      .metadata.parse_error = to_string(err)
  }

  # Set parser name
  .metadata.parser = "okta"

  # Preserve raw log
  .message = raw_log
