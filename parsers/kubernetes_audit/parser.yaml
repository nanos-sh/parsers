name: kubernetes_audit
display_name: Kubernetes Audit Log
version: "1.0.0"
description: "Parses Kubernetes API server audit logs including request metadata, user identity, resource operations, and response status"
match_values:
  - kubernetes_audit
  - k8s_audit
  - k8s
category: cloud
vendor: "CNCF"
product: "Kubernetes"
parser_vrl: |
  # Kubernetes Audit Log Parser
  # Handles K8s API server audit events (JSON format)

  # Initialize required structures
  .udm = {}
  .ext = {}
  .metadata = {}

  # Set defaults
  .udm.timestamp = now()
  .udm.vendor = "CNCF"
  .udm.product = "Kubernetes"
  .udm.vendor_product = "CNCF Kubernetes"
  .udm.cloud_provider = "kubernetes"

  # Get raw log
  raw_log = string!(.message)

  # Parse JSON
  parsed, parse_err = parse_json(raw_log)
  if parse_err != null {
      abort
  }

  # --- Timestamp ---
  if exists(parsed.requestReceivedTimestamp) {
      ts_str = string!(parsed.requestReceivedTimestamp)
      ts, ts_err = parse_timestamp(ts_str, "%Y-%m-%dT%H:%M:%S%.fZ")
      if ts_err == null {
          .udm.timestamp = format_timestamp!(ts, format: "%Y-%m-%d %H:%M:%S")
      }
  }

  # --- Audit metadata ---
  if exists(parsed.auditID) { .ext.audit_id = string!(parsed.auditID) }
  if exists(parsed.level) { .ext.audit_level = string!(parsed.level) }
  if exists(parsed.stage) { .ext.stage = string!(parsed.stage) }
  if exists(parsed.apiVersion) { .ext.api_version = string!(parsed.apiVersion) }

  # --- Request ---
  if exists(parsed.requestURI) { .udm.uri_path = string!(parsed.requestURI) }
  if exists(parsed.userAgent) { .udm.http_user_agent = string!(parsed.userAgent) }

  # --- Verb → action ---
  if exists(parsed.verb) {
      verb = downcase(string!(parsed.verb))
      .udm.event_type = verb
  }

  # --- User identity ---
  if exists(parsed.user) {
      user_obj = parsed.user
      if exists(user_obj.username) { .udm.user = string!(user_obj.username) }
      if exists(user_obj.uid) { .ext.user_uid = string!(user_obj.uid) }
      if exists(user_obj.groups) { .ext.user_groups = user_obj.groups }
  }

  # --- Source IPs ---
  if exists(parsed.sourceIPs) {
      first_ip = get!(parsed.sourceIPs, [0])
      if first_ip != null {
          .udm.src_ip = string!(first_ip)
      }
  }

  # --- Object reference ---
  if exists(parsed.objectRef) {
      obj_ref = parsed.objectRef
      if exists(obj_ref.resource) { .udm.resource_type = string!(obj_ref.resource) }
      if exists(obj_ref.name) { .udm.resource_name = string!(obj_ref.name) }
      if exists(obj_ref.namespace) { .ext.namespace = string!(obj_ref.namespace) }
      if exists(obj_ref.apiVersion) { .ext.resource_api_version = string!(obj_ref.apiVersion) }
      if exists(obj_ref.apiGroup) { .ext.resource_api_group = string!(obj_ref.apiGroup) }
      if exists(obj_ref.subresource) { .ext.subresource = string!(obj_ref.subresource) }
  }

  # --- Response status ---
  if exists(parsed.responseStatus) {
      resp = parsed.responseStatus
      if exists(resp.code) {
          code_val = to_int(resp.code) ?? null
          if code_val != null {
              .udm.status_code = code_val
          }
      }
      if exists(resp.status) { .udm.status = string!(resp.status) }
      if exists(resp.reason) { .ext.response_reason = string!(resp.reason) }
      if exists(resp.message) { .ext.response_message = string!(resp.message) }
  }

  # --- Annotations (authorization decision) ---
  if exists(parsed.annotations) {
      annotations = parsed.annotations
      decision_key = "authorization.k8s.io/decision"
      reason_key = "authorization.k8s.io/reason"

      decision_val = get!(annotations, [decision_key])
      if decision_val != null {
          .udm.result = string!(decision_val)
      }

      reason_val = get!(annotations, [reason_key])
      if reason_val != null {
          .ext.auth_reason = string!(reason_val)
      }
  }

  # --- Stage timestamp ---
  if exists(parsed.stageTimestamp) { .ext.stage_timestamp = string!(parsed.stageTimestamp) }

  # --- Metadata ---
  .metadata.event_category = "audit"

  # --- Final: set .message to raw log ---
  .message = raw_log
