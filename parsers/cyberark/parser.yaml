name: cyberark
display_name: CyberArk PAM
version: "1.0.0"
description: "Parses CyberArk Privileged Access Manager audit logs including session activity, password operations, and policy events"
match_values:
  - cyberark
  - cyberark_pam
  - cyberark_vault
category: security
vendor: "CyberArk"
product: "PAM"
parser_vrl: |
  # CyberArk PAM Parser
  # Parses CEF-formatted vault audit and PSM session logs

  # Initialize required structures
  .udm = {}
  .ext = {}
  .metadata = {}

  # Set defaults
  .udm.timestamp = now()
  .udm.vendor = "CyberArk"
  .udm.product = "PAM"
  .udm.vendor_product = "CyberArk PAM"

  # Get raw log content
  raw_log = to_string(.message) ?? ""

  # Check if this is CEF format
  if starts_with(raw_log, "CEF:") {
      # Split CEF header on pipe delimiter
      # CEF:version|vendor|product|version|event_class_id|name|severity|extensions
      cef_parts = split(raw_log, "|", limit: 8)

      if length(cef_parts) >= 8 {
          # Parse header fields
          .ext.cef_vendor = string!(cef_parts[1])
          .ext.cef_product = string!(cef_parts[2])
          .ext.cef_version = string!(cef_parts[3])
          .ext.event_class_id = string!(cef_parts[4])
          .ext.event_name = string!(cef_parts[5])

          # Map CEF severity (0-10) to normalized severity
          cef_sev = to_int(cef_parts[6]) ?? 0
          .udm.severity = if cef_sev >= 8 {
              "critical"
          } else if cef_sev >= 6 {
              "high"
          } else if cef_sev >= 4 {
              "medium"
          } else if cef_sev >= 1 {
              "low"
          } else {
              "info"
          }

          .udm.category = "privileged_access"

          # Parse CEF extension using key=value parsing
          ext_str = string!(cef_parts[7])
          kv, kv_err = parse_key_value(ext_str, key_value_delimiter: "=", field_delimiter: " ")

          if kv_err == null {
              # act (action)
              act_val = to_string(kv.act) ?? ""
              if act_val != "" {
                  .udm.action = act_val
              }

              # suser (source user)
              suser_val = to_string(kv.suser) ?? ""
              if suser_val != "" {
                  .udm.user = suser_val
              }

              # duser (destination user)
              duser_val = to_string(kv.duser) ?? ""
              if duser_val != "" {
                  .ext.dest_user = duser_val
              }

              # src (source IP)
              src_val = to_string(kv.src) ?? ""
              if src_val != "" {
                  .udm.src_ip = src_val
              }

              # dst (destination IP)
              dst_val = to_string(kv.dst) ?? ""
              if dst_val != "" {
                  .udm.dest_ip = dst_val
              }

              # dhost (destination host)
              dhost_val = to_string(kv.dhost) ?? ""
              if dhost_val != "" {
                  .udm.dest_host = dhost_val
              }

              # target
              target_val = to_string(kv.target) ?? ""
              if target_val != "" {
                  .ext.target = target_val
              }

              # cs1 (Safe)
              cs1_val = to_string(kv.cs1) ?? ""
              if cs1_val != "" {
                  .ext.safe = cs1_val
              }

              # cs2 (Address)
              cs2_val = to_string(kv.cs2) ?? ""
              if cs2_val != "" {
                  .ext.address = cs2_val
              }

              # cs3 (PolicyId/Reason)
              cs3_val = to_string(kv.cs3) ?? ""
              if cs3_val != "" {
                  .ext.policy_or_reason = cs3_val
              }

              # cn1 (Score)
              cn1_val = to_string(kv.cn1) ?? ""
              if cn1_val != "" {
                  .ext.risk_score = cn1_val
              }

              # rt (timestamp)
              rt_val = to_string(kv.rt) ?? ""
              if rt_val != "" {
                  ts, ts_err = parse_timestamp(rt_val, "%b %d %Y %H:%M:%S")
                  if ts_err == null {
                      .udm.timestamp = format_timestamp!(ts, format: "%Y-%m-%d %H:%M:%S")
                  }
              }

              # msg
              msg_val = to_string(kv.msg) ?? ""
              if msg_val != "" {
                  .ext.message = msg_val
              }
          }

      } else {
          # Fewer than 8 CEF parts - partial parse
          .metadata.parse_error = "incomplete CEF format"
      }

  } else {
      # Try JSON fallback
      parsed, err = parse_json(raw_log)
      if err == null {
          .udm.category = "privileged_access"

          if exists(parsed.action) {
              .udm.action = string!(parsed.action)
          }
          if exists(parsed.user) {
              .udm.user = string!(parsed.user)
          }
          if exists(parsed.src) {
              .udm.src_ip = string!(parsed.src)
          }
          if exists(parsed.dst) {
              .udm.dest_ip = string!(parsed.dst)
          }
          if exists(parsed.timestamp) {
              .ext.raw_timestamp = to_string(parsed.timestamp) ?? ""
          }
      } else {
          .metadata.parse_error = "unrecognized format"
      }
  }

  # Set parser name
  .metadata.parser = "cyberark"

  # Preserve raw log
  .message = raw_log
