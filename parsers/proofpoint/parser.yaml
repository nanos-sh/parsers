name: proofpoint
display_name: Proofpoint Email Security
version: "1.0.0"
description: "Parses Proofpoint email security logs including message delivery, TAP threat alerts, spam/phishing verdicts, and DLP events"
match_values:
  - proofpoint
  - proofpoint_tap
  - proofpoint_email
category: security
vendor: "Proofpoint"
product: "Email Protection"
parser_vrl: |
  # Proofpoint Email Security Parser
  # Parses message logs, TAP click events, and TAP message events

  # Initialize required structures
  .udm = {}
  .ext = {}
  .metadata = {}

  # Set defaults
  .udm.timestamp = now()
  .udm.vendor = "Proofpoint"
  .udm.product = "Email Protection"
  .udm.vendor_product = "Proofpoint Email Protection"

  # Get raw log content
  raw_log = to_string(.message) ?? ""

  # Parse JSON
  parsed, err = parse_json(raw_log)

  if err == null {
      event_type = to_string(parsed.type) ?? "unknown"

      if event_type == "message" {
          # ============= MESSAGE LOG =============
          .udm.category = "email"

          # Timestamp
          if exists(parsed.ts) {
              ts, ts_err = parse_timestamp(string!(parsed.ts), "%+")
              if ts_err == null {
                  .udm.timestamp = format_timestamp!(ts, format: "%Y-%m-%d %H:%M:%S")
              }
          }

          # Connection source IP
          if exists(parsed.connection.ip) {
              .udm.src_ip = string!(parsed.connection.ip)
          }

          # Connection details
          if exists(parsed.connection.host) {
              .udm.src_host = string!(parsed.connection.host)
          }
          if exists(parsed.connection.protocol) {
              .ext.connection_protocol = string!(parsed.connection.protocol)
          }
          if exists(parsed.connection.country) {
              .ext.src_country = string!(parsed.connection.country)
          }
          if exists(parsed.connection.helo) {
              .ext.helo = string!(parsed.connection.helo)
          }

          # Envelope sender
          if exists(parsed.envelope.from) {
              .udm.sender = string!(parsed.envelope.from)
              parts = split(string!(parsed.envelope.from), "@")
              if length(parts) == 2 {
                  .udm.sender_domain = parts[1]
              }
          }

          # Envelope recipients
          if exists(parsed.envelope.rcpts) && is_array(parsed.envelope.rcpts) {
              rcpts = array!(parsed.envelope.rcpts)
              if length(rcpts) > 0 {
                  .udm.recipient = to_string(rcpts[0]) ?? ""
                  r_parts = split(to_string(rcpts[0]) ?? "", "@")
                  if length(r_parts) == 2 {
                      .udm.recipient_domain = r_parts[1]
                  }
              }
              if length(rcpts) > 1 {
                  .ext.recipients = encode_json(parsed.envelope.rcpts)
              }
          }

          # Headers
          if exists(parsed.msg.normalizedHeader.subject) && is_array(parsed.msg.normalizedHeader.subject) {
              subj_arr = array!(parsed.msg.normalizedHeader.subject)
              if length(subj_arr) > 0 {
                  .udm.subject = to_string(subj_arr[0]) ?? ""
              }
          }
          if exists(parsed.msg.header."message-id") && is_array(parsed.msg.header."message-id") {
              mid_arr = array!(parsed.msg.header."message-id")
              if length(mid_arr) > 0 {
                  .udm.message_id = to_string(mid_arr[0]) ?? ""
              }
          }

          # Message size
          if exists(parsed.msg.sizeBytes) {
              .ext.message_size = to_string(parsed.msg.sizeBytes) ?? ""
          }

          # GUID
          if exists(parsed.guid) {
              .ext.guid = string!(parsed.guid)
          }

          # Filter disposition / action
          if exists(parsed.filter.disposition) {
              .udm.event_type = string!(parsed.filter.disposition)
          }
          if exists(parsed.filter.routeDirection) {
              .ext.direction = string!(parsed.filter.routeDirection)
          }

          # Spam module
          if exists(parsed.filter.modules.spam) {
              spam = parsed.filter.modules.spam
              if exists(spam.verdict) {
                  .ext.spam_verdict = string!(spam.verdict)
              }
              if exists(spam.disposition) {
                  .udm.event_type = string!(spam.disposition)
              }
              if exists(spam.scores.overall) {
                  .ext.risk_score = to_string(spam.scores.overall) ?? ""
              }
              if exists(spam.scores.classifiers.phish) {
                  .ext.phish_score = to_string(spam.scores.classifiers.phish) ?? ""
              }
              if exists(spam.scores.classifiers.malware) {
                  .ext.malware_score = to_string(spam.scores.classifiers.malware) ?? ""
              }
              if exists(spam.scores.classifiers.spam) {
                  .ext.spam_score = to_string(spam.scores.classifiers.spam) ?? ""
              }
          }

          # URL defense
          if exists(parsed.filter.modules.urldefense.counts) {
              .ext.urls_rewritten = to_string(parsed.filter.modules.urldefense.counts.rewritten) ?? ""
          }

      } else if event_type == "tap_click" {
          # ============= TAP CLICK EVENT =============
          .udm.category = "email_threat"

          # Timestamp
          if exists(parsed.clickTime) {
              ts, ts_err = parse_timestamp(string!(parsed.clickTime), "%+")
              if ts_err == null {
                  .udm.timestamp = format_timestamp!(ts, format: "%Y-%m-%d %H:%M:%S")
              }
          }

          # Click IP is the source
          if exists(parsed.clickIP) {
              .udm.src_ip = string!(parsed.clickIP)
          }

          # Sender / recipient
          if exists(parsed.sender) {
              .udm.sender = string!(parsed.sender)
              parts = split(string!(parsed.sender), "@")
              if length(parts) == 2 {
                  .udm.sender_domain = parts[1]
              }
          }
          if exists(parsed.recipient) {
              .udm.recipient = string!(parsed.recipient)
              r_parts = split(string!(parsed.recipient), "@")
              if length(r_parts) == 2 {
                  .udm.recipient_domain = r_parts[1]
              }
          }

          # Sender IP
          if exists(parsed.senderIP) {
              .ext.sender_ip = string!(parsed.senderIP)
          }

          # Threat info
          if exists(parsed.url) {
              .udm.url = string!(parsed.url)
          }
          if exists(parsed.threatURL) {
              .ext.threat_url = string!(parsed.threatURL)
          }
          if exists(parsed.classification) {
              .udm.category = string!(parsed.classification)
          }
          if exists(parsed.threatStatus) {
              .ext.threat_status = string!(parsed.threatStatus)
          }
          if exists(parsed.threatID) {
              .ext.threat_id = string!(parsed.threatID)
          }
          if exists(parsed.campaignId) {
              .ext.campaign_id = string!(parsed.campaignId)
          }
          if exists(parsed.messageID) {
              .udm.message_id = string!(parsed.messageID)
          }
          if exists(parsed.userAgent) {
              .udm.http_user_agent = string!(parsed.userAgent)
          }
          .udm.event_type = "click"

      } else if event_type == "tap_message" {
          # ============= TAP MESSAGE EVENT =============
          .udm.category = "email_threat"

          # Timestamp
          if exists(parsed.messageTime) {
              ts, ts_err = parse_timestamp(string!(parsed.messageTime), "%+")
              if ts_err == null {
                  .udm.timestamp = format_timestamp!(ts, format: "%Y-%m-%d %H:%M:%S")
              }
          }

          # Sender / recipient
          if exists(parsed.sender) {
              .udm.sender = string!(parsed.sender)
              parts = split(string!(parsed.sender), "@")
              if length(parts) == 2 {
                  .udm.sender_domain = parts[1]
              }
          }
          if exists(parsed.recipient) && is_array(parsed.recipient) {
              rcpts = array!(parsed.recipient)
              if length(rcpts) > 0 {
                  .udm.recipient = to_string(rcpts[0]) ?? ""
                  r_parts = split(to_string(rcpts[0]) ?? "", "@")
                  if length(r_parts) == 2 {
                      .udm.recipient_domain = r_parts[1]
                  }
              }
          }
          if exists(parsed.headerFrom) {
              .ext.header_from = string!(parsed.headerFrom)
          }

          # Subject
          if exists(parsed.subject) {
              .udm.subject = string!(parsed.subject)
          }
          if exists(parsed.messageID) {
              .udm.message_id = string!(parsed.messageID)
          }

          # Source IP
          if exists(parsed.senderIP) {
              .udm.src_ip = string!(parsed.senderIP)
          }

          # Scores
          if exists(parsed.spamScore) {
              .ext.spam_score = to_string(parsed.spamScore) ?? ""
          }
          if exists(parsed.malwareScore) {
              .ext.malware_score = to_string(parsed.malwareScore) ?? ""
              .ext.risk_score = to_string(parsed.malwareScore) ?? ""
          }
          if exists(parsed.phishScore) {
              .ext.phish_score = to_string(parsed.phishScore) ?? ""
          }
          if exists(parsed.impostorScore) {
              .ext.impostor_score = to_string(parsed.impostorScore) ?? ""
          }

          # Message size
          if exists(parsed.messageSize) {
              .ext.message_size = to_string(parsed.messageSize) ?? ""
          }

          # Quarantine
          if exists(parsed.quarantineFolder) {
              .ext.quarantine_folder = string!(parsed.quarantineFolder)
              .udm.event_type = "quarantine"
          }
          if exists(parsed.quarantineRule) {
              .ext.quarantine_rule = string!(parsed.quarantineRule)
          }

          # Message parts (attachments)
          if exists(parsed.messageParts) && is_array(parsed.messageParts) {
              parts = array!(parsed.messageParts)
              if length(parts) > 0 {
                  p0 = parts[0]
                  if exists(p0.filename) {
                      .udm.file_name = string!(p0.filename)
                  }
                  if exists(p0.sha256) {
                      .udm.file_hash = string!(p0.sha256)
                  }
                  if exists(p0.md5) {
                      .ext.md5 = string!(p0.md5)
                  }
                  if exists(p0.sandboxStatus) {
                      .ext.sandbox_status = string!(p0.sandboxStatus)
                  }
              }
              .ext.message_parts = encode_json(parsed.messageParts)
          }

          # Threats info map
          if exists(parsed.threatsInfoMap) && is_array(parsed.threatsInfoMap) {
              threats = array!(parsed.threatsInfoMap)
              if length(threats) > 0 {
                  t0 = threats[0]
                  if exists(t0.classification) {
                      .udm.category = string!(t0.classification)
                  }
                  if exists(t0.threatUrl) {
                      .udm.url = string!(t0.threatUrl)
                  }
                  if exists(t0.threatStatus) {
                      .ext.threat_status = string!(t0.threatStatus)
                  }
                  if exists(t0.threatType) {
                      .ext.threat_type = string!(t0.threatType)
                  }
                  if exists(t0.campaignId) {
                      .ext.campaign_id = string!(t0.campaignId)
                  }
              }
              .ext.threats_info = encode_json(parsed.threatsInfoMap)
          }

          # Modules run
          if exists(parsed.modulesRun) && is_array(parsed.modulesRun) {
              .ext.modules_run = encode_json(parsed.modulesRun)
          }

      } else {
          # Unknown type - store what we can
          .udm.category = "email"
          .ext.raw_type = event_type
      }

  } else {
      .metadata.parse_error = to_string(err)
  }

  # Set parser name
  .metadata.parser = "proofpoint"

  # Preserve raw log
  .message = raw_log
