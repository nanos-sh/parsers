name: linux_auditd
display_name: Linux Audit Daemon
version: "1.0.0"
description: "Parses Linux auditd logs including SYSCALL, EXECVE, PATH, USER_AUTH, USER_LOGIN, CRED_ACQ, and AVC (SELinux) events"
match_values:
  - linux_auditd
  - auditd
  - linux_audit
  - audit
category: endpoint
vendor: "Linux"
product: "auditd"
parser_vrl: |
  # Linux auditd Parser
  # Supports: SYSCALL, EXECVE, PATH, USER_AUTH, USER_LOGIN, CRED_ACQ, CRED_DISP, AVC, NETFILTER_PKT

  .udm = {}
  .ext = {}
  .metadata = {}

  raw_log = string!(.message)

  # ------------------------------------------------------------------
  # Extract type and audit header: type=TYPE msg=audit(EPOCH.MS:SERIAL):
  # ------------------------------------------------------------------
  header_match, h_err = parse_regex(raw_log, r'^type=(?P<audit_type>\w+)\s+msg=audit\((?P<epoch>\d+)\.(?P<ms>\d+):(?P<serial>\d+)\):\s*(?P<body>.*)')

  if h_err == null {
      audit_type = string!(header_match.audit_type)
      epoch_str = string!(header_match.epoch)
      serial = string!(header_match.serial)
      body = string!(header_match.body)

      .ext.audit_type = audit_type
      .ext.audit_serial = serial
      .udm.vendor_product = "Linux auditd"

      # Timestamp from epoch
      epoch_int = to_int(epoch_str) ?? null
      if epoch_int != null {
          .udm.timestamp = from_unix_timestamp(epoch_int) ?? now()
      } else {
          .udm.timestamp = now()
      }

      # ------------------------------------------------------------------
      # Parse key=value pairs from body
      # Body format: key1=value1 key2=value2 key3="quoted value"
      # ------------------------------------------------------------------
      kv = {}
      # Use parse_key_value for the main body
      kv_parsed, kv_err = parse_key_value(body, key_value_delimiter: "=", field_delimiter: " ")
      if kv_err == null {
          kv = kv_parsed
      }

      # ------------------------------------------------------------------
      # SYSCALL events
      # ------------------------------------------------------------------
      if audit_type == "SYSCALL" {
          if exists(kv.comm) {
              comm_val = replace(to_string(kv.comm) ?? "", "\"", "")
              .udm.process_name = comm_val
          }
          if exists(kv.exe) {
              exe_val = replace(to_string(kv.exe) ?? "", "\"", "")
              .udm.process_path = exe_val
              # Extract process name from path
              parts = split(exe_val, "/")
              pname = get!(parts, [-1])
              if pname != null {
                  pn = to_string!(pname)
                  if pn != "" {
                      .udm.process_name = pn
                  }
              }
          }
          if exists(kv.pid) { .udm.process_id = to_string(kv.pid) ?? null }
          if exists(kv.ppid) { .udm.parent_process_id = to_string(kv.ppid) ?? null }
          if exists(kv.uid) { .ext.uid = to_string(kv.uid) ?? null }
          if exists(kv.auid) { .udm.user_id = to_string(kv.auid) ?? null }
          if exists(kv.euid) { .ext.euid = to_string(kv.euid) ?? null }
          if exists(kv.gid) { .ext.gid = to_string(kv.gid) ?? null }
          if exists(kv.tty) { .ext.tty = to_string(kv.tty) ?? null }
          if exists(kv.ses) { .udm.session_id = to_string(kv.ses) ?? null }
          if exists(kv.key) {
              key_val = replace(to_string(kv.key) ?? "", "\"", "")
              if key_val != "(null)" {
                  .udm.rule_name = key_val
              }
          }
          if exists(kv.syscall) { .ext.syscall = to_string(kv.syscall) ?? null }
          if exists(kv.success) {
              succ = to_string(kv.success) ?? ""
              .udm.result = succ
          }
          if exists(kv.exit) { .ext.exit_code = to_string(kv.exit) ?? null }
          .udm.event_type = "syscall"

      } else if audit_type == "EXECVE" {
          # ------------------------------------------------------------------
          # EXECVE — command line arguments
          # ------------------------------------------------------------------
          # Reconstruct command line from a0, a1, a2, ...
          args = []
          if exists(kv.a0) {
              a0_val = replace(to_string(kv.a0) ?? "", "\"", "")
              args = push(args, a0_val)
          }
          if exists(kv.a1) {
              a1_val = replace(to_string(kv.a1) ?? "", "\"", "")
              args = push(args, a1_val)
          }
          if exists(kv.a2) {
              a2_val = replace(to_string(kv.a2) ?? "", "\"", "")
              args = push(args, a2_val)
          }
          if exists(kv.a3) {
              a3_val = replace(to_string(kv.a3) ?? "", "\"", "")
              args = push(args, a3_val)
          }
          if exists(kv.a4) {
              a4_val = replace(to_string(kv.a4) ?? "", "\"", "")
              args = push(args, a4_val)
          }
          if length(args) > 0 {
              .udm.command_line = join!(args, " ")
              first_arg = get!(args, [0])
              if first_arg != null {
                  .udm.process_name = to_string!(first_arg)
              }
          }
          .udm.event_type = "exec"

      } else if audit_type == "PATH" {
          # ------------------------------------------------------------------
          # PATH — file path information
          # ------------------------------------------------------------------
          if exists(kv.name) {
              name_val = replace(to_string(kv.name) ?? "", "\"", "")
              .udm.file_path = name_val
              # Extract file name
              parts = split(name_val, "/")
              fname = get!(parts, [-1])
              if fname != null {
                  fn_str = to_string!(fname)
                  if fn_str != "" {
                      .udm.file_name = fn_str
                  }
              }
          }
          if exists(kv.inode) { .ext.inode = to_string(kv.inode) ?? null }
          if exists(kv.mode) { .ext.file_mode = to_string(kv.mode) ?? null }
          if exists(kv.nametype) { .ext.nametype = to_string(kv.nametype) ?? null }
          .udm.event_type = "path"

      } else if audit_type == "CWD" {
          # ------------------------------------------------------------------
          # CWD — current working directory
          # ------------------------------------------------------------------
          if exists(kv.cwd) {
              cwd_val = replace(to_string(kv.cwd) ?? "", "\"", "")
              .ext.cwd = cwd_val
          }
          .udm.event_type = "cwd"

      } else if audit_type == "USER_AUTH" || audit_type == "USER_LOGIN" || audit_type == "CRED_ACQ" || audit_type == "CRED_DISP" {
          # ------------------------------------------------------------------
          # Authentication events
          # ------------------------------------------------------------------
          .udm.event_type = downcase(audit_type)

          if exists(kv.pid) { .udm.process_id = to_string(kv.pid) ?? null }
          if exists(kv.uid) { .ext.uid = to_string(kv.uid) ?? null }
          if exists(kv.auid) { .udm.user_id = to_string(kv.auid) ?? null }
          if exists(kv.ses) { .udm.session_id = to_string(kv.ses) ?? null }

          # The msg= field contains a sub-message with single-quoted key=value
          # e.g., msg='op=PAM:authentication ... acct="jsmith" ... res=success'
          # parse_key_value may have picked up msg as a key
          sub_msg = to_string(kv.msg) ?? ""
          # Try to also parse from the body directly for inner fields
          # Look for specific fields in the body text
          acct_match, acct_err = parse_regex(body, r'acct="(?P<acct>[^"]*)"')
          if acct_err == null {
              .udm.user = string!(acct_match.acct)
          }

          exe_match, exe_err = parse_regex(body, r'exe="(?P<exe>[^"]*)"')
          if exe_err == null {
              .udm.process_path = string!(exe_match.exe)
          }

          hostname_match, hn_err = parse_regex(body, r'hostname=(?P<hn>[^\s]+)')
          if hn_err == null {
              hn_val = string!(hostname_match.hn)
              if hn_val != "?" {
                  .udm.src_host = hn_val
              }
          }

          addr_match, addr_err = parse_regex(body, r'addr=(?P<addr>[^\s]+)')
          if addr_err == null {
              addr_val = string!(addr_match.addr)
              if addr_val != "?" {
                  .udm.src_ip = addr_val
              }
          }

          terminal_match, term_err = parse_regex(body, r'terminal=(?P<term>[^\s]+)')
          if term_err == null {
              .ext.terminal = string!(terminal_match.term)
          }

          res_match, res_err = parse_regex(body, r'res=(?P<res>\w+)')
          if res_err == null {
              .udm.auth_result = string!(res_match.res)
          }

          op_match, op_err = parse_regex(body, r'op=(?P<op>[^\s]+)')
          if op_err == null {
              .ext.operation = string!(op_match.op)
          }

          # Set auth_type based on audit type
          if audit_type == "USER_AUTH" {
              .udm.auth_type = "authentication"
          } else if audit_type == "USER_LOGIN" {
              .udm.auth_type = "login"
          } else if audit_type == "CRED_ACQ" {
              .udm.auth_type = "credential_acquisition"
          } else if audit_type == "CRED_DISP" {
              .udm.auth_type = "credential_disposition"
          }

      } else if audit_type == "AVC" {
          # ------------------------------------------------------------------
          # SELinux AVC events
          # ------------------------------------------------------------------
          .udm.event_type = "selinux_avc"

          # Parse avc: denied/granted { permission }
          avc_match, avc_err = parse_regex(body, r'avc:\s+(?P<decision>\w+)\s+\{\s*(?P<perm>[^}]+)\}')
          if avc_err == null {
              .ext.avc_decision = string!(avc_match.decision)
              .ext.avc_permission = strip_whitespace(string!(avc_match.perm))
          }

          if exists(kv.pid) { .udm.process_id = to_string(kv.pid) ?? null }
          if exists(kv.comm) {
              comm_val = replace(to_string(kv.comm) ?? "", "\"", "")
              .udm.process_name = comm_val
          }
          if exists(kv.name) {
              name_val = replace(to_string(kv.name) ?? "", "\"", "")
              .udm.file_name = name_val
          }

          # SELinux contexts
          scontext_match, sc_err = parse_regex(body, r'scontext=(?P<sc>[^\s]+)')
          if sc_err == null {
              .ext.source_context = string!(scontext_match.sc)
          }
          tcontext_match, tc_err = parse_regex(body, r'tcontext=(?P<tc>[^\s]+)')
          if tc_err == null {
              .ext.target_context = string!(tcontext_match.tc)
          }
          tclass_match, tcl_err = parse_regex(body, r'tclass=(?P<tcl>\w+)')
          if tcl_err == null {
              .ext.target_class = string!(tclass_match.tcl)
          }

          if exists(kv.permissive) {
              perm_val = to_string(kv.permissive) ?? "0"
              if perm_val == "1" {
                  .ext.selinux_permissive = true
              } else {
                  .ext.selinux_permissive = false
              }
          }

      } else if audit_type == "NETFILTER_PKT" {
          # ------------------------------------------------------------------
          # NETFILTER_PKT — network packet events
          # ------------------------------------------------------------------
          .udm.event_type = "netfilter"

          if exists(kv.saddr) { .udm.src_ip = to_string(kv.saddr) ?? null }
          if exists(kv.daddr) { .udm.dest_ip = to_string(kv.daddr) ?? null }
          if exists(kv.sport) { .udm.src_port = to_int(kv.sport) ?? null }
          if exists(kv.dport) { .udm.dest_port = to_int(kv.dport) ?? null }
          if exists(kv.proto) {
              proto_num = to_int(kv.proto) ?? 0
              if proto_num == 6 {
                  .udm.protocol = "TCP"
              } else if proto_num == 17 {
                  .udm.protocol = "UDP"
              } else if proto_num == 1 {
                  .udm.protocol = "ICMP"
              } else {
                  .udm.protocol = to_string(proto_num)
              }
          }
          if exists(kv.mark) { .ext.mark = to_string(kv.mark) ?? null }

      } else {
          # Unknown audit type — store what we can
          .udm.event_type = downcase(audit_type)
          if exists(kv.pid) { .udm.process_id = to_string(kv.pid) ?? null }
          if exists(kv.uid) { .ext.uid = to_string(kv.uid) ?? null }
      }

  } else {
      # Failed to parse audit header — store raw
      .udm.timestamp = now()
      .ext.raw_message = raw_log
      .ext.parse_error = "failed to parse audit header"
  }
