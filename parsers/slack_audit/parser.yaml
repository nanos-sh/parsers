name: slack_audit
display_name: Slack Audit Log
version: "1.0.0"
description: "Parses Slack Enterprise Grid audit log events"
match_values:
  - slack_audit
  - slack
category: cloud
vendor: "Salesforce"
product: "Slack"
parser_vrl: |
  # Slack Audit Log Parser
  # Parses JSON events from Slack Enterprise Grid audit API

  # Initialize required structures
  .udm = {}
  .ext = {}
  .metadata = {}

  # Set defaults
  .udm.timestamp = now()
  .udm.vendor = "Salesforce"
  .udm.product = "Slack"
  .udm.vendor_product = "Salesforce Slack"

  # Get raw log content
  raw_log = to_string(.message) ?? ""

  # Parse JSON
  parsed, err = parse_json(raw_log)

  if err == null {
      .udm.category = "cloud_audit"

      # --- Timestamp ---
      if exists(parsed.date_create) {
          ts_sec = to_int(parsed.date_create) ?? 0
          if ts_sec > 0 {
              ts, ts_err = from_unix_timestamp(ts_sec)
              if ts_err == null {
                  .udm.timestamp = format_timestamp!(ts, format: "%Y-%m-%d %H:%M:%S")
              }
          }
      }

      # --- Event ID ---
      if exists(parsed.id) {
          .ext.event_id = string!(parsed.id)
      }

      # --- Action ---
      if exists(parsed.action) {
          .udm.action = string!(parsed.action)
      }

      # --- Actor ---
      if exists(parsed.actor) {
          actor = parsed.actor
          if exists(actor.user) {
              actor_user = actor.user
              if exists(actor_user.email) {
                  .udm.user = string!(actor_user.email)
              }
              if exists(actor_user.name) {
                  .udm.user_name = string!(actor_user.name)
              }
              if exists(actor_user.id) {
                  .udm.user_id = string!(actor_user.id)
              }
              if exists(actor_user.team) {
                  .ext.actor_team = string!(actor_user.team)
              }
          }
          if exists(actor.type) {
              .ext.actor_type = string!(actor.type)
          }
      }

      # --- Context ---
      if exists(parsed.context) {
          ctx = parsed.context
          if exists(ctx.ip_address) {
              .udm.src_ip = string!(ctx.ip_address)
          }
          if exists(ctx.ua) {
              .udm.http_user_agent = string!(ctx.ua)
          }
          if exists(ctx.session_id) {
              .udm.session_id = string!(ctx.session_id)
          }

          # Location context
          if exists(ctx.location) {
              loc = ctx.location
              if exists(loc.type) {
                  .ext.location_type = string!(loc.type)
              }
              if exists(loc.id) {
                  .ext.location_id = string!(loc.id)
              }
              if exists(loc.name) {
                  .ext.location_name = string!(loc.name)
              }
              if exists(loc.domain) {
                  .ext.workspace_domain = string!(loc.domain)
              }
          }
      }

      # --- Entity ---
      if exists(parsed.entity) {
          entity = parsed.entity
          if exists(entity.type) {
              .ext.entity_type = string!(entity.type)
              .udm.resource_type = string!(entity.type)
          }

          # Workspace entity
          if exists(entity.workspace) {
              ws = entity.workspace
              if exists(ws.id) {
                  .ext.workspace_id = string!(ws.id)
              }
              if exists(ws.name) {
                  .udm.resource_name = string!(ws.name)
              }
              if exists(ws.domain) {
                  .ext.workspace_domain = string!(ws.domain)
              }
          }

          # File entity
          if exists(entity.file) {
              f = entity.file
              if exists(f.id) {
                  .ext.file_id = string!(f.id)
              }
              if exists(f.name) {
                  .udm.file_name = string!(f.name)
              }
              if exists(f.title) {
                  .ext.file_title = string!(f.title)
              }
          }

          # Channel entity
          if exists(entity.channel) {
              ch = entity.channel
              if exists(ch.id) {
                  .ext.channel_id = string!(ch.id)
              }
              if exists(ch.name) {
                  .ext.channel_name = string!(ch.name)
                  .udm.resource_name = string!(ch.name)
              }
          }

          # User entity (target user)
          if exists(entity.user) {
              eu = entity.user
              if exists(eu.id) {
                  .ext.target_user_id = string!(eu.id)
              }
              if exists(eu.email) {
                  .ext.dest_user = string!(eu.email)
              }
              if exists(eu.name) {
                  .ext.target_user_name = string!(eu.name)
              }
          }
      }

      # --- Details ---
      if exists(parsed.details) {
          details = parsed.details

          # Auth-related details
          if exists(details.method) {
              .udm.auth_type = string!(details.method)
          }
          if exists(details.mfa) {
              mfa_val = to_string(details.mfa) ?? "false"
              .udm.mfa_used = mfa_val
          }

          # Store remaining details
          .ext.details = encode_json(parsed.details)
      }

      # --- Categorize based on action ---
      action_str = to_string(parsed.action) ?? ""
      if contains(action_str, "login") || contains(action_str, "signin") || contains(action_str, "session") {
          .udm.category = "authentication"
          .udm.auth_result = "success"
      } else if contains(action_str, "file") {
          .udm.category = "file_activity"
      } else if contains(action_str, "channel") {
          .udm.category = "channel_management"
      } else if contains(action_str, "user") {
          .udm.category = "user_management"
      } else if contains(action_str, "app") || contains(action_str, "integration") {
          .udm.category = "integration"
      }

  } else {
      .metadata.parse_error = to_string(err)
  }

  # Set parser name
  .metadata.parser = "slack_audit"

  # Preserve raw log
  .message = raw_log
