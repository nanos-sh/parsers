name: cisco_umbrella
display_name: Cisco Umbrella
version: "1.0.0"
description: "Parses Cisco Umbrella DNS and proxy logs including domain categorization, threat blocking, and identity context"
match_values:
  - cisco_umbrella
  - umbrella
  - opendns
category: network
vendor: "Cisco"
product: "Umbrella"
parser_vrl: |
  # Cisco Umbrella Parser
  # Parses DNS logs and proxy logs (CSV format) as well as JSON

  # Initialize required structures
  .udm = {}
  .ext = {}
  .metadata = {}

  # Set defaults
  .udm.timestamp = now()
  .udm.vendor = "Cisco"
  .udm.product = "Umbrella"
  .udm.vendor_product = "Cisco Umbrella"

  # Get raw log content
  raw_log = to_string(.message) ?? ""

  # Try JSON first
  parsed, json_err = parse_json(raw_log)

  if json_err == null {
      # JSON format
      .udm.category = "dns"

      if exists(parsed.timestamp) {
          .ext.raw_timestamp = to_string(parsed.timestamp) ?? ""
      }
      if exists(parsed.domain) {
          .ext.query = string!(parsed.domain)
      }
      if exists(parsed.action) {
          .udm.action = string!(parsed.action)
      }
      if exists(parsed.identity) {
          .udm.user = string!(parsed.identity)
      }
      if exists(parsed.internalIp) {
          .udm.src_ip = string!(parsed.internalIp)
      }
      if exists(parsed.externalIp) {
          .ext.external_ip = string!(parsed.externalIp)
      }
      if exists(parsed.categories) {
          .udm.category = to_string(parsed.categories) ?? "dns"
      }

  } else {
      # CSV format - try to detect DNS vs proxy by field count
      # Strip surrounding quotes and split
      # DNS: timestamp, identity, device, internal_ip, external_ip, action, query_type, response_code, domain, categories...
      # Proxy: timestamp, identity, device, internal_ip, external_ip, url, referer, action, status_code, ...

      # Use parse_csv if available, otherwise manual split
      # Remove wrapping quotes from CSV fields
      cleaned = replace(raw_log, "\"", "")
      fields = split(cleaned, ",")

      field_count = length(fields)

      if field_count >= 9 {
          # Parse timestamp (field 0)
          ts_str = string!(fields[0])
          ts, ts_err = parse_timestamp(ts_str, "%Y-%m-%d %H:%M:%S")
          if ts_err == null {
              .udm.timestamp = format_timestamp!(ts, format: "%Y-%m-%d %H:%M:%S")
          }

          # Identity (field 1)
          identity = string!(fields[1])
          if identity != "" {
              .udm.user = identity
          }

          # Device (field 2)
          device = string!(fields[2])
          if device != "" {
              .udm.src_host = device
          }

          # Internal IP (field 3)
          internal_ip = string!(fields[3])
          if internal_ip != "" {
              .udm.src_ip = internal_ip
          }

          # External IP (field 4)
          external_ip = string!(fields[4])
          if external_ip != "" {
              .ext.external_ip = external_ip
          }

          # Determine if DNS or Proxy
          # DNS field 5 = action (Allowed/Blocked), Proxy field 5 = url (starts with http)
          field5 = string!(fields[5])

          if starts_with(field5, "http") {
              # ============= PROXY LOG =============
              .udm.category = "web"
              .udm.url = field5

              # Extract domain from URL
              domain_match, dm_err = parse_regex(field5, r'https?://(?P<domain>[^/:\s]+)')
              if dm_err == null {
                  .udm.url_domain = string!(domain_match.domain)
              }

              # Field 7 = action
              if field_count > 7 {
                  .udm.action = string!(fields[7])
              }

              # Field 8 = status code
              if field_count > 8 {
                  .udm.http_status_code = string!(fields[8])
              }

              # Field 9 = bytes request
              if field_count > 9 {
                  .ext.bytes_request = string!(fields[9])
              }

              # Field 10 = bytes response
              if field_count > 10 {
                  .ext.bytes_response = string!(fields[10])
              }

              # Field 12 = domain
              if field_count > 12 {
                  domain_val = string!(fields[12])
                  if domain_val != "" {
                      .udm.url_domain = domain_val
                  }
              }

              # Field 13 = categories
              if field_count > 13 {
                  .ext.categories = string!(fields[13])
              }

              # AV result
              if field_count > 16 {
                  .ext.av_result = string!(fields[16])
              }

              # Policy
              if field_count > 17 {
                  .ext.policy = string!(fields[17])
              }

          } else {
              # ============= DNS LOG =============
              .udm.category = "dns"

              # Field 5 = action
              .udm.action = field5

              # Field 6 = query type
              if field_count > 6 {
                  .ext.query_type = string!(fields[6])
              }

              # Field 7 = response code
              if field_count > 7 {
                  .udm.status = string!(fields[7])
              }

              # Field 8 = domain
              if field_count > 8 {
                  .ext.query = string!(fields[8])
              }

              # Fields 9+ = categories
              if field_count > 9 {
                  .ext.category1 = string!(fields[9])
              }
              if field_count > 10 {
                  .ext.category2 = string!(fields[10])
              }
              if field_count > 11 {
                  .ext.category3 = string!(fields[11])
              }

              # Policy identity type
              if field_count > 13 {
                  .ext.identity_id = string!(fields[13])
              }

              # Policy
              if field_count > 14 {
                  .ext.policy = string!(fields[14])
              }
          }

      } else {
          .metadata.parse_error = "unrecognized format: insufficient fields"
      }
  }

  # Set parser name
  .metadata.parser = "cisco_umbrella"

  # Preserve raw log
  .message = raw_log
