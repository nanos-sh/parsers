name: rapid7_insightvm
display_name: Rapid7 InsightVM
version: "1.0.0"
description: "Parses Rapid7 InsightVM (Nexpose) vulnerability scan results, asset data, and remediation events"
match_values:
  - rapid7
  - rapid7_insightvm
  - insightvm
  - nexpose
category: security
vendor: "Rapid7"
product: "InsightVM"
parser_vrl: |
  # Rapid7 InsightVM Parser
  # Parses vulnerability findings, asset data, and remediation events

  # Initialize required structures
  .udm = {}
  .ext = {}
  .metadata = {}

  # Set defaults
  .udm.timestamp = now()
  .udm.vendor = "Rapid7"
  .udm.product = "InsightVM"
  .udm.vendor_product = "Rapid7 InsightVM"

  # Get raw log content
  raw_log = to_string(.message) ?? ""

  # Parse JSON
  parsed, err = parse_json(raw_log)

  if err == null {
      # --- Determine event type ---
      # Remediation: has type=="remediation" or remediated_date
      # Asset: has type=="asset" or (vulnerabilities object with total)
      # Vulnerability: has vulnerability_id or title with severity
      event_type_field = to_string(parsed.type) ?? ""

      is_remediation = event_type_field == "remediation" || exists(parsed.remediated_date)
      is_asset = event_type_field == "asset" || (exists(parsed.vulnerabilities) && exists(parsed.vulnerabilities.total) && !exists(parsed.vulnerability_id))
      is_vuln = exists(parsed.vulnerability_id) && !is_remediation

      # --- Common fields across all types ---
      if exists(parsed.ip) {
          .udm.dest_ip = string!(parsed.ip)
      }

      if exists(parsed.hostname) {
          .udm.dest_host = string!(parsed.hostname)
      }

      if exists(parsed.os_name) {
          .ext.os = string!(parsed.os_name)
      }

      if exists(parsed.os_version) {
          .ext.os_version = string!(parsed.os_version)
      }

      if exists(parsed.os_architecture) {
          .ext.os_architecture = string!(parsed.os_architecture)
      }

      if exists(parsed.mac_address) {
          .ext.dest_mac = string!(parsed.mac_address)
      }

      if exists(parsed.site_name) {
          .ext.site = string!(parsed.site_name)
      }

      if exists(parsed.asset_id) {
          .ext.asset_id = string!(parsed.asset_id)
      } else if exists(parsed.id) {
          .ext.asset_id = string!(parsed.id)
      }

      if is_vuln {
          # --- Vulnerability Finding ---
          .udm.event_type = "vulnerability_detected"
          .udm.category = "vulnerability"

          if exists(parsed.vulnerability_id) {
              .udm.signature_id = string!(parsed.vulnerability_id)
          }

          if exists(parsed.title) {
              .udm.signature = string!(parsed.title)
          }

          # Map severity: Critical/Severe/Moderate/Low
          if exists(parsed.severity) {
              sev_raw = downcase(string!(parsed.severity))
              sev_mapped = if sev_raw == "critical" {
                  "critical"
              } else if sev_raw == "severe" {
                  "high"
              } else if sev_raw == "moderate" {
                  "medium"
              } else if sev_raw == "low" {
                  "low"
              } else {
                  sev_raw
              }
              .udm.severity = sev_mapped
          }

          if exists(parsed.cvss_v3_score) {
              .ext.cvss_v3 = to_string(parsed.cvss_v3_score) ?? ""
          }

          if exists(parsed.cvss_v2_score) {
              .ext.cvss = to_string(parsed.cvss_v2_score) ?? ""
          }

          if exists(parsed.cvss_v2_vector) {
              .ext.cvss_v2_vector = string!(parsed.cvss_v2_vector)
          }

          if exists(parsed.cvss_v3_vector) {
              .ext.cvss_v3_vector = string!(parsed.cvss_v3_vector)
          }

          if exists(parsed.cves) && is_array(parsed.cves) {
              cve_arr = array!(parsed.cves)
              if length(cve_arr) > 0 {
                  .udm.cve = to_string(get!(cve_arr, [0])) ?? ""
              }
              .ext.cve_list = encode_json(parsed.cves)
          }

          if exists(parsed.port) {
              port_val, port_err = to_int(parsed.port)
              if port_err == null {
                  if port_val != 0 {
                      .udm.dest_port = port_val
                  }
              }
          }

          if exists(parsed.protocol) {
              .udm.protocol = string!(parsed.protocol)
          }

          if exists(parsed.service) {
              .udm.app = string!(parsed.service)
          }

          if exists(parsed.status) {
              .udm.status = string!(parsed.status)
          }

          if exists(parsed.risk_score) {
              risk_val, risk_err = to_float(parsed.risk_score)
              if risk_err == null {
                  .udm.risk_score = to_string(risk_val)
              }
          }

          if exists(parsed.exploits) {
              .ext.exploits = to_string(parsed.exploits) ?? ""
          }

          if exists(parsed.malware_kits) {
              .ext.malware_kits = to_string(parsed.malware_kits) ?? ""
          }

          if exists(parsed.proof) {
              .ext.proof = string!(parsed.proof)
          }

          if exists(parsed.solution) {
              .ext.solution = string!(parsed.solution)
          }

          if exists(parsed.solution_id) {
              .ext.solution_id = string!(parsed.solution_id)
          }

          if exists(parsed.categories) && is_array(parsed.categories) {
              cat_arr = array!(parsed.categories)
              if length(cat_arr) > 0 {
                  .udm.category = to_string(get!(cat_arr, [0])) ?? "vulnerability"
              }
              .ext.categories = encode_json(parsed.categories)
          }

          if exists(parsed.scan_id) {
              .udm.session_id = string!(parsed.scan_id)
          }

          if exists(parsed.scan_template) {
              .ext.scan_template = string!(parsed.scan_template)
          }

          if exists(parsed.first_found) {
              .ext.first_found = string!(parsed.first_found)
          }

          if exists(parsed.last_found) {
              ts, ts_err = parse_timestamp(string!(parsed.last_found), "%+")
              if ts_err == null {
                  .udm.timestamp = format_timestamp!(ts, format: "%Y-%m-%d %H:%M:%S")
              }
              .ext.last_found = string!(parsed.last_found)
          }

          if exists(parsed.published) {
              .ext.published = string!(parsed.published)
          }

      } else if is_remediation {
          # --- Remediation Event ---
          .udm.event_type = "vulnerability_remediated"
          .udm.category = "vulnerability"
          .udm.status = "remediated"

          if exists(parsed.vulnerability_id) {
              .udm.signature_id = string!(parsed.vulnerability_id)
          }

          if exists(parsed.title) {
              .udm.signature = string!(parsed.title)
          }

          if exists(parsed.solution) {
              .ext.solution = string!(parsed.solution)
          }

          if exists(parsed.solution_id) {
              .ext.solution_id = string!(parsed.solution_id)
          }

          if exists(parsed.verified_by) {
              .ext.verified_by = string!(parsed.verified_by)
          }

          if exists(parsed.remediated_date) {
              ts, ts_err = parse_timestamp(string!(parsed.remediated_date), "%+")
              if ts_err == null {
                  .udm.timestamp = format_timestamp!(ts, format: "%Y-%m-%d %H:%M:%S")
              }
              .ext.remediated_date = string!(parsed.remediated_date)
          }

      } else if is_asset {
          # --- Asset Data ---
          .udm.event_type = "asset_discovered"
          .udm.category = "asset"

          if exists(parsed.fqdn) {
              .ext.fqdn = string!(parsed.fqdn)
          }

          if exists(parsed.risk_score) {
              risk_val, risk_err = to_float(parsed.risk_score)
              if risk_err == null {
                  .udm.risk_score = to_string(risk_val)
              }
          }

          if exists(parsed.vulnerabilities) {
              vuln = parsed.vulnerabilities
              if exists(vuln.total) {
                  .ext.vuln_total = to_string(vuln.total) ?? ""
              }
              if exists(vuln.critical) {
                  .ext.vuln_critical = to_string(vuln.critical) ?? ""
              }
              if exists(vuln.severe) {
                  .ext.vuln_severe = to_string(vuln.severe) ?? ""
              }
              if exists(vuln.moderate) {
                  .ext.vuln_moderate = to_string(vuln.moderate) ?? ""
              }
              if exists(vuln.low) {
                  .ext.vuln_low = to_string(vuln.low) ?? ""
              }
          }

          if exists(parsed.tags) && is_array(parsed.tags) {
              .ext.tags = encode_json(parsed.tags)
          }

          if exists(parsed.last_assessed_for_vulnerabilities) {
              ts, ts_err = parse_timestamp(string!(parsed.last_assessed_for_vulnerabilities), "%+")
              if ts_err == null {
                  .udm.timestamp = format_timestamp!(ts, format: "%Y-%m-%d %H:%M:%S")
              }
          }

          if exists(parsed.last_scan_id) {
              .udm.session_id = string!(parsed.last_scan_id)
          }

      } else {
          # Unknown Rapid7 event type
          .udm.event_type = "unknown"
          .ext.raw_parsed = encode_json(parsed)
      }

  } else {
      .metadata.parse_error = to_string(err)
  }

  # Set parser name
  .metadata.parser = "rapid7_insightvm"

  # Preserve raw log
  .message = raw_log
