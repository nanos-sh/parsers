name: aws_waf
display_name: AWS WAF
version: "1.0.0"
description: "Parses AWS WAF v2 access logs including rule matches, rate limiting, and bot control"
match_values:
  - aws_waf
  - aws_waf_logs
category: cloud
vendor: "Amazon"
product: "WAF"
parser_vrl: |
  # AWS WAF Parser
  # Parses AWS WAF v2 JSON access logs

  # Initialize required structures
  .udm = {}
  .ext = {}
  .metadata = {}

  # Set defaults
  .udm.timestamp = now()
  .udm.cloud_provider = "aws"
  .udm.cloud_service = "waf"

  # Get raw log content
  raw_log = to_string(.message) ?? ""

  # Parse JSON
  parsed, err = parse_json(raw_log)

  if err == null {
      # --- Timestamp ---
      if exists(parsed.timestamp) {
          ts_ms = to_int(parsed.timestamp) ?? 0
          if ts_ms > 0 {
              ts_secs = int!(ts_ms / 1000)
              ts, ts_err = from_unix_timestamp(ts_secs)
              if ts_err == null {
                  .udm.timestamp = format_timestamp!(ts, format: "%Y-%m-%d %H:%M:%S")
              }
          }
      }

      # --- HTTP Request ---
      if exists(parsed.httpRequest) {
          req = parsed.httpRequest

          # Client IP
          if exists(req.clientIp) {
              .udm.src_ip = string!(req.clientIp)
          }

          # HTTP Method
          if exists(req.httpMethod) {
              .udm.http_method = string!(req.httpMethod)
          }

          # URI
          if exists(req.uri) {
              uri_val = string!(req.uri)
              .udm.uri_path = uri_val
              .udm.url = uri_val
          }

          # Country
          if exists(req.country) {
              .ext.src_country = string!(req.country)
          }

          # Request ID
          if exists(req.requestId) {
              .ext.request_id = string!(req.requestId)
          }

          # HTTP Version
          if exists(req.httpVersion) {
              .ext.http_version = string!(req.httpVersion)
          }

          # Extract headers
          if exists(req.headers) && is_array(req.headers) {
              headers = array!(req.headers)
              i = 0
              count = length(headers)
              header_item, h_err = get(headers, [i])
              if h_err == null && header_item != null {
                  name_val = downcase(to_string(get!(header_item, ["name"])) ?? "")
                  value_val = to_string(get!(header_item, ["value"])) ?? ""
                  if name_val == "host" { .udm.url_domain = value_val }
                  if name_val == "user-agent" { .udm.http_user_agent = value_val }
              }
              i = 1
              header_item, h_err = get(headers, [i])
              if h_err == null && header_item != null {
                  name_val = downcase(to_string(get!(header_item, ["name"])) ?? "")
                  value_val = to_string(get!(header_item, ["value"])) ?? ""
                  if name_val == "host" { .udm.url_domain = value_val }
                  if name_val == "user-agent" { .udm.http_user_agent = value_val }
              }
              i = 2
              header_item, h_err = get(headers, [i])
              if h_err == null && header_item != null {
                  name_val = downcase(to_string(get!(header_item, ["name"])) ?? "")
                  value_val = to_string(get!(header_item, ["value"])) ?? ""
                  if name_val == "host" { .udm.url_domain = value_val }
                  if name_val == "user-agent" { .udm.http_user_agent = value_val }
              }
              i = 3
              header_item, h_err = get(headers, [i])
              if h_err == null && header_item != null {
                  name_val = downcase(to_string(get!(header_item, ["name"])) ?? "")
                  value_val = to_string(get!(header_item, ["value"])) ?? ""
                  if name_val == "host" { .udm.url_domain = value_val }
                  if name_val == "user-agent" { .udm.http_user_agent = value_val }
              }
              i = 4
              header_item, h_err = get(headers, [i])
              if h_err == null && header_item != null {
                  name_val = downcase(to_string(get!(header_item, ["name"])) ?? "")
                  value_val = to_string(get!(header_item, ["value"])) ?? ""
                  if name_val == "host" { .udm.url_domain = value_val }
                  if name_val == "user-agent" { .udm.http_user_agent = value_val }
              }
          }
      }

      # --- Response Code ---
      if exists(parsed.responseCodeSent) {
          .udm.http_status_code = to_string(parsed.responseCodeSent) ?? ""
      }

      # --- Action ---
      if exists(parsed.action) {
          .udm.event_type = string!(parsed.action)
      }

      # --- Terminating Rule ---
      if exists(parsed.terminatingRuleId) {
          .udm.rule_name = string!(parsed.terminatingRuleId)
      }

      if exists(parsed.terminatingRuleType) {
          .ext.terminating_rule_type = string!(parsed.terminatingRuleType)
      }

      # --- Match Details ---
      if exists(parsed.terminatingRuleMatchDetails) && is_array(parsed.terminatingRuleMatchDetails) {
          match_details = array!(parsed.terminatingRuleMatchDetails)
          if length(match_details) > 0 {
              first_match, fm_err = get(match_details, [0])
              if fm_err == null && first_match != null {
                  cond_type = to_string(get!(first_match, ["conditionType"])) ?? ""
                  if cond_type != "" {
                      .udm.category = cond_type
                  }
                  matched_data = get!(first_match, ["matchedData"])
                  if matched_data != null {
                      .ext.matched_data = encode_json(matched_data)
                  }
              }
          }
      }

      # --- Web ACL ID (Resource ID) ---
      if exists(parsed.webaclId) {
          .udm.resource_id = string!(parsed.webaclId)
      }

      # --- Labels ---
      if exists(parsed.labels) && is_array(parsed.labels) {
          .ext.labels = encode_json(parsed.labels)
      }

      # --- HTTP Source ---
      if exists(parsed.httpSourceName) {
          .ext.http_source_name = string!(parsed.httpSourceName)
      }
      if exists(parsed.httpSourceId) {
          .ext.http_source_id = string!(parsed.httpSourceId)
      }

      # --- Rule Group List ---
      if exists(parsed.ruleGroupList) && is_array(parsed.ruleGroupList) {
          .ext.rule_group_list = encode_json(parsed.ruleGroupList)
      }

      # --- Rate Based Rule List ---
      if exists(parsed.rateBasedRuleList) && is_array(parsed.rateBasedRuleList) {
          rate_rules = array!(parsed.rateBasedRuleList)
          if length(rate_rules) > 0 {
              .ext.rate_based_rule_list = encode_json(parsed.rateBasedRuleList)
          }
      }

  } else {
      .metadata.parse_error = to_string(err)
  }

  # Set parser name
  .metadata.parser = "aws_waf"

  # Preserve raw log
  .message = raw_log
