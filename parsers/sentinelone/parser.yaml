name: sentinelone
display_name: SentinelOne
version: "1.0.0"
description: "Parses SentinelOne EDR threat, activity, and Deep Visibility events"
match_values:
  - sentinelone
  - sentinel_one
  - s1
category: endpoint
vendor: "SentinelOne"
product: "Singularity"
parser_vrl: |
  # SentinelOne EDR Parser
  # Supports: Threat/Alert, Activity Log, Deep Visibility events

  .udm = {}
  .ext = {}
  .metadata = {}

  raw_log = string!(.message)
  parsed, err = parse_json(raw_log)

  if err == null {
      # ------------------------------------------------------------------
      # Detect event type: Threat, Activity, or Deep Visibility
      # ------------------------------------------------------------------
      event_type = "unknown"

      if exists(parsed.EventType) {
          event_type = "deep_visibility"
      } else if exists(parsed.activityType) {
          event_type = "activity"
      } else if exists(parsed.threatId) || exists(parsed.threatName) || exists(parsed.classification) {
          event_type = "threat"
      }

      .ext.event_type = event_type

      # ------------------------------------------------------------------
      # Common fields across all event types
      # ------------------------------------------------------------------
      if exists(parsed.createdAt) {
          ts, ts_err = parse_timestamp(to_string(parsed.createdAt) ?? "", "%+")
          if ts_err == null {
              .udm.timestamp = ts
          }
      }

      if exists(parsed.siteName) { .ext.site_name = to_string(parsed.siteName) ?? null }
      if exists(parsed.groupName) { .ext.group_name = to_string(parsed.groupName) ?? null }
      if exists(parsed.accountName) { .ext.account_name = to_string(parsed.accountName) ?? null }
      if exists(parsed.accountId) { .ext.account_id = to_string(parsed.accountId) ?? null }

      # ------------------------------------------------------------------
      # THREAT events
      # ------------------------------------------------------------------
      if event_type == "threat" {
          .udm.vendor_product = "SentinelOne Singularity"
          .udm.category = to_string(parsed.classification) ?? null
          .udm.signature = to_string(parsed.threatName) ?? null
          .udm.file_hash = to_string(parsed.fileContentHash) ?? null
          .udm.file_path = to_string(parsed.filePath) ?? null
          .udm.src_host = to_string(parsed.agentComputerName) ?? null
          .udm.src_ip = to_string(parsed.agentIp) ?? null
          .udm.event_type = to_string(parsed.mitigationStatus) ?? null

          if exists(parsed.fileSize) {
              .udm.file_size = to_int(parsed.fileSize) ?? null
          }

          # Extract file_name from filePath
          fp = to_string(parsed.filePath) ?? ""
          if fp != "" {
              # Handle both Windows and Unix paths
              parts_back = split(fp, "\\")
              last_back = get!(parts_back, [-1])
              if last_back != null {
                  parts_fwd = split(to_string!(last_back), "/")
                  fname = get!(parts_fwd, [-1])
                  if fname != null {
                      .udm.file_name = to_string!(fname)
                  }
              }
          }

          # Severity from confidenceLevel
          confidence = downcase(to_string(parsed.confidenceLevel) ?? "")
          if confidence == "malicious" {
              .udm.severity = "critical"
          } else if confidence == "suspicious" {
              .udm.severity = "high"
          } else if confidence == "n/a" || confidence == "" {
              .udm.severity = "medium"
          } else {
              .udm.severity = "low"
          }

          # Cloud verdict and classification source
          if exists(parsed.cloudVerdict) { .ext.cloud_verdict = to_string(parsed.cloudVerdict) ?? null }
          if exists(parsed.classificationSource) { .ext.classification_source = to_string(parsed.classificationSource) ?? null }
          if exists(parsed.description) { .ext.description = to_string(parsed.description) ?? null }

          # Agent metadata
          if exists(parsed.agentDomain) { .udm.user_domain = to_string(parsed.agentDomain) ?? null }
          if exists(parsed.agentOsType) { .ext.os_type = to_string(parsed.agentOsType) ?? null }
          if exists(parsed.agentVersion) { .ext.agent_version = to_string(parsed.agentVersion) ?? null }
          if exists(parsed.agentIsActive) { .ext.agent_active = to_bool(parsed.agentIsActive) ?? null }
          if exists(parsed.agentMachineType) { .ext.machine_type = to_string(parsed.agentMachineType) ?? null }
          if exists(parsed.agentNetworkStatus) { .ext.network_status = to_string(parsed.agentNetworkStatus) ?? null }
          if exists(parsed.agentId) { .ext.agent_id = to_string(parsed.agentId) ?? null }
          if exists(parsed.id) { .ext.event_id = to_string(parsed.id) ?? null }
          if exists(parsed.threatId) { .ext.threat_id = to_string(parsed.threatId) ?? null }

          # Mitigation details
          if exists(parsed.mitigationStatusDescription) {
              .ext.mitigation_description = to_string(parsed.mitigationStatusDescription) ?? null
          }
          if exists(parsed.initiatedBy) { .ext.initiated_by = to_string(parsed.initiatedBy) ?? null }

          # Engines
          if exists(parsed.engines) {
              engines_arr = array!(parsed.engines)
              engine_strs = []
              for_each(engines_arr) -> |_i, v| {
                  s = to_string(v) ?? ""
                  if s != "" {
                      engine_strs = push(engine_strs, s)
                  }
              }
              if length(engine_strs) > 0 {
                  .ext.engines = join!(engine_strs, ",")
              }
          }

          # MITRE from indicators array
          if exists(parsed.indicators) {
              indicators = array!(parsed.indicators)
              techniques = []
              tactics = []
              for_each(indicators) -> |_i, ind| {
                  if exists(ind.techniques) {
                      techs = array(ind.techniques) ?? []
                      for_each(techs) -> |_j, t| {
                          tv = to_string(t) ?? ""
                          if tv != "" {
                              techniques = push(techniques, tv)
                          }
                      }
                  }
                  if exists(ind.tactics) {
                      tacs = array(ind.tactics) ?? []
                      for_each(tacs) -> |_k, ta| {
                          tav = to_string(ta) ?? ""
                          if tav != "" {
                              tactics = push(tactics, tav)
                          }
                      }
                  }
              }
              if length(techniques) > 0 {
                  .udm.mitre_technique_id = join!(unique(techniques), ",")
              }
              if length(tactics) > 0 {
                  .ext.mitre_tactics = join!(unique(tactics), ",")
              }
          }

      } else if event_type == "activity" {
          # ------------------------------------------------------------------
          # ACTIVITY LOG events
          # ------------------------------------------------------------------
          .udm.vendor_product = "SentinelOne Singularity"

          if exists(parsed.activityType) { .ext.activity_type = to_int(parsed.activityType) ?? null }
          if exists(parsed.primaryDescription) { .udm.signature = to_string(parsed.primaryDescription) ?? null }
          if exists(parsed.secondaryDescription) { .ext.secondary_description = to_string(parsed.secondaryDescription) ?? null }
          if exists(parsed.id) { .ext.event_id = to_string(parsed.id) ?? null }
          if exists(parsed.userId) { .udm.user_id = to_string(parsed.userId) ?? null }

          # Data sub-object
          if exists(parsed.data) {
              data = parsed.data
              if exists(data.computerName) { .udm.src_host = to_string(data.computerName) ?? null }
              if exists(data.username) { .udm.user = to_string(data.username) ?? null }
              if exists(data.ipAddress) { .udm.src_ip = to_string(data.ipAddress) ?? null }
              if exists(data.role) { .ext.user_role = to_string(data.role) ?? null }
              if exists(data.source) { .ext.activity_source = to_string(data.source) ?? null }
          }

      } else if event_type == "deep_visibility" {
          # ------------------------------------------------------------------
          # DEEP VISIBILITY events
          # ------------------------------------------------------------------
          .udm.vendor_product = "SentinelOne Singularity"

          dv_type = downcase(to_string(parsed.EventType) ?? "")
          .ext.event_type_detail = to_string(parsed.EventType) ?? null

          if exists(parsed.agentName) { .udm.src_host = to_string(parsed.agentName) ?? null }
          if exists(parsed.User) { .udm.user = to_string(parsed.User) ?? null }

          # Process fields (common across DV types)
          if exists(parsed.ProcessName) { .udm.process_name = to_string(parsed.ProcessName) ?? null }
          if exists(parsed.ProcessImagePath) { .udm.process_path = to_string(parsed.ProcessImagePath) ?? null }
          if exists(parsed.ProcessCommandLine) { .udm.command_line = to_string(parsed.ProcessCommandLine) ?? null }
          if exists(parsed.ProcessId) { .udm.process_id = to_string(parsed.ProcessId) ?? null }

          if exists(parsed.Sha256) { .udm.process_hash = to_string(parsed.Sha256) ?? null }
          if exists(parsed.Sha1) { .ext.sha1 = to_string(parsed.Sha1) ?? null }
          if exists(parsed.Md5) { .ext.md5 = to_string(parsed.Md5) ?? null }

          # Parent process
          if exists(parsed.ParentProcessName) { .udm.parent_process_name = to_string(parsed.ParentProcessName) ?? null }
          if exists(parsed.ParentProcessImagePath) { .udm.parent_process_path = to_string(parsed.ParentProcessImagePath) ?? null }
          if exists(parsed.ParentProcessCommandLine) { .udm.parent_command_line = to_string(parsed.ParentProcessCommandLine) ?? null }
          if exists(parsed.ParentProcessId) { .udm.parent_process_id = to_string(parsed.ParentProcessId) ?? null }

          # Timestamp from ProcessStartTime
          if exists(parsed.ProcessStartTime) {
              pts, pts_err = parse_timestamp(to_string(parsed.ProcessStartTime) ?? "", "%+")
              if pts_err == null {
                  .udm.timestamp = pts
              }
          }

          # Network fields (for network/DNS DV events)
          src_ip_val = to_string(parsed.SrcIP) ?? ""
          if src_ip_val != "" { .udm.src_ip = src_ip_val }

          dst_ip_val = to_string(parsed.DstIP) ?? ""
          if dst_ip_val != "" { .udm.dest_ip = dst_ip_val }

          src_port_val = to_string(parsed.SrcPort) ?? ""
          if src_port_val != "" {
              .udm.src_port = to_int(src_port_val) ?? null
          }

          dst_port_val = to_string(parsed.DstPort) ?? ""
          if dst_port_val != "" {
              .udm.dest_port = to_int(dst_port_val) ?? null
          }

          # DNS
          if exists(parsed.DnsRequest) {
              dns = to_string(parsed.DnsRequest) ?? ""
              if dns != "" {
                  .ext.dns_query = dns
              }
          }

          # Dispatch on DV event type for action
          if contains(dv_type, "process") {
              .udm.event_type = "process_created"
          } else if contains(dv_type, "network") {
              .udm.event_type = "network_connection"
          } else if contains(dv_type, "dns") {
              .udm.event_type = "dns_query"
          } else if contains(dv_type, "file") {
              .udm.event_type = "file_modified"
              if exists(parsed.FilePath) { .udm.file_path = to_string(parsed.FilePath) ?? null }
          } else if contains(dv_type, "registry") {
              .udm.event_type = "registry_modified"
              if exists(parsed.RegistryPath) { .ext.registry_path = to_string(parsed.RegistryPath) ?? null }
              if exists(parsed.RegistryValue) { .ext.registry_value = to_string(parsed.RegistryValue) ?? null }
          } else {
              .udm.event_type = dv_type
          }
      }

      # Set default timestamp if not set
      if !exists(.udm.timestamp) || .udm.timestamp == null {
          .udm.timestamp = now()
      }
  } else {
      # Failed to parse JSON — store raw
      .udm.timestamp = now()
      .ext.raw_message = raw_log
      .ext.parse_error = to_string(err)
  }
