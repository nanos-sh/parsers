name: microsoft_365
display_name: Microsoft 365
version: "1.0.0"
description: "Parses Microsoft 365 Management Activity API audit logs including Exchange, SharePoint, Azure AD, DLP, and Teams events"
match_values:
  - microsoft_365
  - m365
  - o365
  - office365
category: cloud
vendor: "Microsoft"
product: "Microsoft 365"
parser_vrl: |
  # Microsoft 365 Management Activity API Parser
  # Parses Exchange, SharePoint, AzureAD, DLP, Teams, and other workloads

  # Initialize required structures
  .udm = {}
  .ext = {}
  .metadata = {}

  # Set defaults
  .udm.timestamp = now()
  .udm.vendor = "Microsoft"
  .udm.product = "Microsoft 365"
  .udm.vendor_product = "Microsoft 365"
  .udm.cloud_provider = "microsoft"

  # Get raw log content
  raw_log = to_string(.message) ?? ""

  # Parse JSON
  parsed, err = parse_json(raw_log)

  if err == null {
      # --- Common fields ---

      # Timestamp from CreationTime
      if exists(parsed.CreationTime) {
          raw_ts = string!(parsed.CreationTime)
          # Try ISO8601 first (with timezone), then without
          ts, ts_err = parse_timestamp(raw_ts, "%+")
          if ts_err != null {
              ts, ts_err = parse_timestamp(raw_ts, "%Y-%m-%dT%H:%M:%S")
          }
          if ts_err == null {
              .udm.timestamp = format_timestamp!(ts, format: "%Y-%m-%d %H:%M:%S")
          }
      }

      # UserId -> user
      if exists(parsed.UserId) {
          user_id = string!(parsed.UserId)
          .udm.user = user_id
          # Extract domain from email
          parts = split(user_id, "@")
          if length(parts) == 2 {
              .udm.user_domain = parts[1]
              .udm.user_name = parts[0]
          }
      }

      # ClientIP -> src_ip (may contain port like "[ip]:port" or "ip:port")
      if exists(parsed.ClientIP) {
          raw_ip = string!(parsed.ClientIP)
          if raw_ip != "" {
              # Handle [ipv6]:port format
              if starts_with(raw_ip, "[") {
                  bracket_parts = split(raw_ip, "]")
                  if length(bracket_parts) > 0 {
                      ip_part = replace(to_string(get!(bracket_parts, [0])) ?? "", "[", "")
                      if ip_part != "" {
                          .udm.src_ip = ip_part
                      }
                  }
              } else {
                  # Handle ip:port or just ip
                  colon_parts = split(raw_ip, ":")
                  colon_count = length(colon_parts)
                  # IPv4 with port: exactly 2 parts
                  if colon_count == 2 {
                      .udm.src_ip = to_string(get!(colon_parts, [0])) ?? ""
                  } else if colon_count == 1 {
                      .udm.src_ip = raw_ip
                  } else {
                      # IPv6 address (multiple colons)
                      .udm.src_ip = raw_ip
                  }
              }
          }
      }

      # Also check ClientIPAddress (some events use this)
      if exists(parsed.ClientIPAddress) && !exists(.udm.src_ip) {
          .udm.src_ip = string!(parsed.ClientIPAddress)
      }

      # Operation -> action
      if exists(parsed.Operation) {
          .udm.action = string!(parsed.Operation)
      }

      # ResultStatus -> result
      if exists(parsed.ResultStatus) {
          raw_result = string!(parsed.ResultStatus)
          if raw_result != "" {
              result_lower = downcase(raw_result)
              .udm.result = if result_lower == "succeeded" || result_lower == "success" {
                  "success"
              } else if result_lower == "failed" || result_lower == "failure" {
                  "failure"
              } else if result_lower == "partiallysuceeded" {
                  "partial"
              } else {
                  result_lower
              }
          }
      }

      # Workload -> cloud_service
      workload = ""
      if exists(parsed.Workload) {
          workload = string!(parsed.Workload)
          .udm.cloud_service = workload
          .ext.workload = workload
      }

      # RecordType
      if exists(parsed.RecordType) {
          .ext.record_type = to_string(parsed.RecordType) ?? ""
      }

      # Id -> event_id
      if exists(parsed.Id) {
          .ext.event_id = string!(parsed.Id)
      }

      # OrganizationId -> cloud_account_id
      if exists(parsed.OrganizationId) {
          .udm.cloud_account_id = string!(parsed.OrganizationId)
      }

      # --- Workload-specific dispatch ---
      operation = to_string(parsed.Operation) ?? ""

      if workload == "Exchange" {
          # Check if it's a MessageTrace event
          is_message_trace = operation == "MessageTrace" || exists(parsed.SenderAddress) || exists(parsed.MessageTraceId)

          if is_message_trace {
              # --- Exchange MessageTrace (mail flow) ---
              .udm.category = "email"

              if exists(parsed.SenderAddress) {
                  .udm.sender = string!(parsed.SenderAddress)
                  sender_parts = split(string!(parsed.SenderAddress), "@")
                  if length(sender_parts) == 2 {
                      .udm.sender_domain = to_string(get!(sender_parts, [1])) ?? ""
                  }
              }

              if exists(parsed.RecipientAddress) {
                  .udm.recipient = string!(parsed.RecipientAddress)
                  recip_parts = split(string!(parsed.RecipientAddress), "@")
                  if length(recip_parts) == 2 {
                      .udm.recipient_domain = to_string(get!(recip_parts, [1])) ?? ""
                  }
              }

              if exists(parsed.Subject) {
                  .udm.subject = string!(parsed.Subject)
              }

              if exists(parsed.MessageId) {
                  .udm.message_id = string!(parsed.MessageId)
              }

              if exists(parsed.Status) {
                  .udm.status = string!(parsed.Status)
              }

              if exists(parsed.Direction) {
                  .ext.direction = string!(parsed.Direction)
              } else if exists(parsed.Directionality) {
                  .ext.direction = string!(parsed.Directionality)
              }

              if exists(parsed.FromIP) {
                  .udm.src_ip = string!(parsed.FromIP)
              }

              if exists(parsed.ToIP) {
                  .ext.to_ip = string!(parsed.ToIP)
              }

              if exists(parsed.Size) {
                  .ext.message_size = to_string(parsed.Size) ?? ""
              }

              if exists(parsed.SCL) {
                  scl_val = to_string(parsed.SCL) ?? "0"
                  .udm.risk_score = scl_val
                  .ext.scl = scl_val
              }

              if exists(parsed.Action) {
                  .ext.mail_action = string!(parsed.Action)
              }

              if exists(parsed.MessageTraceId) {
                  .ext.message_trace_id = string!(parsed.MessageTraceId)
              }

              if exists(parsed.ConnectorId) {
                  .ext.connector_id = string!(parsed.ConnectorId)
              }

              if exists(parsed.MessageType) {
                  .ext.message_type = string!(parsed.MessageType)
              }

          } else {
              # --- Exchange mailbox events ---
              .udm.category = "email"

              if exists(parsed.MailboxOwnerUPN) {
                  .udm.dest_user = string!(parsed.MailboxOwnerUPN)
              }

              if exists(parsed.ClientProcessName) {
                  .udm.process_name = string!(parsed.ClientProcessName)
              }

              if exists(parsed.Folders) {
                  .ext.folders = encode_json(parsed.Folders)
              }

              if exists(parsed.OperationCount) {
                  .ext.operation_count = to_string(parsed.OperationCount) ?? ""
              }

              if exists(parsed.SessionId) {
                  .udm.session_id = string!(parsed.SessionId)
              }

              if exists(parsed.ExternalAccess) {
                  .ext.external_access = to_string(parsed.ExternalAccess) ?? ""
              }

              if exists(parsed.ClientAppId) {
                  .ext.client_app_id = string!(parsed.ClientAppId)
              }

              if exists(parsed.ClientInfoString) {
                  .ext.client_info = string!(parsed.ClientInfoString)
              }

              if exists(parsed.MailboxGuid) {
                  .ext.mailbox_guid = string!(parsed.MailboxGuid)
              }
          }

      } else if workload == "SharePoint" || workload == "OneDrive" {
          # --- SharePoint / OneDrive ---
          .udm.category = "file"

          if exists(parsed.SourceFileName) {
              .udm.file_name = string!(parsed.SourceFileName)
          }

          if exists(parsed.ObjectId) {
              .udm.url = string!(parsed.ObjectId)
          }

          if exists(parsed.SiteUrl) {
              .udm.url_domain = string!(parsed.SiteUrl)
          }

          if exists(parsed.SourceFileExtension) {
              .ext.file_extension = string!(parsed.SourceFileExtension)
          }

          if exists(parsed.ItemType) {
              .ext.item_type = string!(parsed.ItemType)
          }

          if exists(parsed.UserAgent) {
              .udm.http_user_agent = string!(parsed.UserAgent)
          }

          if exists(parsed.SourceRelativeUrl) {
              .ext.source_relative_url = string!(parsed.SourceRelativeUrl)
          }

          if exists(parsed.Site) {
              .ext.site_id = string!(parsed.Site)
          }

          if exists(parsed.ListItemUniqueId) {
              .ext.list_item_id = string!(parsed.ListItemUniqueId)
          }

          if exists(parsed.EventSource) {
              .ext.event_source = string!(parsed.EventSource)
          }

      } else if workload == "AzureActiveDirectory" {
          # --- Azure AD / Entra ---
          .udm.category = "identity"

          # Actor -> src_user
          if exists(parsed.Actor) && is_array(parsed.Actor) {
              actors = array!(parsed.Actor)
              if length(actors) > 0 {
                  a0 = actors[0]
                  if exists(a0.ID) {
                      .udm.src_user = string!(a0.ID)
                  }
              }
          }

          # Target -> dest_user, resource_id
          if exists(parsed.Target) && is_array(parsed.Target) {
              targets = array!(parsed.Target)
              if length(targets) > 0 {
                  t0 = targets[0]
                  if exists(t0.ID) {
                      .udm.dest_user = string!(t0.ID)
                  }
              }
          }

          if exists(parsed.ObjectId) {
              .udm.resource_id = string!(parsed.ObjectId)
          }

          if exists(parsed.ModifiedProperties) {
              .ext.modified_properties = encode_json(parsed.ModifiedProperties)
          }

          if exists(parsed.ExtendedProperties) {
              .ext.extended_properties = encode_json(parsed.ExtendedProperties)
          }

          if exists(parsed.AzureActiveDirectoryEventType) {
              .ext.aad_event_type = to_string(parsed.AzureActiveDirectoryEventType) ?? ""
          }

          # Map result for AAD (Success vs other)
          if exists(parsed.ResultStatus) {
              raw_rs = downcase(string!(parsed.ResultStatus))
              if raw_rs == "success" {
                  .udm.auth_result = "success"
              } else if raw_rs == "failure" || raw_rs == "failed" {
                  .udm.auth_result = "failure"
              }
          }

      } else if workload == "MicrosoftTeams" {
          # --- Teams ---
          .udm.category = "collaboration"

          if exists(parsed.ChatName) {
              .ext.chat_name = string!(parsed.ChatName)
          }

          if exists(parsed.ChannelName) {
              .ext.channel_name = string!(parsed.ChannelName)
          }

          if exists(parsed.TeamName) {
              .ext.team_name = string!(parsed.TeamName)
          }

          if exists(parsed.MessageId) {
              .ext.message_id = string!(parsed.MessageId)
          }

          if exists(parsed.CommunicationType) {
              .ext.communication_type = string!(parsed.CommunicationType)
          }

          if exists(parsed.MessageURLs) && is_array(parsed.MessageURLs) {
              .ext.message_urls = encode_json(parsed.MessageURLs)
          }

          if exists(parsed.Members) && is_array(parsed.Members) {
              .ext.members = encode_json(parsed.Members)
          }

      } else if operation == "DLPRuleMatch" || exists(parsed.IncidentId) || exists(parsed.PolicyDetails) {
          # --- DLP ---
          .udm.category = "dlp"

          if exists(parsed.IncidentId) {
              .ext.incident_id = string!(parsed.IncidentId)
          }

          # PolicyDetails -> rule_name
          if exists(parsed.PolicyDetails) && is_array(parsed.PolicyDetails) {
              policies = array!(parsed.PolicyDetails)
              if length(policies) > 0 {
                  p0 = policies[0]
                  if exists(p0.PolicyName) {
                      .udm.rule_name = string!(p0.PolicyName)
                  }
                  if exists(p0.PolicyId) {
                      .ext.policy_id = string!(p0.PolicyId)
                  }
                  # Get first rule details
                  if exists(p0.Rules) && is_array(p0.Rules) {
                      rules = array!(p0.Rules)
                      if length(rules) > 0 {
                          r0 = rules[0]
                          if exists(r0.RuleName) {
                              .ext.dlp_rule = string!(r0.RuleName)
                          }
                          if exists(r0.Severity) {
                              .udm.severity = downcase(string!(r0.Severity))
                          }
                          if exists(r0.Actions) && is_array(r0.Actions) {
                              actions = array!(r0.Actions)
                              if length(actions) > 0 {
                                  .udm.action = to_string(get!(actions, [0])) ?? operation
                              }
                          }
                      }
                  }
              }
          }

          # Sensitive info detections
          if exists(parsed.SensitiveInfoDetections) {
              .ext.sensitive_info = encode_json(parsed.SensitiveInfoDetections)
          }

          # Exchange metadata for DLP
          if exists(parsed.ExchangeMetaData) {
              meta = parsed.ExchangeMetaData
              if exists(meta.From) {
                  .udm.sender = string!(meta.From)
              }
              if exists(meta.Subject) {
                  .udm.subject = string!(meta.Subject)
              }
              if exists(meta.MessageID) {
                  .udm.message_id = string!(meta.MessageID)
              }
              if exists(meta.To) && is_array(meta.To) {
                  to_arr = array!(meta.To)
                  if length(to_arr) > 0 {
                      .udm.recipient = to_string(get!(to_arr, [0])) ?? ""
                  }
                  .ext.recipients = encode_json(meta.To)
              }
          }

      } else {
          # --- Other workloads (SecurityComplianceCenter, Sway, PowerBI, Yammer, etc.) ---
          if workload != "" {
              .udm.category = downcase(workload)
          } else {
              .udm.category = "other"
          }

          # Capture any additional common fields
          if exists(parsed.ObjectId) {
              .udm.resource_id = string!(parsed.ObjectId)
          }

          if exists(parsed.UserAgent) {
              .udm.http_user_agent = string!(parsed.UserAgent)
          }

          if exists(parsed.Target) {
              .ext.target = encode_json(parsed.Target)
          }

          if exists(parsed.ModifiedProperties) {
              .ext.modified_properties = encode_json(parsed.ModifiedProperties)
          }
      }

      # --- UserType mapping (common) ---
      if exists(parsed.UserType) {
          ut = to_string(parsed.UserType) ?? ""
          user_type_mapped = if ut == "0" {
              "Regular"
          } else if ut == "1" {
              "Reserved"
          } else if ut == "2" {
              "Admin"
          } else if ut == "3" {
              "DcAdmin"
          } else if ut == "4" {
              "System"
          } else if ut == "5" {
              "Application"
          } else if ut == "6" {
              "ServicePrincipal"
          } else if ut == "7" {
              "CustomPolicy"
          } else if ut == "8" {
              "SystemPolicy"
          } else {
              ut
          }
          .ext.user_type = user_type_mapped
      }

  } else {
      .metadata.parse_error = to_string(err)
  }

  # Set parser name
  .metadata.parser = "microsoft_365"

  # Preserve raw log
  .message = raw_log
