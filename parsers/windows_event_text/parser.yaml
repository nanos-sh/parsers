      # === 4729/4733/4757 - Group Membership Removed ===
      if event_id == 4729 || event_id == 4733 || event_id == 4757 {
          .udm.event_type = if event_id == 4729 { "member_removed_global_group" } else if event_id == 4733 { "member_removed_local_group" } else { "member_removed_universal_group" }
          .udm.category = "account_management"
