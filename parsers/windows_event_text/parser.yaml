          .udm.dest_user = string(get!(body_fields, ["Target Account.Account Name"])) ?? null
          .udm.dest_nt_domain = string(get!(body_fields, ["Target Account.Account Domain"])) ?? null
          .udm.user_id = string(get!(body_fields, ["Target Account.Security ID"])) ?? null
