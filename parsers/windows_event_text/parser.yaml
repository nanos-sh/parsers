name: windows_event_text
display_name: Windows Event Log (Rendered Text)
version: "1.0.0"
description: "Parses Windows Event Logs in rendered text format as sent by Splunk Universal Forwarder, wevtutil, and syslog agents — with header key=value pairs and indented Message body parsing"
match_values:
  - windows_event_text
  - windows_rendered
  - wineventlog
  - splunk_winevent
  - win_rendered
category: endpoint
vendor: "Microsoft"
product: "Windows"
parser_vrl: |
  # Windows Event Log Rendered Text Parser
  # Handles: multi-line rendered text (Splunk UF, wevtutil, syslog agents)
  # and single-line MSWinEventLog syslog-wrapped format

  .udm = {}
  .ext = {}
  .metadata = {}

  .udm.vendor = "Microsoft"
  .udm.product = "Windows"
  .udm.timestamp = now()

  raw_log = string!(.message)

  # ============================================================
  # PHASE 0: Detect and handle MSWinEventLog syslog-wrapped format
  # Single-line tab-delimited: <PRI>date host MSWinEventLog\t1\tChannel\tRecordNum\t...
  # ============================================================
  is_syslog_wrapped = false
  working = raw_log

  # Strip syslog PRI if present
  pri_match, pri_err = parse_regex(working, r'^<\d+>')
  if pri_err == null {
      working = replace(working, r'^<\d+>', "")
      working = strip_whitespace(working)
  }

  # Check for MSWinEventLog tab-delimited format
  if contains(working, "MSWinEventLog") {
      is_syslog_wrapped = true
      # Format: syslog_header MSWinEventLog\t1\tChannel\tRecordNum\tDate\tEventID\tSource\tUser\tSIDType\tEventType\tHost\tCategory\tMessage...
      # Strip everything before MSWinEventLog
      mswin_match, mswin_err = parse_regex(working, r'(?s)MSWinEventLog\t(?P<rest>.*)')
      if mswin_err == null {
          tab_fields = split(string!(mswin_match.rest), "\t")
          # tab_fields[0] = severity (1), [1] = channel, [2] = record_num, [3] = date
          # [4] = event_id, [5] = source, [6] = user, [7] = sid_type, [8] = event_type
          # [9] = host, [10] = category, [11..] = message
          if length(tab_fields) > 9 {
              .ext.channel = string(get!(tab_fields, [1])) ?? ""
              .ext.record_number = string(get!(tab_fields, [2])) ?? ""
              event_id_str = string(get!(tab_fields, [4])) ?? "0"
              .ext.provider = string(get!(tab_fields, [5])) ?? ""
              computer_name = string(get!(tab_fields, [9])) ?? ""
              .ext.task_category = string(get!(tab_fields, [10])) ?? ""
              event_type_str = string(get!(tab_fields, [8])) ?? ""

              event_id = to_int(event_id_str) ?? 0
              .udm.signature_id = to_string(event_id)
              .udm.src_host = computer_name

              if contains(downcase(event_type_str), "success") {
                  .udm.auth_result = "success"
              } else if contains(downcase(event_type_str), "failure") {
                  .udm.auth_result = "failure"
              }

              # Parse the date field
              date_str = string(get!(tab_fields, [3])) ?? ""
              if date_str != "" {
                  ts, ts_err = parse_timestamp(date_str, "%a %b %d %H:%M:%S %Y")
                  if ts_err == null {
                      .udm.timestamp = ts
                  }
              }

              # The rest of tab_fields from index 11+ form the message body
              # For syslog-wrapped, the message is space-separated key:value pairs in a single line
              # We'll parse it below in the body section if we can reconstruct it
              if length(tab_fields) > 11 {
                  msg_parts = []
                  idx = 11
                  remaining = slice!(tab_fields, 11)
                  msg_body = join(remaining, "\t") ?? ""
                  .ext.message_body = msg_body
              }
          }
      }
  }

  # ============================================================
  # PHASE 1: Parse multi-line rendered text format
  # ============================================================
  if !is_syslog_wrapped {
      lines = split(raw_log, "\n")

      # --- Parse header key=value pairs ---
      event_id = 0
      computer_name = ""
      channel = ""
      provider_name = ""
      keywords_str = ""
      event_type = ""
      message_start_idx = -1
      header_timestamp = ""

      for_each(lines) -> |idx, line| {
          line_str = strip_whitespace(string!(line))

          # Skip empty lines in header
          if line_str != "" && message_start_idx < 0 {
              # Check for header key=value pairs
              kv_match, kv_err = parse_regex(line_str, r'^(?P<key>[A-Za-z]+)=(?P<val>.*)$')
              if kv_err == null {
                  k = string!(kv_match.key)
                  v = string!(kv_match.val)

                  if k == "LogName" {
                      channel = v
                  } else if k == "SourceName" {
                      provider_name = v
                  } else if k == "EventCode" {
                      event_id = to_int(v) ?? 0
                  } else if k == "ComputerName" {
                      computer_name = v
                  } else if k == "TaskCategory" {
                      .ext.task_category = v
                  } else if k == "Keywords" {
                      keywords_str = v
                  } else if k == "Type" {
                      event_type = v
                  } else if k == "EventType" {
                      .ext.event_type_code = v
                  } else if k == "OpCode" {
                      .ext.opcode = v
                  } else if k == "RecordNumber" {
                      .ext.record_number = v
                  } else if k == "Message" {
                      # Message= marks start of body; the value on this line is the first body line
                      message_start_idx = idx
                      .ext.message_summary = v
                  }
              } else if message_start_idx < 0 {
                  # First line might be a timestamp (no key=value)
                  # e.g., "10/15/2023 02:23:45 PM"
                  ts_match, ts_err = parse_regex(line_str, r'^\d{1,2}/\d{1,2}/\d{4}\s+\d{1,2}:\d{2}:\d{2}\s+[AP]M$')
                  if ts_err == null {
                      header_timestamp = line_str
                  }
              }
          }
      }

      .udm.signature_id = to_string(event_id)
      .udm.src_host = computer_name
      .ext.channel = channel
      .ext.provider = provider_name

      # Parse header timestamp
      if header_timestamp != "" {
          ts, ts_err = parse_timestamp(header_timestamp, "%m/%d/%Y %I:%M:%S %p")
          if ts_err == null {
              .udm.timestamp = ts
          }
      }

      # Map Keywords to auth_result
      kw_lower = downcase(keywords_str)
      if contains(kw_lower, "success") {
          .udm.auth_result = "success"
      } else if contains(kw_lower, "failure") {
          .udm.auth_result = "failure"
      }

      # ============================================================
      # PHASE 2: Parse message body — section-aware key:value extraction
      # ============================================================
      # Build a flat map: "section.key" -> "value"
      # e.g., "New Logon.Account Name" -> "jsmith"
      body_fields = {}
      current_section = "General"
      last_key = ""

      if message_start_idx >= 0 {
          body_lines = slice!(lines, message_start_idx + 1)

          for_each(body_lines) -> |_idx, bline| {
              bline_str = string!(bline)

              # Check for section header: a line ending with ":" that isn't tab-indented key:value
              # Section headers are NOT indented, or minimally indented, and end with ":"
              section_match, section_err = parse_regex(bline_str, r'^(?P<section>[A-Za-z][A-Za-z0-9 ()]+):\s*$')
              if section_err == null {
                  current_section = strip_whitespace(string!(section_match.section))
                  last_key = ""
              } else {
                  # Check for tab-indented key:\tvalue pairs
                  # Handles varying tabs: \tKey:\t\tValue or \tKey:\t\t\tValue
                  kv_body_match, kv_body_err = parse_regex(bline_str, r'^\t(?P<key>[^\t:]+):\t+(?P<val>.*)$')
                  if kv_body_err == null {
                      k = strip_whitespace(string!(kv_body_match.key))
                      v = strip_whitespace(string!(kv_body_match.val))
                      full_key = current_section + "." + k
                      body_fields = set!(body_fields, [full_key], v)
                      last_key = full_key
                  } else {
                      # Check for non-indented key:\tvalue (like "Logon Type:\t3" in 4625)
                      kv_flat_match, kv_flat_err = parse_regex(bline_str, r'^(?P<key>[A-Za-z][^\t:]+):\t+(?P<val>.*)$')
                      if kv_flat_err == null {
                          k = strip_whitespace(string!(kv_flat_match.key))
                          v = strip_whitespace(string!(kv_flat_match.val))
                          full_key = current_section + "." + k
                          body_fields = set!(body_fields, [full_key], v)
                          last_key = full_key
                      } else {
                          # Check for space-separated key:  value (7045 System log style)
                          kv_space_match, kv_space_err = parse_regex(bline_str, r'^(?P<key>[A-Za-z][^:]+):\s{2,}(?P<val>.+)$')
                          if kv_space_err == null {
                              k = strip_whitespace(string!(kv_space_match.key))
                              v = strip_whitespace(string!(kv_space_match.val))
                              full_key = current_section + "." + k
                              body_fields = set!(body_fields, [full_key], v)
                              last_key = full_key
                          } else {
                              # Continuation line (e.g., multi-line Privileges value)
                              # Lines starting with tabs that don't match key:value pattern
                              cont_match, cont_err = parse_regex(bline_str, r'^\t+(?P<val>\S.*)$')
                              if cont_err == null && last_key != "" {
                                  existing = string(get!(body_fields, [last_key])) ?? ""
                                  cont_val = strip_whitespace(string!(cont_match.val))
                                  if existing != "" {
                                      body_fields = set!(body_fields, [last_key], existing + "\n" + cont_val)
                                  }
                              }
                          }
                      }
                  }
              }
          }
      }

      # ============================================================
      # PHASE 3: Helper function - get body field with section fallback
      # Tries "section.key" first, then any section containing that key
      # ============================================================
      # Since VRL doesn't have functions, we just use direct access with get!

      # ============================================================
      # PHASE 4: LogonType mapping
      # ============================================================
      # Try multiple section locations for Logon Type
      logon_type_str = string(get!(body_fields, ["Logon Information.Logon Type"])) ?? ""
      if logon_type_str == "" {
          logon_type_str = string(get!(body_fields, ["New Logon.Logon Type"])) ?? ""
      }
      if logon_type_str == "" {
          logon_type_str = string(get!(body_fields, ["Subject.Logon Type"])) ?? ""
      }
      if logon_type_str == "" {
          logon_type_str = string(get!(body_fields, ["General.Logon Type"])) ?? ""
      }
      logon_type_name = if logon_type_str == "2" { "Interactive" } else if logon_type_str == "3" { "Network" } else if logon_type_str == "4" { "Batch" } else if logon_type_str == "5" { "Service" } else if logon_type_str == "7" { "Unlock" } else if logon_type_str == "8" { "NetworkCleartext" } else if logon_type_str == "9" { "NewCredentials" } else if logon_type_str == "10" { "RemoteInteractive" } else if logon_type_str == "11" { "CachedInteractive" } else { null }

      # ============================================================
      # PHASE 5: Event-specific field mapping (dispatch on EventCode)
      # ============================================================

      # === 4624 - Successful Logon ===
      if event_id == 4624 {
          .udm.event_type = "logon_success"
          .udm.category = "authentication"
          .udm.auth_result = "success"

          .udm.user = string(get!(body_fields, ["New Logon.Account Name"])) ?? null
          .udm.user_domain = string(get!(body_fields, ["New Logon.Account Domain"])) ?? null
          .udm.user_id = string(get!(body_fields, ["New Logon.Security ID"])) ?? null
          .udm.session_id = string(get!(body_fields, ["New Logon.Logon ID"])) ?? null
          .udm.src_user = string(get!(body_fields, ["Subject.Account Name"])) ?? null
          .udm.src_nt_domain = string(get!(body_fields, ["Subject.Account Domain"])) ?? null
          .ext.subject_logon_id = string(get!(body_fields, ["Subject.Logon ID"])) ?? null
          .ext.subject_user_sid = string(get!(body_fields, ["Subject.Security ID"])) ?? null

          if logon_type_name != null {
              .udm.auth_type = logon_type_name
          }
          .ext.logon_type = logon_type_str

          ip_addr = string(get!(body_fields, ["Network Information.Source Network Address"])) ?? ""
          if ip_addr != "" && ip_addr != "-" {
              .udm.src_ip = ip_addr
          }
          ip_port = string(get!(body_fields, ["Network Information.Source Port"])) ?? ""
          if ip_port != "" && ip_port != "0" && ip_port != "-" {
              .udm.src_port = to_int(ip_port) ?? null
          }

          .ext.logon_process = string(get!(body_fields, ["Detailed Authentication Information.Logon Process"])) ?? null
          .udm.authentication_method = string(get!(body_fields, ["Detailed Authentication Information.Authentication Package"])) ?? null
          .ext.workstation_name = string(get!(body_fields, ["Network Information.Workstation Name"])) ?? null
          .ext.logon_guid = string(get!(body_fields, ["New Logon.Logon GUID"])) ?? null
          .ext.transmitted_services = string(get!(body_fields, ["Detailed Authentication Information.Transited Services"])) ?? null
          .ext.lm_package_name = string(get!(body_fields, ["Detailed Authentication Information.Package Name (NTLM only)"])) ?? null
          .ext.key_length = string(get!(body_fields, ["Detailed Authentication Information.Key Length"])) ?? null

          elevated = string(get!(body_fields, ["Logon Information.Elevated Token"])) ?? null
          if elevated != null {
              .ext.elevated_token = elevated
          }

          # Process info from the logon event
          proc_name = string(get!(body_fields, ["Process Information.Process Name"])) ?? ""
          if proc_name != "" && proc_name != "-" {
              .udm.process_path = proc_name
              parts = split(proc_name, "\\")
              if length(parts) > 0 {
                  .udm.process_name = get(parts, [length(parts) - 1]) ?? null
              }
          }
      }

      # === 4625 - Failed Logon ===
      if event_id == 4625 {
          .udm.event_type = "logon_failure"
          .udm.category = "authentication"
          .udm.auth_result = "failure"

          .udm.user = string(get!(body_fields, ["Account For Which Logon Failed.Account Name"])) ?? null
          .udm.user_domain = string(get!(body_fields, ["Account For Which Logon Failed.Account Domain"])) ?? null
          .udm.user_id = string(get!(body_fields, ["Account For Which Logon Failed.Security ID"])) ?? null
          .udm.src_user = string(get!(body_fields, ["Subject.Account Name"])) ?? null
          .udm.src_nt_domain = string(get!(body_fields, ["Subject.Account Domain"])) ?? null

          if logon_type_name != null {
              .udm.auth_type = logon_type_name
          }
          .ext.logon_type = logon_type_str

          ip_addr = string(get!(body_fields, ["Network Information.Source Network Address"])) ?? ""
          if ip_addr != "" && ip_addr != "-" {
              .udm.src_ip = ip_addr
          }
          ip_port = string(get!(body_fields, ["Network Information.Source Port"])) ?? ""
          if ip_port != "" && ip_port != "0" && ip_port != "-" {
              .udm.src_port = to_int(ip_port) ?? null
          }

          .ext.logon_process = string(get!(body_fields, ["Detailed Authentication Information.Logon Process"])) ?? null
          .udm.authentication_method = string(get!(body_fields, ["Detailed Authentication Information.Authentication Package"])) ?? null
          .ext.workstation_name = string(get!(body_fields, ["Network Information.Workstation Name"])) ?? null

          # Failure reason mapping
          status_code = downcase(string(get!(body_fields, ["Failure Information.Status"])) ?? "")
          sub_status_code = downcase(string(get!(body_fields, ["Failure Information.Sub Status"])) ?? "")
          .ext.status = status_code
          .ext.sub_status = sub_status_code
          .ext.failure_reason_text = string(get!(body_fields, ["Failure Information.Failure Reason"])) ?? null

          failure_reason = if sub_status_code == "0xc000006a" { "wrong_password" } else if sub_status_code == "0xc0000064" { "no_such_user" } else if sub_status_code == "0xc0000234" { "account_locked" } else if sub_status_code == "0xc0000072" { "account_disabled" } else if sub_status_code == "0xc000006d" { "bad_password" } else if sub_status_code == "0xc000006e" { "restricted_logon" } else if sub_status_code == "0xc000006f" { "outside_logon_hours" } else if sub_status_code == "0xc0000070" { "unauthorized_workstation" } else if sub_status_code == "0xc0000071" { "password_expired" } else if sub_status_code == "0xc0000133" { "clock_skew" } else if sub_status_code == "0xc0000224" { "password_change_required" } else if status_code == "0xc000006d" { "bad_password" } else if status_code == "0xc0000064" { "no_such_user" } else if status_code == "0xc0000234" { "account_locked" } else if status_code == "0xc0000072" { "account_disabled" } else { null }

          if failure_reason != null {
              .udm.result = failure_reason
              .ext.failure_reason = failure_reason
          }
      }

      # === 4634/4647 - Logoff ===
      if event_id == 4634 || event_id == 4647 {
          .udm.event_type = "logoff"
          .udm.category = "authentication"
          .udm.user = string(get!(body_fields, ["Subject.Account Name"])) ?? null
          .udm.user_domain = string(get!(body_fields, ["Subject.Account Domain"])) ?? null
          .udm.user_id = string(get!(body_fields, ["Subject.Security ID"])) ?? null
          .udm.session_id = string(get!(body_fields, ["Subject.Logon ID"])) ?? null
          .ext.logon_type = logon_type_str
      }

      # === 4648 - Explicit Credentials ===
      if event_id == 4648 {
          .udm.event_type = "explicit_credentials"
          .udm.category = "authentication"
          .udm.src_user = string(get!(body_fields, ["Subject.Account Name"])) ?? null
          .udm.src_nt_domain = string(get!(body_fields, ["Subject.Account Domain"])) ?? null
          .udm.dest_user = string(get!(body_fields, ["Account Whose Credentials Were Used.Account Name"])) ?? string(get!(body_fields, ["General.Account Name"])) ?? null
          .udm.dest_nt_domain = string(get!(body_fields, ["Account Whose Credentials Were Used.Account Domain"])) ?? string(get!(body_fields, ["General.Account Domain"])) ?? null
          .ext.target_server_name = string(get!(body_fields, ["Target Server.Target Server Name"])) ?? null
          .ext.target_info = string(get!(body_fields, ["Target Server.Additional Information"])) ?? null
          .ext.subject_logon_id = string(get!(body_fields, ["Subject.Logon ID"])) ?? null

          proc_name = string(get!(body_fields, ["Process Information.Process Name"])) ?? ""
          if proc_name != "" && proc_name != "-" {
              .udm.process_path = proc_name
              parts = split(proc_name, "\\")
              if length(parts) > 0 {
                  .udm.process_name = get(parts, [length(parts) - 1]) ?? null
              }
          }

          ip_addr = string(get!(body_fields, ["Network Information.Network Address"])) ?? ""
          if ip_addr != "" && ip_addr != "-" {
              .udm.src_ip = ip_addr
          }
          ip_port = string(get!(body_fields, ["Network Information.Port"])) ?? ""
          if ip_port != "" && ip_port != "0" {
              .udm.src_port = to_int(ip_port) ?? null
          }
      }

      # === 4672 - Special Privileges Assigned ===
      if event_id == 4672 {
          .udm.event_type = "special_privileges_assigned"
          .udm.category = "authorization"
          .udm.user = string(get!(body_fields, ["Subject.Account Name"])) ?? null
          .udm.user_domain = string(get!(body_fields, ["Subject.Account Domain"])) ?? null
          .udm.user_id = string(get!(body_fields, ["Subject.Security ID"])) ?? null
          .udm.session_id = string(get!(body_fields, ["Subject.Logon ID"])) ?? null

          # Privileges may be a multi-line value or in General section
          privs = string(get!(body_fields, ["General.Privileges"])) ?? ""
          if privs == "" {
              privs = string(get!(body_fields, ["Subject.Privileges"])) ?? ""
          }
          if privs != "" {
              .ext.privileges = privs
          }
      }

      # === 4688 - Process Creation ===
      if event_id == 4688 {
          .udm.event_type = "process_create"
          .udm.category = "process"

          new_process = string(get!(body_fields, ["Process Information.New Process Name"])) ?? ""
          if new_process != "" {
              .udm.process_path = new_process
              parts = split(new_process, "\\")
              if length(parts) > 0 {
                  .udm.process_name = get(parts, [length(parts) - 1]) ?? null
              }
          }

          .udm.command_line = string(get!(body_fields, ["Process Information.Process Command Line"])) ?? null

          parent_process = string(get!(body_fields, ["Process Information.Creator Process Name"])) ?? ""
          if parent_process != "" {
              .udm.parent_process_path = parent_process
              .udm.parent_command_line = parent_process
              parts = split(parent_process, "\\")
              if length(parts) > 0 {
                  .udm.parent_process_name = get(parts, [length(parts) - 1]) ?? null
              }
          }

          # Prefer Target Subject for user (the process owner), fall back to Creator Subject
          .udm.user = string(get!(body_fields, ["Target Subject.Account Name"])) ?? string(get!(body_fields, ["Creator Subject.Account Name"])) ?? null
          .udm.user_domain = string(get!(body_fields, ["Target Subject.Account Domain"])) ?? string(get!(body_fields, ["Creator Subject.Account Domain"])) ?? null
          .udm.user_id = string(get!(body_fields, ["Target Subject.Security ID"])) ?? string(get!(body_fields, ["Creator Subject.Security ID"])) ?? null
          .udm.session_id = string(get!(body_fields, ["Target Subject.Logon ID"])) ?? string(get!(body_fields, ["Creator Subject.Logon ID"])) ?? null

          # Process IDs (hex format)
          new_pid_str = string(get!(body_fields, ["Process Information.New Process ID"])) ?? ""
          if new_pid_str != "" {
              .udm.process_id = to_int(new_pid_str) ?? null
          }

          parent_pid_str = string(get!(body_fields, ["Process Information.Creator Process ID"])) ?? ""
          if parent_pid_str != "" {
              .udm.parent_process_id = to_int(parent_pid_str) ?? null
          }

          .ext.token_elevation_type = string(get!(body_fields, ["Process Information.Token Elevation Type"])) ?? null

          # Map MandatoryLabel SID to integrity level
          mandatory_label = string(get!(body_fields, ["Process Information.Mandatory Label"])) ?? ""
          if mandatory_label != "" {
              .ext.mandatory_label = mandatory_label
              .udm.process_integrity_level = if mandatory_label == "S-1-16-0" { "Untrusted" } else if mandatory_label == "S-1-16-4096" { "Low" } else if mandatory_label == "S-1-16-8192" { "Medium" } else if mandatory_label == "S-1-16-8448" { "MediumPlus" } else if mandatory_label == "S-1-16-12288" { "High" } else if mandatory_label == "S-1-16-16384" { "System" } else { null }
          }
      }

      # === 4689 - Process Termination ===
      if event_id == 4689 {
          .udm.event_type = "process_terminate"
          .udm.category = "process"
          proc_name = string(get!(body_fields, ["Process Information.Process Name"])) ?? ""
          if proc_name != "" {
              .udm.process_path = proc_name
              parts = split(proc_name, "\\")
              if length(parts) > 0 {
                  .udm.process_name = get(parts, [length(parts) - 1]) ?? null
              }
          }
          .udm.user = string(get!(body_fields, ["Subject.Account Name"])) ?? null
          .udm.user_domain = string(get!(body_fields, ["Subject.Account Domain"])) ?? null
          .udm.session_id = string(get!(body_fields, ["Subject.Logon ID"])) ?? null
          .udm.status = string(get!(body_fields, ["Process Information.Exit Status"])) ?? null

          pid_str = string(get!(body_fields, ["Process Information.Process ID"])) ?? ""
          if pid_str != "" {
              .udm.process_id = to_int(pid_str) ?? null
          }
      }

      # === 4697 - Service Installed (Security log) ===
      if event_id == 4697 {
          .udm.event_type = "service_installed"
          .udm.category = "service"
          .udm.user = string(get!(body_fields, ["Subject.Account Name"])) ?? null
          .udm.user_domain = string(get!(body_fields, ["Subject.Account Domain"])) ?? null
          .udm.user_id = string(get!(body_fields, ["Subject.Security ID"])) ?? null
          .udm.session_id = string(get!(body_fields, ["Subject.Logon ID"])) ?? null
          .udm.service_name = string(get!(body_fields, ["Service Information.Service Name"])) ?? null
          .udm.service_path = string(get!(body_fields, ["Service Information.Service File Name"])) ?? null
