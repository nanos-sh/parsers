          .ext.group_name = string(get!(body_fields, ["Group.Group Name"])) ?? null
          .ext.group_domain = string(get!(body_fields, ["Group.Group Domain"])) ?? null
          .ext.group_sid = string(get!(body_fields, ["Group.Security ID"])) ?? null
          .ext.member_sid = string(get!(body_fields, ["Member.Security ID"])) ?? null
          .udm.user = string(get!(body_fields, ["Member.Account Name"])) ?? string(get!(body_fields, ["Member.Security ID"])) ?? null
      }

      # === 4768 - Kerberos TGT Request (AS-REQ) ===
      if event_id == 4768 {
          .udm.event_type = "kerberos_tgt_request"
          .udm.category = "authentication"
          .udm.auth_type = "Kerberos"
          .udm.user = string(get!(body_fields, ["Account Information.Account Name"])) ?? null
          .udm.user_domain = string(get!(body_fields, ["Account Information.Supplied Realm Name"])) ?? null
          .udm.user_id = string(get!(body_fields, ["Account Information.User ID"])) ?? null

          status_4768 = downcase(string(get!(body_fields, ["Additional Information.Result Code"])) ?? "")
          if status_4768 == "" {
              status_4768 = downcase(string(get!(body_fields, ["Additional Information.Failure Code"])) ?? "")
          }
          .udm.auth_result = if status_4768 == "0x0" { "success" } else if status_4768 == "" { .udm.auth_result } else { "failure" }
          .ext.status = status_4768

          .ext.service_name = string(get!(body_fields, ["Service Information.Service Name"])) ?? null
          .ext.service_sid = string(get!(body_fields, ["Service Information.Service ID"])) ?? null
          .ext.ticket_options = string(get!(body_fields, ["Additional Information.Ticket Options"])) ?? null
          .ext.pre_auth_type = string(get!(body_fields, ["Additional Information.Pre-Authentication Type"])) ?? null

          enc_type = downcase(string(get!(body_fields, ["Additional Information.Ticket Encryption Type"])) ?? "")
          .ext.ticket_encryption_type_raw = enc_type
          .ext.ticket_encryption = if enc_type == "0x17" { "RC4-HMAC (potentially Kerberoasting)" } else if enc_type == "0x12" { "AES256" } else if enc_type == "0x11" { "AES128" } else if enc_type == "0x18" { "RC4-HMAC-EXP" } else if enc_type == "0x3" { "DES-CBC-MD5" } else if enc_type == "0x1" { "DES-CBC-CRC" } else { enc_type }

          ip_addr = string(get!(body_fields, ["Network Information.Client Address"])) ?? ""
          if starts_with(ip_addr, "::ffff:") {
              ip_addr = slice!(ip_addr, 7)
          }
          if ip_addr != "" && ip_addr != "-" {
              .udm.src_ip = ip_addr
          }
          ip_port = string(get!(body_fields, ["Network Information.Client Port"])) ?? ""
          if ip_port != "" && ip_port != "0" {
              .udm.src_port = to_int(ip_port) ?? null
          }
      }

      # === 4769 - Kerberos Service Ticket (TGS-REQ) ===
      if event_id == 4769 {
          .udm.event_type = "kerberos_service_ticket"
          .udm.category = "authentication"
          .udm.auth_type = "Kerberos"
          .udm.user = string(get!(body_fields, ["Account Information.Account Name"])) ?? null
          .udm.user_domain = string(get!(body_fields, ["Account Information.Account Domain"])) ?? null

          status_4769 = downcase(string(get!(body_fields, ["Additional Information.Failure Code"])) ?? "")
          .udm.auth_result = if status_4769 == "0x0" { "success" } else if status_4769 == "" { .udm.auth_result } else { "failure" }
          .ext.status = status_4769

          .ext.service_name = string(get!(body_fields, ["Service Information.Service Name"])) ?? null
          .ext.service_sid = string(get!(body_fields, ["Service Information.Service ID"])) ?? null
          .ext.ticket_options = string(get!(body_fields, ["Additional Information.Ticket Options"])) ?? null
          .ext.logon_guid = string(get!(body_fields, ["Additional Information.Logon GUID"])) ?? null
          .ext.transmitted_services = string(get!(body_fields, ["Additional Information.Transited Services"])) ?? null

          enc_type = downcase(string(get!(body_fields, ["Additional Information.Ticket Encryption Type"])) ?? "")
          .ext.ticket_encryption_type_raw = enc_type
          .ext.ticket_encryption = if enc_type == "0x17" { "RC4-HMAC (potentially Kerberoasting)" } else if enc_type == "0x12" { "AES256" } else if enc_type == "0x11" { "AES128" } else if enc_type == "0x18" { "RC4-HMAC-EXP" } else if enc_type == "0x3" { "DES-CBC-MD5" } else if enc_type == "0x1" { "DES-CBC-CRC" } else { enc_type }

          ip_addr = string(get!(body_fields, ["Network Information.Client Address"])) ?? ""
          if starts_with(ip_addr, "::ffff:") {
              ip_addr = slice!(ip_addr, 7)
          }
          if ip_addr != "" && ip_addr != "-" {
              .udm.src_ip = ip_addr
          }
          ip_port = string(get!(body_fields, ["Network Information.Client Port"])) ?? ""
          if ip_port != "" && ip_port != "0" {
              .udm.src_port = to_int(ip_port) ?? null
          }
      }

      # === 4771 - Kerberos Pre-Auth Failed ===
      if event_id == 4771 {
          .udm.event_type = "kerberos_preauth_failed"
          .udm.category = "authentication"
          .udm.auth_type = "Kerberos"
          .udm.auth_result = "failure"
          .udm.user = string(get!(body_fields, ["Account Information.Account Name"])) ?? null
          .udm.user_id = string(get!(body_fields, ["Account Information.Security ID"])) ?? null
          .ext.service_name = string(get!(body_fields, ["Service Information.Service Name"])) ?? null

          status_4771 = downcase(string(get!(body_fields, ["Additional Information.Failure Code"])) ?? "")
          .ext.status = status_4771
          .ext.ticket_options = string(get!(body_fields, ["Additional Information.Ticket Options"])) ?? null
          .ext.pre_auth_type = string(get!(body_fields, ["Additional Information.Pre-Authentication Type"])) ?? null

          .ext.failure_reason = if status_4771 == "0x6" { "client_not_found" } else if status_4771 == "0x12" { "credentials_revoked" } else if status_4771 == "0x17" { "password_expired" } else if status_4771 == "0x18" { "wrong_password" } else if status_4771 == "0x25" { "clock_skew" } else { null }

          enc_type = downcase(string(get!(body_fields, ["Additional Information.Ticket Encryption Type"])) ?? "")
          .ext.ticket_encryption_type_raw = enc_type
          .ext.ticket_encryption = if enc_type == "0x17" { "RC4-HMAC (potentially Kerberoasting)" } else if enc_type == "0x12" { "AES256" } else if enc_type == "0x11" { "AES128" } else { enc_type }

          ip_addr = string(get!(body_fields, ["Network Information.Client Address"])) ?? ""
          if starts_with(ip_addr, "::ffff:") {
              ip_addr = slice!(ip_addr, 7)
          }
          if ip_addr != "" && ip_addr != "-" {
              .udm.src_ip = ip_addr
          }
          ip_port = string(get!(body_fields, ["Network Information.Client Port"])) ?? ""
          if ip_port != "" && ip_port != "0" {
              .udm.src_port = to_int(ip_port) ?? null
          }
      }

      # === 4776 - NTLM Authentication ===
      if event_id == 4776 {
          .udm.event_type = "ntlm_authentication"
          .udm.category = "authentication"
          .udm.auth_type = "NTLM"
          .udm.user = string(get!(body_fields, ["General.Logon Account"])) ?? null
          .ext.authenticating_package = string(get!(body_fields, ["General.Authentication Package"])) ?? null
          .ext.workstation_name = string(get!(body_fields, ["General.Source Workstation"])) ?? null

          status_4776 = downcase(string(get!(body_fields, ["General.Error Code"])) ?? "")
          .udm.auth_result = if status_4776 == "0x0" { "success" } else if status_4776 == "" { .udm.auth_result } else { "failure" }
          .ext.status = status_4776
      }

      # === 5140 - Network Share Accessed ===
      if event_id == 5140 {
          .udm.event_type = "share_access"
          .udm.category = "file_access"
          .udm.user = string(get!(body_fields, ["Subject.Account Name"])) ?? null
          .udm.user_domain = string(get!(body_fields, ["Subject.Account Domain"])) ?? null
          .udm.user_id = string(get!(body_fields, ["Subject.Security ID"])) ?? null
          .udm.session_id = string(get!(body_fields, ["Subject.Logon ID"])) ?? null
          .ext.share_name = string(get!(body_fields, ["Network Information.Share Name"])) ?? null
          .ext.share_local_path = string(get!(body_fields, ["Network Information.Share Path"])) ?? null
          .ext.access_mask = string(get!(body_fields, ["Access Request Information.Access Mask"])) ?? null

          ip_addr = string(get!(body_fields, ["Network Information.Source Address"])) ?? ""
          if ip_addr != "" && ip_addr != "-" {
              .udm.src_ip = ip_addr
          }
          ip_port = string(get!(body_fields, ["Network Information.Source Port"])) ?? ""
          if ip_port != "" && ip_port != "0" {
              .udm.src_port = to_int(ip_port) ?? null
          }
      }

      # === 5145 - Network Share Object Checked ===
      if event_id == 5145 {
          .udm.event_type = "share_object_access"
          .udm.category = "file_access"
          .udm.user = string(get!(body_fields, ["Subject.Account Name"])) ?? null
          .udm.user_domain = string(get!(body_fields, ["Subject.Account Domain"])) ?? null
          .udm.user_id = string(get!(body_fields, ["Subject.Security ID"])) ?? null
          .udm.session_id = string(get!(body_fields, ["Subject.Logon ID"])) ?? null
          .ext.share_name = string(get!(body_fields, ["Network Information.Share Name"])) ?? null

          rel_path = string(get!(body_fields, ["Network Information.Relative Target Name"])) ?? string(get!(body_fields, ["Share Information.Relative Target Name"])) ?? ""
          if rel_path != "" {
              .udm.file_path = rel_path
              parts = split(rel_path, "\\")
              if length(parts) > 0 {
                  .udm.file_name = get(parts, [length(parts) - 1]) ?? null
              }
          }

          ip_addr = string(get!(body_fields, ["Network Information.Source Address"])) ?? ""
          if ip_addr != "" && ip_addr != "-" {
              .udm.src_ip = ip_addr
          }
          ip_port = string(get!(body_fields, ["Network Information.Source Port"])) ?? ""
          if ip_port != "" && ip_port != "0" {
              .udm.src_port = to_int(ip_port) ?? null
          }
      }

      # === 1102 - Audit Log Cleared ===
      if event_id == 1102 {
          .udm.event_type = "audit_log_cleared"
          .udm.category = "audit"
          .udm.severity = "high"
          .udm.user = string(get!(body_fields, ["Subject.Account Name"])) ?? null
          .udm.user_domain = string(get!(body_fields, ["Subject.Account Domain"])) ?? null
          .udm.user_id = string(get!(body_fields, ["Subject.Security ID"])) ?? null
          .udm.session_id = string(get!(body_fields, ["Subject.Logon ID"])) ?? null
      }

      # === 4740 - Account Locked Out ===
      if event_id == 4740 {
          .udm.event_type = "account_locked"
          .udm.category = "account_management"
          .udm.dest_user = string(get!(body_fields, ["Target Account.Account Name"])) ?? string(get!(body_fields, ["Account That Was Locked Out.Account Name"])) ?? null
          .udm.user_domain = string(get!(body_fields, ["Target Account.Account Domain"])) ?? null
          .udm.user_id = string(get!(body_fields, ["Target Account.Security ID"])) ?? string(get!(body_fields, ["Account That Was Locked Out.Security ID"])) ?? null
          .udm.src_user = string(get!(body_fields, ["Subject.Account Name"])) ?? null
          .ext.caller_computer_name = string(get!(body_fields, ["Additional Information.Caller Computer Name"])) ?? null
      }

      # === 4767 - Account Unlocked ===
      if event_id == 4767 {
          .udm.event_type = "account_unlocked"
          .udm.category = "account_management"
          .udm.dest_user = string(get!(body_fields, ["Target Account.Account Name"])) ?? null
          .udm.user_domain = string(get!(body_fields, ["Target Account.Account Domain"])) ?? null
          .udm.user_id = string(get!(body_fields, ["Target Account.Security ID"])) ?? null
          .udm.src_user = string(get!(body_fields, ["Subject.Account Name"])) ?? null
          .udm.src_nt_domain = string(get!(body_fields, ["Subject.Account Domain"])) ?? null
      }

      # === 4663 - Object Access Attempt ===
      if event_id == 4663 {
          .udm.event_type = "object_access"
          .udm.category = "file_access"
          .udm.user = string(get!(body_fields, ["Subject.Account Name"])) ?? null
          .udm.user_domain = string(get!(body_fields, ["Subject.Account Domain"])) ?? null
          .udm.session_id = string(get!(body_fields, ["Subject.Logon ID"])) ?? null
          .udm.file_path = string(get!(body_fields, ["Object.Object Name"])) ?? null
          .ext.object_type = string(get!(body_fields, ["Object.Object Type"])) ?? null
          .ext.access_mask = string(get!(body_fields, ["Process Request Information.Accesses"])) ?? null
          .ext.handle_id = string(get!(body_fields, ["Object.Handle ID"])) ?? null

          proc_name = string(get!(body_fields, ["Process Information.Process Name"])) ?? ""
          if proc_name != "" {
              .udm.process_path = proc_name
              parts = split(proc_name, "\\")
              if length(parts) > 0 {
                  .udm.process_name = get(parts, [length(parts) - 1]) ?? null
              }
          }
      }

      # === 4657 - Registry Value Modified ===
      if event_id == 4657 {
          .udm.event_type = "registry_value_modified"
          .udm.category = "registry"
          .udm.user = string(get!(body_fields, ["Subject.Account Name"])) ?? null
          .udm.user_domain = string(get!(body_fields, ["Subject.Account Domain"])) ?? null
          .udm.session_id = string(get!(body_fields, ["Subject.Logon ID"])) ?? null
          .udm.registry_path = string(get!(body_fields, ["Object.Object Name"])) ?? null
          .udm.registry_value_name = string(get!(body_fields, ["Object.Object Value Name"])) ?? null
          .udm.registry_value_data = string(get!(body_fields, ["Object.New Value"])) ?? null
          .ext.old_value = string(get!(body_fields, ["Object.Old Value"])) ?? null
          .ext.old_value_type = string(get!(body_fields, ["Object.Old Value Type"])) ?? null
          .ext.new_value_type = string(get!(body_fields, ["Object.New Value Type"])) ?? null
          .ext.operation_type = string(get!(body_fields, ["Object.Operation Type"])) ?? null

          proc_name = string(get!(body_fields, ["Process Information.Process Name"])) ?? ""
          if proc_name != "" {
              .udm.process_path = proc_name
              parts = split(proc_name, "\\")
              if length(parts) > 0 {
                  .udm.process_name = get(parts, [length(parts) - 1]) ?? null
              }
          }
      }

      # === 4698/4699/4700/4701/4702 - Scheduled Task Events ===
      if event_id == 4698 || event_id == 4699 || event_id == 4700 || event_id == 4701 || event_id == 4702 {
          .udm.event_type = if event_id == 4698 { "scheduled_task_created" } else if event_id == 4699 { "scheduled_task_deleted" } else if event_id == 4700 { "scheduled_task_enabled" } else if event_id == 4701 { "scheduled_task_disabled" } else { "scheduled_task_updated" }
          .udm.category = "scheduled_task"
          .udm.user = string(get!(body_fields, ["Subject.Account Name"])) ?? null
          .udm.user_domain = string(get!(body_fields, ["Subject.Account Domain"])) ?? null
          .udm.session_id = string(get!(body_fields, ["Subject.Logon ID"])) ?? null
          .ext.task_name = string(get!(body_fields, ["Task Information.Task Name"])) ?? null
          .ext.task_content = string(get!(body_fields, ["Task Information.Task Content"])) ?? null
      }

      # === 4946/4947/4948/4950 - Windows Firewall Rule Changes ===
      if event_id == 4946 || event_id == 4947 || event_id == 4948 || event_id == 4950 {
          .udm.event_type = if event_id == 4946 { "firewall_rule_added" } else if event_id == 4947 { "firewall_rule_modified" } else if event_id == 4948 { "firewall_rule_deleted" } else { "firewall_settings_changed" }
          .udm.category = "firewall"
          .udm.rule_name = string(get!(body_fields, ["Rule Information.Rule Name"])) ?? string(get!(body_fields, ["General.Rule Name"])) ?? null
          .ext.rule_id = string(get!(body_fields, ["Rule Information.Rule ID"])) ?? string(get!(body_fields, ["General.Rule ID"])) ?? null
          .ext.profile = string(get!(body_fields, ["General.Profile Changed"])) ?? null
      }

      # ============================================================
      # Fallback action for unhandled EventCodes
      # ============================================================
      if !exists(.udm.event_type) || .udm.event_type == null {
          .udm.event_type = "windows_event_" + to_string(event_id)
      }

      # ============================================================
      # Severity mapping from event type / keywords
      # ============================================================
      event_type_lower = downcase(event_type)
      if event_type_lower == "error" {
          .udm.severity = "high"
      } else if event_type_lower == "warning" {
          .udm.severity = "medium"
      } else if event_type_lower == "critical" {
          .udm.severity = "critical"
      }

      # Bump severity for high-value events
      if event_id == 1102 {
          .udm.severity = "high"
      }

      # Store body_fields as ext.body_fields for debugging (optional, remove in production)
      # .ext.parsed_body = body_fields
  }

  .message = raw_log
