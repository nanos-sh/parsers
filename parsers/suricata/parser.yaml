name: suricata
display_name: Suricata IDS/IPS
version: "1.0.0"
description: "Parses Suricata EVE JSON logs including alert, flow, dns, http, tls, fileinfo, smtp, ssh, stats, and anomaly events"
match_values:
  - suricata
  - suricata_eve
  - eve_json
category: security
vendor: "OISF"
product: "Suricata"
parser_vrl: |
  # Suricata EVE JSON Parser
  # Dispatches on event_type for comprehensive field mapping

  .udm = {}
  .ext = {}
  .metadata = {}

  # Set defaults
  .udm.timestamp = now()
  .udm.vendor = "OISF"
  .udm.product = "Suricata"
  .udm.vendor_product = "OISF Suricata"

  raw_log = to_string(.message) ?? ""
  parsed, err = parse_json(raw_log)

  if err == null {
      # ---------------------------------------------------------------
      # Timestamp - ISO 8601 with timezone: 2023-10-15T14:23:45.123456+0000
      # ---------------------------------------------------------------
      if exists(parsed.timestamp) {
          raw_ts = string!(parsed.timestamp)
          # Suricata uses +0000 format; parse_timestamp with %+ handles it
          ts, ts_err = parse_timestamp(raw_ts, "%+")
          if ts_err == null {
              .udm.timestamp = format_timestamp!(ts, format: "%Y-%m-%d %H:%M:%S")
          } else {
              # Try alternate format with colon-less offset
              ts2, ts2_err = parse_timestamp(raw_ts, "%Y-%m-%dT%H:%M:%S%.f%z")
              if ts2_err == null {
                  .udm.timestamp = format_timestamp!(ts2, format: "%Y-%m-%d %H:%M:%S")
              }
          }
      }

      # ---------------------------------------------------------------
      # Common fields across all event types
      # ---------------------------------------------------------------
      if exists(parsed.src_ip) {
          .udm.src_ip = string!(parsed.src_ip)
      }
      if exists(parsed.dest_ip) {
          .udm.dest_ip = string!(parsed.dest_ip)
      }
      if exists(parsed.src_port) {
          .udm.src_port = to_int(parsed.src_port) ?? null
      }
      if exists(parsed.dest_port) {
          .udm.dest_port = to_int(parsed.dest_port) ?? null
      }
      if exists(parsed.proto) {
          .udm.protocol = downcase(string!(parsed.proto))
      }
      if exists(parsed.flow_id) {
          .udm.flow_id = to_string(parsed.flow_id) ?? ""
          .ext.flow_id = to_string(parsed.flow_id) ?? ""
      }
      if exists(parsed.community_id) {
          .ext.community_id = string!(parsed.community_id)
      }
      if exists(parsed.in_iface) {
          .ext.in_iface = string!(parsed.in_iface)
      }
      if exists(parsed.app_proto) {
          .ext.app_proto = string!(parsed.app_proto)
      }
      if exists(parsed.tx_id) {
          .ext.tx_id = to_int(parsed.tx_id) ?? null
      }

      # ---------------------------------------------------------------
      # Dispatch on event_type
      # ---------------------------------------------------------------
      event_type = ""
      if exists(parsed.event_type) {
          event_type = downcase(string!(parsed.event_type))
      }
      .ext.event_type = event_type

      # ===============================================================
      # ALERT
      # ===============================================================
      if event_type == "alert" {
          .udm.action = "alert"

          if exists(parsed.alert) {
              a = parsed.alert

              if exists(a.signature) {
                  .udm.signature = string!(a.signature)
              }
              if exists(a.signature_id) {
                  .udm.signature_id = to_string(a.signature_id) ?? ""
              }
              if exists(a.category) {
                  .udm.category = string!(a.category)
              }
              if exists(a.action) {
                  .udm.action = downcase(string!(a.action))
              }
              if exists(a.gid) {
                  .ext.alert_gid = to_int(a.gid) ?? null
              }
              if exists(a.rev) {
                  .ext.alert_rev = to_int(a.rev) ?? null
              }

              # Severity mapping: 1=high, 2=medium, 3=low
              if exists(a.severity) {
                  sev_int = to_int(a.severity) ?? 3
                  if sev_int == 1 {
                      .udm.severity = "high"
                  } else if sev_int == 2 {
                      .udm.severity = "medium"
                  } else {
                      .udm.severity = "low"
                  }
              }

              # MITRE metadata
              if exists(a.metadata) {
                  meta = a.metadata
                  if exists(meta.mitre_technique_id) {
                      technique_ids = array!(meta.mitre_technique_id)
                      first_technique = get!(technique_ids, [0])
                      if first_technique != null {
                          .udm.mitre_technique_id = string!(first_technique)
                      }
                      .ext.mitre_technique_ids = technique_ids
                  }
                  if exists(meta.mitre_tactic_id) {
                      .ext.mitre_tactic_ids = meta.mitre_tactic_id
                  }
                  if exists(meta.mitre_tactic_name) {
                      .ext.mitre_tactic_names = meta.mitre_tactic_name
                  }
                  if exists(meta.mitre_technique_name) {
                      .ext.mitre_technique_names = meta.mitre_technique_name
                  }
                  if exists(meta.signature_severity) {
                      sev_arr = array!(meta.signature_severity)
                      first_sev = get!(sev_arr, [0])
                      if first_sev != null {
                          .ext.signature_severity = string!(first_sev)
                      }
                  }
                  if exists(meta.attack_target) {
                      .ext.attack_target = meta.attack_target
                  }
                  if exists(meta.deployment) {
                      .ext.deployment = meta.deployment
                  }
                  if exists(meta.former_category) {
                      .ext.former_category = meta.former_category
                  }
              }
          }

          # Flow stats from alert events
          if exists(parsed.flow) {
              fl = parsed.flow
              if exists(fl.bytes_toserver) {
                  .udm.bytes_out = to_int(fl.bytes_toserver) ?? null
              }
              if exists(fl.bytes_toclient) {
                  .udm.bytes_in = to_int(fl.bytes_toclient) ?? null
              }
              if exists(fl.pkts_toserver) {
                  .udm.packets_out = to_int(fl.pkts_toserver) ?? null
              }
              if exists(fl.pkts_toclient) {
                  .udm.packets_in = to_int(fl.pkts_toclient) ?? null
              }
          }

          # Payload
          if exists(parsed.payload_printable) {
              pp = string!(parsed.payload_printable)
              if pp != "" {
                  .ext.payload_printable = pp
              }
          }
          if exists(parsed.stream) {
              .ext.stream = to_int(parsed.stream) ?? null
          }

      # ===============================================================
      # FLOW
      # ===============================================================
      } else if event_type == "flow" {
          .udm.action = "connection"

          if exists(parsed.flow) {
              fl = parsed.flow
              if exists(fl.bytes_toserver) {
                  .udm.bytes_out = to_int(fl.bytes_toserver) ?? null
              }
              if exists(fl.bytes_toclient) {
                  .udm.bytes_in = to_int(fl.bytes_toclient) ?? null
              }
              if exists(fl.pkts_toserver) {
                  .udm.packets_out = to_int(fl.pkts_toserver) ?? null
              }
              if exists(fl.pkts_toclient) {
                  .udm.packets_in = to_int(fl.pkts_toclient) ?? null
              }
              if exists(fl.state) {
                  .udm.status = downcase(string!(fl.state))
              }
              if exists(fl.age) {
                  .udm.duration = to_float(fl.age) ?? null
              }
              if exists(fl.reason) {
                  .ext.flow_reason = string!(fl.reason)
              }
              if exists(fl.alerted) {
                  .ext.flow_alerted = fl.alerted
              }
              if exists(fl.start) {
                  .ext.flow_start = string!(fl.start)
              }
              if exists(fl.end) {
                  .ext.flow_end = string!(fl.end)
              }
          }

          # TCP flags
          if exists(parsed.tcp) {
              tcp = parsed.tcp
              if exists(tcp.tcp_flags) {
                  .ext.tcp_flags = string!(tcp.tcp_flags)
              }
              if exists(tcp.tcp_flags_ts) {
                  .ext.tcp_flags_ts = string!(tcp.tcp_flags_ts)
              }
              if exists(tcp.tcp_flags_tc) {
                  .ext.tcp_flags_tc = string!(tcp.tcp_flags_tc)
              }
              if exists(tcp.state) {
                  .ext.tcp_state = string!(tcp.state)
              }
              if exists(tcp.syn) {
                  .ext.tcp_syn = tcp.syn
              }
              if exists(tcp.fin) {
                  .ext.tcp_fin = tcp.fin
              }
              if exists(tcp.rst) {
                  .ext.tcp_rst = tcp.rst
              }
              if exists(tcp.psh) {
                  .ext.tcp_psh = tcp.psh
              }
              if exists(tcp.ack) {
                  .ext.tcp_ack = tcp.ack
              }
          }

      # ===============================================================
      # DNS
      # ===============================================================
      } else if event_type == "dns" {
          .udm.action = "dns_query"

          if exists(parsed.dns) {
              d = parsed.dns
              if exists(d.rrname) {
                  .udm.query = string!(d.rrname)
              }
              if exists(d.rrtype) {
                  .udm.query_type = string!(d.rrtype)
                  .udm.record_type = string!(d.rrtype)
              }
              if exists(d.rcode) {
                  .udm.status = string!(d.rcode)
              }
              if exists(d.type) {
                  .ext.dns_type = string!(d.type)
              }
              if exists(d.id) {
                  .ext.dns_id = to_int(d.id) ?? null
              }
              if exists(d.version) {
                  .ext.dns_version = to_int(d.version) ?? null
              }
              if exists(d.flags) {
                  .ext.dns_flags = string!(d.flags)
              }
              if exists(d.qr) {
                  .ext.dns_qr = d.qr
              }
              if exists(d.rd) {
                  .ext.dns_rd = d.rd
              }
              if exists(d.ra) {
                  .ext.dns_ra = d.ra
              }

              # Parse answers array
              if exists(d.answers) {
                  answers_arr = array!(d.answers)
                  answer_strings = []
                  for_each(answers_arr) -> |_idx, ans| {
                      if exists(ans.rdata) {
                          answer_strings = push(answer_strings, string!(ans.rdata))
                      }
                  }
                  if length(answer_strings) > 0 {
                      first_answer = get!(answer_strings, [0])
                      if first_answer != null {
                          .udm.answer = string!(first_answer)
                      }
                      .udm.dns_answers = join!(answer_strings, ",")
                  }
              }

              # Grouped answers
              if exists(d.grouped) {
                  .ext.dns_grouped = d.grouped
              }
          }

      # ===============================================================
      # HTTP
      # ===============================================================
      } else if event_type == "http" {
          .udm.action = "http_request"

          if exists(parsed.http) {
              h = parsed.http
              if exists(h.hostname) {
                  .udm.url_domain = string!(h.hostname)
              }
              if exists(h.url) {
                  raw_url = string!(h.url)
                  .udm.uri_path = raw_url

                  # Reconstruct full URL
                  if exists(h.hostname) {
                      hostname = string!(h.hostname)
                      proto_prefix = "http://"
                      if exists(.udm.dest_port) && (.udm.dest_port == 443) {
                          proto_prefix = "https://"
                      }
                      .udm.url = proto_prefix + hostname + raw_url
                  } else {
                      .udm.url = raw_url
                  }
              }
              if exists(h.http_method) {
                  .udm.http_method = upcase(string!(h.http_method))
              }
              if exists(h.http_user_agent) {
                  .udm.http_user_agent = string!(h.http_user_agent)
              }
              if exists(h.http_content_type) {
                  .udm.http_content_type = string!(h.http_content_type)
              }
              if exists(h.status) {
                  .udm.http_status_code = to_int(h.status) ?? null
              }
              if exists(h.http_refer) {
                  .udm.http_referrer = string!(h.http_refer)
              }
              if exists(h.length) {
                  .udm.bytes_in = to_int(h.length) ?? null
              }
              if exists(h.protocol) {
                  .ext.http_protocol = string!(h.protocol)
              }
              if exists(h.redirect) {
                  redirect_val = h.redirect
                  if redirect_val != null {
                      .ext.http_redirect = to_string(redirect_val) ?? ""
                  }
              }
          }

      # ===============================================================
      # TLS
      # ===============================================================
      } else if event_type == "tls" {
          .udm.action = "tls_handshake"

          if exists(parsed.tls) {
              t = parsed.tls
              if exists(t.sni) {
                  .udm.url_domain = string!(t.sni)
              }
              if exists(t.subject) {
                  .ext.tls_subject = string!(t.subject)
              }
              if exists(t.issuerdn) {
                  .ext.tls_issuer = string!(t.issuerdn)
              }
              if exists(t.serial) {
                  .ext.tls_serial = string!(t.serial)
              }
              if exists(t.fingerprint) {
                  .ext.tls_fingerprint = string!(t.fingerprint)
              }
              if exists(t.version) {
                  .ext.tls_version = string!(t.version)
              }
              if exists(t.notbefore) {
                  .ext.tls_not_before = string!(t.notbefore)
              }
              if exists(t.notafter) {
                  .ext.tls_not_after = string!(t.notafter)
              }

              # JA3
              if exists(t.ja3) {
                  if exists(t.ja3.hash) {
                      .ext.ja3_hash = string!(t.ja3.hash)
                  }
                  if exists(t.ja3.string) {
                      .ext.ja3_string = string!(t.ja3.string)
                  }
              }
              # JA3S
              if exists(t.ja3s) {
                  if exists(t.ja3s.hash) {
                      .ext.ja3s_hash = string!(t.ja3s.hash)
                  }
                  if exists(t.ja3s.string) {
                      .ext.ja3s_string = string!(t.ja3s.string)
                  }
              }
          }

      # ===============================================================
      # FILEINFO
      # ===============================================================
      } else if event_type == "fileinfo" {
          .udm.action = "file_transfer"

          if exists(parsed.fileinfo) {
              fi = parsed.fileinfo
              if exists(fi.filename) {
                  .udm.file_name = string!(fi.filename)
              }
              if exists(fi.sha256) {
                  .udm.file_hash = string!(fi.sha256)
              }
              if exists(fi.md5) {
                  .ext.md5 = string!(fi.md5)
              }
              if exists(fi.sha1) {
                  .ext.sha1 = string!(fi.sha1)
              }
              if exists(fi.size) {
                  .udm.file_size = to_int(fi.size) ?? null
              }
              if exists(fi.magic) {
                  .ext.file_magic = string!(fi.magic)
              }
              if exists(fi.state) {
                  .ext.file_state = string!(fi.state)
              }
              if exists(fi.stored) {
                  .ext.file_stored = fi.stored
              }
              if exists(fi.file_id) {
                  .ext.file_id = to_int(fi.file_id) ?? null
              }
              if exists(fi.gaps) {
                  .ext.file_gaps = fi.gaps
              }
          }

          # HTTP context for file transfers
          if exists(parsed.http) {
              h = parsed.http
              if exists(h.hostname) {
                  .udm.url_domain = string!(h.hostname)
              }
              if exists(h.url) {
                  .udm.url = string!(h.url)
              }
              if exists(h.http_method) {
                  .udm.http_method = upcase(string!(h.http_method))
              }
              if exists(h.status) {
                  .udm.http_status_code = to_int(h.status) ?? null
              }
          }

      # ===============================================================
      # SMTP / EMAIL
      # ===============================================================
      } else if event_type == "smtp" {
          .udm.action = "email_sent"

          if exists(parsed.smtp) {
              s = parsed.smtp
              if exists(s.helo) {
                  .ext.smtp_helo = string!(s.helo)
              }
              if exists(s.mail_from) {
                  .ext.smtp_mail_from = string!(s.mail_from)
              }
              if exists(s.rcpt_to) {
                  .ext.smtp_rcpt_to = s.rcpt_to
              }
          }

          if exists(parsed.email) {
              e = parsed.email
              if exists(e.from) {
                  .udm.sender = string!(e.from)
              }
              if exists(e.to) {
                  to_arr = array!(e.to)
                  first_to = get!(to_arr, [0])
                  if first_to != null {
                      .udm.recipient = string!(first_to)
                  }
                  .ext.email_recipients = to_arr
              }
              if exists(e.subject) {
                  .udm.subject = string!(e.subject)
              }
              if exists(e.attachment) {
                  .ext.email_attachments = e.attachment
              }
              if exists(e.url) {
                  .ext.email_urls = e.url
              }
          }

      # ===============================================================
      # SSH
      # ===============================================================
      } else if event_type == "ssh" {
          .udm.action = "ssh_connection"

          if exists(parsed.ssh) {
              ssh = parsed.ssh
              if exists(ssh.client) {
                  c = ssh.client
                  if exists(c.proto_version) {
                      .ext.ssh_client_proto = string!(c.proto_version)
                  }
                  if exists(c.software_version) {
                      .ext.ssh_client_software = string!(c.software_version)
                  }
                  if exists(c.hassh) {
                      .ext.hassh = string!(c.hassh)
                  }
                  if exists(c.hassh_algorithms) {
                      .ext.hassh_algorithms = string!(c.hassh_algorithms)
                  }
              }
              if exists(ssh.server) {
                  s = ssh.server
                  if exists(s.proto_version) {
                      .ext.ssh_server_proto = string!(s.proto_version)
                  }
                  if exists(s.software_version) {
                      .ext.ssh_server_software = string!(s.software_version)
                  }
                  if exists(s.hassh) {
                      .ext.hassh_server = string!(s.hassh)
                  }
                  if exists(s.hassh_algorithms) {
                      .ext.hassh_server_algorithms = string!(s.hassh_algorithms)
                  }
              }
          }

      # ===============================================================
      # ANOMALY
      # ===============================================================
      } else if event_type == "anomaly" {
          .udm.action = "anomaly"

          if exists(parsed.anomaly) {
              an = parsed.anomaly
              if exists(an.event) {
                  .udm.signature = string!(an.event)
              }
              if exists(an.type) {
                  .udm.category = string!(an.type)
              }
              if exists(an.app_proto) {
                  .ext.anomaly_app_proto = string!(an.app_proto)
              }
              if exists(an.layer) {
                  .ext.anomaly_layer = string!(an.layer)
              }
          }

      # ===============================================================
      # STATS
      # ===============================================================
      } else if event_type == "stats" {
          .udm.action = "stats"

          if exists(parsed.stats) {
              st = parsed.stats
              if exists(st.uptime) {
                  .ext.uptime = to_int(st.uptime) ?? null
              }
              if exists(st.capture) {
                  cap = st.capture
                  if exists(cap.kernel_packets) {
                      .ext.kernel_packets = to_int(cap.kernel_packets) ?? null
                  }
                  if exists(cap.kernel_drops) {
                      .ext.kernel_drops = to_int(cap.kernel_drops) ?? null
                  }
                  if exists(cap.errors) {
                      .ext.capture_errors = to_int(cap.errors) ?? null
                  }
              }
              if exists(st.decoder) {
                  dec = st.decoder
                  if exists(dec.pkts) {
                      .ext.decoder_pkts = to_int(dec.pkts) ?? null
                  }
                  if exists(dec.bytes) {
                      .ext.decoder_bytes = to_int(dec.bytes) ?? null
                  }
                  if exists(dec.invalid) {
                      .ext.decoder_invalid = to_int(dec.invalid) ?? null
                  }
              }
              if exists(st.detect) {
                  if exists(st.detect.alert) {
                      .ext.detect_alert_count = to_int(st.detect.alert) ?? null
                  }
              }
          }

      # ===============================================================
      # DROP
      # ===============================================================
      } else if event_type == "drop" {
          .udm.action = "drop"

          if exists(parsed.drop) {
              dr = parsed.drop
              if exists(dr.reason) {
                  .ext.drop_reason = to_string(dr.reason) ?? ""
              }
              if exists(dr.action) {
                  .ext.drop_action = to_string(dr.action) ?? ""
              }
          }

      # ===============================================================
      # NETFLOW
      # ===============================================================
      } else if event_type == "netflow" {
          .udm.action = "netflow"

          if exists(parsed.netflow) {
              nf = parsed.netflow
              if exists(nf.bytes) {
                  .udm.bytes_in = to_int(nf.bytes) ?? null
              }
              if exists(nf.pkts) {
                  .udm.packets_in = to_int(nf.pkts) ?? null
              }
              if exists(nf.start) {
                  .ext.netflow_start = to_string(nf.start) ?? ""
              }
              if exists(nf.end) {
                  .ext.netflow_end = to_string(nf.end) ?? ""
              }
              if exists(nf.age) {
                  .udm.duration = to_float(nf.age) ?? null
              }
          }

      # ===============================================================
      # RDP
      # ===============================================================
      } else if event_type == "rdp" {
          .udm.action = "rdp_connection"

          if exists(parsed.rdp) {
              r = parsed.rdp
              if exists(r.cookie) {
                  .ext.rdp_cookie = string!(r.cookie)
              }
              if exists(r.client) {
                  .ext.rdp_client = r.client
              }
              if exists(r.server) {
                  .ext.rdp_server = r.server
              }
          }

      # ===============================================================
      # DHCP
      # ===============================================================
      } else if event_type == "dhcp" {
          .udm.action = "dhcp"

          if exists(parsed.dhcp) {
              dh = parsed.dhcp
              if exists(dh.type) {
                  .ext.dhcp_type = to_string(dh.type) ?? ""
              }
              if exists(dh.hostname) {
                  .ext.dhcp_hostname = string!(dh.hostname)
              }
              if exists(dh.assigned_ip) {
                  .ext.dhcp_assigned_ip = string!(dh.assigned_ip)
              }
              if exists(dh.client_mac) {
                  .ext.dhcp_client_mac = string!(dh.client_mac)
              }
              if exists(dh.lease_time) {
                  .ext.dhcp_lease_time = to_int(dh.lease_time) ?? null
              }
          }

      # ===============================================================
      # SMB
      # ===============================================================
      } else if event_type == "smb" {
          .udm.action = "smb"

          if exists(parsed.smb) {
              smb = parsed.smb
              if exists(smb.command) {
                  .ext.smb_command = to_string(smb.command) ?? ""
              }
              if exists(smb.filename) {
                  .udm.file_name = to_string(smb.filename) ?? ""
              }
              if exists(smb.share) {
                  .ext.smb_share = to_string(smb.share) ?? ""
              }
              if exists(smb.status) {
                  .udm.status = to_string(smb.status) ?? ""
              }
          }

      # ===============================================================
      # KRB5 (Kerberos)
      # ===============================================================
      } else if event_type == "krb5" {
          .udm.action = "kerberos"

          if exists(parsed.krb5) {
              k = parsed.krb5
              if exists(k.cname) {
                  .udm.user = to_string(k.cname) ?? ""
              }
              if exists(k.sname) {
                  .ext.krb5_sname = to_string(k.sname) ?? ""
              }
              if exists(k.realm) {
                  .ext.krb5_realm = to_string(k.realm) ?? ""
              }
              if exists(k.msg_type) {
                  .ext.krb5_msg_type = to_string(k.msg_type) ?? ""
              }
              if exists(k.encryption) {
                  .ext.krb5_encryption = to_string(k.encryption) ?? ""
              }
          }

      # ===============================================================
      # SNMP
      # ===============================================================
      } else if event_type == "snmp" {
          .udm.action = "snmp"

          if exists(parsed.snmp) {
              sn = parsed.snmp
              if exists(sn.version) {
                  .ext.snmp_version = to_int(sn.version) ?? null
              }
              if exists(sn.community) {
                  .ext.snmp_community = to_string(sn.community) ?? ""
              }
              if exists(sn.pdu_type) {
                  .ext.snmp_pdu_type = to_string(sn.pdu_type) ?? ""
              }
          }

      # ===============================================================
      # SIP
      # ===============================================================
      } else if event_type == "sip" {
          .udm.action = "sip"

          if exists(parsed.sip) {
              si = parsed.sip
              if exists(si.method) {
                  .ext.sip_method = to_string(si.method) ?? ""
              }
              if exists(si.uri) {
                  .ext.sip_uri = to_string(si.uri) ?? ""
              }
              if exists(si.request_line) {
                  .ext.sip_request_line = to_string(si.request_line) ?? ""
              }
              if exists(si.response_line) {
                  .ext.sip_response_line = to_string(si.response_line) ?? ""
              }
              if exists(si.code) {
                  .ext.sip_code = to_string(si.code) ?? ""
              }
          }

      # ===============================================================
      # NFS
      # ===============================================================
      } else if event_type == "nfs" {
          .udm.action = "nfs"

          if exists(parsed.nfs) {
              nfs = parsed.nfs
              if exists(nfs.type) {
                  .ext.nfs_type = to_string(nfs.type) ?? ""
              }
              if exists(nfs.procedure) {
                  .ext.nfs_procedure = to_string(nfs.procedure) ?? ""
              }
              if exists(nfs.filename) {
                  .udm.file_name = to_string(nfs.filename) ?? ""
              }
              if exists(nfs.status) {
                  .udm.status = to_string(nfs.status) ?? ""
              }
              if exists(nfs.version) {
                  .ext.nfs_version = to_int(nfs.version) ?? null
              }
          }

      # ===============================================================
      # DCERPC
      # ===============================================================
      } else if event_type == "dcerpc" {
          .udm.action = "dcerpc"

          if exists(parsed.dcerpc) {
              dc = parsed.dcerpc
              if exists(dc.request) {
                  .ext.dcerpc_request = to_string(dc.request) ?? ""
              }
              if exists(dc.response) {
                  .ext.dcerpc_response = to_string(dc.response) ?? ""
              }
              if exists(dc.opnum) {
                  .ext.dcerpc_opnum = to_int(dc.opnum) ?? null
              }
              if exists(dc.call_id) {
                  .ext.dcerpc_call_id = to_int(dc.call_id) ?? null
              }
          }

      # ===============================================================
      # TFTP
      # ===============================================================
      } else if event_type == "tftp" {
          .udm.action = "tftp"

          if exists(parsed.tftp) {
              tf = parsed.tftp
              if exists(tf.file) {
                  .udm.file_name = to_string(tf.file) ?? ""
              }
              if exists(tf.mode) {
                  .ext.tftp_mode = to_string(tf.mode) ?? ""
              }
          }

      # ===============================================================
      # IKEv2
      # ===============================================================
      } else if event_type == "ikev2" {
          .udm.action = "ikev2"

          if exists(parsed.ikev2) {
              ik = parsed.ikev2
              if exists(ik.version_major) {
                  .ext.ikev2_version_major = to_int(ik.version_major) ?? null
              }
              if exists(ik.version_minor) {
                  .ext.ikev2_version_minor = to_int(ik.version_minor) ?? null
              }
              if exists(ik.exchange_type) {
                  .ext.ikev2_exchange_type = to_int(ik.exchange_type) ?? null
              }
              if exists(ik.init_spi) {
                  .ext.ikev2_init_spi = to_string(ik.init_spi) ?? ""
              }
              if exists(ik.resp_spi) {
                  .ext.ikev2_resp_spi = to_string(ik.resp_spi) ?? ""
              }
          }

      # ===============================================================
      # MQTT
      # ===============================================================
      } else if event_type == "mqtt" {
          .udm.action = "mqtt"

          if exists(parsed.mqtt) {
              mq = parsed.mqtt
              if exists(mq.publish) {
                  .ext.mqtt_publish = mq.publish
              }
              if exists(mq.connect) {
                  .ext.mqtt_connect = mq.connect
              }
              if exists(mq.subscribe) {
                  .ext.mqtt_subscribe = mq.subscribe
              }
          }

      # ===============================================================
      # QUIC
      # ===============================================================
      } else if event_type == "quic" {
          .udm.action = "quic"

          if exists(parsed.quic) {
              q = parsed.quic
              if exists(q.sni) {
                  .udm.url_domain = to_string(q.sni) ?? ""
              }
              if exists(q.version) {
                  .ext.quic_version = to_string(q.version) ?? ""
              }
              if exists(q.ja3) {
                  .ext.quic_ja3 = q.ja3
              }
          }

      # ===============================================================
      # DEFAULT (unknown event types)
      # ===============================================================
      } else {
          if event_type != "" {
              .udm.action = event_type
          } else {
              .udm.action = "unknown"
          }
      }

      # ---------------------------------------------------------------
      # Device fields (always set)
      # ---------------------------------------------------------------
      .udm.dvc = "suricata"
      .udm.vendor = "OISF"
      .udm.product = "Suricata"
      .udm.vendor_product = "OISF Suricata"

  } else {
      # JSON parse failed — store raw message
      .ext.parse_error = to_string!(err)
      .udm.action = "parse_error"
      .udm.dvc = "suricata"
      .udm.vendor = "OISF"
      .udm.product = "Suricata"
      .udm.vendor_product = "OISF Suricata"
  }
