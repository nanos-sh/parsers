name: cisco_asa
display_name: Cisco ASA
version: "1.0.0"
description: "Parses Cisco ASA firewall logs including connection built/teardown (302013-302021), ACL deny/permit (106001-106100), NAT translation (305011-305012), AAA authentication (113004-113005), VPN (713228), IPS events (400027), failover (105003-105004), and TCP access (710003) with full UDM mapping"
match_values:
  - cisco_asa
  - cisco
  - asa
  - cisco_firewall
category: network
vendor: "Cisco"
product: "ASA"
parser_vrl: |
  # Cisco ASA Firewall Parser
  # Handles syslog messages with %ASA-severity-messageid pattern
  # Covers connection tracking, ACL, NAT, auth, VPN, IPS, failover

  # Initialize required structures
  .udm = {}
  .ext = {}
  .metadata = {}

  # Set defaults
  .udm.timestamp = now()
  .udm.vendor = "Cisco"
  .udm.product = "ASA"
  .udm.vendor_product = "Cisco ASA"

  # Get raw log
  raw_log = string!(.message)

  # ============================================================
  # PHASE 1: Strip syslog PRI and header, extract %ASA pattern
  # ============================================================

  working = raw_log

  # Strip syslog PRI header if present: <134>...
  pri_match, pri_err = parse_regex(working, r'^<(?P<pri>\d+)>(?P<body>.*)$')
  if pri_err == null && pri_match != null {
      working = string!(pri_match.body)
      pri_val = to_int(pri_match.pri) ?? null
      if pri_val != null {
          .ext.syslog_priority = pri_val
          .ext.syslog_facility = (pri_val / 8) ?? 0
          .ext.syslog_severity = mod(pri_val, 8) ?? 0
      }
  }

  # Try to extract syslog timestamp + hostname before %ASA
  # Pattern: optional "Mon DD HH:MM:SS" or "Mon DD YYYY HH:MM:SS" then optional hostname, then optional colon, then %ASA-...
  syslog_match, syslog_err = parse_regex(working, r'^(?P<syslog_ts>(?:(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s+\d{1,2}\s+(?:\d{4}\s+)?\d{2}:\d{2}:\d{2}))\s*(?::?\s*)(?P<hostname>[^\s:]+)?\s*(?::?\s*)(?P<rest>%ASA-.*)$')
  if syslog_err == null && syslog_match != null {
      syslog_ts_str = string!(syslog_match.syslog_ts)

      # Try with year first: "Apr 15 2013 09:36:50"
      ts, ts_err = parse_timestamp(syslog_ts_str, "%b %d %Y %H:%M:%S")
      if ts_err == null {
          .udm.timestamp = format_timestamp!(ts, format: "%Y-%m-%d %H:%M:%S")
      } else {
          # Try without year: "Apr 15 09:36:50" — use current year
          ts2, ts_err2 = parse_timestamp(syslog_ts_str, "%b %d %H:%M:%S")
          if ts_err2 == null {
              .udm.timestamp = format_timestamp!(ts2, format: "%Y-%m-%d %H:%M:%S")
          }
      }

      hostname_val = to_string!(syslog_match.hostname)
      if hostname_val != "" && hostname_val != ":" {
          .udm.dvc = hostname_val
      }
      working = string!(syslog_match.rest)
  } else {
      # Try without hostname: timestamp directly before %ASA
      syslog_match2, syslog_err2 = parse_regex(working, r'^(?P<syslog_ts>(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s+\d{1,2}\s+(?:\d{4}\s+)?\d{2}:\d{2}:\d{2})\s*:?\s*(?P<rest>%ASA-.*)$')
      if syslog_err2 == null && syslog_match2 != null {
          syslog_ts_str = string!(syslog_match2.syslog_ts)
          ts, ts_err = parse_timestamp(syslog_ts_str, "%b %d %Y %H:%M:%S")
          if ts_err == null {
              .udm.timestamp = format_timestamp!(ts, format: "%Y-%m-%d %H:%M:%S")
          } else {
              ts2, ts_err2 = parse_timestamp(syslog_ts_str, "%b %d %H:%M:%S")
              if ts_err2 == null {
                  .udm.timestamp = format_timestamp!(ts2, format: "%Y-%m-%d %H:%M:%S")
              }
          }
          working = string!(syslog_match2.rest)
      }
  }

  # ============================================================
  # PHASE 2: Parse %ASA-severity-messageid header
  # ============================================================

  asa_match, asa_err = parse_regex(working, r'^%ASA-(?P<severity>\d)-(?P<msgid>\d+):\s*(?P<msg_body>.*)$')
  if asa_err == null && asa_match != null {
      sev_num = to_int(asa_match.severity) ?? 6
      msg_id = string!(asa_match.msgid)
      msg_body = string!(asa_match.msg_body)

      .ext.asa_message_id = msg_id
      .udm.signature_id = msg_id
      .ext.asa_severity_num = sev_num

      # Map severity number to text
      if sev_num == 0 { .udm.severity = "emergency" } else if sev_num == 1 { .udm.severity = "alert" } else if sev_num == 2 { .udm.severity = "critical" } else if sev_num == 3 { .udm.severity = "error" } else if sev_num == 4 { .udm.severity = "warning" } else if sev_num == 5 { .udm.severity = "notification" } else if sev_num == 6 { .udm.severity = "informational" } else if sev_num == 7 { .udm.severity = "debugging" }

      # ============================================================
      # PHASE 3: Message-specific parsing
      # ============================================================

      # ----------------------------------------------------------
      # 302013: Built inbound TCP connection
      # 302015: Built inbound UDP connection
      # 302020: Built inbound ICMP connection
      # Format: Built inbound|outbound TCP|UDP|ICMP connection <id> for <iface>:<ip>/<port> (<nat_ip>/<nat_port>) to <iface>:<ip>/<port> (<nat_ip>/<nat_port>)
      # ----------------------------------------------------------
      if msg_id == "302013" || msg_id == "302015" || msg_id == "302020" {
          .udm.event_type = "allow"
          .metadata.event_category = "network"

          conn_match, conn_err = parse_regex(msg_body, r'Built\s+(?P<direction>inbound|outbound)\s+(?P<protocol>\w+)\s+connection\s+(?P<conn_id>\d+)\s+for\s+(?P<src_iface>\w+):(?P<src_ip>[^/]+)/(?P<src_port>\d+)\s*(?:\((?P<src_nat_ip>[^/]+)/(?P<src_nat_port>\d+)\))?\s+to\s+(?P<dst_iface>\w+):(?P<dst_ip>[^/]+)/(?P<dst_port>\d+)\s*(?:\((?P<dst_nat_ip>[^/]+)/(?P<dst_nat_port>\d+)\))?')
          if conn_err == null && conn_match != null {
              .udm.direction = downcase(string!(conn_match.direction))
              .udm.protocol = downcase(string!(conn_match.protocol))
              .udm.session_id = string!(conn_match.conn_id)
              .ext.connection_id = string!(conn_match.conn_id)

              # For inbound: src_iface side is the external source, dst_iface side is internal dest
              .udm.src_interface = string!(conn_match.src_iface)
              .udm.src_ip = string!(conn_match.src_ip)
              .udm.src_port = to_int(conn_match.src_port) ?? null
              .udm.dest_interface = string!(conn_match.dst_iface)
              .udm.dest_ip = string!(conn_match.dst_ip)
              .udm.dest_port = to_int(conn_match.dst_port) ?? null

              # NAT translated addresses (in parentheses)
              src_nat_ip = to_string!(conn_match.src_nat_ip)
              if src_nat_ip != "" {
                  .udm.src_translated_ip = src_nat_ip
                  .udm.src_translated_port = to_int(conn_match.src_nat_port) ?? null
              }
              dst_nat_ip = to_string!(conn_match.dst_nat_ip)
              if dst_nat_ip != "" {
                  .udm.dest_translated_ip = dst_nat_ip
                  .udm.dest_translated_port = to_int(conn_match.dst_nat_port) ?? null
              }
          }

          if msg_id == "302013" { .ext.asa_message_desc = "Built inbound TCP connection" } else if msg_id == "302015" { .ext.asa_message_desc = "Built inbound UDP connection" } else if msg_id == "302020" { .ext.asa_message_desc = "Built inbound ICMP connection" }      # ----------------------------------------------------------
      # 302014: Teardown TCP connection
      # 302016: Teardown UDP connection
      # 302021: Teardown ICMP connection
      # Format: Teardown TCP|UDP|ICMP connection <id> for <iface>:<ip>/<port> to <iface>:<ip>/<port> duration H:MM:SS bytes <n> [reason <reason>]
      # ----------------------------------------------------------

      } else if msg_id == "302014" || msg_id == "302016" || msg_id == "302021" {
          .udm.event_type = "close"
          .metadata.event_category = "network"

          tear_match, tear_err = parse_regex(msg_body, r'Teardown\s+(?P<protocol>\w+)\s+connection\s+(?P<conn_id>\d+)\s+for\s+(?P<src_iface>\w+):(?P<src_ip>[^/]+)/(?P<src_port>\d+)\s+to\s+(?P<dst_iface>\w+):(?P<dst_ip>[^/]+)/(?P<dst_port>\d+)\s+duration\s+(?P<hours>\d+):(?P<minutes>\d{2}):(?P<seconds>\d{2})\s+bytes\s+(?P<bytes>\d+)(?:\s+reason\s+(?P<reason>.+))?')
          if tear_err == null && tear_match != null {
              .udm.protocol = downcase(string!(tear_match.protocol))
              .udm.session_id = string!(tear_match.conn_id)
              .ext.connection_id = string!(tear_match.conn_id)
              .udm.src_interface = string!(tear_match.src_iface)
              .udm.src_ip = string!(tear_match.src_ip)
              .udm.src_port = to_int(tear_match.src_port) ?? null
              .udm.dest_interface = string!(tear_match.dst_iface)
              .udm.dest_ip = string!(tear_match.dst_ip)
              .udm.dest_port = to_int(tear_match.dst_port) ?? null

              # Parse duration H:MM:SS to seconds
              hours = to_int(tear_match.hours) ?? 0
              minutes = to_int(tear_match.minutes) ?? 0
              seconds = to_int(tear_match.seconds) ?? 0
              .udm.duration = (hours * 3600) + (minutes * 60) + seconds

              .udm.bytes_out = to_int(tear_match.bytes) ?? null

              reason = to_string!(tear_match.reason)
              if reason != "" {
                  .ext.teardown_reason = reason
              }
          }

          if msg_id == "302014" { .ext.asa_message_desc = "Teardown TCP connection" } else if msg_id == "302016" { .ext.asa_message_desc = "Teardown UDP connection" } else if msg_id == "302021" { .ext.asa_message_desc = "Teardown ICMP connection" }      # ----------------------------------------------------------
      # 106023: Deny <proto> src <iface>:<ip>/<port> dst <iface>:<ip>/<port> by access-group "<name>"
      # ----------------------------------------------------------

      } else if msg_id == "106023" {
          .udm.event_type = "deny"
          .metadata.event_category = "network"

          acl_match, acl_err = parse_regex(msg_body, r'Deny\s+(?P<protocol>\w+)\s+src\s+(?P<src_iface>\w+):(?P<src_ip>[^/]+)/(?P<src_port>\d+)\s+dst\s+(?P<dst_iface>\w+):(?P<dst_ip>[^/]+)/(?P<dst_port>\d+)\s+by\s+access-group\s+"(?P<acl_name>[^"]+)"')
          if acl_err == null && acl_match != null {
              .udm.protocol = downcase(string!(acl_match.protocol))
              .udm.src_interface = string!(acl_match.src_iface)
              .udm.src_ip = string!(acl_match.src_ip)
              .udm.src_port = to_int(acl_match.src_port) ?? null
              .udm.dest_interface = string!(acl_match.dst_iface)
              .udm.dest_ip = string!(acl_match.dst_ip)
              .udm.dest_port = to_int(acl_match.dst_port) ?? null
              .udm.rule_name = string!(acl_match.acl_name)
          }

          .ext.asa_message_desc = "ACL deny"      # ----------------------------------------------------------
      # 106100: access-list <name> <action> <proto> <iface>/<ip>(<port>) -> <iface>/<ip>(<port>) hit-cnt <n>
      # ----------------------------------------------------------

      } else if msg_id == "106100" {
          .metadata.event_category = "network"

          acl100_match, acl100_err = parse_regex(msg_body, r'access-list\s+(?P<acl_name>\S+)\s+(?P<action>\w+)\s+(?P<protocol>\w+)\s+(?P<src_iface>\w+)/(?P<src_ip>[^(]+)\((?P<src_port>\d+)\)\s*->\s*(?P<dst_iface>\w+)/(?P<dst_ip>[^(]+)\((?P<dst_port>\d+)\)\s+hit-cnt\s+(?P<hit_cnt>\d+)')
          if acl100_err == null && acl100_match != null {
              action_str = downcase(string!(acl100_match.action))
              .udm.event_type = action_str
              .udm.protocol = downcase(string!(acl100_match.protocol))
              .udm.rule_name = string!(acl100_match.acl_name)
              .udm.src_interface = string!(acl100_match.src_iface)
              .udm.src_ip = string!(acl100_match.src_ip)
              .udm.src_port = to_int(acl100_match.src_port) ?? null
              .udm.dest_interface = string!(acl100_match.dst_iface)
              .udm.dest_ip = string!(acl100_match.dst_ip)
              .udm.dest_port = to_int(acl100_match.dst_port) ?? null
              .ext.hit_count = to_int(acl100_match.hit_cnt) ?? null
          }

          .ext.asa_message_desc = "ACL hit"      # ----------------------------------------------------------
      # 106001: Inbound TCP connection denied from <ip>/<port> to <ip>/<port> flags <flags> on interface <iface>
      # ----------------------------------------------------------

      } else if msg_id == "106001" {
          .udm.event_type = "deny"
          .udm.direction = "inbound"
          .metadata.event_category = "network"

          deny1_match, deny1_err = parse_regex(msg_body, r'(?:Inbound\s+)?(?P<protocol>\w+)\s+connection\s+denied\s+from\s+(?P<src_ip>[^/]+)/(?P<src_port>\d+)\s+to\s+(?P<dst_ip>[^/]+)/(?P<dst_port>\d+)\s+flags\s+(?P<flags>\S+)\s+on\s+interface\s+(?P<iface>\w+)')
          if deny1_err == null && deny1_match != null {
              .udm.protocol = downcase(string!(deny1_match.protocol))
              .udm.src_ip = string!(deny1_match.src_ip)
              .udm.src_port = to_int(deny1_match.src_port) ?? null
              .udm.dest_ip = string!(deny1_match.dst_ip)
              .udm.dest_port = to_int(deny1_match.dst_port) ?? null
              .udm.src_interface = string!(deny1_match.iface)
              .ext.tcp_flags = string!(deny1_match.flags)
          }

          .ext.asa_message_desc = "Inbound TCP connection denied"      # ----------------------------------------------------------
      # 106006: Deny inbound UDP from <ip>/<port> to <ip>/<port> on interface <iface>
      # ----------------------------------------------------------

      } else if msg_id == "106006" {
          .udm.event_type = "deny"
          .udm.direction = "inbound"
          .udm.protocol = "udp"
          .metadata.event_category = "network"

          deny6_match, deny6_err = parse_regex(msg_body, r'Deny\s+inbound\s+UDP\s+from\s+(?P<src_ip>[^/]+)/(?P<src_port>\d+)\s+to\s+(?P<dst_ip>[^/]+)/(?P<dst_port>\d+)\s+on\s+interface\s+(?P<iface>\w+)')
          if deny6_err == null && deny6_match != null {
              .udm.src_ip = string!(deny6_match.src_ip)
              .udm.src_port = to_int(deny6_match.src_port) ?? null
              .udm.dest_ip = string!(deny6_match.dst_ip)
              .udm.dest_port = to_int(deny6_match.dst_port) ?? null
              .udm.src_interface = string!(deny6_match.iface)
          }

          .ext.asa_message_desc = "Deny inbound UDP"      # ----------------------------------------------------------
      # 106007: Deny inbound UDP from <ip>/<port> to <ip>/<port> due to DNS <reason>
      # ----------------------------------------------------------

      } else if msg_id == "106007" {
          .udm.event_type = "deny"
          .udm.direction = "inbound"
          .udm.protocol = "udp"
          .metadata.event_category = "network"

          deny7_match, deny7_err = parse_regex(msg_body, r'Deny\s+inbound\s+UDP\s+from\s+(?P<src_ip>[^/]+)/(?P<src_port>\d+)\s+to\s+(?P<dst_ip>[^/]+)/(?P<dst_port>\d+)\s+due\s+to\s+(?P<reason>.+)')
          if deny7_err == null && deny7_match != null {
              .udm.src_ip = string!(deny7_match.src_ip)
              .udm.src_port = to_int(deny7_match.src_port) ?? null
              .udm.dest_ip = string!(deny7_match.dst_ip)
              .udm.dest_port = to_int(deny7_match.dst_port) ?? null
              .ext.deny_reason = string!(deny7_match.reason)
          }

          .ext.asa_message_desc = "Deny inbound UDP (DNS)"      # ----------------------------------------------------------
      # 106015: Deny TCP (no connection) from <ip>/<port> to <ip>/<port> flags <flags> on interface <iface>
      # ----------------------------------------------------------

      } else if msg_id == "106015" {
          .udm.event_type = "deny"
          .udm.protocol = "tcp"
          .metadata.event_category = "network"

          deny15_match, deny15_err = parse_regex(msg_body, r'Deny\s+TCP\s+\(no\s+connection\)\s+from\s+(?P<src_ip>[^/]+)/(?P<src_port>\d+)\s+to\s+(?P<dst_ip>[^/]+)/(?P<dst_port>\d+)\s+flags\s+(?P<flags>\S+)\s+on\s+interface\s+(?P<iface>\w+)')
          if deny15_err == null && deny15_match != null {
              .udm.src_ip = string!(deny15_match.src_ip)
              .udm.src_port = to_int(deny15_match.src_port) ?? null
              .udm.dest_ip = string!(deny15_match.dst_ip)
              .udm.dest_port = to_int(deny15_match.dst_port) ?? null
              .udm.src_interface = string!(deny15_match.iface)
              .ext.tcp_flags = string!(deny15_match.flags)
          }

          .ext.asa_message_desc = "Deny TCP (no connection)"      # ----------------------------------------------------------
      # 305011: Built dynamic <proto> translation from <iface>:<ip>/<port> to <iface>:<ip>/<port>
      # 305012: Teardown dynamic <proto> translation from <iface>:<ip>/<port> to <iface>:<ip>/<port> duration H:MM:SS
      # ----------------------------------------------------------

      } else if msg_id == "305011" || msg_id == "305012" {
          .metadata.event_category = "network"

          if msg_id == "305011" {
              .udm.event_type = "allow"
              .ext.asa_message_desc = "Built dynamic NAT translation"
          } else {
              .udm.event_type = "close"
              .ext.asa_message_desc = "Teardown dynamic NAT translation"
          }

          nat_match, nat_err = parse_regex(msg_body, r'(?:Built|Teardown)\s+dynamic\s+(?P<protocol>\w+)\s+translation\s+from\s+(?P<src_iface>\w+):(?P<src_ip>[^/]+)/(?P<src_port>\d+)\s+to\s+(?P<dst_iface>\w+):(?P<dst_ip>[^/]+)/(?P<dst_port>\d+)(?:\s+duration\s+(?P<hours>\d+):(?P<minutes>\d{2}):(?P<seconds>\d{2}))?')
          if nat_err == null && nat_match != null {
              .udm.protocol = downcase(string!(nat_match.protocol))
              .udm.src_interface = string!(nat_match.src_iface)
              .udm.src_ip = string!(nat_match.src_ip)
              .udm.src_port = to_int(nat_match.src_port) ?? null
              .udm.dest_interface = string!(nat_match.dst_iface)
              .udm.dest_translated_ip = string!(nat_match.dst_ip)
              .udm.dest_translated_port = to_int(nat_match.dst_port) ?? null

              # Duration for teardown
              hours_str = to_string!(nat_match.hours)
              if hours_str != "" {
                  hours = to_int(nat_match.hours) ?? 0
                  minutes = to_int(nat_match.minutes) ?? 0
                  seconds = to_int(nat_match.seconds) ?? 0
                  .udm.duration = (hours * 3600) + (minutes * 60) + seconds
              }
          }      # ----------------------------------------------------------
      # 305009: Built static translation from <iface>:<ip> to <iface>:<ip>
      # 305010: Teardown static translation from <iface>:<ip> to <iface>:<ip> duration H:MM:SS
      # ----------------------------------------------------------

      } else if msg_id == "305009" || msg_id == "305010" {
          .metadata.event_category = "network"

          if msg_id == "305009" {
              .udm.event_type = "allow"
              .ext.asa_message_desc = "Built static NAT translation"
          } else {
              .udm.event_type = "close"
              .ext.asa_message_desc = "Teardown static NAT translation"
          }

          snat_match, snat_err = parse_regex(msg_body, r'(?:Built|Teardown)\s+static\s+translation\s+from\s+(?P<src_iface>\w+):(?P<src_ip>[^\s]+)\s+to\s+(?P<dst_iface>\w+):(?P<dst_ip>[^\s]+)(?:\s+duration\s+(?P<hours>\d+):(?P<minutes>\d{2}):(?P<seconds>\d{2}))?')
          if snat_err == null && snat_match != null {
              .udm.src_interface = string!(snat_match.src_iface)
              .udm.src_ip = string!(snat_match.src_ip)
              .udm.dest_interface = string!(snat_match.dst_iface)
              .udm.dest_translated_ip = string!(snat_match.dst_ip)

              hours_str = to_string!(snat_match.hours)
              if hours_str != "" {
                  hours = to_int(snat_match.hours) ?? 0
                  minutes = to_int(snat_match.minutes) ?? 0
                  seconds = to_int(snat_match.seconds) ?? 0
                  .udm.duration = (hours * 3600) + (minutes * 60) + seconds
              }
          }      # ----------------------------------------------------------
      # 113004: AAA user authentication Successful : server = <ip> : user = <user>
      # ----------------------------------------------------------

      } else if msg_id == "113004" {
          .udm.event_type = "allow"
          .metadata.event_category = "authentication"
          .udm.auth_result = "success"

          auth_ok_match, auth_ok_err = parse_regex(msg_body, r'AAA\s+user\s+authentication\s+Successful\s*:\s*server\s*=\s*(?P<server>[^\s:]+)\s*:\s*user\s*=\s*(?P<user>\S+)')
          if auth_ok_err == null && auth_ok_match != null {
              .udm.user = string!(auth_ok_match.user)
              .ext.auth_server = string!(auth_ok_match.server)
              .udm.auth_type = "AAA"
          }

          .ext.asa_message_desc = "AAA authentication successful"      # ----------------------------------------------------------
      # 113005: AAA user authentication Rejected : reason = <reason> : server = <ip> : user = <user> : user IP = <ip>
      # ----------------------------------------------------------

      } else if msg_id == "113005" {
          .udm.event_type = "deny"
          .metadata.event_category = "authentication"
          .udm.auth_result = "failure"

          auth_fail_match, auth_fail_err = parse_regex(msg_body, r'AAA\s+user\s+authentication\s+Rejected\s*:\s*reason\s*=\s*(?P<reason>[^:]+?)\s*:\s*server\s*=\s*(?P<server>[^\s:]+)\s*:\s*user\s*=\s*(?P<user>[^\s:]+)\s*(?::\s*user\s+IP\s*=\s*(?P<user_ip>\S+))?')
          if auth_fail_err == null && auth_fail_match != null {
              .udm.user = string!(auth_fail_match.user)
              .ext.auth_server = string!(auth_fail_match.server)
              .ext.auth_failure_reason = string!(auth_fail_match.reason)
              .udm.auth_type = "AAA"

              user_ip = to_string!(auth_fail_match.user_ip)
              if user_ip != "" {
                  .udm.src_ip = user_ip
              }
          }

          .ext.asa_message_desc = "AAA authentication rejected"      # ----------------------------------------------------------
      # 113012: AAA user authentication: found existing session for user <user>
      # 113015: AAA user authentication Rejected: reason = <reason> : local database : user = <user>
      # ----------------------------------------------------------

      } else if msg_id == "113012" || msg_id == "113015" {
          .metadata.event_category = "authentication"

          if msg_id == "113012" {
              .udm.auth_result = "success"
