name: sysmon_linux_xml
display_name: Microsoft Sysmon for Linux (XML)
version: "1.0.0"
description: "Parses Sysmon for Linux XML events: process creation, network connections, file create/delete, process terminate, sysmon state, config change, with MITRE ATT&CK extraction"
match_values:
  - sysmon_linux_xml
  - sysmon_linux
  - linux_sysmon
category: endpoint
vendor: "Microsoft"
product: "Sysmon for Linux"
parser_vrl: |
  raw_log = string(.message) ?? ""
  .message = raw_log

  .udm = {}
  .metadata = {}
  .ext = {}

  if raw_log != "" {
      parsed, err = parse_xml(raw_log)
      if err == null {
          event = parsed.Event
          if event != null {
              system = event.System
              event_data = event.EventData

              # -----------------------------------------------------------
              # System block
              # -----------------------------------------------------------
              event_id = 0
              if system != null {
                  eid_raw = system.EventID
                  if eid_raw != null {
                      event_id = to_int(eid_raw) ?? 0
                  }

                  computer = system.Computer
                  if computer != null {
                      .udm.dvc = string!(computer)
                      .udm.src_host = string!(computer)
                  }

                  provider = system.Provider
                  if provider != null {
                      pn = provider."@Name"
                      if pn != null {
                          .ext.provider_name = string!(pn)
                      }
                      pg = provider."@Guid"
                      if pg != null {
                          .ext.provider_guid = string!(pg)
                      }
                  }

                  level = system.Level
                  if level != null {
                      level_int = to_int(level) ?? -1
                      .udm.severity = if level_int == 1 { "critical" } else if level_int == 2 { "error" } else if level_int == 3 { "warning" } else if level_int == 4 { "informational" } else if level_int == 5 { "verbose" } else { "informational" }
                  }

                  channel = system.Channel
                  if channel != null {
                      .ext.channel = string!(channel)
                  }

                  time_created = system.TimeCreated
                  if time_created != null {
                      system_time = time_created."@SystemTime"
                      if system_time != null {
                          system_time_str = string!(system_time)
                          ts, err = parse_timestamp(system_time_str, "%+")
                          if err == null {
                              .udm.timestamp = format_timestamp!(ts, format: "%Y-%m-%d %H:%M:%S")
                          } else {
                              .udm.timestamp = system_time_str
                          }
                      }
                  }

                  exec_block = system.Execution
                  if exec_block != null {
                      sysmon_pid = exec_block."@ProcessID"
                      if sysmon_pid != null {
                          .ext.sysmon_process_id = to_int(sysmon_pid) ?? null
                      }
                  }
              }

              .udm.signature_id = to_string(event_id)
              .udm.vendor = "Microsoft"
              .udm.product = "Sysmon for Linux"
              .udm.vendor_product = "Sysmon for Linux"

              # -----------------------------------------------------------
              # Action / category — Linux Sysmon supports a subset of
              # event IDs. Windows-only IDs (registry, WMI, pipes, etc.)
              # are not emitted on Linux.
              # -----------------------------------------------------------
              .udm.action = if event_id == 1 { "process_create" } else if event_id == 2 { "file_time_change" } else if event_id == 3 { "network_connection" } else if event_id == 4 { "sysmon_state_change" } else if event_id == 5 { "process_terminate" } else if event_id == 11 { "file_create" } else if event_id == 16 { "sysmon_config_change" } else if event_id == 23 { "file_delete_archived" } else if event_id == 26 { "file_delete_logged" } else { "sysmon_event" }

              .udm.category = if event_id == 1 || event_id == 5 { "process" } else if event_id == 3 { "network" } else if event_id == 2 || event_id == 11 || event_id == 23 || event_id == 26 { "file" } else if event_id == 4 || event_id == 16 { "system" } else { "endpoint" }

              .udm.file_action = if event_id == 11 { "create" } else if event_id == 23 || event_id == 26 { "delete" } else if event_id == 2 { "modify" } else { null }

              # -----------------------------------------------------------
              # EventData → flat key/value map
              # -----------------------------------------------------------
              if event_data != null {
                  data_items = event_data.Data
                  if data_items != null {
                      items_array = []
                      if is_array(data_items) {
                          items_array = array!(data_items)
                      } else if is_object(data_items) {
                          items_array = [data_items]
                      }

                      kv = {}
                      for_each(items_array) -> |_idx, item| {
                          iname = item."@Name"
                          ivalue = item.text
                          if iname != null && ivalue != null {
                              kv = set!(kv, [to_string!(iname)], to_string!(ivalue))
                          }
                      }

                      # ---------------------------------------------------
                      # User — plain username on Linux (no domain split)
                      # ---------------------------------------------------
                      user_raw = get(kv, ["User"]) ?? null
                      if user_raw != null {
                          user_str = string!(user_raw)
                          if user_str != "-" && user_str != "" {
                              .udm.user = user_str
                          }
                      }

                      utc_time = get(kv, ["UtcTime"]) ?? null
                      if utc_time != null {
                          .ext.utc_time = string!(utc_time)
                      }

                      # ---------------------------------------------------
                      # Process fields
                      # ---------------------------------------------------
                      image = get(kv, ["Image"]) ?? null
                      if image != null {
                          image_str = string!(image)
                          if image_str != "-" {
                              .udm.process_path = image_str
                              parts = split(image_str, "/")
                              if length(parts) > 0 {
                                  .udm.process_name = get!(parts, [length(parts) - 1])
                              }
                          }
                      }

                      pid = get(kv, ["ProcessId"]) ?? null
                      if pid != null {
                          .udm.process_id = to_int(pid) ?? null
                      }

                      pguid = get(kv, ["ProcessGuid"]) ?? null
                      if pguid != null {
                          .udm.process_guid = string!(pguid)
                      }

                      cmdline = get(kv, ["CommandLine"]) ?? null
                      if cmdline != null {
                          .udm.command_line = string!(cmdline)
                      }

                      curdir = get(kv, ["CurrentDirectory"]) ?? null
                      if curdir != null {
                          .udm.process_current_directory = string!(curdir)
                      }

                      integrity = get(kv, ["IntegrityLevel"]) ?? null
                      if integrity != null {
                          int_str = string!(integrity)
                          if int_str != "no level" {
                              .udm.process_integrity_level = int_str
                          }
                      }

                      # Parent process — fields may be "-" when parent
                      # was not tracked (process predates sysmon)
                      pimage = get(kv, ["ParentImage"]) ?? null
                      if pimage != null {
                          pimage_str = string!(pimage)
                          if pimage_str != "-" {
                              .udm.parent_process_path = pimage_str
                              parts = split(pimage_str, "/")
                              if length(parts) > 0 {
                                  .udm.parent_process_name = get!(parts, [length(parts) - 1])
                              }
                          }
                      }

                      ppid = get(kv, ["ParentProcessId"]) ?? null
                      if ppid != null {
                          .udm.parent_process_id = to_int(ppid) ?? null
                      }

                      ppguid = get(kv, ["ParentProcessGuid"]) ?? null
                      if ppguid != null {
                          ppg_str = string!(ppguid)
                          if ppg_str != "{00000000-0000-0000-0000-000000000000}" {
                              .ext.parent_process_guid = ppg_str
                          }
                      }

                      pcmd = get(kv, ["ParentCommandLine"]) ?? null
                      if pcmd != null {
                          pcmd_str = string!(pcmd)
                          if pcmd_str != "-" {
                              .udm.parent_command_line = pcmd_str
                          }
                      }

                      puser = get(kv, ["ParentUser"]) ?? null
                      if puser != null {
                          puser_str = string!(puser)
                          if puser_str != "-" {
                              .ext.parent_user = puser_str
                          }
                      }

                      logon_id = get(kv, ["LogonId"]) ?? null
                      if logon_id != null {
                          .udm.session_id = string!(logon_id)
                      }

                      logon_guid = get(kv, ["LogonGuid"]) ?? null
                      if logon_guid != null {
                          lg_str = string!(logon_guid)
                          if lg_str != "{00000000-0000-0000-0000-000000000000}" {
                              .ext.logon_guid = lg_str
                          }
                      }

                      term_sess = get(kv, ["TerminalSessionId"]) ?? null
                      if term_sess != null {
                          .ext.terminal_session_id = string!(term_sess)
                      }

                      # ---------------------------------------------------
                      # Hashes — Linux Sysmon typically only populates
                      # SHA256, but the same parser handles MD5/SHA1 too
                      # ---------------------------------------------------
                      hashes_raw = get(kv, ["Hashes"]) ?? null
                      if hashes_raw != null {
                          hashes_str = string!(hashes_raw)
                          if hashes_str != "-" && hashes_str != "" {
                              .ext.hashes_raw = hashes_str

                              sha256_match = parse_regex(hashes_str, r'SHA256=(?P<hash>[A-Fa-f0-9]+)') ?? null
                              md5_match = parse_regex(hashes_str, r'MD5=(?P<hash>[A-Fa-f0-9]+)') ?? null
                              sha1_match = parse_regex(hashes_str, r'SHA1=(?P<hash>[A-Fa-f0-9]+)') ?? null

                              if sha256_match != null {
                                  .ext.sha256 = sha256_match.hash
                              }
                              if md5_match != null {
                                  .ext.md5 = md5_match.hash
                              }
                              if sha1_match != null {
                                  .ext.sha1 = sha1_match.hash
                              }

                              primary_hash = if sha256_match != null { sha256_match.hash } else if sha1_match != null { sha1_match.hash } else if md5_match != null { md5_match.hash } else { null }

                              if primary_hash != null {
                                  if event_id == 1 || event_id == 5 {
                                      .udm.process_hash = primary_hash
                                  } else {
                                      .udm.file_hash = primary_hash
                                  }
                              }
                          }
                      }

                      # ---------------------------------------------------
                      # RuleName — MITRE ATT&CK technique
                      # Linux Sysmon emits PascalCase (TechniqueID=,
                      # TechniqueName=); the Windows form uses snake_case
                      # ---------------------------------------------------
                      rule_name_raw = get(kv, ["RuleName"]) ?? null
                      if rule_name_raw != null {
                          rule_name_str = string!(rule_name_raw)
                          if rule_name_str != "-" && rule_name_str != "" {
                              .udm.rule_name = rule_name_str
                              tid_match = parse_regex(rule_name_str, r'(?i)technique[_]?id=(?P<tid>[^,\s]+)') ?? null
                              if tid_match != null {
                                  .udm.mitre_technique_id = tid_match.tid
                              }
                              tname_match = parse_regex(rule_name_str, r'(?i)technique[_]?name=(?P<tname>[^,]+)') ?? null
                              if tname_match != null {
                                  .ext.mitre_technique_name = tname_match.tname
                              }
                          }
                      }

                      # ---------------------------------------------------
                      # Network connection (Event ID 3)
                      # ---------------------------------------------------
                      if event_id == 3 {
                          src_ip = get(kv, ["SourceIp"]) ?? null
                          if src_ip != null { .udm.src_ip = string!(src_ip) }

                          dest_ip = get(kv, ["DestinationIp"]) ?? null
                          if dest_ip != null { .udm.dest_ip = string!(dest_ip) }

                          src_host = get(kv, ["SourceHostname"]) ?? null
                          if src_host != null {
                              sh_str = string!(src_host)
                              if sh_str != "-" { .udm.src_host = sh_str }
                          }

                          dest_host = get(kv, ["DestinationHostname"]) ?? null
                          if dest_host != null {
                              dh_str = string!(dest_host)
                              if dh_str != "-" { .udm.dest_host = dh_str }
                          }

                          src_port = get(kv, ["SourcePort"]) ?? null
                          if src_port != null { .udm.src_port = to_int(src_port) ?? null }

                          dest_port = get(kv, ["DestinationPort"]) ?? null
                          if dest_port != null { .udm.dest_port = to_int(dest_port) ?? null }

                          proto = get(kv, ["Protocol"]) ?? null
                          if proto != null { .udm.protocol = string!(proto) }

                          initiated = get(kv, ["Initiated"]) ?? null
                          if initiated != null {
                              init_str = string!(initiated)
                              .ext.initiated = init_str
                              if init_str == "true" {
                                  .ext.direction = "outbound"
                              } else {
                                  .ext.direction = "inbound"
                              }
                          }

                          src_ipv6 = get(kv, ["SourceIsIpv6"]) ?? null
                          if src_ipv6 != null { .ext.source_is_ipv6 = string!(src_ipv6) }

                          dst_ipv6 = get(kv, ["DestinationIsIpv6"]) ?? null
                          if dst_ipv6 != null { .ext.destination_is_ipv6 = string!(dst_ipv6) }

                          src_port_name = get(kv, ["SourcePortName"]) ?? null
                          if src_port_name != null {
                              spn = string!(src_port_name)
                              if spn != "-" { .ext.src_port_name = spn }
                          }

                          dst_port_name = get(kv, ["DestinationPortName"]) ?? null
                          if dst_port_name != null {
                              dpn = string!(dst_port_name)
                              if dpn != "-" { .ext.dest_port_name = dpn }
                          }
                      }

                      # ---------------------------------------------------
                      # File events (Event IDs 2, 11, 23, 26)
                      # ---------------------------------------------------
                      target_fn = get(kv, ["TargetFilename"]) ?? null
                      if target_fn != null {
                          tfn_str = string!(target_fn)
                          .udm.file_path = tfn_str
                          parts = split(tfn_str, "/")
                          if length(parts) > 0 {
                              .udm.file_name = get!(parts, [length(parts) - 1])
                          }
                      }

                      creation_time = get(kv, ["CreationUtcTime"]) ?? null
                      if creation_time != null {
                          .udm.file_create_time = string!(creation_time)
                      }

                      prev_creation = get(kv, ["PreviousCreationUtcTime"]) ?? null
                      if prev_creation != null {
                          .ext.previous_creation_utc_time = string!(prev_creation)
                      }

                      # ---------------------------------------------------
                      # Sysmon service state (Event ID 4)
                      # ---------------------------------------------------
                      if event_id == 4 {
                          state = get(kv, ["State"]) ?? null
                          if state != null { .ext.sysmon_state = string!(state) }
                          version = get(kv, ["Version"]) ?? null
                          if version != null { .ext.sysmon_version = string!(version) }
                          schema = get(kv, ["SchemaVersion"]) ?? null
                          if schema != null { .ext.sysmon_schema_version = string!(schema) }
                      }

                      # ---------------------------------------------------
                      # Sysmon config change (Event ID 16)
                      # ---------------------------------------------------
                      if event_id == 16 {
                          config = get(kv, ["Configuration"]) ?? null
                          if config != null { .ext.configuration = string!(config) }
                          config_hash = get(kv, ["ConfigurationFileHash"]) ?? null
                          if config_hash != null { .ext.configuration_file_hash = string!(config_hash) }
                      }

                      # ---------------------------------------------------
                      # Event ID 1 extra: file metadata (mostly "-" on
                      # Linux but kept for parity with Windows)
                      # ---------------------------------------------------
                      if event_id == 1 {
                          file_ver = get(kv, ["FileVersion"]) ?? null
                          if file_ver != null {
                              fv = string!(file_ver)
                              if fv != "-" { .ext.file_version = fv }
                          }
                          desc = get(kv, ["Description"]) ?? null
                          if desc != null {
                              d = string!(desc)
                              if d != "-" { .ext.description = d }
                          }
                          prod = get(kv, ["Product"]) ?? null
                          if prod != null {
                              p = string!(prod)
                              if p != "-" { .ext.product_name = p }
                          }
                          comp = get(kv, ["Company"]) ?? null
                          if comp != null {
                              c = string!(comp)
                              if c != "-" { .ext.company = c }
                          }
                          orig_fn = get(kv, ["OriginalFileName"]) ?? null
                          if orig_fn != null {
                              o = string!(orig_fn)
                              if o != "-" { .ext.original_file_name = o }
                          }
                      }
                  }
              }
          }
      }
  }

  if !exists(.udm.timestamp) {
      .udm.timestamp = now()
  }
