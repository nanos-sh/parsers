name: json_generic
display_name: Generic JSON
version: "1.2.0"
description: "Parses generic JSON-formatted logs, auto-detecting common field names for timestamps, IPs, users, actions, and more"
category: generic
vendor: "nano"
product: "JSON Parser"
parser_vrl: |
  # Generic JSON parser
  # Expects logs to already be JSON formatted

  # Try to parse the raw content as JSON
  parsed, err = parse_json(.message)

  if err == null {
      .udm = {}
      .metadata = {}
      .ext = {}

      # --- Timestamp Normalization ---
      ts_val = null
      if exists(parsed.timestamp) {
          ts_val = parsed.timestamp
      } else if exists(parsed.time) {
          ts_val = parsed.time
      } else if exists(parsed."@timestamp") {
          ts_val = parsed."@timestamp"
      } else if exists(parsed.datetime) {
          ts_val = parsed.datetime
      } else if exists(parsed.date) {
          ts_val = parsed.date
      }

      if ts_val != null {
          ts_str = string!(ts_val)
          ts = parse_timestamp(ts_str, "%Y-%m-%dT%H:%M:%S%z") ??
               parse_timestamp(ts_str, "%Y-%m-%dT%H:%M:%SZ") ??
               parse_timestamp(ts_str, "%Y-%m-%d %H:%M:%S") ??
               now()
          .udm.timestamp = format_timestamp!(ts, format: "%Y-%m-%d %H:%M:%S")
      } else {
          .udm.timestamp = format_timestamp!(now(), format: "%Y-%m-%d %H:%M:%S")
      }

      # --- Network Fields ---
      if exists(parsed.src_ip) { .udm.src_ip = parsed.src_ip }
      else if exists(parsed.source_ip) { .udm.src_ip = parsed.source_ip }
      else if exists(parsed.client_ip) { .udm.src_ip = parsed.client_ip }

      if exists(parsed.dest_ip) { .udm.dest_ip = parsed.dest_ip }
      else if exists(parsed.destination_ip) { .udm.dest_ip = parsed.destination_ip }
      else if exists(parsed.server_ip) { .udm.dest_ip = parsed.server_ip }
      else if exists(parsed.target_ip) { .udm.dest_ip = parsed.target_ip }

      if exists(parsed.src_port) { .udm.src_port = to_int(parsed.src_port) ?? 0 }
      if exists(parsed.dest_port) { .udm.dest_port = to_int(parsed.dest_port) ?? 0 }
      if exists(parsed.protocol) { .udm.protocol = parsed.protocol }

      # --- User Fields ---
      if exists(parsed.user) { .udm.user = parsed.user }
      else if exists(parsed.username) { .udm.user = parsed.username }
      else if exists(parsed.user_name) { .udm.user = parsed.user_name }
      else if exists(parsed.src_user) { .udm.src_user = parsed.src_user }

      if exists(parsed.dest_user) { .udm.dest_user = parsed.dest_user }
      else if exists(parsed.target_user) { .udm.dest_user = parsed.target_user }

      # --- Action & Severity ---
      if exists(parsed.action) { .udm.action = parsed.action }
      else if exists(parsed.event_action) { .udm.action = parsed.event_action }
      else if exists(parsed.activity) { .udm.action = parsed.activity }

      if exists(parsed.severity) { .udm.severity = parsed.severity }
      else if exists(parsed.level) { .udm.severity = parsed.level }
      else if exists(parsed.log_level) { .udm.severity = parsed.log_level }

      # --- Host/Device Fields ---
      if exists(parsed.host) { .udm.src_host = parsed.host }
      else if exists(parsed.hostname) { .udm.src_host = parsed.hostname }

      if exists(parsed.dvc) { .udm.dvc = parsed.dvc }
      else if exists(parsed.device) { .udm.dvc = parsed.device }

      # --- Process Fields ---
      if exists(parsed.process) { .udm.process = parsed.process }
      else if exists(parsed.command_line) { .udm.process = parsed.command_line }
      else if exists(parsed.cmdline) { .udm.process = parsed.cmdline }

      if exists(parsed.process_name) { .udm.process_name = parsed.process_name }
      else if exists(parsed.image) { .udm.process_name = parsed.image }

      if exists(parsed.pid) { .udm.process_id = to_int(parsed.pid) ?? 0 }
      else if exists(parsed.process_id) { .udm.process_id = to_int(parsed.process_id) ?? 0 }

      # --- Web/URL Fields ---
      if exists(parsed.url) { .udm.url = parsed.url }
      else if exists(parsed.uri) { .udm.url = parsed.uri }
      else if exists(parsed.request_url) { .udm.url = parsed.request_url }

      if exists(parsed.domain) { .udm.url_domain = parsed.domain }
      if exists(parsed.method) { .udm.http_method = parsed.method }
      if exists(parsed.user_agent) { .udm.http_user_agent = parsed.user_agent }
      if exists(parsed.status_code) { .udm.http_status_code = to_int(parsed.status_code) ?? 0 }

      # --- File Fields ---
      if exists(parsed.file_name) { .udm.file_name = parsed.file_name }
      if exists(parsed.file_path) { .udm.file_path = parsed.file_path }
      if exists(parsed.hash) { .udm.file_hash = parsed.hash }

      # --- Metadata ---
      if exists(parsed.event_code) { .metadata.event_code = parsed.event_code }
      if exists(parsed.product) { .metadata.product = parsed.product }

  } else {
      .udm = {}
      .ext = {}
      .metadata = {
          "parse_error": to_string(err)
      }
      .udm.timestamp = format_timestamp!(now(), format: "%Y-%m-%d %H:%M:%S")
  }

  .message = .message
