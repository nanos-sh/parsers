name: sysmon_json
display_name: Microsoft Sysmon (JSON)
version: "1.0.0"
description: "Parses Sysmon events from Vector's windows_event_log source (JSON format). Covers process creation, network connections, DNS queries, file operations, registry changes, driver loads, pipe events, WMI, process injection, and process tampering."
match_values:
  - sysmon
  - windows_sysmon
  - sysmon_json
category: endpoint
vendor: "Microsoft"
product: "Sysmon"

parser_vrl: |
  .udm = {}
  .ext = {}

  raw_log = string!(.message)
  parsed, err = parse_json(raw_log)

  if err == null {
      event_id = to_int(parsed.event_id) ?? 0
      event_data = if exists(parsed.event_data) && is_object(parsed.event_data) { object!(parsed.event_data) } else { {} }
      computer_name = string(parsed.computer) ?? string(parsed.host) ?? ""

      # ---------------------------------------------------------------
      # Common fields
      # ---------------------------------------------------------------
      .udm.signature_id = to_string(event_id)
      .udm.src_host = computer_name
      .udm.vendor = "Microsoft"
      .udm.product = "Sysmon"

      # Timestamp
      if exists(parsed.timestamp) {
          ts, ts_err = parse_timestamp(string!(parsed.timestamp), "%+")
          if ts_err == null {
              .udm.timestamp = ts
          }
      }

      # Channel and provider in ext
      .ext.channel = string(parsed.channel) ?? null
      .ext.provider = string(parsed.provider_name) ?? null

      # Rule name (Sysmon config rule that matched)
      rule_name = string(event_data.RuleName) ?? ""
      if rule_name != "" && rule_name != "-" {
          .ext.rule_name = rule_name
      }

      # ---------------------------------------------------------------
      # Action mapping
      # ---------------------------------------------------------------
      .udm.action = if event_id == 1 { "process_create" } else if event_id == 2 { "file_time_change" } else if event_id == 3 { "network_connection" } else if event_id == 4 { "sysmon_state_change" } else if event_id == 5 { "process_terminate" } else if event_id == 6 { "driver_load" } else if event_id == 7 { "image_load" } else if event_id == 8 { "create_remote_thread" } else if event_id == 9 { "raw_access_read" } else if event_id == 10 { "process_access" } else if event_id == 11 { "file_create" } else if event_id == 12 { "registry_add_delete" } else if event_id == 13 { "registry_value_set" } else if event_id == 14 { "registry_rename" } else if event_id == 15 { "file_stream_create" } else if event_id == 17 { "pipe_create" } else if event_id == 18 { "pipe_connect" } else if event_id == 19 { "wmi_filter" } else if event_id == 20 { "wmi_consumer" } else if event_id == 21 { "wmi_binding" } else if event_id == 22 { "dns_query" } else if event_id == 23 { "file_delete" } else if event_id == 24 { "clipboard_change" } else if event_id == 25 { "process_tampering" } else if event_id == 26 { "file_delete_logged" } else if event_id == 27 { "file_block_executable" } else if event_id == 28 { "file_block_shredding" } else if event_id == 29 { "file_executable_detected" } else { "sysmon_" + to_string(event_id) }

      # Category mapping
      .udm.category = if event_id == 1 || event_id == 5 || event_id == 25 { "process" } else if event_id == 3 { "network" } else if event_id == 22 { "dns" } else if event_id == 2 || event_id == 11 || event_id == 15 || event_id == 23 || event_id == 26 || event_id == 27 || event_id == 28 || event_id == 29 { "file" } else if event_id == 12 || event_id == 13 || event_id == 14 { "registry" } else if event_id == 6 || event_id == 7 { "driver" } else if event_id == 8 || event_id == 10 { "process_injection" } else if event_id == 9 { "raw_access" } else if event_id == 17 || event_id == 18 { "pipe" } else if event_id == 19 || event_id == 20 || event_id == 21 { "wmi" } else { "endpoint" }

      # File action
      .udm.file_action = if event_id == 11 || event_id == 15 { "create" } else if event_id == 23 || event_id == 26 { "delete" } else if event_id == 2 { "modify" } else if event_id == 27 || event_id == 28 { "blocked" } else { null }

      # ---------------------------------------------------------------
      # User
      # ---------------------------------------------------------------
      user_raw = string(event_data.User) ?? ""
      if user_raw != "" {
          # Strip DOMAIN\ prefix for UDM user field
          user_parts = split(user_raw, "\\")
          if length(user_parts) == 2 {
              .udm.user_domain = user_parts[0]
              .udm.user = user_parts[1]
          } else {
              .udm.user = user_raw
          }
      }

      # ---------------------------------------------------------------
      # Process fields (Event 1, 5, and common to many events)
      # ---------------------------------------------------------------
      image = string(event_data.Image) ?? ""
      if image != "" {
          .udm.process_path = image
          parts = split(image, "\\")
          if length(parts) > 0 {
              .udm.process_name = get(parts, [length(parts) - 1]) ?? null
          }
      }

      .udm.pid = to_int(event_data.ProcessId) ?? null
      .ext.process_guid = string(event_data.ProcessGuid) ?? null

      # Command line (Event 1)
      cmd = string(event_data.CommandLine) ?? ""
      if cmd != "" {
          .udm.process = cmd
      }

      # Parent process (Event 1)
      parent_image = string(event_data.ParentImage) ?? ""
      if parent_image != "" {
          .udm.parent_process_path = parent_image
          parts = split(parent_image, "\\")
          if length(parts) > 0 {
              .udm.parent_process_name = get(parts, [length(parts) - 1]) ?? null
          }
      }
      .udm.ppid = to_int(event_data.ParentProcessId) ?? null
      .ext.parent_process_guid = string(event_data.ParentProcessGuid) ?? null

      parent_cmd = string(event_data.ParentCommandLine) ?? ""
      if parent_cmd != "" {
          .udm.parent_process = parent_cmd
      }

      # Current directory and integrity level
      .ext.current_directory = string(event_data.CurrentDirectory) ?? null
      .ext.integrity_level = string(event_data.IntegrityLevel) ?? null
      .ext.logon_id = string(event_data.LogonId) ?? null

      # ---------------------------------------------------------------
      # Hashes (process hash for events 1/5/6/7, file hash for file events)
      # ---------------------------------------------------------------
      hashes_raw = string(event_data.Hashes) ?? ""
      if hashes_raw != "" {
          sha256_match, sha256_err = parse_regex(hashes_raw, r'SHA256=(?P<hash>[A-Fa-f0-9]+)')
          md5_match, md5_err = parse_regex(hashes_raw, r'MD5=(?P<hash>[A-Fa-f0-9]+)')

          hash_value = if sha256_err == null { sha256_match.hash } else if md5_err == null { md5_match.hash } else { null }

          if hash_value != null {
              if event_id == 1 || event_id == 5 || event_id == 6 || event_id == 7 {
                  .udm.process_hash = hash_value
              } else {
                  .udm.file_hash = hash_value
              }
          }
          .ext.hashes = hashes_raw
      }

      # ---------------------------------------------------------------
      # Network connection (Event 3)
      # ---------------------------------------------------------------
      if event_id == 3 {
          src_ip = string(event_data.SourceIp) ?? ""
          if src_ip != "" {
              .udm.src_ip = src_ip
          }
          dest_ip = string(event_data.DestinationIp) ?? ""
          if dest_ip != "" {
              .udm.dest_ip = dest_ip
          }
          .udm.src_port = to_int(event_data.SourcePort) ?? null
          .udm.dest_port = to_int(event_data.DestinationPort) ?? null
          .udm.protocol = downcase(string(event_data.Protocol) ?? "")

          src_hostname = string(event_data.SourceHostname) ?? ""
          if src_hostname != "" && src_hostname != "-" {
              .udm.src_host = src_hostname
          }
          dest_hostname = string(event_data.DestinationHostname) ?? ""
          if dest_hostname != "" && dest_hostname != "-" {
              .udm.dest_host = dest_hostname
          }

          .ext.initiated = string(event_data.Initiated) ?? null
          .ext.source_is_ipv6 = string(event_data.SourceIsIpv6) ?? null
          .ext.destination_is_ipv6 = string(event_data.DestinationIsIpv6) ?? null
      }

      # ---------------------------------------------------------------
      # DNS query (Event 22)
      # ---------------------------------------------------------------
      if event_id == 22 {
          .udm.query = string(event_data.QueryName) ?? null
          .udm.dns_answers = string(event_data.QueryResults) ?? null
          .ext.query_type = string(event_data.QueryType) ?? null
          .ext.query_status = string(event_data.QueryStatus) ?? null
      }

      # ---------------------------------------------------------------
      # File events (Event 2, 11, 15, 23, 26, 27, 29)
      # ---------------------------------------------------------------
      target_filename = string(event_data.TargetFilename) ?? ""
      if target_filename != "" {
          .udm.file_path = target_filename
          parts = split(target_filename, "\\")
          if length(parts) > 0 {
              .udm.file_name = get(parts, [length(parts) - 1]) ?? null
          }
      }

      if event_id == 2 {
          .ext.creation_utc_time = string(event_data.CreationUtcTime) ?? null
          .ext.previous_creation_utc_time = string(event_data.PreviousCreationUtcTime) ?? null
      }

      # ---------------------------------------------------------------
      # Registry events (Event 12, 13, 14)
      # ---------------------------------------------------------------
      if event_id == 12 || event_id == 13 || event_id == 14 {
          .udm.registry_path = string(event_data.TargetObject) ?? null
          .ext.event_type = string(event_data.EventType) ?? null
          if event_id == 13 {
              .udm.registry_value_data = string(event_data.Details) ?? null
          }
          if event_id == 14 {
              .ext.new_name = string(event_data.NewName) ?? null
          }
      }

      # ---------------------------------------------------------------
      # Driver load (Event 6)
      # ---------------------------------------------------------------
      if event_id == 6 {
          .ext.image_loaded = string(event_data.ImageLoaded) ?? null
          .ext.signature = string(event_data.Signature) ?? null
          .ext.signature_status = string(event_data.SignatureStatus) ?? null
          .ext.signed = string(event_data.Signed) ?? null
      }

      # ---------------------------------------------------------------
      # Image load / DLL (Event 7)
      # ---------------------------------------------------------------
      if event_id == 7 {
          .ext.image_loaded = string(event_data.ImageLoaded) ?? null
          .ext.signature = string(event_data.Signature) ?? null
          .ext.signature_status = string(event_data.SignatureStatus) ?? null
          .ext.signed = string(event_data.Signed) ?? null
          .ext.original_file_name = string(event_data.OriginalFileName) ?? null
      }

      # ---------------------------------------------------------------
      # CreateRemoteThread (Event 8)
      # ---------------------------------------------------------------
      if event_id == 8 {
          .ext.source_process_guid = string(event_data.SourceProcessGuid) ?? null
          .ext.source_process_id = to_int(event_data.SourceProcessId) ?? null
          .ext.source_image = string(event_data.SourceImage) ?? null
          .ext.target_process_guid = string(event_data.TargetProcessGuid) ?? null
          .ext.target_process_id = to_int(event_data.TargetProcessId) ?? null
          .ext.target_image = string(event_data.TargetImage) ?? null
          .ext.start_address = string(event_data.StartAddress) ?? null
          .ext.start_module = string(event_data.StartModule) ?? null
          .ext.start_function = string(event_data.StartFunction) ?? null
          .udm.severity = "high"
      }

      # ---------------------------------------------------------------
      # ProcessAccess (Event 10) — credential dumping detection
      # ---------------------------------------------------------------
      if event_id == 10 {
          .ext.source_process_guid = string(event_data.SourceProcessGuid) ?? null
          .ext.source_process_id = to_int(event_data.SourceProcessId) ?? null
          .ext.source_image = string(event_data.SourceImage) ?? null
          .ext.target_process_guid = string(event_data.TargetProcessGuid) ?? null
          .ext.target_process_id = to_int(event_data.TargetProcessId) ?? null
          .ext.target_image = string(event_data.TargetImage) ?? null
          .ext.granted_access = string(event_data.GrantedAccess) ?? null
          .ext.call_trace = string(event_data.CallTrace) ?? null

          # Flag LSASS access as high severity
          target_img = downcase(string(event_data.TargetImage) ?? "")
          if contains(target_img, "lsass.exe") {
              .udm.severity = "high"
          }
      }

      # ---------------------------------------------------------------
      # Pipe events (Event 17, 18)
      # ---------------------------------------------------------------
      if event_id == 17 || event_id == 18 {
          .ext.pipe_name = string(event_data.PipeName) ?? null
      }

      # ---------------------------------------------------------------
      # WMI events (Event 19, 20, 21)
      # ---------------------------------------------------------------
      if event_id == 19 || event_id == 20 || event_id == 21 {
          .ext.event_type = string(event_data.EventType) ?? null
          .ext.operation = string(event_data.Operation) ?? null
          .ext.event_namespace = string(event_data.EventNamespace) ?? null
          .ext.wmi_name = string(event_data.Name) ?? null
          .ext.destination = string(event_data.Destination) ?? null
          .ext.consumer = string(event_data.Consumer) ?? null
          .ext.filter = string(event_data.Filter) ?? null
          .udm.severity = "medium"
      }

      # ---------------------------------------------------------------
      # Process Tampering (Event 25)
      # ---------------------------------------------------------------
      if event_id == 25 {
          .ext.tampering_type = string(event_data.Type) ?? null
          .udm.severity = "high"
      }

      # ---------------------------------------------------------------
      # Severity defaults for high-value events
      # ---------------------------------------------------------------
      if event_id == 9 {
          .udm.severity = "medium"
      }
      if event_id == 27 || event_id == 28 {
          .udm.severity = "high"
      }

      # ---------------------------------------------------------------
      # Clean up raw fields to prevent ext leakage
      # ---------------------------------------------------------------
      del(.event_id)
      del(.computer)
      del(.host)
      del(.provider_name)
      del(.provider_guid)
      del(.timestamp)
      del(.event_data)
      del(.channel)
      del(.keywords)
      del(.level)
      del(.level_value)
      del(.task)
      del(.task_name)
      del(.thread_id)
      del(.process_id)
      del(.record_id)
      del(.version)
      del(.user_id)
      del(.user_name)

  } else {
      .metadata.parse_error = to_string(err)
  }

  .message = raw_log
