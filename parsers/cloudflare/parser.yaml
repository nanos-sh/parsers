name: cloudflare
display_name: Cloudflare
version: "1.0.0"
description: "Parses Cloudflare HTTP request logs, firewall events, and DNS logs from Logpush"
match_values:
  - cloudflare
  - cloudflare_http
  - cloudflare_fw
  - cf_logpush
category: network
vendor: "Cloudflare"
product: "Cloudflare"
parser_vrl: |
  # Cloudflare Parser
  # Parses JSON events from Cloudflare Logpush (HTTP, Firewall, DNS)

  # Initialize required structures
  .udm = {}
  .ext = {}
  .metadata = {}

  # Set defaults
  .udm.timestamp = now()
  .udm.vendor = "Cloudflare"
  .udm.product = "Cloudflare"
  .udm.vendor_product = "Cloudflare"

  # Get raw log content
  raw_log = to_string(.message) ?? ""

  # Parse JSON
  parsed, err = parse_json(raw_log)

  if err == null {
      # --- Detect log type ---
      is_dns = exists(parsed.QueryName)
      is_firewall = exists(parsed.Kind) || (exists(parsed.Action) && !exists(parsed.EdgeStartTimestamp))
      is_http = exists(parsed.EdgeStartTimestamp) || exists(parsed.ClientRequestHost)

      if is_dns {
          # ============= DNS LOG =============
          .udm.category = "dns"

          # Timestamp
          if exists(parsed.Timestamp) {
              ts, ts_err = parse_timestamp(string!(parsed.Timestamp), "%+")
              if ts_err == null {
                  .udm.timestamp = format_timestamp!(ts, format: "%Y-%m-%d %H:%M:%S")
              }
          }

          # Source IP
          if exists(parsed.SourceIP) {
              .udm.src_ip = string!(parsed.SourceIP)
          }

          # Query
          if exists(parsed.QueryName) {
              .ext.query = string!(parsed.QueryName)
          }

          # Query type mapping
          if exists(parsed.QueryType) {
              qt = to_int(parsed.QueryType) ?? 0
              query_type_name = if qt == 1 {
                  "A"
              } else if qt == 28 {
                  "AAAA"
              } else if qt == 5 {
                  "CNAME"
              } else if qt == 15 {
                  "MX"
              } else if qt == 2 {
                  "NS"
              } else if qt == 16 {
                  "TXT"
              } else if qt == 6 {
                  "SOA"
              } else if qt == 12 {
                  "PTR"
              } else if qt == 33 {
                  "SRV"
              } else {
                  to_string(qt)
              }
              .ext.query_type = query_type_name
          }

          # Response code
          if exists(parsed.ResponseCode) {
              rc = to_int(parsed.ResponseCode) ?? -1
              .udm.status = if rc == 0 {
                  "NOERROR"
              } else if rc == 2 {
                  "SERVFAIL"
              } else if rc == 3 {
                  "NXDOMAIN"
              } else if rc == 5 {
                  "REFUSED"
              } else {
                  to_string(rc)
              }
          }

          # Colo
          if exists(parsed.ColoCode) {
              .ext.colo_code = string!(parsed.ColoCode)
          }

          # EDNS
          if exists(parsed.EDNSSubnet) {
              .ext.edns_subnet = string!(parsed.EDNSSubnet)
          }

      } else if is_firewall {
          # ============= FIREWALL EVENT =============
          .udm.category = "network"

          # Timestamp
          if exists(parsed.Datetime) {
              ts, ts_err = parse_timestamp(string!(parsed.Datetime), "%+")
              if ts_err == null {
                  .udm.timestamp = format_timestamp!(ts, format: "%Y-%m-%d %H:%M:%S")
              }
          }

          # Source IP
          if exists(parsed.ClientIP) {
              .udm.src_ip = string!(parsed.ClientIP)
          }

          # Action
          if exists(parsed.Action) {
              .udm.event_type = downcase(string!(parsed.Action))
          }

          # Request details
          if exists(parsed.ClientRequestHost) {
              .ext.url_domain = string!(parsed.ClientRequestHost)
          }
          if exists(parsed.ClientRequestMethod) {
              .udm.http_method = string!(parsed.ClientRequestMethod)
          }
          if exists(parsed.ClientRequestPath) {
              .ext.uri_path = string!(parsed.ClientRequestPath)
          }
          if exists(parsed.ClientRequestProtocol) {
              .ext.request_protocol = string!(parsed.ClientRequestProtocol)
          }
          if exists(parsed.ClientRequestUserAgent) {
              .udm.http_user_agent = string!(parsed.ClientRequestUserAgent)
          }

          # Build URL
          scheme = to_string(parsed.ClientRequestScheme) ?? "https"
          host = to_string(parsed.ClientRequestHost) ?? ""
          path = to_string(parsed.ClientRequestPath) ?? ""
          query = to_string(parsed.ClientRequestQuery) ?? ""
          if host != "" {
              full_url = scheme + "://" + host + path + query
              .udm.url = full_url
          }

          # Edge response
          if exists(parsed.EdgeResponseStatus) {
              .ext.http_status_code = to_string(parsed.EdgeResponseStatus) ?? ""
          }

          # Client ASN info
          if exists(parsed.ClientASN) {
              .ext.client_asn = to_string(parsed.ClientASN) ?? ""
          }
          if exists(parsed.ClientASNDescription) {
              .ext.client_asn_description = string!(parsed.ClientASNDescription)
          }
          if exists(parsed.ClientCountry) {
              .ext.enriched_src_country = string!(parsed.ClientCountry)
          }
          if exists(parsed.ClientIPClass) {
              .ext.client_ip_class = string!(parsed.ClientIPClass)
          }

          # Rule info
          if exists(parsed.RuleID) {
              .ext.rule_id = string!(parsed.RuleID)
          }
          if exists(parsed.Description) {
              .ext.signature = string!(parsed.Description)
          }
          if exists(parsed.Source) {
              .ext.firewall_source = string!(parsed.Source)
          }

          # RayID -> session_id
          if exists(parsed.RayID) {
              .udm.session_id = string!(parsed.RayID)
          }

          # Kind
          if exists(parsed.Kind) {
              .ext.event_kind = string!(parsed.Kind)
          }

          # Metadata
          if exists(parsed.Metadata) {
              .ext.fw_metadata = encode_json(parsed.Metadata)
          }

      } else if is_http {
          # ============= HTTP REQUEST LOG =============
          .udm.category = "web"

          # Timestamp from EdgeStartTimestamp (nanoseconds)
          if exists(parsed.EdgeStartTimestamp) {
              edge_ts_ns = to_int(parsed.EdgeStartTimestamp) ?? 0
              if edge_ts_ns > 0 {
                  # Convert nanoseconds to seconds
                  edge_ts_sec = int!(edge_ts_ns / 1000000000)
                  ts, ts_err = from_unix_timestamp(edge_ts_sec)
                  if ts_err == null {
                      .udm.timestamp = format_timestamp!(ts, format: "%Y-%m-%d %H:%M:%S")
                  }
              }
          }

          # --- IPs ---
          if exists(parsed.ClientIP) {
              .udm.src_ip = string!(parsed.ClientIP)
          }
          if exists(parsed.OriginIP) {
              .udm.dest_ip = string!(parsed.OriginIP)
          }
          if exists(parsed.EdgeServerIP) {
              .ext.dvc_ip = string!(parsed.EdgeServerIP)
          }

          # --- HTTP fields ---
          if exists(parsed.ClientRequestHost) {
              .ext.url_domain = string!(parsed.ClientRequestHost)
          }
          if exists(parsed.ClientRequestURI) {
              .ext.uri_path = string!(parsed.ClientRequestURI)
          }
          if exists(parsed.ClientRequestMethod) {
              .udm.http_method = string!(parsed.ClientRequestMethod)
          }
          if exists(parsed.EdgeResponseStatus) {
              .ext.http_status_code = to_string(parsed.EdgeResponseStatus) ?? ""
          }
          if exists(parsed.ClientRequestUserAgent) {
              .udm.http_user_agent = string!(parsed.ClientRequestUserAgent)
          }
          if exists(parsed.ClientRequestReferer) {
              .ext.http_referrer = string!(parsed.ClientRequestReferer)
          }
          if exists(parsed.ClientRequestProtocol) {
              .ext.request_protocol = string!(parsed.ClientRequestProtocol)
          }

          # Build full URL
          host = to_string(parsed.ClientRequestHost) ?? ""
          uri = to_string(parsed.ClientRequestURI) ?? ""
          if host != "" {
              .udm.url = "https://" + host + uri
          }

          # --- Bytes ---
          if exists(parsed.EdgeResponseBytes) {
              .ext.bytes_in = to_string(parsed.EdgeResponseBytes) ?? ""
          }
          if exists(parsed.ClientRequestBytes) {
              .ext.bytes_out = to_string(parsed.ClientRequestBytes) ?? ""
          }

          # --- Ports ---
          if exists(parsed.ClientSrcPort) {
              .ext.src_port = to_string(parsed.ClientSrcPort) ?? ""
          }

          # --- WAF ---
          if exists(parsed.WAFAction) {
              waf_action = downcase(string!(parsed.WAFAction))
              if waf_action != "unknown" && waf_action != "" {
                  .udm.event_type = waf_action
              }
          }
          if exists(parsed.WAFRuleMessage) {
              waf_msg = string!(parsed.WAFRuleMessage)
              if waf_msg != "" {
                  .ext.signature = waf_msg
              }
          }
          if exists(parsed.WAFRuleID) {
              waf_rule = string!(parsed.WAFRuleID)
              if waf_rule != "" {
                  .ext.rule_id = waf_rule
              }
          }
          if exists(parsed.WAFProfile) {
              .ext.waf_profile = string!(parsed.WAFProfile)
          }

          # --- Firewall matches ---
          if exists(parsed.FirewallMatchesActions) && is_array(parsed.FirewallMatchesActions) {
              .ext.firewall_actions = encode_json(parsed.FirewallMatchesActions)
              fw_actions = array!(parsed.FirewallMatchesActions)
              if length(fw_actions) > 0 {
                  first_fw_action = to_string(fw_actions[0]) ?? ""
                  if first_fw_action != "" {
                      .udm.event_type = downcase(first_fw_action)
                  }
              }
          }
          if exists(parsed.FirewallMatchesRuleIDs) && is_array(parsed.FirewallMatchesRuleIDs) {
              .ext.firewall_rule_ids = encode_json(parsed.FirewallMatchesRuleIDs)
          }
          if exists(parsed.FirewallMatchesSources) && is_array(parsed.FirewallMatchesSources) {
              .ext.firewall_sources = encode_json(parsed.FirewallMatchesSources)
          }

          # --- Security fields ---
          if exists(parsed.SecurityLevel) {
              .ext.security_level = string!(parsed.SecurityLevel)
          }
          if exists(parsed.BotScore) {
              .ext.risk_score = to_string(parsed.BotScore) ?? ""
          }
          if exists(parsed.BotScoreSrc) {
              .ext.bot_score_src = string!(parsed.BotScoreSrc)
          }
          if exists(parsed.JA3Hash) {
              .ext.ja3 = string!(parsed.JA3Hash)
          }

          # --- SSL ---
          if exists(parsed.ClientSSLProtocol) {
              .ext.ssl_protocol = string!(parsed.ClientSSLProtocol)
          }
          if exists(parsed.ClientSSLCipher) {
              .ext.ssl_cipher = string!(parsed.ClientSSLCipher)
          }

          # --- Cache ---
          if exists(parsed.CacheCacheStatus) {
              .ext.cache_status = string!(parsed.CacheCacheStatus)
          }

          # --- Zone ---
          if exists(parsed.ZoneName) {
              .ext.zone = string!(parsed.ZoneName)
          }

          # --- RayID -> session_id ---
          if exists(parsed.RayID) {
              .udm.session_id = string!(parsed.RayID)
          }

          # --- Edge colo ---
          if exists(parsed.EdgeColoCode) {
              .ext.colo_code = string!(parsed.EdgeColoCode)
          }

          # --- Client geo ---
          if exists(parsed.ClientCountry) {
              .ext.enriched_src_country = string!(parsed.ClientCountry)
          }
          if exists(parsed.ClientDeviceType) {
              .ext.device_type = string!(parsed.ClientDeviceType)
          }

          # --- Origin response time ---
          if exists(parsed.OriginResponseTime) {
              .ext.origin_response_time_ns = to_string(parsed.OriginResponseTime) ?? ""
          }

      } else {
          # Unknown format
          .udm.category = "other"
      }

  } else {
      .metadata.parse_error = to_string(err)
  }

  # Set parser name
  .metadata.parser = "cloudflare"

  # Preserve raw log
  .message = raw_log
