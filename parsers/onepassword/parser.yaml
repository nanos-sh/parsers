name: onepassword
display_name: 1Password
version: "1.0.0"
description: "Parses 1Password Events API audit logs including sign-in, item usage, and vault access events"
match_values:
  - onepassword
  - 1password
category: security
vendor: "1Password"
product: "1Password"
parser_vrl: |
  # 1Password Events Parser
  # Parses sign-in and item usage events from 1Password Events API

  # Initialize required structures
  .udm = {}
  .ext = {}
  .metadata = {}

  # Set defaults
  .udm.timestamp = now()
  .udm.vendor = "1Password"
  .udm.product = "1Password"
  .udm.vendor_product = "1Password"

  # Get raw log content
  raw_log = to_string(.message) ?? ""

  # Parse JSON
  parsed, err = parse_json(raw_log)

  if err == null {
      # --- Timestamp ---
      if exists(parsed.timestamp) {
          ts, ts_err = parse_timestamp(string!(parsed.timestamp), "%+")
          if ts_err == null {
              .udm.timestamp = format_timestamp!(ts, format: "%Y-%m-%d %H:%M:%S")
          }
      }

      # --- Event UUID ---
      if exists(parsed.uuid) {
          .ext.event_uuid = string!(parsed.uuid)
      }

      # --- Determine event type: sign-in vs item usage ---
      is_signin = exists(parsed.category) || exists(parsed.type) || exists(parsed.session_uuid)
      is_item_usage = exists(parsed.action) && exists(parsed.item_uuid)

      if is_signin && !is_item_usage {
          # ============= SIGN-IN EVENT =============
          .udm.category = "authentication"

          # Session UUID
          if exists(parsed.session_uuid) {
              .udm.session_id = string!(parsed.session_uuid)
          }

          # Category -> auth_result
          if exists(parsed.category) {
              cat = downcase(string!(parsed.category))
              .udm.auth_result = cat
              if cat == "success" {
                  .udm.result = "success"
                  .udm.status = "success"
              } else if cat == "credentials_failed" || cat == "mfa_failed" {
                  .udm.result = "failure"
                  .udm.status = "failure"
              } else {
                  .udm.result = cat
              }
          }

          # Type -> action
          if exists(parsed.type) {
              .udm.event_type = string!(parsed.type)
          }

          # Country
          if exists(parsed.country) {
              .ext.src_country = string!(parsed.country)
          }

          # Target user
          if exists(parsed.target_user) {
              tu = parsed.target_user
              if exists(tu.email) {
                  .udm.user = string!(tu.email)
              }
              if exists(tu.name) {
                  .udm.user_name = string!(tu.name)
              }
              if exists(tu.uuid) {
                  .udm.user_id = string!(tu.uuid)
              }
          }

          # Details
          if exists(parsed.details.value) {
              .ext.signin_email = string!(parsed.details.value)
              # Use as user if target_user not present
              if !exists(.udm.user) || .udm.user == null {
                  .udm.user = string!(parsed.details.value)
              }
          }

          # Client info
          if exists(parsed.client) {
              client = parsed.client
              if exists(client.ip) {
                  .udm.src_ip = string!(client.ip)
              }
              if exists(client.app_name) {
                  .ext.app_name = string!(client.app_name)
              }
              if exists(client.app_version) {
                  .ext.app_version = string!(client.app_version)
              }
              if exists(client.platform_name) {
                  .ext.platform = string!(client.platform_name)
              }
              if exists(client.platform_version) {
                  .ext.platform_version = string!(client.platform_version)
              }
          }

      } else if is_item_usage {
          # ============= ITEM USAGE EVENT =============
          .udm.category = "credential_access"

          # Action
          if exists(parsed.action) {
              .udm.event_type = string!(parsed.action)
          }

          # Item / vault
          if exists(parsed.item_uuid) {
              .ext.item_uuid = string!(parsed.item_uuid)
          }
          if exists(parsed.vault_uuid) {
              .ext.vault_uuid = string!(parsed.vault_uuid)
          }
          if exists(parsed.used_version) {
              .ext.item_version = to_string(parsed.used_version) ?? ""
          }

          # User
          if exists(parsed.user) {
              u = parsed.user
              if exists(u.email) {
                  .udm.user = string!(u.email)
              }
              if exists(u.name) {
                  .udm.user_name = string!(u.name)
              }
              if exists(u.uuid) {
                  .udm.user_id = string!(u.uuid)
              }
          }

          # Client info
          if exists(parsed.client) {
              client = parsed.client
              if exists(client.ip) {
                  .udm.src_ip = string!(client.ip)
              }
              if exists(client.app_name) {
                  .ext.app_name = string!(client.app_name)
              }
              if exists(client.app_version) {
                  .ext.app_version = string!(client.app_version)
              }
              if exists(client.platform_name) {
                  .ext.platform = string!(client.platform_name)
              }
          }

          # Location
          if exists(parsed.location) {
              loc = parsed.location
              if exists(loc.country) {
                  .ext.src_country = string!(loc.country)
              }
              if exists(loc.region) {
                  .ext.src_region = string!(loc.region)
              }
              if exists(loc.city) {
                  .ext.src_city = string!(loc.city)
              }
          }

      } else {
          # Unknown event type - extract what we can
          .udm.category = "other"

          if exists(parsed.action) {
              .udm.event_type = to_string(parsed.action) ?? ""
          }
          if exists(parsed.client.ip) {
              .udm.src_ip = string!(parsed.client.ip)
          }
      }

  } else {
      .metadata.parse_error = to_string(err)
  }

  # Set parser name
  .metadata.parser = "onepassword"

  # Preserve raw log
  .message = raw_log
