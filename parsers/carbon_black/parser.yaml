name: carbon_black
display_name: VMware Carbon Black
version: "1.0.0"
description: "Parses Carbon Black Cloud and EDR alert, process, and network events"
match_values:
  - carbon_black
  - cb_edr
  - carbonblack
  - cb_cloud
category: endpoint
vendor: "VMware"
product: "Carbon Black"
parser_vrl: |
  # VMware Carbon Black Cloud/EDR Parser
  # Supports: Alerts, Watchlist hits, Process events

  .udm = {}
  .ext = {}
  .metadata = {}

  raw_log = string!(.message)
  parsed, err = parse_json(raw_log)

  if err == null {
      .udm.vendor_product = "VMware Carbon Black"

      # ------------------------------------------------------------------
      # Detect event type
      # ------------------------------------------------------------------
      event_type = "unknown"
      cb_type = to_string(parsed.type) ?? ""

      if cb_type == "CB_ANALYTICS" || cb_type == "WATCHLIST" || cb_type == "DEVICE_CONTROL" || exists(parsed.alert_url) {
          event_type = "alert"
      } else if starts_with(cb_type, "watchlist.") {
          event_type = "watchlist_hit"
      } else if exists(parsed.process_guid) {
          event_type = "process_event"
      }
      .ext.event_type = event_type
      .ext.cb_type = cb_type

      # ------------------------------------------------------------------
      # Common device/host fields
      # ------------------------------------------------------------------
      if exists(parsed.device_name) { .udm.src_host = to_string(parsed.device_name) ?? null }
      if exists(parsed.device_internal_ip) { .udm.src_ip = to_string(parsed.device_internal_ip) ?? null }
      if exists(parsed.device_external_ip) { .ext.external_ip = to_string(parsed.device_external_ip) ?? null }
      if exists(parsed.device_username) { .udm.user = to_string(parsed.device_username) ?? null }
      if exists(parsed.device_os) { .ext.os_type = to_string(parsed.device_os) ?? null }
      if exists(parsed.device_os_version) { .ext.os_version = to_string(parsed.device_os_version) ?? null }
      if exists(parsed.device_id) { .ext.device_id = to_string(parsed.device_id) ?? null }
      if exists(parsed.device_location) { .ext.device_location = to_string(parsed.device_location) ?? null }
      if exists(parsed.org_key) { .ext.org_key = to_string(parsed.org_key) ?? null }

      # ------------------------------------------------------------------
      # Common process fields
      # ------------------------------------------------------------------
      if exists(parsed.process_name) { .udm.process_name = to_string(parsed.process_name) ?? null }
      if exists(parsed.process_path) { .udm.process_path = to_string(parsed.process_path) ?? null }
      if exists(parsed.process_sha256) { .udm.process_hash = to_string(parsed.process_sha256) ?? null }
      if exists(parsed.process_cmdline) { .udm.command_line = to_string(parsed.process_cmdline) ?? null }
      if exists(parsed.process_pid) { .udm.process_id = to_string(parsed.process_pid) ?? null }
      if exists(parsed.process_guid) { .udm.process_guid = to_string(parsed.process_guid) ?? null }

      # Parent process
      if exists(parsed.parent_name) { .udm.parent_process_name = to_string(parsed.parent_name) ?? null }
      if exists(parsed.parent_path) { .udm.parent_process_path = to_string(parsed.parent_path) ?? null }
      if exists(parsed.parent_sha256) { .ext.parent_sha256 = to_string(parsed.parent_sha256) ?? null }
      if exists(parsed.parent_cmdline) { .udm.parent_command_line = to_string(parsed.parent_cmdline) ?? null }
      if exists(parsed.parent_pid) { .udm.parent_process_id = to_string(parsed.parent_pid) ?? null }
      if exists(parsed.parent_guid) { .ext.parent_guid = to_string(parsed.parent_guid) ?? null }

      # ------------------------------------------------------------------
      # ALERT events
      # ------------------------------------------------------------------
      if event_type == "alert" {
          # Timestamp
          if exists(parsed.backend_timestamp) {
              ts, ts_err = parse_timestamp(to_string(parsed.backend_timestamp) ?? "", "%+")
              if ts_err == null {
                  .udm.timestamp = ts
              }
          }
          if !exists(.udm.timestamp) || .udm.timestamp == null {
              if exists(parsed.first_event_timestamp) {
                  ts2, ts2_err = parse_timestamp(to_string(parsed.first_event_timestamp) ?? "", "%+")
                  if ts2_err == null {
                      .udm.timestamp = ts2
                  }
              }
          }

          # Severity — CB uses numeric 1-10
          if exists(parsed.severity) {
              sev_num = to_int(parsed.severity) ?? 0
              if sev_num >= 8 {
                  .udm.severity = "critical"
              } else if sev_num >= 6 {
                  .udm.severity = "high"
              } else if sev_num >= 4 {
                  .udm.severity = "medium"
              } else {
                  .udm.severity = "low"
              }
              .ext.severity_score = sev_num
          }

          .udm.action = cb_type
          if exists(parsed.reason) { .ext.reason = to_string(parsed.reason) ?? null }
          if exists(parsed.reason_code) { .ext.reason_code = to_string(parsed.reason_code) ?? null }
          if exists(parsed.threat_id) { .ext.threat_id = to_string(parsed.threat_id) ?? null }
          if exists(parsed.ioc_id) { .ext.ioc_id = to_string(parsed.ioc_id) ?? null }
          if exists(parsed.ioc_hit) { .udm.signature = to_string(parsed.ioc_hit) ?? null }
          if exists(parsed.alert_url) { .ext.alert_url = to_string(parsed.alert_url) ?? null }
          if exists(parsed.id) { .ext.event_id = to_string(parsed.id) ?? null }

          # Sensor action
          if exists(parsed.sensor_action) { .ext.sensor_action = to_string(parsed.sensor_action) ?? null }
          if exists(parsed.run_state) { .ext.run_state = to_string(parsed.run_state) ?? null }
          if exists(parsed.target_value) { .ext.target_value = to_string(parsed.target_value) ?? null }

          # ML classification
          if exists(parsed.ml_classification_final_verdict) {
              .ext.ml_verdict = to_string(parsed.ml_classification_final_verdict) ?? null
          }
          if exists(parsed.ml_classification_global_prevalence) {
              .ext.ml_prevalence = to_string(parsed.ml_classification_global_prevalence) ?? null
          }

          # Workflow
          if exists(parsed.workflow) {
              wf = parsed.workflow
              if exists(wf.state) { .udm.status = to_string(wf.state) ?? null }
              if exists(wf.remediation) { .ext.remediation = to_string(wf.remediation) ?? null }
          }

          # Policy
          if exists(parsed.policy_name) { .ext.policy_name = to_string(parsed.policy_name) ?? null }
          if exists(parsed.policy_id) { .ext.policy_id = to_string(parsed.policy_id) ?? null }

          # Report
          if exists(parsed.report_name) { .udm.rule_name = to_string(parsed.report_name) ?? null }
          if exists(parsed.report_id) { .udm.rule_id = to_string(parsed.report_id) ?? null }

          # TTPs — extract MITRE T-numbers
          if exists(parsed.ttps) {
              ttps_arr = array!(parsed.ttps)
              mitre_ids = []
              for_each(ttps_arr) -> |_i, ttp| {
                  ttp_str = to_string(ttp) ?? ""
                  # Extract T-number patterns like T1059
                  matched, m_err = parse_regex(ttp_str, r'(?P<tid>T\d{4}(?:\.\d{3})?)')
                  if m_err == null {
                      tid = string!(matched.tid)
                      if tid != "" {
                          mitre_ids = push(mitre_ids, tid)
                      }
                  }
              }
              if length(mitre_ids) > 0 {
                  .udm.mitre_technique_id = join!(unique(mitre_ids), ",")
              }
              # Store full TTPs too
              ttp_strs = []
              for_each(ttps_arr) -> |_j, ttp2| {
                  s = to_string(ttp2) ?? ""
                  if s != "" {
                      ttp_strs = push(ttp_strs, s)
                  }
              }
              if length(ttp_strs) > 0 {
                  .ext.ttps = join!(ttp_strs, ",")
              }
          }

      } else if event_type == "watchlist_hit" {
          # ------------------------------------------------------------------
          # WATCHLIST HIT events
          # ------------------------------------------------------------------
          if exists(parsed.create_time) {
              ts, ts_err = parse_timestamp(to_string(parsed.create_time) ?? "", "%+")
              if ts_err == null {
                  .udm.timestamp = ts
              }
          }

          if exists(parsed.process_username) { .udm.user = to_string(parsed.process_username) ?? null }
          if exists(parsed.id) { .ext.event_id = to_string(parsed.id) ?? null }

          # Watchlist info
          if exists(parsed.watchlists) {
              wl_arr = array!(parsed.watchlists)
              wl_names = []
              for_each(wl_arr) -> |_i, wl| {
                  wl_name = to_string(wl.name) ?? ""
                  if wl_name != "" {
                      wl_names = push(wl_names, wl_name)
                  }
              }
              if length(wl_names) > 0 {
                  .ext.watchlist_names = join!(wl_names, ",")
              }
          }

          # Report info with severity
          if exists(parsed.report) {
              rpt = parsed.report
              if exists(rpt.name) { .udm.rule_name = to_string(rpt.name) ?? null }
              if exists(rpt.id) { .udm.rule_id = to_string(rpt.id) ?? null }
              if exists(rpt.severity) {
                  rpt_sev = to_int(rpt.severity) ?? 0
                  if rpt_sev >= 8 {
                      .udm.severity = "critical"
                  } else if rpt_sev >= 6 {
                      .udm.severity = "high"
                  } else if rpt_sev >= 4 {
                      .udm.severity = "medium"
                  } else {
                      .udm.severity = "low"
                  }
                  .ext.severity_score = rpt_sev
              }
              # Extract MITRE from report tags
              if exists(rpt.tags) {
                  tags_arr = array!(rpt.tags)
                  mitre_ids = []
                  for_each(tags_arr) -> |_i, tag| {
                      tag_str = to_string(tag) ?? ""
                      matched, m_err = parse_regex(tag_str, r'(?P<tid>[tT]\d{4}(?:\.\d{3})?)')
                      if m_err == null {
                          tid = upcase(string!(matched.tid))
                          if tid != "" {
                              mitre_ids = push(mitre_ids, tid)
                          }
                      }
                  }
                  if length(mitre_ids) > 0 {
                      .udm.mitre_technique_id = join!(unique(mitre_ids), ",")
                  }
              }
          }

          .udm.action = cb_type

      } else {
          # ------------------------------------------------------------------
          # Generic process/other event
          # ------------------------------------------------------------------
          if exists(parsed.create_time) {
              ts, ts_err = parse_timestamp(to_string(parsed.create_time) ?? "", "%+")
              if ts_err == null {
                  .udm.timestamp = ts
              }
          }
          .udm.action = cb_type
      }

      # Default timestamp
      if !exists(.udm.timestamp) || .udm.timestamp == null {
          .udm.timestamp = now()
      }
  } else {
      .udm.timestamp = now()
      .ext.raw_message = raw_log
      .ext.parse_error = to_string(err)
  }
