name: sonicwall
display_name: SonicWall
version: "1.0.0"
description: "Parses SonicWall firewall syslog events including connections, IPS, content filtering, and VPN"
match_values:
  - sonicwall
  - sonic_wall
  - sonicwall_fw
category: network
vendor: "SonicWall"
product: "Firewall"
parser_vrl: |
  # SonicWall Firewall Parser
  # Handles connection open/close, IPS, content filtering, user auth events
  # Format: key=value pairs with quoted values, src/dst in ip:port:interface format

  # Initialize required structures
  .udm = {}
  .ext = {}
  .metadata = {}

  # Set defaults
  .udm.timestamp = now()
  .udm.vendor = "SonicWall"
  .udm.product = "Firewall"
  .udm.vendor_product = "SonicWall Firewall"

  # Get raw log
  raw_log = string!(.message)

  # Parse key=value pairs (supports quoted values)
  parsed = parse_key_value(raw_log, key_value_delimiter: "=", field_delimiter: " ") ?? {}

  # --- Timestamp ---
  if exists(parsed.time) {
      time_str = string!(parsed.time)
      # Strip timezone suffix (UTC, EST, etc.) since VRL %Z doesn't work reliably
      clean_time, tz_err = parse_regex(time_str, r'^(?P<dt>\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2}:\d{2})\s*(?P<tz>\S+)?$')
      if tz_err == null && clean_time != null {
          ts, ts_err = parse_timestamp(string!(clean_time.dt), "%Y-%m-%d %H:%M:%S")
          if ts_err == null {
              .udm.timestamp = format_timestamp!(ts, format: "%Y-%m-%d %H:%M:%S")
          }
      }
  }

  # --- Device info ---
  if exists(parsed.fw) { .udm.dvc_ip = string!(parsed.fw) }
  if exists(parsed.sn) { .ext.serial = string!(parsed.sn) }

  # --- Message ID (m=) and category (c=) ---
  if exists(parsed.m) { .udm.signature_id = string!(parsed.m) }
  if exists(parsed.c) { .ext.message_category = string!(parsed.c) }
  if exists(parsed.n) { .ext.event_counter = to_int(parsed.n) ?? null }

  # --- Priority ---
  if exists(parsed.pri) {
      pri = to_int(parsed.pri) ?? null
      if pri != null {
          .ext.priority = pri
          if pri == 1 { .udm.severity = "critical" } else if pri == 2 { .udm.severity = "high" } else if (pri >= 3 && pri <= 4) ?? false { .udm.severity = "medium" } else if pri == 5 { .udm.severity = "low" } else { .udm.severity = "informational" }
      }
  }

  # --- Message → action mapping ---
  if exists(parsed.msg) {
      msg = string!(parsed.msg)
      .ext.message = msg
      msg_lower = downcase(msg)
      if contains(msg_lower, "connection opened") {
          .udm.event_type = "allow"
          .metadata.event_category = "network"
      } else if contains(msg_lower, "connection closed") {
          .udm.event_type = "close"
          .metadata.event_category = "network"
      } else if contains(msg_lower, "connection dropped") {
          .udm.event_type = "drop"
          .metadata.event_category = "network"
      } else if contains(msg_lower, "ips detection") {
          .udm.event_type = "alert"
          .metadata.event_category = "intrusion"
      } else if contains(msg_lower, "web site hit") {
          .udm.event_type = "allow"
          .metadata.event_category = "web"
      } else if contains(msg_lower, "web site blocked") {
          .udm.event_type = "block"
          .metadata.event_category = "web"
      } else if contains(msg_lower, "login successful") {
          .udm.event_type = "login"
          .udm.auth_result = "success"
          .metadata.event_category = "authentication"
      } else if contains(msg_lower, "login failed") {
          .udm.event_type = "login"
          .udm.auth_result = "failure"
          .metadata.event_category = "authentication"
      } else if contains(msg_lower, "logout") {
          .udm.event_type = "logout"
          .metadata.event_category = "authentication"
      } else {
          .metadata.event_category = "system"
      }
  }

  # --- Source: ip:port:interface ---
  if exists(parsed.src) {
      src_str = string!(parsed.src)
      src_parts, src_err = parse_regex(src_str, r'^(?P<ip>[^:]+):(?P<port>\d+):(?P<iface>\S+)$')
      if src_err == null && src_parts != null {
          .udm.src_ip = string!(src_parts.ip)
          .udm.src_port = to_int(src_parts.port) ?? null
          .udm.src_interface = string!(src_parts.iface)
      } else {
          # Try ip:port format
          src_parts2, src_err2 = parse_regex(src_str, r'^(?P<ip>[^:]+):(?P<port>\d+)$')
          if src_err2 == null && src_parts2 != null {
              .udm.src_ip = string!(src_parts2.ip)
              .udm.src_port = to_int(src_parts2.port) ?? null
          } else {
              # IP only
              .udm.src_ip = src_str
          }
      }
  }

  # --- Destination: ip:port:interface ---
  if exists(parsed.dst) {
      dst_str = string!(parsed.dst)
      dst_parts, dst_err = parse_regex(dst_str, r'^(?P<ip>[^:]+):(?P<port>\d+):(?P<iface>\S+)$')
      if dst_err == null && dst_parts != null {
          .udm.dest_ip = string!(dst_parts.ip)
          .udm.dest_port = to_int(dst_parts.port) ?? null
          .udm.dest_interface = string!(dst_parts.iface)
      } else {
          dst_parts2, dst_err2 = parse_regex(dst_str, r'^(?P<ip>[^:]+):(?P<port>\d+)$')
          if dst_err2 == null && dst_parts2 != null {
              .udm.dest_ip = string!(dst_parts2.ip)
              .udm.dest_port = to_int(dst_parts2.port) ?? null
          } else {
              .udm.dest_ip = dst_str
          }
      }
  }

  # --- Protocol: tcp/https → tcp ---
  if exists(parsed.proto) {
      proto_raw = downcase(string!(parsed.proto))
      proto_parts, proto_err = parse_regex(proto_raw, r'^(?P<proto>[^/]+)')
      if proto_err == null && proto_parts != null {
          .udm.protocol = string!(proto_parts.proto)
      } else {
          .udm.protocol = proto_raw
      }
      .ext.protocol_detail = proto_raw
  }

  # --- Bytes and packets ---
  if exists(parsed.sent) { .udm.bytes_out = to_int(parsed.sent) ?? null }
  if exists(parsed.rcvd) { .udm.bytes_in = to_int(parsed.rcvd) ?? null }
  if exists(parsed.spkt) { .udm.packets_out = to_int(parsed.spkt) ?? null }
  if exists(parsed.rpkt) { .udm.packets_in = to_int(parsed.rpkt) ?? null }

  # --- Rule ---
  if exists(parsed.rule) { .udm.rule_name = string!(parsed.rule) }

  # --- Firewall action ---
  if exists(parsed.fw_action) {
      fw_act = downcase(string!(parsed.fw_action))
      if fw_act != "na" {
          .udm.event_type = fw_act
      }
  }

  # --- User ---
  if exists(parsed.usr) { .udm.user = string!(parsed.usr) }

  # --- IPS fields ---
  if exists(parsed.attack_name) { .udm.signature = string!(parsed.attack_name) }
  if exists(parsed.sid) { .ext.ips_sid = string!(parsed.sid) }
  if exists(parsed.ipscat) {
      ipscat = downcase(string!(parsed.ipscat))
      .udm.severity = ipscat
  }
  if exists(parsed.ipspri) { .ext.ips_priority = to_int(parsed.ipspri) ?? null }
  if exists(parsed.ips_policy_id) { .ext.ips_policy_id = string!(parsed.ips_policy_id) }

  # --- Content filter / Category ---
  if exists(parsed.Category) { .udm.category = string!(parsed.Category) }

  # --- URL fields ---
  if exists(parsed.dstname) { .udm.url_domain = string!(parsed.dstname) }
  if exists(parsed.arg) { .ext.url_path = string!(parsed.arg) }
  # Build URL if both dstname and arg exist
  if exists(parsed.dstname) && exists(parsed.arg) {
      dstname = string!(parsed.dstname)
      arg = string!(parsed.arg)
      .udm.url = "https://" + dstname + arg
  }

  # --- ID type ---
  if exists(parsed.id) { .ext.log_type = string!(parsed.id) }

  # --- Final: set .message to raw log ---
  .message = raw_log
