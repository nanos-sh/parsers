name: azure_firewall
display_name: Azure Firewall
version: "1.0.0"
description: "Parses Azure Firewall network, application, NAT, DNS, and threat intelligence logs"
match_values:
  - azure_firewall
  - azure_fw
category: cloud
vendor: "Microsoft"
product: "Azure Firewall"
parser_vrl: |
  # Azure Firewall Parser
  # Parses Azure Firewall JSON logs (Network, Application, ThreatIntel, DNS)

  # Initialize required structures
  .udm = {}
  .ext = {}
  .metadata = {}

  # Set defaults
  .udm.timestamp = now()
  .udm.cloud_provider = "azure"
  .udm.cloud_service = "firewall"

  # Get raw log content
  raw_log = to_string(.message) ?? ""

  # Parse JSON
  parsed, err = parse_json(raw_log)

  if err == null {
      # --- Timestamp ---
      if exists(parsed.time) {
          ts, ts_err = parse_timestamp(string!(parsed.time), "%+")
          if ts_err == null {
              .udm.timestamp = format_timestamp!(ts, format: "%Y-%m-%d %H:%M:%S")
          }
      }

      # --- Category ---
      log_category = ""
      if exists(parsed.category) {
          log_category = string!(parsed.category)
          .udm.category = log_category
      }

      # --- Resource ID (extract subscription) ---
      if exists(parsed.resourceId) {
          res_id = string!(parsed.resourceId)
          .udm.resource_id = res_id
          # Extract subscription ID from path
          sub_match = parse_regex(res_id, r'(?i)/SUBSCRIPTIONS/(?P<sub>[^/]+)/') ?? {}
          sub_id = string!(sub_match.sub)
          if sub_id != "" {
              .udm.cloud_account_id = sub_id
          }
      }

      # --- Operation Name ---
      if exists(parsed.operationName) {
          .ext.operation_name = string!(parsed.operationName)
      }

      # --- Properties ---
      if exists(parsed.properties) {
          props = parsed.properties

          # Source IP
          if exists(props.SourceIP) {
              .udm.src_ip = string!(props.SourceIP)
          }

          # Source Port
          if exists(props.SourcePort) {
              .udm.src_port = string!(props.SourcePort)
          }

          # Destination IP
          if exists(props.DestinationIP) {
              .udm.dest_ip = string!(props.DestinationIP)
          }

          # Destination Port
          if exists(props.DestinationPort) {
              .udm.dest_port = string!(props.DestinationPort)
          }

          # Protocol
          if exists(props.Protocol) {
              .udm.protocol = string!(props.Protocol)
          }

          # Action
          if exists(props.Action) {
              .udm.action = string!(props.Action)
          }

          # Rule
          if exists(props.Rule) {
              .udm.rule_name = string!(props.Rule)
          }

          # Rule Collection
          if exists(props.RuleCollection) {
              .ext.rule_collection = string!(props.RuleCollection)
          }

          # Rule Collection Group
          if exists(props.RuleCollectionGroup) {
              .ext.rule_collection_group = string!(props.RuleCollectionGroup)
          }

          # Policy
          if exists(props.Policy) {
              .ext.policy = string!(props.Policy)
          }

          # --- Application Rule specific ---
          # FQDN
          if exists(props.FQDN) {
              .udm.url_domain = string!(props.FQDN)
          }

          # Target URL
          if exists(props.TargetUrl) {
              target_url = string!(props.TargetUrl)
              .udm.url = target_url
              # If no FQDN set, try to extract domain from TargetUrl
              if !exists(props.FQDN) {
                  url_parts = split(target_url, "/")
                  if length(url_parts) > 0 {
                      .udm.url_domain = url_parts[0]
                  }
              }
          }

          # --- Threat Intelligence ---
          if exists(props.ThreatIntel) {
              threat_val = string!(props.ThreatIntel)
              if threat_val != "No threat detected" && threat_val != "" {
                  .udm.signature = threat_val
                  .udm.severity = "high"
              }
              .ext.threat_intel = threat_val
          }

          # --- DNS Proxy specific ---
          if exists(props.QueryName) {
              .ext.dns_query = string!(props.QueryName)
              .udm.url_domain = string!(props.QueryName)
          }

          if exists(props.QueryType) {
              .ext.dns_query_type = string!(props.QueryType)
          }

          if exists(props.QueryClass) {
              .ext.dns_query_class = string!(props.QueryClass)
          }

          if exists(props.QueryId) {
              .ext.dns_query_id = string!(props.QueryId)
          }

          if exists(props.Reason) {
              .ext.reason = string!(props.Reason)
          }

          # --- msg field (raw message from Azure) ---
          if exists(props.msg) {
              .ext.raw_msg = string!(props.msg)
          }
      }

      # --- Set severity based on category ---
      if log_category == "AzureFirewallThreatIntel" {
          if !exists(.udm.severity) {
              .udm.severity = "high"
          }
      } else if log_category == "AzureFirewallDnsProxy" {
          .udm.protocol = "DNS"
      }

  } else {
      .metadata.parse_error = to_string(err)
  }

  # Set parser name
  .metadata.parser = "azure_firewall"

  # Preserve raw log
  .message = raw_log
