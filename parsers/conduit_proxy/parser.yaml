name: conduit_proxy
display_name: Conduit MITM Proxy
version: "1.0.0"
description: "Parses Conduit MITM proxy logs. Captures HTTP/HTTPS requests with TLS interception status, threat scoring, DLP matches, and upstream connection details."
match_values:
  - conduit
  - conduit_proxy
  - conduit-proxy
category: network
vendor: "Conduit"
product: "Conduit Proxy"

parser_vrl: |
  .udm = {}
  .ext = {}

  raw_log = string!(.message)
  parsed, err = parse_json(raw_log)

  if err == null {
      # ---------------------------------------------------------------
      # Detect log format: access log vs proxy internal log
      # ---------------------------------------------------------------
      is_internal_log = exists(parsed.level) && exists(parsed.fields) && !exists(parsed.client_ip)

      if is_internal_log {
          # Pingora/Conduit internal log (errors, warnings, info)
          level = downcase(string(parsed.level) ?? "")
          msg = string(parsed.fields.message) ?? ""
          target = string(parsed.target) ?? ""

          .udm.action = if level == "error" { "proxy_error" } else if level == "warn" { "proxy_warning" } else { "proxy_info" }
          .udm.category = "web_proxy"
          .udm.vendor = "Conduit"
          .udm.product = "Conduit Proxy"
          .ext.log_level = level
          .ext.log_target = target
          .ext.proxy_message = msg

          if level == "error" {
              .udm.severity = "high"
          } else if level == "warn" {
              .udm.severity = "medium"
          }

          # Try to extract host from the message
          host_match, host_err = parse_regex(msg, r'Host: (?P<host>[^\s,]+)')
          if host_err == null {
              .udm.dest_host = host_match.host
          }

          # Try to extract status code
          status_match, status_err = parse_regex(msg, r'status: (?P<code>\d+)')
          if status_err == null {
              .udm.http_status_code = to_int(status_match.code) ?? null
          }

          # Timestamp
          if exists(parsed.timestamp) {
              ts, ts_err = parse_timestamp(string!(parsed.timestamp), "%+")
              if ts_err == null {
                  .udm.timestamp = ts
              }
          }

      } else {

      # ---------------------------------------------------------------
      # Core network fields (access log format)
      # ---------------------------------------------------------------
      .udm.src_ip = string(parsed.client_ip) ?? null
      .udm.dest_host = string(parsed.host) ?? null
      .udm.dest_port = to_int(parsed.port) ?? null
      .udm.url = string(parsed.full_url) ?? null
      .udm.url_domain = string(parsed.host) ?? null
      .udm.uri_path = string(parsed.path) ?? null
      .udm.http_method = string(parsed.method) ?? null
      .udm.http_status_code = to_int(parsed.status_code) ?? null
      .udm.bytes_in = to_int(parsed.request_bytes) ?? null
      .udm.bytes_out = to_int(parsed.response_bytes) ?? null
      .udm.duration = to_int(parsed.duration_ms) ?? null
      .udm.protocol = string(parsed.scheme) ?? null

      # Upstream (destination server)
      upstream = string(parsed.upstream_addr) ?? ""
      if upstream != "" {
          parts = split(upstream, ":")
          if length(parts) == 2 {
              .udm.dest_ip = parts[0]
          }
      }

      # User if authenticated
      .udm.user = string(parsed.username) ?? null
      .ext.auth_method = string(parsed.auth_method) ?? null

      # Timestamp
      if exists(parsed.timestamp) {
          ts, ts_err = parse_timestamp(string!(parsed.timestamp), "%+")
          if ts_err == null {
              .udm.timestamp = ts
          }
      }

      # ---------------------------------------------------------------
      # Action and category
      # ---------------------------------------------------------------
      action_raw = string(parsed.action) ?? "unknown"
      .udm.action = action_raw
      .udm.category = "web_proxy"

      # Blocked requests get elevated severity
      threat_blocked = bool(parsed.threat_blocked) ?? false
      if threat_blocked {
          .udm.action = "blocked"
          .udm.severity = "high"
      }

      # ---------------------------------------------------------------
      # TLS interception
      # ---------------------------------------------------------------
      tls_intercepted = bool(parsed.tls_intercepted) ?? false
      .ext.tls_intercepted = if tls_intercepted { "true" } else { "false" }

      # ---------------------------------------------------------------
      # Threat intelligence
      # ---------------------------------------------------------------
      threat_score = to_float(parsed.threat_score) ?? 0.0
      .ext.threat_score = to_string(threat_score)
      .ext.threat_tier = string(parsed.threat_tier) ?? null

      # Surface threat signals as comma-separated string
      if exists(parsed.threat_signals) && is_array(parsed.threat_signals) {
          signals = array!(parsed.threat_signals)
          signal_parts = []
          for_each(signals) -> |_i, signal| {
              name = string(signal.name) ?? "unknown"
              signal_parts = push(signal_parts, name)
          }
          if length(signal_parts) > 0 {
              .ext.threat_signals = join!(signal_parts, ", ")
          }
      }

      # Set severity based on threat score
      if !threat_blocked {
          if threat_score >= 0.8 {
              .udm.severity = "high"
          } else if threat_score >= 0.5 {
              .udm.severity = "medium"
          } else if threat_score >= 0.2 {
              .udm.severity = "low"
          }
      }

      # ---------------------------------------------------------------
      # DLP matches
      # ---------------------------------------------------------------
      if exists(parsed.dlp_matches) && is_array(parsed.dlp_matches) {
          .ext.dlp_matches = join!(array!(parsed.dlp_matches), ", ")
          # DLP match always bumps severity
          if !threat_blocked {
              .udm.severity = "medium"
          }
      }

      # ---------------------------------------------------------------
      # Extended fields
      # ---------------------------------------------------------------
      .ext.content_type = string(parsed.content_type) ?? null
      .ext.cache_status = string(parsed.cache_status) ?? null
      .ext.rule_id = string(parsed.rule_id) ?? null
      .ext.category = string(parsed.category) ?? null
      # upstream_addr already extracted to udm.dest_ip above

      # ---------------------------------------------------------------
      # Vendor/product
      # ---------------------------------------------------------------
      .udm.vendor = "Conduit"
      .udm.product = "Conduit Proxy"
      status_code_val = to_int(parsed.status_code) ?? 0
      if status_code_val > 0 {
          .udm.signature_id = to_string(status_code_val)
      }

      } # end access log else

  } else {
      .metadata.parse_error = to_string(err)
  }

  .message = raw_log
