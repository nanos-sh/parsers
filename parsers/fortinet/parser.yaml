name: fortinet
display_name: Fortinet FortiGate
version: "1.0.0"
description: "Parses Fortinet FortiGate firewall logs including traffic (forward/local/sniffer), UTM (webfilter, app-ctrl, dns, ips, virus, email-filter, dlp), and event (system, user, vpn) subtypes with full UDM mapping"
match_values:
  - fortinet
  - fortigate
  - fortinet_fortigate
  - fgt
category: network
vendor: "Fortinet"
product: "FortiGate"
parser_vrl: |
  # Fortinet FortiGate Parser
  # Handles traffic, UTM, and event log types with all subtypes
  # Format: syslog with key=value pairs, values optionally double-quoted

  # Initialize required structures
  .udm = {}
  .ext = {}
  .metadata = {}

  # Set defaults
  .udm.timestamp = now()
  .udm.vendor = "Fortinet"
  .udm.product = "FortiGate"

  # Get raw log
  raw_log = string!(.message)

  # Strip syslog PRI header if present: <189>...
  stripped = raw_log
  pri_match, pri_err = parse_regex(raw_log, r'^<(?P<pri>\d+)>(?P<body>.*)$')
  if pri_err == null && pri_match != null {
      stripped = string!(pri_match.body)
      pri_val = to_int(pri_match.pri) ?? null
      if pri_val != null {
          .ext.syslog_priority = pri_val
          # Extract facility and severity from PRI
          .ext.syslog_facility = (pri_val / 8) ?? 0
          .ext.syslog_severity = mod(pri_val, 8) ?? 0
      }
  }

  # Parse key=value pairs
  parsed = parse_key_value(stripped, key_value_delimiter: "=", field_delimiter: " ") ?? {}

  # --- Timestamp ---
  # Combine date + time fields into a proper timestamp
  if exists(parsed.date) && exists(parsed.time) {
      date_str = string!(parsed.date)
      time_str = string!(parsed.time)
      combined_ts = date_str + " " + time_str
      ts, ts_err = parse_timestamp(combined_ts, "%Y-%m-%d %H:%M:%S")
      if ts_err == null {
          .udm.timestamp = format_timestamp!(ts, format: "%Y-%m-%d %H:%M:%S")
      }
  }

  # If eventtime is available (epoch with optional nanoseconds), prefer it
  if exists(parsed.eventtime) {
      et_str = string!(parsed.eventtime)
      et_val = to_int(et_str) ?? null
      if et_val != null {
          # eventtime > 10^15 means nanoseconds, > 10^12 means microseconds, > 10^9 means milliseconds
          if (et_val > 1000000000000000) ?? false {
              # Nanoseconds - convert to seconds
              et_secs = (et_val / 1000000000) ?? 0
              ts_from_epoch, epoch_err = from_unix_timestamp(et_secs)
              if epoch_err == null {
                  .udm.timestamp = format_timestamp!(ts_from_epoch, format: "%Y-%m-%d %H:%M:%S")
              }
          } else if (et_val > 1000000000000) ?? false {
              # Microseconds
              et_secs = (et_val / 1000000) ?? 0
              ts_from_epoch, epoch_err = from_unix_timestamp(et_secs)
              if epoch_err == null {
                  .udm.timestamp = format_timestamp!(ts_from_epoch, format: "%Y-%m-%d %H:%M:%S")
              }
          } else if (et_val > 1000000000) ?? false {
              # Milliseconds or seconds
              ts_from_epoch, epoch_err = from_unix_timestamp(et_val)
              if epoch_err == null {
                  .udm.timestamp = format_timestamp!(ts_from_epoch, format: "%Y-%m-%d %H:%M:%S")
              }
          }
      }
  }

  # If timezone is present, store it
  if exists(parsed.tz) { .ext.timezone = string!(parsed.tz) }

  # --- Device info ---
  if exists(parsed.devname) { .udm.dvc = string!(parsed.devname) }
  if exists(parsed.devid) { .ext.device_id = string!(parsed.devid) }

  # --- Log metadata ---
  log_type = ""
  log_subtype = ""
  if exists(parsed.type) { log_type = downcase(string!(parsed.type)); .metadata.log_type = log_type }
  if exists(parsed.subtype) { log_subtype = downcase(string!(parsed.subtype)); .metadata.log_subtype = log_subtype }
  if exists(parsed.eventtype) { .metadata.event_type = string!(parsed.eventtype) }
  if exists(parsed.logid) { .ext.log_id = string!(parsed.logid) }
  if exists(parsed.logdesc) { .udm.description = string!(parsed.logdesc) }

  # --- Severity mapping ---
  if exists(parsed.level) {
      level = downcase(string!(parsed.level))
      .udm.severity = level
      .ext.fortigate_level = level
  }

  # --- Virtual domain ---
  if exists(parsed.vd) { .ext.virtual_domain = string!(parsed.vd) }

  # --- Network fields ---
  if exists(parsed.srcip) { .udm.src_ip = string!(parsed.srcip) }
  if exists(parsed.dstip) { .udm.dest_ip = string!(parsed.dstip) }
  if exists(parsed.srcport) { .udm.src_port = to_int(parsed.srcport) ?? null }
  if exists(parsed.dstport) { .udm.dest_port = to_int(parsed.dstport) ?? null }
  if exists(parsed.srcintf) { .udm.src_interface = string!(parsed.srcintf) }
  if exists(parsed.dstintf) { .udm.dest_interface = string!(parsed.dstintf) }
  if exists(parsed.srcintfrole) { .ext.src_interface_role = string!(parsed.srcintfrole) }
  if exists(parsed.dstintfrole) { .ext.dest_interface_role = string!(parsed.dstintfrole) }

  # --- Protocol mapping (number → name) ---
  if exists(parsed.proto) {
      proto_num = to_int(parsed.proto) ?? null
      if proto_num != null {
          .ext.protocol_number = proto_num
          if proto_num == 1 { .udm.protocol = "icmp" } else if proto_num == 2 { .udm.protocol = "igmp" } else if proto_num == 6 { .udm.protocol = "tcp" } else if proto_num == 17 { .udm.protocol = "udp" } else if proto_num == 41 { .udm.protocol = "ipv6" } else if proto_num == 47 { .udm.protocol = "gre" } else if proto_num == 50 { .udm.protocol = "esp" } else if proto_num == 51 { .udm.protocol = "ah" } else if proto_num == 58 { .udm.protocol = "icmpv6" } else if proto_num == 89 { .udm.protocol = "ospf" } else if proto_num == 132 { .udm.protocol = "sctp" } else { .udm.protocol = to_string!(proto_num) }
      }
  }

  # --- Bytes and packets ---
  if exists(parsed.sentbyte) { .udm.bytes_out = to_int(parsed.sentbyte) ?? null }
  if exists(parsed.rcvdbyte) { .udm.bytes_in = to_int(parsed.rcvdbyte) ?? null }
  if exists(parsed.sentpkt) { .udm.packets_out = to_int(parsed.sentpkt) ?? null }
  if exists(parsed.rcvdpkt) { .udm.packets_in = to_int(parsed.rcvdpkt) ?? null }
  if exists(parsed.sentdelta) { .ext.bytes_out_delta = to_int(parsed.sentdelta) ?? null }
  if exists(parsed.rcvddelta) { .ext.bytes_in_delta = to_int(parsed.rcvddelta) ?? null }

  # --- Duration ---
  if exists(parsed.duration) { .udm.duration = to_int(parsed.duration) ?? null }

  # --- Direction ---
  if exists(parsed.direction) { .udm.direction = downcase(string!(parsed.direction)) }

  # --- Session ---
  if exists(parsed.sessionid) { .udm.session_id = string!(parsed.sessionid) }

  # --- Action ---
  if exists(parsed.action) { .udm.action = downcase(string!(parsed.action)) }

  # --- User ---
  if exists(parsed.user) { .udm.user = string!(parsed.user) }
  if exists(parsed.srcuser) { .udm.src_user = string!(parsed.srcuser) }
  if exists(parsed.group) { .ext.user_group = string!(parsed.group) }
  if exists(parsed.authserver) { .ext.auth_server = string!(parsed.authserver) }

  # --- Service ---
  if exists(parsed.service) { .ext.service_name = string!(parsed.service) }

  # --- Application ---
  if exists(parsed.app) { .udm.app = string!(parsed.app) }
  if exists(parsed.appcat) { .ext.app_category = string!(parsed.appcat) }
  if exists(parsed.applist) { .ext.app_list = string!(parsed.applist) }
  if exists(parsed.apprisk) {
      apprisk = downcase(string!(parsed.apprisk))
      .udm.risk_level = apprisk
  }

  # --- Policy ---
  if exists(parsed.policyid) { .udm.rule_id = string!(parsed.policyid) }
  if exists(parsed.policyname) { .udm.rule_name = string!(parsed.policyname) }
  if exists(parsed.policytype) { .ext.policy_type = string!(parsed.policytype) }
  if exists(parsed.poluuid) { .ext.policy_uuid = string!(parsed.poluuid) }

  # --- NAT / Translation ---
  if exists(parsed.trandisp) { .ext.translation_disposition = string!(parsed.trandisp) }
  if exists(parsed.transip) { .udm.src_translated_ip = string!(parsed.transip) }
  if exists(parsed.transport) { .udm.src_translated_port = to_int(parsed.transport) ?? null }
  if exists(parsed.tranip) { .udm.dest_translated_ip = string!(parsed.tranip) }
  if exists(parsed.tranport) { .udm.dest_translated_port = to_int(parsed.tranport) ?? null }

  # --- Country ---
  if exists(parsed.srccountry) { .ext.src_country = string!(parsed.srccountry) }
  if exists(parsed.dstcountry) { .ext.dest_country = string!(parsed.dstcountry) }

  # --- Message ---
  if exists(parsed.msg) { .ext.message = string!(parsed.msg) }

  # --- Threat / risk scores ---
  if exists(parsed.crscore) { .udm.risk_score = to_int(parsed.crscore) ?? null }
  if exists(parsed.craction) { .ext.cr_action = to_int(parsed.craction) ?? null }
  if exists(parsed.crlevel) { .udm.risk_level = downcase(string!(parsed.crlevel)) }

  # --- VLAN / VWL ---
  if exists(parsed.vwlid) { .ext.vwl_id = to_int(parsed.vwlid) ?? null }

  # --- Profile ---
  if exists(parsed.profile) { .ext.security_profile = string!(parsed.profile) }

  # ============================================================
  # TYPE-SPECIFIC PROCESSING
  # ============================================================

  # --- TRAFFIC TYPE ---
  if log_type == "traffic" {
      .metadata.event_category = "network"

      # Status field for traffic
      if exists(parsed.status) { .udm.status = string!(parsed.status) }
  }

  # --- UTM TYPE ---
  if log_type == "utm" {

      # --- UTM: webfilter ---
      if log_subtype == "webfilter" {
          .metadata.event_category = "web"

          if exists(parsed.hostname) { .udm.url_domain = string!(parsed.hostname) }
          if exists(parsed.url) {
              url_path = string!(parsed.url)
              # Build full URL if hostname is available
              if exists(parsed.hostname) {
                  hostname = string!(parsed.hostname)
                  proto_prefix = "http://"
                  if exists(parsed.dstport) {
                      dstport = to_int(parsed.dstport) ?? 0
                      if dstport == 443 { proto_prefix = "https://" }
                  }
                  if exists(parsed.service) {
                      svc = upcase(string!(parsed.service))
                      if svc == "HTTPS" || svc == "SSL" { proto_prefix = "https://" }
                  }
                  .udm.url = proto_prefix + hostname + url_path
              } else {
                  .udm.url = url_path
              }
          }
          if exists(parsed.catdesc) { .udm.category = string!(parsed.catdesc) }
          if exists(parsed.cat) { .ext.webfilter_category_id = to_int(parsed.cat) ?? null }
          if exists(parsed.reqtype) { .ext.request_type = string!(parsed.reqtype) }
          if exists(parsed.method) { .udm.http_method = upcase(string!(parsed.method)) }
      }

      # --- UTM: app-ctrl (application control) ---
      if log_subtype == "app-ctrl" {
          .metadata.event_category = "application"

          if exists(parsed.app) { .udm.app = string!(parsed.app) }
          if exists(parsed.appcat) { .udm.category = string!(parsed.appcat) }
          if exists(parsed.hostname) { .udm.url_domain = string!(parsed.hostname) }
          if exists(parsed.url) {
              url_path = string!(parsed.url)
              if exists(parsed.hostname) {
                  hostname = string!(parsed.hostname)
                  proto_prefix = "https://"
                  .udm.url = proto_prefix + hostname + url_path
              } else {
                  .udm.url = url_path
              }
          }
          if exists(parsed.appid) { .ext.app_id = to_int(parsed.appid) ?? null }
          if exists(parsed.incidentserialno) { .ext.incident_serial = to_int(parsed.incidentserialno) ?? null }
      }

      # --- UTM: dns ---
      if log_subtype == "dns" {
          .metadata.event_category = "dns"

          if exists(parsed.qname) { .ext.dns_query = string!(parsed.qname) }
          if exists(parsed.qtype) { .ext.dns_query_type = string!(parsed.qtype) }
          if exists(parsed.qtypeval) { .ext.dns_query_type_id = to_int(parsed.qtypeval) ?? null }
          if exists(parsed.qclass) { .ext.dns_query_class = string!(parsed.qclass) }
          if exists(parsed.ipaddr) { .ext.dns_answer = string!(parsed.ipaddr) }
          if exists(parsed.xid) { .ext.dns_transaction_id = to_int(parsed.xid) ?? null }
          if exists(parsed.catdesc) { .udm.category = string!(parsed.catdesc) }
          if exists(parsed.cat) { .ext.dns_category_id = to_int(parsed.cat) ?? null }

          # Map qname to url_domain for correlation
          if exists(parsed.qname) { .udm.url_domain = string!(parsed.qname) }
      }

      # --- UTM: ips (intrusion prevention) ---
      if log_subtype == "ips" {
          .metadata.event_category = "intrusion"

          if exists(parsed.attack) { .udm.signature = string!(parsed.attack) }
          if exists(parsed.attackid) { .udm.signature_id = string!(parsed.attackid) }
          if exists(parsed.severity) { .udm.severity = downcase(string!(parsed.severity)) }
          if exists(parsed.ref) { .ext.reference_url = string!(parsed.ref) }
          if exists(parsed.incidentserialno) { .ext.incident_serial = to_int(parsed.incidentserialno) ?? null }
          if exists(parsed.attackcontextid) { .ext.attack_context_id = string!(parsed.attackcontextid) }
      }

      # --- UTM: virus (antivirus) ---
      if log_subtype == "virus" {
          .metadata.event_category = "malware"

          if exists(parsed.virus) { .udm.signature = string!(parsed.virus) }
          if exists(parsed.virusid) { .udm.signature_id = string!(parsed.virusid) }
          if exists(parsed.dtype) { .ext.detection_type = string!(parsed.dtype) }
          if exists(parsed.filetype) { .ext.file_type = string!(parsed.filetype) }
          if exists(parsed.filename) { .udm.file_path = string!(parsed.filename) }
          if exists(parsed.checksum) { .udm.file_hash = string!(parsed.checksum) }
          if exists(parsed.quarskip) { .ext.quarantine_skip = string!(parsed.quarskip) }
          if exists(parsed.analyticssubmit) { .ext.analytics_submit = string!(parsed.analyticssubmit) }
      }

      # --- UTM: email-filter (antispam) ---
      if log_subtype == "emailfilter" || log_subtype == "email-filter" {
          .metadata.event_category = "email"

          if exists(parsed.from) { .ext.email_from = string!(parsed.from) }
          if exists(parsed.to) { .ext.email_to = string!(parsed.to) }
          if exists(parsed.subject) { .ext.email_subject = string!(parsed.subject) }
          if exists(parsed.sender) { .ext.email_sender = string!(parsed.sender) }
          if exists(parsed.recipient) { .ext.email_recipient = string!(parsed.recipient) }
      }

      # --- UTM: dlp (data loss prevention) ---
      if log_subtype == "dlp" {
          .metadata.event_category = "dlp"

          if exists(parsed.filteridx) { .ext.dlp_filter_index = to_int(parsed.filteridx) ?? null }
          if exists(parsed.filtertype) { .ext.dlp_filter_type = string!(parsed.filtertype) }
          if exists(parsed.filtername) { .ext.dlp_filter_name = string!(parsed.filtername) }
          if exists(parsed.filetype) { .ext.file_type = string!(parsed.filetype) }
          if exists(parsed.filename) { .udm.file_path = string!(parsed.filename) }
          if exists(parsed.filesize) { .ext.file_size = to_int(parsed.filesize) ?? null }
      }

      # --- UTM: anomaly (DoS/anomaly detection) ---
      if log_subtype == "anomaly" {
          .metadata.event_category = "anomaly"

          if exists(parsed.attack) { .udm.signature = string!(parsed.attack) }
          if exists(parsed.attackid) { .udm.signature_id = string!(parsed.attackid) }
          if exists(parsed.ref) { .ext.reference_url = string!(parsed.ref) }
      }
  }

  # --- EVENT TYPE ---
  if log_type == "event" {

      # --- Event: system ---
      if log_subtype == "system" {
          .metadata.event_category = "system"

          if exists(parsed.status) { .udm.status = string!(parsed.status) }
          if exists(parsed.reason) { .ext.reason = string!(parsed.reason) }
          if exists(parsed.sn) { .ext.serial_number = string!(parsed.sn) }

          # Admin login events
          if exists(parsed.ui) {
              ui_str = string!(parsed.ui)
              .ext.admin_interface = ui_str
              # Extract source IP from ui field like "ssh(10.0.0.1)"
              ui_ip_match, ui_ip_err = parse_regex(ui_str, r'.*\((?P<ip>[^)]+)\)')
              if ui_ip_err == null && ui_ip_match != null {
                  if !exists(parsed.srcip) {
                      .udm.src_ip = string!(ui_ip_match.ip)
                  }
              }
          }

          # Map login/logout actions to auth fields
          action_str = downcase(to_string!(.udm.action))
          if action_str == "login" || action_str == "logout" {
              .udm.auth_type = "admin"
              if exists(parsed.status) {
                  status_str = downcase(string!(parsed.status))
                  .udm.auth_result = status_str
              }
          }

          if exists(parsed.profile) { .ext.admin_profile = string!(parsed.profile) }
      }

      # --- Event: user (authentication) ---
      if log_subtype == "user" {
          .metadata.event_category = "authentication"

          if exists(parsed.status) {
              status_str = downcase(string!(parsed.status))
              .udm.auth_result = status_str
          }
          if exists(parsed.authproto) { .udm.auth_type = string!(parsed.authproto) }
          if exists(parsed.reason) { .ext.reason = string!(parsed.reason) }
          if exists(parsed.method) { .ext.auth_method = string!(parsed.method) }
      }

      # --- Event: vpn ---
      if log_subtype == "vpn" {
          .metadata.event_category = "vpn"

          if exists(parsed.tunneltype) { .ext.tunnel_type = string!(parsed.tunneltype) }
          if exists(parsed.tunnelid) { .ext.tunnel_id = to_int(parsed.tunnelid) ?? null }
          if exists(parsed.tunnelip) { .ext.tunnel_ip = string!(parsed.tunnelip) }
          if exists(parsed.remip) { .ext.remote_ip = string!(parsed.remip) }
          if exists(parsed.locip) { .ext.local_ip = string!(parsed.locip) }
          if exists(parsed.vpntunnel) { .ext.vpn_tunnel = string!(parsed.vpntunnel) }
          if exists(parsed.status) { .udm.status = string!(parsed.status) }
          if exists(parsed.reason) { .ext.reason = string!(parsed.reason) }
      }

      # --- Event: ha (high availability) ---
      if log_subtype == "ha" {
          .metadata.event_category = "ha"

          if exists(parsed.status) { .udm.status = string!(parsed.status) }
          if exists(parsed.reason) { .ext.reason = string!(parsed.reason) }
      }

      # --- Event: connector ---
      if log_subtype == "connector" {
          .metadata.event_category = "connector"
      }

      # --- Event: wireless ---
      if log_subtype == "wireless" {
          .metadata.event_category = "wireless"

          if exists(parsed.ssid) { .ext.wifi_ssid = string!(parsed.ssid) }
          if exists(parsed.stamac) { .ext.station_mac = string!(parsed.stamac) }
      }
  }

  # --- ADDITIONAL COMMON FIELDS ---
  # These may appear across multiple types but aren't captured above

  if exists(parsed.hostname) && !exists(.udm.url_domain) {
      .udm.url_domain = string!(parsed.hostname)
  }
  if exists(parsed.dstname) { .udm.dest_host = string!(parsed.dstname) }
  if exists(parsed.srcname) { .udm.src_host = string!(parsed.srcname) }

  # Source zone / dest zone from interface roles or explicit zone fields
  if exists(parsed.srczone) { .udm.src_zone = string!(parsed.srczone) }
  if exists(parsed.dstzone) { .udm.dest_zone = string!(parsed.dstzone) }

  # VLAN
  if exists(parsed.vlanid) { .udm.vlan = to_int(parsed.vlanid) ?? null }

  # Bandwidth / shaping
  if exists(parsed.shaperdropsentbyte) { .ext.shaper_drop_sent_bytes = to_int(parsed.shaperdropsentbyte) ?? null }
  if exists(parsed.shaperdroprcvdbyte) { .ext.shaper_drop_rcvd_bytes = to_int(parsed.shaperdroprcvdbyte) ?? null }
  if exists(parsed.shapersentname) { .ext.shaper_sent_name = string!(parsed.shapersentname) }
  if exists(parsed.shaperrcvdname) { .ext.shaper_rcvd_name = string!(parsed.shaperrcvdname) }
  if exists(parsed.shaperperipdropbyte) { .ext.shaper_per_ip_drop_bytes = to_int(parsed.shaperperipdropbyte) ?? null }

  # FortiGate CVE fields (appears in IPS)
  if exists(parsed.cve) {
      cve_raw = string!(parsed.cve)
      # Multiple CVEs may be comma-separated
      .udm.cve = cve_raw
  }

  # WAD (Web Application Detection) fields
  if exists(parsed.wanoptapptype) { .ext.wanopt_app_type = string!(parsed.wanoptapptype) }
  if exists(parsed.utmaction) { .ext.utm_action = string!(parsed.utmaction) }
  if exists(parsed.utmevent) { .ext.utm_event = string!(parsed.utmevent) }
  if exists(parsed.utmref) { .ext.utm_ref = to_int(parsed.utmref) ?? null }

  # Country enrichment - promote to UDM enrichment fields if available
  if exists(.ext.src_country) {
      country = string!(.ext.src_country)
      if country != "Reserved" && country != "" {
          .udm.enriched_src_country = country
      }
  }
  if exists(.ext.dest_country) {
      country = string!(.ext.dest_country)
      if country != "Reserved" && country != "" {
          .udm.enriched_dest_country = country
      }
  }

  # Set vendor_product
  .udm.vendor_product = "Fortinet FortiGate"

  # --- Final: set .message to raw log ---
  .message = raw_log
