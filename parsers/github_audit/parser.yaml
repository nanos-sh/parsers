name: github_audit
display_name: GitHub Audit Log
version: "1.0.0"
description: "Parses GitHub organization and enterprise audit log events"
match_values:
  - github_audit
  - github
category: cloud
vendor: "GitHub"
product: "GitHub"
parser_vrl: |
  # GitHub Audit Log Parser
  # Parses JSON events from GitHub org/enterprise audit logs

  # Initialize required structures
  .udm = {}
  .ext = {}
  .metadata = {}

  # Set defaults
  .udm.timestamp = now()
  .udm.vendor = "GitHub"
  .udm.product = "GitHub"
  .udm.vendor_product = "GitHub"

  # Get raw log content
  raw_log = to_string(.message) ?? ""

  # Parse JSON
  parsed, err = parse_json(raw_log)

  if err == null {
      .udm.category = "cloud_audit"

      # --- Timestamp ---
      # GitHub uses epoch milliseconds in @timestamp or created_at
      if exists(parsed."@timestamp") {
          ts_ms = to_int(parsed."@timestamp") ?? 0
          if ts_ms > 0 {
              ts_sec = ts_ms / 1000
              ts, ts_err = from_unix_timestamp(int!(ts_sec))
              if ts_err == null {
                  .udm.timestamp = format_timestamp!(ts, format: "%Y-%m-%d %H:%M:%S")
              }
          }
      } else if exists(parsed.created_at) {
          ts_ms = to_int(parsed.created_at) ?? 0
          if ts_ms > 0 {
              ts_sec = ts_ms / 1000
              ts, ts_err = from_unix_timestamp(int!(ts_sec))
              if ts_err == null {
                  .udm.timestamp = format_timestamp!(ts, format: "%Y-%m-%d %H:%M:%S")
              }
          }
      }

      # --- Actor (source user) ---
      if exists(parsed.actor) {
          .udm.user = string!(parsed.actor)
      }
      if exists(parsed.actor_id) {
          .udm.user_id = to_string(parsed.actor_id) ?? ""
      }
      if exists(parsed.actor_ip) {
          .udm.src_ip = string!(parsed.actor_ip)
      }

      # --- Target user ---
      if exists(parsed.user) {
          target_user = string!(parsed.user)
          actor = to_string(parsed.actor) ?? ""
          if target_user != actor {
              .ext.dest_user = target_user
          }
      }
      if exists(parsed.user_id) {
          .ext.target_user_id = to_string(parsed.user_id) ?? ""
      }

      # --- Action ---
      if exists(parsed.action) {
          .udm.event_type = string!(parsed.action)
      }

      # --- Operation type ---
      if exists(parsed.operation_type) {
          .ext.operation_type = string!(parsed.operation_type)
      }

      # --- Organization ---
      if exists(parsed.org) {
          .ext.org = string!(parsed.org)
      }
      if exists(parsed.org_id) {
          .ext.org_id = to_string(parsed.org_id) ?? ""
      }

      # --- Repository ---
      repo_name = ""
      if exists(parsed.repository) {
          repo_name = string!(parsed.repository)
      } else if exists(parsed.repo) {
          repo_name = string!(parsed.repo)
      }
      if repo_name != "" {
          .udm.resource_name = repo_name
          .udm.resource_type = "repository"
      }

      # --- Repository visibility ---
      if exists(parsed.repository_public) {
          .ext.repository_public = to_string(parsed.repository_public) ?? ""
      }

      # --- Enterprise / business ---
      if exists(parsed.business) {
          .ext.enterprise = string!(parsed.business)
      }

      # --- Actor location ---
      if exists(parsed.actor_location) {
          if exists(parsed.actor_location.country_code) {
              .ext.src_country = string!(parsed.actor_location.country_code)
          }
      }

      # --- Document ID ---
      if exists(parsed._document_id) {
          .ext.document_id = string!(parsed._document_id)
      }

      # --- Permission ---
      if exists(parsed.permission) {
          .ext.permission = string!(parsed.permission)
      }

      # --- Categorize based on action prefix ---
      action_str = to_string(parsed.action) ?? ""
      if starts_with(action_str, "repo.") {
          .udm.category = "repository"
      } else if starts_with(action_str, "org.") {
          .udm.category = "organization"
      } else if starts_with(action_str, "team.") {
          .udm.category = "team"
      } else if starts_with(action_str, "protected_branch.") {
          .udm.category = "branch_protection"
      } else if starts_with(action_str, "hook.") {
          .udm.category = "webhook"
      } else if starts_with(action_str, "integration.") {
          .udm.category = "integration"
      } else if starts_with(action_str, "oauth_application.") {
          .udm.category = "oauth"
      }

  } else {
      .metadata.parse_error = to_string(err)
  }

  # Set parser name
  .metadata.parser = "github_audit"

  # Preserve raw log
  .message = raw_log
