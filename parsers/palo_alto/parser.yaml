      if num_fields > 17 { v = to_string(fields[17]); if v != "" { .ext.server_profile = v } }
      if num_fields > 18 { v = to_string(fields[18]); if v != "" { .ext.description = v } }
      if num_fields > 19 { v = to_string(fields[19]); if v != "" { .ext.client_type = v } }
