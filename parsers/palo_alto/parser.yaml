      if num_fields > 28 { v = to_string(fields[28]); if v != "" { .ext.vsys_name = v } }
      if num_fields > 29 {
          v = to_string(fields[29])
          if v != "" {
              .udm.dvc = v
          }
      }

      # PAN-OS 9.0+ fields
      if num_fields > 30 { v = to_string(fields[30]); if v != "" { .ext.vsys_id = v } }
      if num_fields > 31 { v = to_string(fields[31]); if v != "" { .ext.auth_protocol = v } }
      if num_fields > 32 { v = to_string(fields[32]); if v != "" { .ext.rule_uuid = v } }

      # PAN-OS 10.0+ multi-factor fields
      if num_fields > 33 { v = to_string(fields[33]); if v != "" && v != "0" { .ext.high_res_timestamp = v } }
      if num_fields > 34 { v = to_string(fields[34]); if v != "" { .ext.src_device_category = v } }
      if num_fields > 35 { v = to_string(fields[35]); if v != "" { .ext.src_device_profile = v } }
      if num_fields > 36 { v = to_string(fields[36]); if v != "" { .ext.src_device_model = v } }
      if num_fields > 37 { v = to_string(fields[37]); if v != "" { .ext.src_device_vendor = v } }
      if num_fields > 38 { v = to_string(fields[38]); if v != "" { .ext.src_device_os_family = v } }
      if num_fields > 39 { v = to_string(fields[39]); if v != "" { .ext.src_device_os_version = v } }
      if num_fields > 40 { v = to_string(fields[40]); if v != "" { .ext.src_device_host = v } }
      if num_fields > 41 { v = to_string(fields[41]); if v != "" { .ext.src_device_mac = v } }  # ═══════════════════════════════════════════
