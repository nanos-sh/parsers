name: palo_alto
display_name: Palo Alto Networks PAN-OS
version: "1.0.0"
description: "Parses Palo Alto Networks PAN-OS firewall logs including TRAFFIC, THREAT, SYSTEM, CONFIG, USERID, GLOBALPROTECT, HIPMATCH, and AUTHENTICATION log types with full UDM field mapping"
match_values:
  - palo_alto
  - pan_os
  - pan_traffic
  - pan_threat
  - pan_system
  - pan_config
category: network
vendor: "Palo Alto Networks"
product: "PAN-OS"
parser_vrl: |
  # Palo Alto Networks PAN-OS Firewall Log Parser
  # Handles: TRAFFIC, THREAT, SYSTEM, CONFIG, USERID, GLOBALPROTECT, HIPMATCH, AUTHENTICATION
  # Format: CSV-delimited syslog with optional syslog header prefix

  .udm = {}
  .ext = {}
  .metadata = {}

  .udm.vendor = "Palo Alto Networks"
  .udm.product = "PAN-OS"

  raw_log = string!(.message)

  # ─── Strip syslog header prefix if present ───
  # Matches: "<PRI>Mon DD HH:MM:SS hostname ..." or "Oct 30 09:46:12 hostname ..."
  # After stripping, the CSV payload starts with the first numeric field
  working = raw_log
  # Strip PRI-prefixed syslog header: <123>Oct 30 09:46:12 hostname payload
  pri_match, pri_err = parse_regex(working, r'^<\d+>\w+\s+\d+\s+\d+:\d+:\d+\s+\S+\s+(?P<payload>.+)$')
  if pri_err == null && pri_match != null {
      working = string!(pri_match.payload)
  } else {
      # Strip BSD syslog header: Oct 30 09:46:12 hostname payload  (month starts the line)
      bsd_match, bsd_err = parse_regex(working, r'^(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s+\d+\s+\d+:\d+:\d+\s+\S+\s+(?P<payload>.+)$')
      if bsd_err == null && bsd_match != null {
          working = string!(bsd_match.payload)
      } else {
          # Strip BSD syslog without hostname: "Oct 30 09:46:12 payload" where payload starts with digit
          bsd2_match, bsd2_err = parse_regex(working, r'^(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s+\d+\s+\d+:\d+:\d+\s+(?P<payload>\d.+)$')
          if bsd2_err == null && bsd2_match != null {
              working = string!(bsd2_match.payload)
          }
      }
  }

  # ─── CSV split handling quoted fields ───
  # PAN-OS CSV can have quoted fields (especially in THREAT logs for URL/filename)
  # We handle this with a regex-based CSV split that respects quotes
  fields = []
  remaining = working
  done = false

  # VRL doesn't have a while loop, so we use a split approach:
  # First, replace commas inside quoted strings with a placeholder, then split
  # Strategy: find quoted segments, replace inner commas, then split on comma

  # Replace commas inside double-quoted fields with a placeholder \x00
  cleaned = ""
  in_quotes = false
  chars = split(remaining, "")
  i = 0
  char_len = length(chars)

  # VRL lacks mutable iteration, so use regex to handle quoted fields
  # Replace quoted fields: extract them, replace commas inside
  # Match pattern: field is either "..." or non-comma sequence
  # Use parse_csv or manual approach

  # Approach: iteratively extract fields using regex
  # Match: start with " -> grab until closing " (handling ""), or grab until next comma
  pos = 0
  field_idx = 0
  csv_line = remaining

  # Since VRL lacks while loops, we use split with a workaround:
  # Replace commas within quotes first using repeated regex substitution
  # PAN-OS quoted fields are simple: "value with, commas" — no escaped quotes inside
  iteration = 0
  temp = csv_line
  # Replace commas inside quotes: find "...,...", replace the comma
  # Do up to 10 passes to handle multiple commas in a single quoted field
  qm1, qe1 = parse_regex(temp, r'"(?P<before>[^"]*),(?P<after>[^"]*)"')
  if qe1 == null && qm1 != null {
      temp = replace(temp, "\"" + string!(qm1.before) + "," + string!(qm1.after) + "\"", "\"" + string!(qm1.before) + "\t" + string!(qm1.after) + "\"")
  }
  qm2, qe2 = parse_regex(temp, r'"(?P<before>[^"]*),(?P<after>[^"]*)"')
  if qe2 == null && qm2 != null {
      temp = replace(temp, "\"" + string!(qm2.before) + "," + string!(qm2.after) + "\"", "\"" + string!(qm2.before) + "\t" + string!(qm2.after) + "\"")
  }
  qm3, qe3 = parse_regex(temp, r'"(?P<before>[^"]*),(?P<after>[^"]*)"')
  if qe3 == null && qm3 != null {
      temp = replace(temp, "\"" + string!(qm3.before) + "," + string!(qm3.after) + "\"", "\"" + string!(qm3.before) + "\t" + string!(qm3.after) + "\"")
  }
  qm4, qe4 = parse_regex(temp, r'"(?P<before>[^"]*),(?P<after>[^"]*)"')
  if qe4 == null && qm4 != null {
      temp = replace(temp, "\"" + string!(qm4.before) + "," + string!(qm4.after) + "\"", "\"" + string!(qm4.before) + "\t" + string!(qm4.after) + "\"")
  }
  qm5, qe5 = parse_regex(temp, r'"(?P<before>[^"]*),(?P<after>[^"]*)"')
  if qe5 == null && qm5 != null {
      temp = replace(temp, "\"" + string!(qm5.before) + "," + string!(qm5.after) + "\"", "\"" + string!(qm5.before) + "\t" + string!(qm5.after) + "\"")
  }

  # Now split on commas — quoted-field commas are replaced with \t
  raw_fields = split(temp, ",")

  # Restore commas and strip quotes from each field
  fields = []
  for_each(raw_fields) -> |_i, val| {
      v = replace(to_string(val), "\t", ",")
      # Strip surrounding double quotes
      v = replace(v, r'^"', "")
      v = replace(v, r'"$', "")
      fields = push(fields, v)
  }

  num_fields = length(fields)

  # ─── Helper: safe field access ───
  # PAN-OS common header: pos 0=future_use/domain, 1=receive_time, 2=serial, 3=type, 4=subtype, 5=config_version, 6=generate_time

  # Extract common header fields
  if num_fields > 2 {
      .ext.serial_number = to_string(fields[2])
      .udm.dvc = to_string(fields[2])
  }

  log_type = ""
  if num_fields > 3 {
      log_type = upcase(to_string(fields[3]))
      .ext.log_type = log_type
  }

  subtype = ""
  if num_fields > 4 {
      subtype = to_string(fields[4])
      .ext.log_subtype = subtype
  }

  # Parse receive_time (pos 1) as primary timestamp: "YYYY/MM/DD HH:MM:SS"
  if num_fields > 1 {
      ts_str = to_string(fields[1])
      ts, ts_err = parse_timestamp(ts_str, "%Y/%m/%d %H:%M:%S")
      if ts_err == null {
          .udm.timestamp = format_timestamp!(ts, format: "%Y-%m-%d %H:%M:%S")
      } else {
          .udm.timestamp = format_timestamp!(now(), format: "%Y-%m-%d %H:%M:%S")
      }
  }

  # Parse generate_time (pos 6)
  if num_fields > 6 {
      gen_ts_str = to_string(fields[6])
      gen_ts, gen_ts_err = parse_timestamp(gen_ts_str, "%Y/%m/%d %H:%M:%S")
      if gen_ts_err == null {
          .ext.generate_time = format_timestamp!(gen_ts, format: "%Y-%m-%d %H:%M:%S")
      }
  }

  # Config version (pos 5)
  if num_fields > 5 {
      cv = to_string(fields[5])
      if cv != "" && cv != "0" {
          .ext.config_version = cv
      }
  }

  # ═══════════════════════════════════════════
  # TRAFFIC logs
  # ═══════════════════════════════════════════
  if log_type == "TRAFFIC" {
      .metadata.event_type = "network_traffic"

      if num_fields > 7 { v = to_string(fields[7]); if v != "" && v != "0.0.0.0" { .udm.src_ip = v } }
      if num_fields > 8 { v = to_string(fields[8]); if v != "" && v != "0.0.0.0" { .udm.dest_ip = v } }
      if num_fields > 9 { v = to_string(fields[9]); if v != "" && v != "0.0.0.0" { .udm.src_translated_ip = v } }
      if num_fields > 10 { v = to_string(fields[10]); if v != "" && v != "0.0.0.0" { .udm.dest_translated_ip = v } }
      if num_fields > 11 { v = to_string(fields[11]); if v != "" { .udm.rule_name = v } }
      if num_fields > 12 { v = to_string(fields[12]); if v != "" { .udm.src_user = v; .udm.user = v } }
      if num_fields > 13 { v = to_string(fields[13]); if v != "" { .udm.dest_user = v } }
      if num_fields > 14 { v = to_string(fields[14]); if v != "" { .udm.app = v } }
      if num_fields > 15 { v = to_string(fields[15]); if v != "" { .ext.vsys = v } }
      if num_fields > 16 { v = to_string(fields[16]); if v != "" { .udm.src_zone = v } }
      if num_fields > 17 { v = to_string(fields[17]); if v != "" { .udm.dest_zone = v } }
      if num_fields > 18 { v = to_string(fields[18]); if v != "" { .udm.src_interface = v } }
      if num_fields > 19 { v = to_string(fields[19]); if v != "" { .udm.dest_interface = v } }
      if num_fields > 20 { v = to_string(fields[20]); if v != "" { .ext.log_action = v } }

      # Time logged (pos 21)
      if num_fields > 21 {
          tl_str = to_string(fields[21])
          tl, tl_err = parse_timestamp(tl_str, "%Y/%m/%d %H:%M:%S")
          if tl_err == null {
              .ext.time_logged = format_timestamp!(tl, format: "%Y-%m-%d %H:%M:%S")
          }
      }

      if num_fields > 22 { v = to_string(fields[22]); if v != "" { .udm.session_id = v } }
      if num_fields > 23 { v = to_string(fields[23]); if v != "" && v != "0" { .ext.repeat_count = to_int(v) ?? null } }
      if num_fields > 24 { v = to_int!(fields[24]); if v != null { .udm.src_port = v } }
      if num_fields > 25 { v = to_int!(fields[25]); if v != null { .udm.dest_port = v } }
      if num_fields > 26 { v = to_int!(fields[26]); if v != null { .udm.src_translated_port = v } }
      if num_fields > 27 { v = to_int!(fields[27]); if v != null { .udm.dest_translated_port = v } }
      if num_fields > 28 { v = to_string(fields[28]); if v != "" { .ext.flags = v } }

      # Protocol (pos 29) — normalize to lowercase
      if num_fields > 29 {
          proto = downcase(to_string(fields[29]))
          if proto != "" {
              .udm.protocol = proto
          }
      }

      # Action (pos 30)
      if num_fields > 30 {
          action = downcase(to_string(fields[30]))
          if action != "" {
              .udm.event_type = action
          }
      }

      # Bytes (pos 31 = total, 32 = sent, 33 = received)
      if num_fields > 31 { v = to_int!(fields[31]); if v != null { .ext.bytes_total = v } }
      if num_fields > 32 { v = to_int!(fields[32]); if v != null { .udm.bytes_out = v } }
      if num_fields > 33 { v = to_int!(fields[33]); if v != null { .udm.bytes_in = v } }

      # Packets total (pos 34)
      if num_fields > 34 { v = to_int!(fields[34]); if v != null { .ext.packets_total = v } }

      # Start time (pos 35)
      if num_fields > 35 {
          st_str = to_string(fields[35])
          st, st_err = parse_timestamp(st_str, "%Y/%m/%d %H:%M:%S")
          if st_err == null {
              .ext.start_time = format_timestamp!(st, format: "%Y-%m-%d %H:%M:%S")
          }
      }

      # Elapsed time / duration in seconds (pos 36)
      if num_fields > 36 { v = to_int!(fields[36]); if v != null { .udm.duration = v } }

      # Category (pos 37)
      if num_fields > 37 { v = to_string(fields[37]); if v != "" { .udm.category = v } }

      # Future use (pos 38), sequence_num (pos 39), action_flags (pos 40)
      if num_fields > 39 { v = to_string(fields[39]); if v != "" && v != "0" { .ext.sequence_number = v } }
      if num_fields > 40 { v = to_string(fields[40]); if v != "" { .ext.action_flags = v } }

      # Geo: src_country (pos 41), dest_country (pos 42)
      if num_fields > 41 { v = to_string(fields[41]); if v != "" { .ext.src_country = v } }
      if num_fields > 42 { v = to_string(fields[42]); if v != "" { .ext.dest_country = v } }

      # Future use2 (pos 43)
      # Packets sent (pos 44), packets received (pos 45)
      if num_fields > 44 { v = to_int!(fields[44]); if v != null { .udm.packets_out = v } }
      if num_fields > 45 { v = to_int!(fields[45]); if v != null { .udm.packets_in = v } }

      # Session end reason (pos 46)
      if num_fields > 46 { v = to_string(fields[46]); if v != "" { .ext.session_end_reason = v } }

      # PAN-OS 8.0+ additional fields (pos 47+)
      if num_fields > 47 { v = to_string(fields[47]); if v != "" && v != "0" { .ext.dg_hierarchy_1 = v } }
      if num_fields > 48 { v = to_string(fields[48]); if v != "" && v != "0" { .ext.dg_hierarchy_2 = v } }
      if num_fields > 49 { v = to_string(fields[49]); if v != "" && v != "0" { .ext.dg_hierarchy_3 = v } }
      if num_fields > 50 { v = to_string(fields[50]); if v != "" && v != "0" { .ext.dg_hierarchy_4 = v } }
      if num_fields > 51 { v = to_string(fields[51]); if v != "" { .ext.vsys_name = v } }
      if num_fields > 52 { v = to_string(fields[52]); if v != "" { .udm.dvc = v } }

      # PAN-OS 8.1+ fields
      if num_fields > 53 { v = to_string(fields[53]); if v != "" { .ext.action_source = v } }
      if num_fields > 54 { v = to_string(fields[54]); if v != "" { .ext.src_vm_uuid = v } }
      if num_fields > 55 { v = to_string(fields[55]); if v != "" { .ext.dest_vm_uuid = v } }
      if num_fields > 56 { v = to_string(fields[56]); if v != "" { .ext.tunnel_id = v } }
      if num_fields > 57 { v = to_string(fields[57]); if v != "" { .ext.monitor_tag = v } }
      if num_fields > 58 { v = to_string(fields[58]); if v != "" { .ext.parent_session_id = v } }
      if num_fields > 59 { v = to_string(fields[59]); if v != "" { .ext.parent_start_time = v } }
      if num_fields > 60 { v = to_string(fields[60]); if v != "" { .ext.tunnel_type = v } }

      # PAN-OS 9.0+ fields
      if num_fields > 61 { v = to_string(fields[61]); if v != "" && v != "0" { .ext.sctp_association_id = v } }
      if num_fields > 62 { v = to_string(fields[62]); if v != "" && v != "0" { .ext.sctp_chunks = v } }
      if num_fields > 63 { v = to_string(fields[63]); if v != "" && v != "0" { .ext.sctp_chunks_sent = v } }
      if num_fields > 64 { v = to_string(fields[64]); if v != "" && v != "0" { .ext.sctp_chunks_received = v } }

      # PAN-OS 9.1+ fields
      if num_fields > 65 { v = to_string(fields[65]); if v != "" { .ext.uuid_rule = v } }
      if num_fields > 66 { v = to_int!(fields[66]); if v != null { .ext.http2_connection = v } }

      # PAN-OS 10.0+ fields
      if num_fields > 67 { v = to_string(fields[67]); if v != "" && v != "0" { .ext.link_change_count = v } }
      if num_fields > 68 { v = to_string(fields[68]); if v != "" { .ext.policy_id = v } }
      if num_fields > 69 { v = to_string(fields[69]); if v != "" { .ext.link_switches = v } }
      if num_fields > 70 { v = to_string(fields[70]); if v != "" { .ext.sdwan_cluster = v } }
      if num_fields > 71 { v = to_string(fields[71]); if v != "" { .ext.sdwan_device_type = v } }
      if num_fields > 72 { v = to_string(fields[72]); if v != "" { .ext.sdwan_cluster_type = v } }
      if num_fields > 73 { v = to_string(fields[73]); if v != "" { .ext.sdwan_site = v } }
      if num_fields > 74 { v = to_string(fields[74]); if v != "" { .ext.dynusergroup_name = v } }  # ═══════════════════════════════════════════
  # THREAT logs
  # ═══════════════════════════════════════════

  } else if log_type == "THREAT" {
      .metadata.event_type = "security_threat"

      # Positions 7-30 are the same as TRAFFIC
      if num_fields > 7 { v = to_string(fields[7]); if v != "" && v != "0.0.0.0" { .udm.src_ip = v } }
      if num_fields > 8 { v = to_string(fields[8]); if v != "" && v != "0.0.0.0" { .udm.dest_ip = v } }
      if num_fields > 9 { v = to_string(fields[9]); if v != "" && v != "0.0.0.0" { .udm.src_translated_ip = v } }
      if num_fields > 10 { v = to_string(fields[10]); if v != "" && v != "0.0.0.0" { .udm.dest_translated_ip = v } }
      if num_fields > 11 { v = to_string(fields[11]); if v != "" { .udm.rule_name = v } }
      if num_fields > 12 { v = to_string(fields[12]); if v != "" { .udm.src_user = v; .udm.user = v } }
      if num_fields > 13 { v = to_string(fields[13]); if v != "" { .udm.dest_user = v } }
      if num_fields > 14 { v = to_string(fields[14]); if v != "" { .udm.app = v } }
      if num_fields > 15 { v = to_string(fields[15]); if v != "" { .ext.vsys = v } }
      if num_fields > 16 { v = to_string(fields[16]); if v != "" { .udm.src_zone = v } }
      if num_fields > 17 { v = to_string(fields[17]); if v != "" { .udm.dest_zone = v } }
      if num_fields > 18 { v = to_string(fields[18]); if v != "" { .udm.src_interface = v } }
      if num_fields > 19 { v = to_string(fields[19]); if v != "" { .udm.dest_interface = v } }
      if num_fields > 20 { v = to_string(fields[20]); if v != "" { .ext.log_action = v } }

      # Time logged (pos 21)
      if num_fields > 21 {
          tl_str = to_string(fields[21])
          tl, tl_err = parse_timestamp(tl_str, "%Y/%m/%d %H:%M:%S")
          if tl_err == null {
              .ext.time_logged = format_timestamp!(tl, format: "%Y-%m-%d %H:%M:%S")
          }
      }

      if num_fields > 22 { v = to_string(fields[22]); if v != "" { .udm.session_id = v } }
      if num_fields > 23 { v = to_string(fields[23]); if v != "" && v != "0" { .ext.repeat_count = to_int(v) ?? null } }
      if num_fields > 24 { v = to_int!(fields[24]); if v != null { .udm.src_port = v } }
      if num_fields > 25 { v = to_int!(fields[25]); if v != null { .udm.dest_port = v } }
      if num_fields > 26 { v = to_int!(fields[26]); if v != null { .udm.src_translated_port = v } }
      if num_fields > 27 { v = to_int!(fields[27]); if v != null { .udm.dest_translated_port = v } }
      if num_fields > 28 { v = to_string(fields[28]); if v != "" { .ext.flags = v } }

      # Protocol (pos 29)
      if num_fields > 29 {
          proto = downcase(to_string(fields[29]))
          if proto != "" {
              .udm.protocol = proto
          }
      }

      # Action (pos 30) — alert, allow, deny, drop, reset-client, reset-server, reset-both, block-url, block-ip, etc.
      if num_fields > 30 {
          action = downcase(to_string(fields[30]))
          if action != "" {
              .udm.event_type = action
          }
      }

      # ─── THREAT-specific fields (pos 31+) ───

      # URL/Filename (pos 31) — may be quoted, already stripped by our CSV parser
      if num_fields > 31 {
          url_or_file = to_string(fields[31])
          if url_or_file != "" {
              lower_subtype = downcase(subtype)
              if lower_subtype == "url" {
                  .udm.url = url_or_file
                  # Extract domain from URL
                  domain_match, domain_err = parse_regex(url_or_file, r'^(?:https?://)?(?P<domain>[^/:\s]+)')
                  if domain_err == null && domain_match != null {
                      .udm.url_domain = string!(domain_match.domain)
                  }
                  # Extract path
                  path_match, path_err = parse_regex(url_or_file, r'^(?:https?://)?[^/]+(?P<path>/.*)$')
                  if path_err == null && path_match != null {
                      .udm.uri_path = string!(path_match.path)
                  }
              } else if lower_subtype == "file" || lower_subtype == "virus" || lower_subtype == "wildfire" || lower_subtype == "data" {
                  .ext.filename = url_or_file
              } else {
                  # vulnerability, spyware — could be URL
                  .udm.url = url_or_file
                  domain_match2, domain_err2 = parse_regex(url_or_file, r'^(?:https?://)?(?P<domain>[^/:\s]+)')
                  if domain_err2 == null && domain_match2 != null {
                      .udm.url_domain = string!(domain_match2.domain)
                  }
              }
          }
      }

      # Threat ID (pos 32) — format: "ThreatName(ID)" — extract numeric ID
      if num_fields > 32 {
          threat_raw = to_string(fields[32])
          if threat_raw != "" {
              .udm.signature = threat_raw
              tid_match, tid_err = parse_regex(threat_raw, r'\((?P<id>\d+)\)\s*$')
              if tid_err == null && tid_match != null {
                  .udm.signature_id = string!(tid_match.id)
              }
              # Also store the threat name without the ID
              tname_match, tname_err = parse_regex(threat_raw, r'^(?P<name>.+?)\(\d+\)\s*$')
              if tname_err == null && tname_match != null {
                  .ext.threat_name = string!(tname_match.name)
              }
          }
      }

      # Category (pos 33)
      if num_fields > 33 { v = to_string(fields[33]); if v != "" { .udm.category = v } }

      # Severity (pos 34)
      if num_fields > 34 {
          sev = downcase(to_string(fields[34]))
          if sev != "" {
              .udm.severity = sev
          }
      }

      # Direction (pos 35)
      if num_fields > 35 {
          dir = to_string(fields[35])
          if dir != "" {
              .udm.direction = dir
              .ext.threat_direction = dir
          }
      }

      # Sequence number (pos 36), action_flags (pos 37)
      if num_fields > 36 { v = to_string(fields[36]); if v != "" && v != "0" { .ext.sequence_number = v } }
      if num_fields > 37 { v = to_string(fields[37]); if v != "" { .ext.action_flags = v } }

      # Source location (pos 38), dest location (pos 39)
      if num_fields > 38 { v = to_string(fields[38]); if v != "" { .ext.src_country = v } }
      if num_fields > 39 { v = to_string(fields[39]); if v != "" { .ext.dest_country = v } }

      # Future use (pos 40)
      # Content type (pos 41)
      if num_fields > 41 { v = to_string(fields[41]); if v != "" { .udm.http_content_type = v } }

      # PCAP ID (pos 42)
      if num_fields > 42 { v = to_string(fields[42]); if v != "" && v != "0" { .ext.pcap_id = v } }

      # File digest / hash (pos 43)
      if num_fields > 43 { v = to_string(fields[43]); if v != "" { .ext.file_digest = v } }

      # Cloud (pos 44)
      if num_fields > 44 { v = to_string(fields[44]); if v != "" { .ext.cloud = v } }

      # URL index (pos 45)
      if num_fields > 45 { v = to_string(fields[45]); if v != "" && v != "0" { .ext.url_index = v } }

      # User agent (pos 46)
      if num_fields > 46 { v = to_string(fields[46]); if v != "" { .udm.http_user_agent = v } }

      # File type (pos 47)
      if num_fields > 47 { v = to_string(fields[47]); if v != "" { .ext.file_type = v } }

      # X-Forwarded-For (pos 48)
