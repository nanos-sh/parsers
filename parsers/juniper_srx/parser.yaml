name: juniper_srx
display_name: Juniper SRX
version: "1.0.0"
description: "Parses Juniper SRX firewall logs including RT_FLOW, RT_IDP, RT_UTM, and system events"
match_values:
  - juniper_srx
  - juniper
  - srx
  - junos
category: network
vendor: "Juniper"
product: "SRX"
parser_vrl: |
  # Juniper SRX Parser
  # Handles RT_FLOW (session create/close/deny), RT_IDP (IPS), and other structured data events
  # Format: RFC 5424 syslog with structured data [junos@... key="value"]

  # Initialize required structures
  .udm = {}
  .ext = {}
  .metadata = {}

  # Set defaults
  .udm.timestamp = now()
  .udm.vendor = "Juniper"
  .udm.product = "SRX"
  .udm.vendor_product = "Juniper SRX"

  # Get raw log
  raw_log = string!(.message)

  # --- Parse RFC 5424 header ---
  # Format: <PRI>VERSION TIMESTAMP HOSTNAME APP-NAME PROCID MSGID [SD...] MSG
  header_match, header_err = parse_regex(raw_log, r'^<(?P<pri>\d+)>\d*\s*(?P<timestamp>\S+)\s+(?P<hostname>\S+)\s+(?P<appname>\S+)\s+(?P<procid>\S+)\s+(?P<msgid>\S+)\s+(?P<rest>.*)$')
  if header_err != null {
      abort
  }

  # Parse PRI
  pri_val = to_int(header_match.pri) ?? null
  if pri_val != null {
      .ext.syslog_priority = pri_val
      .ext.syslog_facility = floor((pri_val / 8) ?? 0)
      .ext.syslog_severity = mod(pri_val, 8) ?? 0
  }

  # Parse timestamp
  ts_str = string!(header_match.timestamp)
  ts, ts_err = parse_timestamp(ts_str, "%Y-%m-%dT%H:%M:%S%.fZ")
  if ts_err == null {
      .udm.timestamp = format_timestamp!(ts, format: "%Y-%m-%d %H:%M:%S")
  }

  # Device hostname
  .udm.dvc = string!(header_match.hostname)

  # App name determines the event type (RT_FLOW, RT_IDP, RT_UTM, etc.)
  app_name = string!(header_match.appname)
  .ext.app_name = app_name

  # Message ID (RT_FLOW_SESSION_CREATE, RT_FLOW_SESSION_CLOSE, etc.)
  msg_id = string!(header_match.msgid)
  .ext.message_id = msg_id

  rest = string!(header_match.rest)

  # --- Extract structured data from [junos@... key="value" ...] ---
  sd_match, sd_err = parse_regex(rest, r'\[junos@\S+\s+(?P<kvdata>[^\]]+)\]')
  if sd_err == null && sd_match != null {
      kv_data = string!(sd_match.kvdata)
      parsed = parse_key_value(kv_data, key_value_delimiter: "=", field_delimiter: " ") ?? {}

      # --- Network fields ---
      if exists(parsed."source-address") { .udm.src_ip = string!(parsed."source-address") }
      if exists(parsed."destination-address") { .udm.dest_ip = string!(parsed."destination-address") }
      if exists(parsed."source-port") { .udm.src_port = to_int(parsed."source-port") ?? null }
      if exists(parsed."destination-port") { .udm.dest_port = to_int(parsed."destination-port") ?? null }

      # --- Protocol mapping ---
      if exists(parsed."protocol-id") {
          proto_num = to_int(parsed."protocol-id") ?? null
          if proto_num != null {
              .ext.protocol_number = proto_num
              if proto_num == 1 { .udm.protocol = "icmp" } else if proto_num == 6 { .udm.protocol = "tcp" } else if proto_num == 17 { .udm.protocol = "udp" } else if proto_num == 47 { .udm.protocol = "gre" } else if proto_num == 50 { .udm.protocol = "esp" } else if proto_num == 58 { .udm.protocol = "icmpv6" } else { .udm.protocol = to_string!(proto_num) }
          }
      }
      if exists(parsed."protocol-name") { .udm.protocol = downcase(string!(parsed."protocol-name")) }

      # --- Policy / rule ---
      if exists(parsed."policy-name") { .udm.rule_name = string!(parsed."policy-name") }

      # --- Zones ---
      if exists(parsed."source-zone-name") { .udm.src_zone = string!(parsed."source-zone-name") }
      if exists(parsed."destination-zone-name") { .udm.dest_zone = string!(parsed."destination-zone-name") }

      # --- NAT / Translation ---
      if exists(parsed."nat-source-address") {
          nat_src = string!(parsed."nat-source-address")
          if nat_src != "0.0.0.0" { .udm.src_translated_ip = nat_src }
      }
      if exists(parsed."nat-source-port") {
          nat_src_port = to_int(parsed."nat-source-port") ?? 0
          if nat_src_port != 0 { .udm.src_translated_port = nat_src_port }
      }
      if exists(parsed."nat-destination-address") {
          nat_dst = string!(parsed."nat-destination-address")
          if nat_dst != "0.0.0.0" { .udm.dest_translated_ip = nat_dst }
      }
      if exists(parsed."nat-destination-port") {
          nat_dst_port = to_int(parsed."nat-destination-port") ?? 0
          if nat_dst_port != 0 { .udm.dest_translated_port = nat_dst_port }
      }

      # --- Session ---
      if exists(parsed."session-id-32") { .udm.session_id = string!(parsed."session-id-32") }

      # --- Bytes and packets (close events) ---
      if exists(parsed."bytes-from-client") { .udm.bytes_out = to_int(parsed."bytes-from-client") ?? null }
      if exists(parsed."bytes-from-server") { .udm.bytes_in = to_int(parsed."bytes-from-server") ?? null }
      if exists(parsed."packets-from-client") { .udm.packets_out = to_int(parsed."packets-from-client") ?? null }
      if exists(parsed."packets-from-server") { .udm.packets_in = to_int(parsed."packets-from-server") ?? null }

      # --- Duration ---
      if exists(parsed."elapsed-time") { .udm.duration = to_int(parsed."elapsed-time") ?? null }

      # --- User ---
      if exists(parsed.username) {
          uname = string!(parsed.username)
          if uname != "N/A" { .udm.user = uname }
      }

      # --- Application ---
      if exists(parsed.application) { .udm.app = string!(parsed.application) }
      if exists(parsed."nested-application") {
          nested = string!(parsed."nested-application")
          if nested != "UNKNOWN" { .ext.nested_application = nested }
      }

      # --- Interface ---
      if exists(parsed."packet-incoming-interface") { .udm.src_interface = string!(parsed."packet-incoming-interface") }
      if exists(parsed."source-interface-name") { .udm.src_interface = string!(parsed."source-interface-name") }
      if exists(parsed."destination-interface-name") { .udm.dest_interface = string!(parsed."destination-interface-name") }

      # --- NAT rule names ---
      if exists(parsed."src-nat-rule-name") {
          snat = string!(parsed."src-nat-rule-name")
          if snat != "N/A" { .ext.src_nat_rule = snat }
      }
      if exists(parsed."dst-nat-rule-name") {
          dnat = string!(parsed."dst-nat-rule-name")
          if dnat != "N/A" { .ext.dst_nat_rule = dnat }
      }

      # --- Service ---
      if exists(parsed."service-name") { .ext.service_name = string!(parsed."service-name") }

      # --- Close reason ---
      if exists(parsed.reason) { .ext.close_reason = string!(parsed.reason) }

      # --- IDP-specific fields ---
      if exists(parsed."attack-name") { .udm.signature = string!(parsed."attack-name") }
      if exists(parsed."threat-severity") { .udm.severity = downcase(string!(parsed."threat-severity")) }
      if exists(parsed.action) { .udm.action = downcase(string!(parsed.action)) }
      if exists(parsed."rule-name") {
          idp_rule = string!(parsed."rule-name")
          .ext.idp_rule_name = idp_rule
      }
      if exists(parsed."rulebase-name") { .ext.rulebase_name = string!(parsed."rulebase-name") }
      if exists(parsed."repeat-count") { .ext.repeat_count = to_int(parsed."repeat-count") ?? null }
      if exists(parsed."application-name") { .udm.app = string!(parsed."application-name") }

      # --- Encrypted ---
      if exists(parsed.encrypted) {
          enc = string!(parsed.encrypted)
          if enc != "UNKNOWN" { .ext.encrypted = enc }
      }
  }

  # --- Determine event category and action from message ID ---
  msg_id_lower = downcase(msg_id)
  if contains(msg_id_lower, "rt_flow_session_create") {
      .metadata.event_category = "network"
      if !exists(.udm.action) { .udm.action = "allow" }
  } else if contains(msg_id_lower, "rt_flow_session_close") {
      .metadata.event_category = "network"
      if !exists(.udm.action) { .udm.action = "close" }
  } else if contains(msg_id_lower, "rt_flow_session_deny") {
      .metadata.event_category = "network"
      if !exists(.udm.action) { .udm.action = "deny" }
  } else if contains(msg_id_lower, "rt_idp") {
      .metadata.event_category = "intrusion"
  } else if contains(msg_id_lower, "rt_utm") {
      .metadata.event_category = "utm"
  } else {
      .metadata.event_category = "system"
  }

  # --- Final: set .message to raw log ---
  .message = raw_log
