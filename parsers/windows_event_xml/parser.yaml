name: windows_event_xml
display_name: Windows Event Log (XML)
version: "1.0.0"
description: "Parses Windows Event Logs in native XML format including Security, System, Sysmon, and PowerShell channels with full EventData field extraction"
match_values:
  - windows_event_xml
  - windows_xml
  - evtx_xml
  - wef
category: endpoint
vendor: "Microsoft"
product: "Windows"
parser_vrl: |
  # Windows Event Log XML Parser
  # Handles native XML format from WEF, EVTX exports, etc.
  .udm = {}
  .ext = {}
  .metadata = {}

  raw_log = string!(.message)
  .message = raw_log

  parsed, err = parse_xml(raw_log)
  if err == null {
      event = parsed.Event
      if event != null {
          system = event.System
          event_data_section = event.EventData
          user_data_section = event.UserData

          # -----------------------------------------------------------
          # Extract EventID (may be int or object with text+@Qualifiers)
          # -----------------------------------------------------------
          event_id = 0
          if system != null {
              raw_eid = system.EventID
              if raw_eid != null {
                  if is_object(raw_eid) {
                      event_id = to_int(raw_eid.text) ?? 0
                      eid_qual, eid_err = to_string(raw_eid."@Qualifiers")
                      if eid_err == null && eid_qual != "" { .ext.event_id_qualifiers = eid_qual }
                  } else {
                      event_id = to_int(raw_eid) ?? 0
                  }
              }
          }
          .udm.signature_id = to_string(event_id)

          # -----------------------------------------------------------
          # System fields
          # -----------------------------------------------------------
          if system != null {
              computer = system.Computer
              if computer != null {
                  .udm.src_host = to_string!(computer)
              }

              channel = system.Channel
              if channel != null {
                  .ext.channel = to_string!(channel)
              }

              provider = system.Provider
              if provider != null {
                  pname = provider."@Name"
                  if pname != null {
                      .ext.provider = to_string!(pname)
                  }
                  pguid = provider."@Guid"
                  if pguid != null {
                      .ext.provider_guid = to_string!(pguid)
                  }
              }

              level = system.Level
              if level != null {
                  level_int = to_int(level) ?? -1
                  .ext.level = level_int
                  .udm.severity = if level_int == 1 { "critical" } else if level_int == 2 { "error" } else if level_int == 3 { "warning" } else if level_int == 4 { "informational" } else if level_int == 5 { "verbose" } else if level_int == 0 { "audit" } else { null }
              }

              time_created = system.TimeCreated
              if time_created != null {
                  system_time = time_created."@SystemTime"
                  if system_time != null {
                      system_time_str = to_string!(system_time)
                      ts, ts_err = parse_timestamp(system_time_str, "%Y-%m-%dT%H:%M:%S.%f%Z")
                      if ts_err != null {
                          ts, ts_err = parse_timestamp(system_time_str, "%Y-%m-%dT%H:%M:%S%.fZ")
                      }
                      if ts_err != null {
                          ts, ts_err = parse_timestamp(system_time_str, "%Y-%m-%dT%H:%M:%SZ")
                      }
                      if ts_err == null {
                          .udm.timestamp = ts
                      } else {
                          .udm.timestamp = system_time_str
                      }
                  }
              }

              record_id = system.EventRecordID
              if record_id != null {
                  .ext.record_id = to_int(record_id) ?? null
              }

              correlation = system.Correlation
              if correlation != null {
                  activity_id = correlation."@ActivityID"
                  if activity_id != null {
                      .ext.activity_id = to_string!(activity_id)
                  }
              }

              execution = system.Execution
              if execution != null {
                  exec_pid = execution."@ProcessID"
                  if exec_pid != null {
                      .ext.logging_process_id = to_int(exec_pid) ?? null
                  }
                  exec_tid = execution."@ThreadID"
                  if exec_tid != null {
                      .ext.logging_thread_id = to_int(exec_tid) ?? null
                  }
              }

              keywords = system.Keywords
              if keywords != null {
                  .ext.keywords = to_string!(keywords)
              }

              task_val = system.Task
              if task_val != null {
                  .ext.task = to_int(task_val) ?? null
              }

              opcode = system.Opcode
              if opcode != null {
                  .ext.opcode = to_int(opcode) ?? null
              }
          }

          if !exists(.udm.timestamp) {
              .udm.timestamp = now()
          }

          .udm.vendor = "Microsoft"
          .udm.product = "Windows"

          # -----------------------------------------------------------
          # Build event_data key-value map from EventData/Data array
          # -----------------------------------------------------------
          event_data = {}
          if event_data_section != null {
              data_items = event_data_section.Data
              if data_items != null {
                  items_array = []
                  if is_array(data_items) {
                      items_array = array!(data_items)
                  } else if is_object(data_items) {
                      items_array = [data_items]
                  }

                  for_each(items_array) -> |_idx, item| {
                      name = item."@Name"
                      value = item.text
                      if name != null {
                          name_str = to_string!(name)
                          if name_str != "" {
                              if value != null {
                                  event_data = set!(event_data, [name_str], value)
                              } else {
                                  event_data = set!(event_data, [name_str], "")
                              }
                          }
                      }
                  }
              }
          }

          # -----------------------------------------------------------
          # Handle UserData (e.g., 1102 audit log cleared)
          # UserData has named child elements with direct field access
          # -----------------------------------------------------------
          if user_data_section != null {
              if is_object(user_data_section) {
                  for_each(object!(user_data_section)) -> |_key, child| {
                      if is_object(child) {
                          for_each(object!(child)) -> |field_name, field_value| {
                              if !starts_with(field_name, "@") {
                                  event_data = set!(event_data, [field_name], field_value)
                              }
                          }
                      }
                  }
              }
          }

          # -----------------------------------------------------------
          # Helper: extract a string field from event_data, "" if absent
          # We use to_string() which is infallible: to_string(null) = ""
          # -----------------------------------------------------------
          # VRL has no user-defined functions, so we inline to_string()
          # and use `if val != "" { .udm.x = val }` for nullable UDM fields.

          # -----------------------------------------------------------
          # LogonType mapping
          # -----------------------------------------------------------
          logon_type_str = to_string(event_data.LogonType)
          logon_type_name = if logon_type_str == "2" { "Interactive" } else if logon_type_str == "3" { "Network" } else if logon_type_str == "4" { "Batch" } else if logon_type_str == "5" { "Service" } else if logon_type_str == "7" { "Unlock" } else if logon_type_str == "8" { "NetworkCleartext" } else if logon_type_str == "9" { "NewCredentials" } else if logon_type_str == "10" { "RemoteInteractive" } else if logon_type_str == "11" { "CachedInteractive" } else { null }

          # -----------------------------------------------------------
          # Event-specific field extraction
          # -----------------------------------------------------------

          # === 4624 - Successful Logon ===
          if event_id == 4624 {
              .udm.action = "logon_success"
              .udm.category = "authentication"
              .udm.auth_result = "success"

              val = to_string(event_data.TargetUserName)
              if val != "" { .udm.user = val }
              val = to_string(event_data.TargetDomainName)
              if val != "" { .udm.user_domain = val }
              val = to_string(event_data.TargetUserSid)
              if val != "" { .udm.user_id = val }
              val = to_string(event_data.TargetLogonId)
              if val != "" { .udm.session_id = val }
              val = to_string(event_data.SubjectUserName)
              if val != "" { .udm.src_user = val }
              val = to_string(event_data.SubjectDomainName)
              if val != "" { .udm.src_nt_domain = val }
              val = to_string(event_data.SubjectLogonId)
              if val != "" { .ext.subject_logon_id = val }
              val = to_string(event_data.SubjectUserSid)
              if val != "" { .ext.subject_user_sid = val }

              if logon_type_name != null {
                  .udm.auth_type = logon_type_name
              }
              if logon_type_str != "" { .ext.logon_type = logon_type_str }

              ip_addr = to_string(event_data.IpAddress)
              if ip_addr != "" && ip_addr != "-" {
                  .udm.src_ip = ip_addr
              }
              ip_port = to_string(event_data.IpPort)
              if ip_port != "" && ip_port != "0" {
                  .udm.src_port = to_int(ip_port) ?? null
              }

              val = to_string(event_data.LogonProcessName)
              if val != "" { .ext.logon_process = val }
              val = to_string(event_data.AuthenticationPackageName)
              if val != "" { .udm.authentication_method = val }
              val = to_string(event_data.WorkstationName)
              if val != "" { .ext.workstation_name = val }
              val = to_string(event_data.LogonGuid)
              if val != "" { .ext.logon_guid = val }
              val = to_string(event_data.TransmittedServices)
              if val != "" && val != "-" { .ext.transmitted_services = val }
              val = to_string(event_data.LmPackageName)
              if val != "" && val != "-" { .ext.lm_package_name = val }
              val = to_string(event_data.KeyLength)
              if val != "" { .ext.key_length = val }
              val = to_string(event_data.ImpersonationLevel)
              if val != "" { .ext.impersonation_level = val }
              val = to_string(event_data.ElevatedToken)
              if val != "" { .ext.elevated_token = val }
          }

          # === 4625 - Failed Logon ===
          if event_id == 4625 {
              .udm.action = "logon_failure"
              .udm.category = "authentication"
              .udm.auth_result = "failure"

              val = to_string(event_data.TargetUserName)
              if val != "" { .udm.user = val }
              val = to_string(event_data.TargetDomainName)
              if val != "" { .udm.user_domain = val }
              val = to_string(event_data.SubjectUserName)
              if val != "" { .udm.src_user = val }
              val = to_string(event_data.SubjectDomainName)
              if val != "" { .udm.src_nt_domain = val }

              if logon_type_name != null {
                  .udm.auth_type = logon_type_name
              }
              if logon_type_str != "" { .ext.logon_type = logon_type_str }

              ip_addr = to_string(event_data.IpAddress)
              if ip_addr != "" && ip_addr != "-" {
                  .udm.src_ip = ip_addr
              }
              ip_port = to_string(event_data.IpPort)
              if ip_port != "" && ip_port != "0" {
                  .udm.src_port = to_int(ip_port) ?? null
              }

              val = to_string(event_data.LogonProcessName)
              if val != "" { .ext.logon_process = val }
              val = to_string(event_data.AuthenticationPackageName)
              if val != "" { .udm.authentication_method = val }
              val = to_string(event_data.WorkstationName)
              if val != "" { .ext.workstation_name = val }
              val = to_string(event_data.FailureReason)
              if val != "" { .ext.failure_reason_code = val }

              status_code = downcase(to_string(event_data.Status))
              sub_status_code = downcase(to_string(event_data.SubStatus))
              if status_code != "" { .ext.status = status_code }
              if sub_status_code != "" { .ext.sub_status = sub_status_code }

              failure_reason = if sub_status_code == "0xc000006a" { "wrong_password" } else if sub_status_code == "0xc0000064" { "no_such_user" } else if sub_status_code == "0xc0000234" { "account_locked" } else if sub_status_code == "0xc0000072" { "account_disabled" } else if sub_status_code == "0xc000006d" { "bad_password" } else if sub_status_code == "0xc000006e" { "restricted_logon" } else if sub_status_code == "0xc000006f" { "outside_logon_hours" } else if sub_status_code == "0xc0000070" { "unauthorized_workstation" } else if sub_status_code == "0xc0000071" { "password_expired" } else if sub_status_code == "0xc0000133" { "clock_skew" } else if sub_status_code == "0xc0000224" { "password_change_required" } else if status_code == "0xc000006d" { "bad_password" } else if status_code == "0xc0000064" { "no_such_user" } else if status_code == "0xc0000234" { "account_locked" } else if status_code == "0xc0000072" { "account_disabled" } else { null }

              if failure_reason != null {
                  .udm.result = failure_reason
                  .ext.failure_reason = failure_reason
              }
          }

          # === 4634/4647 - Logoff ===
          if event_id == 4634 || event_id == 4647 {
              .udm.action = "logoff"
              .udm.category = "authentication"
              val = to_string(event_data.TargetUserName)
              if val != "" { .udm.user = val }
              val = to_string(event_data.TargetDomainName)
              if val != "" { .udm.user_domain = val }
              val = to_string(event_data.TargetUserSid)
              if val != "" { .udm.user_id = val }
              val = to_string(event_data.TargetLogonId)
              if val != "" { .udm.session_id = val }
              if logon_type_str != "" { .ext.logon_type = logon_type_str }
          }

          # === 4648 - Explicit Credentials ===
          if event_id == 4648 {
              .udm.action = "explicit_credentials"
              .udm.category = "authentication"
              val = to_string(event_data.SubjectUserName)
              if val != "" { .udm.src_user = val }
              val = to_string(event_data.SubjectDomainName)
              if val != "" { .udm.src_nt_domain = val }
              val = to_string(event_data.TargetUserName)
              if val != "" { .udm.dest_user = val }
              val = to_string(event_data.TargetDomainName)
              if val != "" { .udm.dest_nt_domain = val }
              val = to_string(event_data.TargetServerName)
              if val != "" { .ext.target_server_name = val }
              val = to_string(event_data.TargetInfo)
              if val != "" { .ext.target_info = val }
              val = to_string(event_data.SubjectLogonId)
              if val != "" { .ext.subject_logon_id = val }

              process_name_full = to_string(event_data.ProcessName)
              if process_name_full != "" && process_name_full != "-" {
                  .udm.process_path = process_name_full
                  parts = split(process_name_full, "\\")
                  if length(parts) > 0 {
                      .udm.process_name = get(parts, [length(parts) - 1]) ?? null
                  }
              }

              ip_addr = to_string(event_data.IpAddress)
              if ip_addr != "" && ip_addr != "-" {
                  .udm.src_ip = ip_addr
              }
              ip_port = to_string(event_data.IpPort)
              if ip_port != "" && ip_port != "0" {
                  .udm.src_port = to_int(ip_port) ?? null
              }
          }

          # === 4672 - Special Privileges Assigned ===
          if event_id == 4672 {
              .udm.action = "special_privileges_assigned"
              .udm.category = "authorization"
              val = to_string(event_data.SubjectUserName)
              if val != "" { .udm.user = val }
              val = to_string(event_data.SubjectDomainName)
              if val != "" { .udm.user_domain = val }
              val = to_string(event_data.SubjectUserSid)
              if val != "" { .udm.user_id = val }
              val = to_string(event_data.SubjectLogonId)
              if val != "" { .udm.session_id = val }
              val = to_string(event_data.PrivilegeList)
              if val != "" { .ext.privileges = val }
          }

          # === 4688 - Process Creation ===
          if event_id == 4688 {
              .udm.action = "process_create"
              .udm.category = "process"

              new_process = to_string(event_data.NewProcessName)
              if new_process != "" {
                  .udm.process_path = new_process
                  parts = split(new_process, "\\")
                  if length(parts) > 0 {
                      .udm.process_name = get(parts, [length(parts) - 1]) ?? null
                  }
              }

              val = to_string(event_data.CommandLine)
              if val != "" { .udm.process = val }

              parent_process = to_string(event_data.ParentProcessName)
              if parent_process != "" {
                  .udm.parent_process_path = parent_process
                  .udm.parent_process = parent_process
                  parts = split(parent_process, "\\")
                  if length(parts) > 0 {
                      .udm.parent_process_name = get(parts, [length(parts) - 1]) ?? null
                  }
              }

              val = to_string(event_data.SubjectUserName)
              if val == "" { val = to_string(event_data.TargetUserName) }
              if val != "" { .udm.user = val }

              val = to_string(event_data.SubjectDomainName)
              if val == "" { val = to_string(event_data.TargetDomainName) }
              if val != "" { .udm.user_domain = val }

              val = to_string(event_data.SubjectUserSid)
              if val == "" { val = to_string(event_data.TargetUserSid) }
              if val != "" { .udm.user_id = val }

              val = to_string(event_data.SubjectLogonId)
              if val == "" { val = to_string(event_data.TargetLogonId) }
              if val != "" { .udm.session_id = val }

              new_pid_str = to_string(event_data.NewProcessId)
              if new_pid_str != "" {
                  .udm.process_id = to_int(new_pid_str) ?? null
              }

              parent_pid_str = to_string(event_data.ProcessId)
              if parent_pid_str != "" {
                  .udm.parent_process_id = to_int(parent_pid_str) ?? null
              }

              val = to_string(event_data.TokenElevationType)
              if val != "" { .ext.token_elevation_type = val }
              val = to_string(event_data.MandatoryLabel)
              if val != "" { .ext.mandatory_label = val }

              mandatory_label = to_string(event_data.MandatoryLabel)
              .udm.process_integrity_level = if mandatory_label == "S-1-16-0" { "Untrusted" } else if mandatory_label == "S-1-16-4096" { "Low" } else if mandatory_label == "S-1-16-8192" { "Medium" } else if mandatory_label == "S-1-16-8448" { "MediumPlus" } else if mandatory_label == "S-1-16-12288" { "High" } else if mandatory_label == "S-1-16-16384" { "System" } else { null }
          }

          # === 4689 - Process Termination ===
          if event_id == 4689 {
              .udm.action = "process_terminate"
              .udm.category = "process"
              process_name_full = to_string(event_data.ProcessName)
              if process_name_full != "" {
                  .udm.process_path = process_name_full
                  parts = split(process_name_full, "\\")
                  if length(parts) > 0 {
                      .udm.process_name = get(parts, [length(parts) - 1]) ?? null
                  }
              }
              val = to_string(event_data.SubjectUserName)
              if val != "" { .udm.user = val }
              val = to_string(event_data.SubjectDomainName)
              if val != "" { .udm.user_domain = val }
              val = to_string(event_data.SubjectLogonId)
              if val != "" { .udm.session_id = val }
              val = to_string(event_data.Status)
              if val != "" { .udm.status = val }

              pid_str = to_string(event_data.ProcessId)
              if pid_str != "" {
                  .udm.process_id = to_int(pid_str) ?? null
              }
          }

          # === 4697 - Service Installed (Security log) ===
          if event_id == 4697 {
              .udm.action = "service_installed"
              .udm.category = "service"
              val = to_string(event_data.SubjectUserName)
              if val != "" { .udm.user = val }
              val = to_string(event_data.SubjectDomainName)
              if val != "" { .udm.user_domain = val }
              val = to_string(event_data.SubjectUserSid)
              if val != "" { .udm.user_id = val }
              val = to_string(event_data.SubjectLogonId)
              if val != "" { .udm.session_id = val }
              val = to_string(event_data.ServiceName)
              if val != "" { .udm.service_name = val }
              val = to_string(event_data.ServiceFileName)
              if val != "" { .udm.service_path = val }
              val = to_string(event_data.ServiceType)
              if val != "" { .ext.service_type = val }
              val = to_string(event_data.ServiceStartType)
              if val != "" { .ext.service_start_type = val }
              val = to_string(event_data.ServiceAccount)
              if val != "" { .ext.service_account = val }
          }

          # === 7045 - Service Installed (System log) ===
          if event_id == 7045 {
              .udm.action = "service_installed"
              .udm.category = "service"
              val = to_string(event_data.ServiceName)
              if val != "" { .udm.service_name = val }
              val = to_string(event_data.ImagePath)
              if val != "" { .udm.service_path = val }
              val = to_string(event_data.ServiceType)
              if val != "" { .ext.service_type = val }
              val = to_string(event_data.StartType)
              if val != "" { .ext.service_start_type = val }
              val = to_string(event_data.AccountName)
              if val != "" { .ext.service_account = val }
          }

          # === 4720 - User Account Created ===
          if event_id == 4720 {
              .udm.action = "account_created"
              .udm.category = "account_management"
              val = to_string(event_data.SubjectUserName)
              if val != "" { .udm.src_user = val }
              val = to_string(event_data.SubjectDomainName)
              if val != "" { .udm.src_nt_domain = val }
              val = to_string(event_data.TargetUserName)
              if val != "" { .udm.dest_user = val }
              val = to_string(event_data.TargetDomainName)
              if val != "" { .udm.dest_nt_domain = val }
              val = to_string(event_data.TargetSid)
              if val != "" { .udm.user_id = val }
              val = to_string(event_data.SubjectLogonId)
              if val != "" { .ext.subject_logon_id = val }
              val = to_string(event_data.SamAccountName)
              if val != "" { .ext.sam_account_name = val }
              val = to_string(event_data.DisplayName)
              if val != "" { .ext.display_name = val }
              val = to_string(event_data.UserPrincipalName)
              if val != "" { .ext.user_principal_name = val }
              val = to_string(event_data.PrimaryGroupId)
              if val != "" { .ext.primary_group_id = val }
              val = to_string(event_data.PasswordLastSet)
              if val != "" { .ext.password_last_set = val }
              val = to_string(event_data.AccountExpires)
              if val != "" { .ext.account_expires = val }
              val = to_string(event_data.UserAccountControl)
              if val != "" { .ext.user_account_control = val }
          }

          # === 4722 - User Account Enabled ===
          if event_id == 4722 {
              .udm.action = "account_enabled"
              .udm.category = "account_management"
              val = to_string(event_data.SubjectUserName)
              if val != "" { .udm.src_user = val }
              val = to_string(event_data.SubjectDomainName)
              if val != "" { .udm.src_nt_domain = val }
              val = to_string(event_data.TargetUserName)
              if val != "" { .udm.dest_user = val }
              val = to_string(event_data.TargetDomainName)
              if val != "" { .udm.dest_nt_domain = val }
              val = to_string(event_data.TargetSid)
              if val != "" { .udm.user_id = val }
          }

          # === 4723 - Password Change Attempt ===
          if event_id == 4723 {
              .udm.action = "password_change_attempt"
              .udm.category = "account_management"
              val = to_string(event_data.SubjectUserName)
              if val != "" { .udm.src_user = val }
              val = to_string(event_data.SubjectDomainName)
              if val != "" { .udm.src_nt_domain = val }
              val = to_string(event_data.TargetUserName)
              if val != "" { .udm.dest_user = val }
              val = to_string(event_data.TargetDomainName)
              if val != "" { .udm.dest_nt_domain = val }
              val = to_string(event_data.TargetSid)
              if val != "" { .udm.user_id = val }
          }

          # === 4724 - Password Reset ===
          if event_id == 4724 {
              .udm.action = "password_reset"
              .udm.category = "account_management"
              val = to_string(event_data.SubjectUserName)
              if val != "" { .udm.src_user = val }
              val = to_string(event_data.SubjectDomainName)
              if val != "" { .udm.src_nt_domain = val }
              val = to_string(event_data.TargetUserName)
              if val != "" { .udm.dest_user = val }
              val = to_string(event_data.TargetDomainName)
