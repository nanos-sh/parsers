name: aws_alb
display_name: AWS ALB Access Logs
version: "1.0.0"
description: "Parses AWS Application Load Balancer access logs including request routing, target processing, and SSL details"
match_values:
  - aws_alb
  - aws_elb
  - alb_access
category: cloud
vendor: "Amazon"
product: "ALB"
parser_vrl: |
  # AWS ALB Access Log Parser
  # Parses space-delimited ALB access log lines

  # Initialize required structures
  .udm = {}
  .ext = {}
  .metadata = {}

  # Set defaults
  .udm.timestamp = now()
  .udm.cloud_provider = "aws"
  .udm.cloud_service = "alb"

  # Get raw log content
  raw_log = to_string(.message) ?? ""

  # Parse ALB log format using regex
  matched = parse_regex(raw_log, r'^(?P<type>\S+)\s+(?P<timestamp>\S+)\s+(?P<elb>\S+)\s+(?P<client_port>\S+)\s+(?P<target_port>\S+)\s+(?P<request_processing_time>\S+)\s+(?P<target_processing_time>\S+)\s+(?P<response_processing_time>\S+)\s+(?P<elb_status_code>\S+)\s+(?P<target_status_code>\S+)\s+(?P<received_bytes>\S+)\s+(?P<sent_bytes>\S+)\s+"(?P<request>[^"]*)"\s+"(?P<user_agent>[^"]*)"\s+(?P<ssl_cipher>\S+)\s+(?P<ssl_protocol>\S+)\s+(?P<target_group_arn>\S+)\s+"(?P<trace_id>[^"]*)"\s+"(?P<domain_name>[^"]*)"\s+"(?P<chosen_cert_arn>[^"]*)"\s+(?P<matched_rule_priority>\S+)\s+(?P<request_creation_time>\S+)\s+"(?P<actions_executed>[^"]*)"\s+"(?P<redirect_url>[^"]*)"\s+"(?P<error_reason>[^"]*)"') ?? {}

  if length(keys(matched)) > 0 {
      # --- Timestamp ---
      ts_str = string!(matched.timestamp)
      if ts_str != "" {
          ts, ts_err = parse_timestamp(ts_str, "%+")
          if ts_err == null {
              .udm.timestamp = format_timestamp!(ts, format: "%Y-%m-%d %H:%M:%S")
          }
      }

      # --- Client IP and Port ---
      client_str = string!(matched.client_port)
      if client_str != "-" {
          client_parts = split(client_str, ":")
          if length(client_parts) >= 2 {
              .udm.src_ip = client_parts[0]
              .udm.src_port = client_parts[1]
          }
      }

      # --- Target IP and Port ---
      target_str = string!(matched.target_port)
      if target_str != "-" {
          target_parts = split(target_str, ":")
          if length(target_parts) >= 2 {
              .udm.dest_ip = target_parts[0]
              .udm.dest_port = target_parts[1]
          }
      }

      # --- Request (method url protocol) ---
      request_str = string!(matched.request)
      if request_str != "" && request_str != "-" {
          req_parts = split(request_str, " ")
          if length(req_parts) >= 1 {
              .udm.http_method = req_parts[0]
          }
          if length(req_parts) >= 2 {
              .udm.url = req_parts[1]
          }
          if length(req_parts) >= 3 {
              .udm.protocol = req_parts[2]
          }
      }

      # --- User Agent ---
      ua = string!(matched.user_agent)
      if ua != "" && ua != "-" {
          .udm.http_user_agent = ua
      }

      # --- Status Codes ---
      elb_status = string!(matched.elb_status_code)
      if elb_status != "-" {
          .udm.http_status_code = elb_status
      }
      target_status = string!(matched.target_status_code)
      if target_status != "-" {
          .ext.target_status_code = target_status
      }

      # --- Bytes ---
      recv = string!(matched.received_bytes)
      if recv != "-" {
          .udm.bytes_in = recv
      }
      sent = string!(matched.sent_bytes)
      if sent != "-" {
          .udm.bytes_out = sent
      }

      # --- Domain Name ---
      domain = string!(matched.domain_name)
      if domain != "" && domain != "-" {
          .udm.url_domain = domain
      }

      # --- Duration (target processing time in seconds) ---
      tpt = string!(matched.target_processing_time)
      if tpt != "-" {
          .udm.duration = tpt
      }

      # --- Actions Executed ---
      actions = string!(matched.actions_executed)
      if actions != "" && actions != "-" {
          .udm.action = actions
      }

      # --- ELB Type ---
      elb_type = string!(matched.type)
      if elb_type != "" {
          .ext.connection_type = elb_type
      }

      # --- ELB Name ---
      elb_name = string!(matched.elb)
      if elb_name != "" && elb_name != "-" {
          .udm.resource_name = elb_name
      }

      # --- SSL ---
      cipher = string!(matched.ssl_cipher)
      if cipher != "-" {
          .ext.ssl_cipher = cipher
      }
      proto = string!(matched.ssl_protocol)
      if proto != "-" {
          .ext.ssl_protocol = proto
      }

      # --- Target Group ARN ---
      tg_arn = string!(matched.target_group_arn)
      if tg_arn != "-" {
          .ext.target_group_arn = tg_arn
      }

      # --- Trace ID ---
      trace = string!(matched.trace_id)
      if trace != "" && trace != "-" {
          .ext.trace_id = trace
      }

      # --- Processing Times ---
      rpt = string!(matched.request_processing_time)
      if rpt != "-" {
          .ext.request_processing_time = rpt
      }
      resp_pt = string!(matched.response_processing_time)
      if resp_pt != "-" {
          .ext.response_processing_time = resp_pt
      }

      # --- Error Reason ---
      err_reason = string!(matched.error_reason)
      if err_reason != "" && err_reason != "-" {
          .ext.error_reason = err_reason
      }

      # --- Redirect URL ---
      redir = string!(matched.redirect_url)
      if redir != "" && redir != "-" {
          .ext.redirect_url = redir
      }

  } else {
      .metadata.parse_error = "Failed to match ALB log format"
  }

  # Set parser name
  .metadata.parser = "aws_alb"

  # Preserve raw log
  .message = raw_log
