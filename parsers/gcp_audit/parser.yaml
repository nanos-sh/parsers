name: gcp_audit
display_name: GCP Audit Log
version: "1.0.0"
description: "Parses Google Cloud Audit Logs (cloudaudit.googleapis.com) including IAM changes, API calls, resource operations, and authorization details"
category: cloud
vendor: "Google"
product: "Cloud Audit Logs"
parser_vrl: |
  # GCP Audit Log Parser
  # Parses JSON-formatted Google Cloud Audit Logs (cloudaudit.googleapis.com)

  # Initialize required structures
  .udm = {}
  .ext = {}
  .metadata = {}

  # Set defaults
  .udm.timestamp = now()
  .udm.cloud_provider = "gcp"

  # Get raw log content
  raw_log = to_string(.message) ?? ""

  # Parse JSON
  parsed, err = parse_json(raw_log)

  if err == null {
      # --- Core Fields ---

      # Timestamp
      # Prefer top-level timestamp, fallback to receiveTimestamp
      if exists(parsed.timestamp) {
          ts, ts_err = parse_timestamp(string!(parsed.timestamp), "%+")
          if ts_err == null {
              .udm.timestamp = format_timestamp!(ts, format: "%Y-%m-%d %H:%M:%S")
          }
      } else if exists(parsed.receiveTimestamp) {
          ts, ts_err = parse_timestamp(string!(parsed.receiveTimestamp), "%+")
          if ts_err == null {
              .udm.timestamp = format_timestamp!(ts, format: "%Y-%m-%d %H:%M:%S")
          }
      }

      # Severity
      if exists(parsed.severity) {
          .udm.severity = downcase(string!(parsed.severity))
      }

      # Log Name / ID
      if exists(parsed.insertId) {
          .metadata.event_id = string!(parsed.insertId)
      }
      if exists(parsed.logName) {
          .ext.log_name = string!(parsed.logName)
      }

      # --- Resource Context & Namespace ---

      # Extract Project ID for Namespace Isolation
      # Try resource.labels first, then look in logName
      project_id = null

      if exists(parsed.resource.labels.project_id) {
          project_id = string!(parsed.resource.labels.project_id)
      } else if exists(parsed.logName) {
          # logName format: projects/PROJECT_ID/logs/...
          log_name = string!(parsed.logName)
          parts = split(log_name, "/")
          if length(parts) >= 2 && parts[0] == "projects" {
              project_id = parts[1]
          }
      }

      if project_id != null {
          .udm.cloud_account_name = project_id

          # If the project_id happens to be numeric, we can also map to account_id
          project_num = to_int(project_id) ?? null
          if project_num != null {
              .udm.cloud_account_id = project_num
          }

          .udm.namespace = "gcp:" + project_id
      } else {
          .udm.namespace = "gcp:"
      }

      # Resource Type & Labels
      if exists(parsed.resource.type) {
          .udm.resource_type = string!(parsed.resource.type)
      }
      if exists(parsed.resource.labels) {
          labels = parsed.resource.labels

          if exists(labels.email_id) {
              .ext.resource_email = string!(labels.email_id)
          }
          if exists(labels.unique_id) {
              .ext.resource_unique_id = string!(labels.unique_id)
          }
          if exists(labels.zone) {
              .udm.cloud_region = string!(labels.zone)
          }
      }

      # --- ProtoPayload (Core Audit Data) ---
      if exists(parsed.protoPayload) {
          payload = parsed.protoPayload

          # Action / Method + change_type derivation
          if exists(payload.methodName) {
              method_name = string!(payload.methodName)
              .udm.action = method_name

              # Split method name and grab last segment as the verb
              method_parts = split(method_name, ".")
              last_idx = length(method_parts) - 1
              got, get_err = get(method_parts, [last_idx])
              if get_err == null {
                  verb = downcase(string!(got))

                  if starts_with(verb, "create") || starts_with(verb, "insert") {
                      .udm.change_type = "create"
                  } else if starts_with(verb, "delete") || starts_with(verb, "remove") || starts_with(verb, "destroy") || starts_with(verb, "purge") {
                      .udm.change_type = "delete"
                  } else if contains(verb, "setiampolicy") || contains(verb, "setiambinding") {
                      .udm.change_type = "permission_change"
                  } else if starts_with(verb, "update") || starts_with(verb, "patch") || starts_with(verb, "set") || starts_with(verb, "modify") || starts_with(verb, "enable") || starts_with(verb, "disable") || starts_with(verb, "start") || starts_with(verb, "stop") || starts_with(verb, "reset") || starts_with(verb, "resize") || starts_with(verb, "attach") || starts_with(verb, "detach") {
                      .udm.change_type = "update"
                  } else if starts_with(verb, "get") || starts_with(verb, "list") || starts_with(verb, "describe") || starts_with(verb, "search") || starts_with(verb, "read") || starts_with(verb, "check") || starts_with(verb, "aggregated") {
                      .udm.change_type = "access"
                  }
              }
          }

          # Service Name
          if exists(payload.serviceName) {
              .udm.cloud_service = string!(payload.serviceName)

              # Extract simple service name (e.g., "iam" from "iam.googleapis.com")
              svc_parts = split(string!(payload.serviceName), ".")
              if length(svc_parts) > 0 {
                  .udm.cloud_service = svc_parts[0]
              }
          }

          # Target Resource
          if exists(payload.resourceName) {
              .udm.object = string!(payload.resourceName)
              .udm.resource_name = string!(payload.resourceName)
          }

          # Authentication Info (User/Principal)
          if exists(payload.authenticationInfo) {
              auth = payload.authenticationInfo
              if exists(auth.principalEmail) {
                  .udm.user = string!(auth.principalEmail)
                  .udm.src_user = string!(auth.principalEmail)
              }
              if exists(auth.principalSubject) {
                  .ext.principal_subject = string!(auth.principalSubject)
              }
              if exists(auth.oauthInfo.oauthClientId) {
                  .ext.oauth_client_id = string!(auth.oauthInfo.oauthClientId)
              }
          }

          # Request Metadata (Network Source)
          if exists(payload.requestMetadata) {
              req_meta = payload.requestMetadata

              # Source IP
              if exists(req_meta.callerIp) {
                  ip_val = string!(req_meta.callerIp)
                  if is_ipv4(ip_val) || is_ipv6(ip_val) {
                      .udm.src_ip = ip_val
                  } else {
                      # Handle non-IP values like "private", "gce-internal-ip"
                      .udm.src_host = ip_val
                  }
              }

              # User Agent
              if exists(req_meta.callerSuppliedUserAgent) {
                  .udm.http_user_agent = string!(req_meta.callerSuppliedUserAgent)
              }
          }

          # Authorization Info (Permissions)
          if exists(payload.authorizationInfo) && is_array(payload.authorizationInfo) {
              auth_info_list = array!(payload.authorizationInfo)
              if length(auth_info_list) > 0 {
                  first_auth = auth_info_list[0]

                  if exists(first_auth.permission) {
                      .ext.permission = string!(first_auth.permission)
                  }

                  if exists(first_auth.granted) {
                      is_granted = to_bool(first_auth.granted) ?? false
                      .udm.status = if is_granted { "success" } else { "failure" }
                  }

                  # Store full authorization info in ext
                  .ext.authorization_info = encode_json(payload.authorizationInfo)
              }
          }

          # Request Details
          if exists(payload.request) {
              .ext.request_details = encode_json(payload.request)

              if exists(payload.request.name) && !exists(.udm.object) {
                  .udm.object = string!(payload.request.name)
              }
          }

          # Response Details
          if exists(payload.response) {
              .ext.response_details = encode_json(payload.response)
          }

          # Service Data (IAM Policy Deltas)
          if exists(payload.serviceData) {
              .ext.service_data = encode_json(payload.serviceData)

              if exists(payload.serviceData.policyDelta) {
                  deltas = payload.serviceData.policyDelta
                  if exists(deltas.bindingDeltas) {
                      .ext.iam_changes = encode_json(deltas.bindingDeltas)

                      # Override change_type — bindingDeltas is a stronger signal
                      .udm.change_type = "permission_change"

                      # Try to set operation from first delta if available
                      delta_list = array!(deltas.bindingDeltas)
                      if length(delta_list) > 0 {
                          first_delta = delta_list[0]
                          if exists(first_delta.action) {
                              .udm.operation = string!(first_delta.action)
                          }
                      }
                  }
              }
          }

          # Status (if explicit status object exists)
          if exists(payload.status) {
              status_obj = payload.status
              if exists(status_obj.code) {
                  code = to_int(status_obj.code) ?? 0
                  if code != 0 {
                      .udm.status = "failure"
                      .ext.error_code = to_string(code)
                  } else {
                      # Code 0 usually means success in GCP APIs
                      .udm.status = "success"
                  }
              }
              if exists(status_obj.message) {
                  .ext.status_message = string!(status_obj.message)
              }
          }
      }

      # Fallback status if not set
      if !exists(.udm.status) {
          .udm.status = "success"
      }

  } else {
      # Fallback for parse errors
      .metadata.parse_error = to_string(err)
  }

  # Set parser name
  .metadata.parser = "gcp_audit"

  # Preserve raw log
  .message = raw_log
