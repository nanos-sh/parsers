name: auth0
display_name: Auth0
version: "1.0.0"
description: "Parses Auth0 log events including successful/failed logins, signups, MFA, token exchanges, and management API operations"
match_values:
  - auth0
  - auth0_logs
category: security
vendor: "Okta"
product: "Auth0"
parser_vrl: |
  # Auth0 Log Parser
  # Parses JSON events from Auth0 log streams

  # Initialize required structures
  .udm = {}
  .ext = {}
  .metadata = {}

  # Set defaults
  .udm.timestamp = now()
  .udm.vendor = "Okta"
  .udm.product = "Auth0"
  .udm.vendor_product = "Okta Auth0"

  # Get raw log content
  raw_log = to_string(.message) ?? ""

  # Parse JSON
  parsed, err = parse_json(raw_log)

  if err == null {
      # --- Timestamp ---
      if exists(parsed.date) {
          ts, ts_err = parse_timestamp(string!(parsed.date), "%+")
          if ts_err == null {
              .udm.timestamp = format_timestamp!(ts, format: "%Y-%m-%d %H:%M:%S")
          }
      }

      # --- Type code mapping ---
      type_code = to_string(parsed.type) ?? ""

      # Map type codes to action names
      action_name = if type_code == "s" {
          "login_success"
      } else if type_code == "f" {
          "login_failure"
      } else if type_code == "fp" {
          "login_failure_wrong_password"
      } else if type_code == "fu" {
          "login_failure_invalid_email"
      } else if type_code == "ss" {
          "signup_success"
      } else if type_code == "fs" {
          "signup_failure"
      } else if type_code == "gd_auth_succeed" {
          "mfa_success"
      } else if type_code == "gd_auth_failed" {
          "mfa_failure"
      } else if type_code == "sapi" {
          "api_success"
      } else if type_code == "fapi" {
          "api_failure"
      } else if type_code == "slo" {
          "logout_success"
      } else if type_code == "ssa" {
          "silent_auth_success"
      } else if type_code == "fsa" {
          "silent_auth_failure"
      } else if type_code == "se" {
          "token_exchange_success"
      } else if type_code == "fe" {
          "token_exchange_failure"
      } else if type_code == "sci" {
          "change_password_success"
      } else if type_code == "fci" {
          "change_password_failure"
      } else if type_code == "sv" {
          "email_verification_success"
      } else if type_code == "fv" {
          "email_verification_failure"
      } else {
          type_code
      }

      .udm.action = action_name
      .ext.type_code = type_code

      # Determine success/failure from type code prefix
      is_success = starts_with(type_code, "s") || type_code == "gd_auth_succeed"
      is_failure = starts_with(type_code, "f") || type_code == "gd_auth_failed"

      if is_success {
          .udm.status = "success"
          .udm.result = "success"
      } else if is_failure {
          .udm.status = "failure"
          .udm.result = "failure"
      }

      # Determine category
      is_auth = type_code == "s" || type_code == "f" || type_code == "fp" || type_code == "fu" || type_code == "ssa" || type_code == "fsa"
      is_mfa = type_code == "gd_auth_succeed" || type_code == "gd_auth_failed"
      is_signup = type_code == "ss" || type_code == "fs"
      is_api = type_code == "sapi" || type_code == "fapi"

      if is_auth {
          .udm.category = "authentication"
          .udm.authentication_service = "Auth0"
          if is_success {
              .udm.auth_result = "success"
          } else if is_failure {
              .udm.auth_result = "failure"
          }
      } else if is_mfa {
          .udm.category = "authentication"
          .udm.authentication_service = "Auth0"
          .udm.mfa_used = "true"
          if type_code == "gd_auth_succeed" {
              .udm.auth_result = "success"
          } else {
              .udm.auth_result = "failure"
          }
      } else if is_signup {
          .udm.category = "user_management"
      } else if is_api {
          .udm.category = "admin"
      } else {
          .udm.category = "other"
      }

      # --- User ---
      if exists(parsed.user_name) {
          user_name_val = string!(parsed.user_name)
          .udm.user = user_name_val

          # Extract domain from email
          parts = split(user_name_val, "@")
          if length(parts) == 2 {
              .udm.user_name = parts[0]
              .udm.user_domain = parts[1]
          }
      }

      if exists(parsed.user_id) {
          uid_val = to_string(parsed.user_id) ?? ""
          if uid_val != "" {
              .udm.user_id = uid_val
          }
      }

      # --- Source IP ---
      if exists(parsed.ip) {
          .udm.src_ip = string!(parsed.ip)
      }

      # --- Description ---
      if exists(parsed.description) {
          .ext.description = string!(parsed.description)
      }

      # --- Application ---
      if exists(parsed.client_name) {
          .udm.app = string!(parsed.client_name)
      }
      if exists(parsed.client_id) {
          .udm.app_id = string!(parsed.client_id)
      }

      # --- Connection / Strategy ---
      if exists(parsed.connection) {
          .udm.authentication_method = string!(parsed.connection)
      }
      if exists(parsed.strategy) {
          .ext.strategy = string!(parsed.strategy)
      }
      if exists(parsed.strategy_type) {
          .ext.strategy_type = string!(parsed.strategy_type)
      }
      if exists(parsed.connection_id) {
          .ext.connection_id = string!(parsed.connection_id)
      }

      # --- Session ID from details ---
      if exists(parsed.details.session_id) {
          .udm.session_id = string!(parsed.details.session_id)
      }

      # --- User Agent ---
      if exists(parsed.user_agent) {
          .udm.http_user_agent = string!(parsed.user_agent)
      }

      # --- Hostname (Auth0 domain) ---
      if exists(parsed.hostname) {
          .ext.auth0_domain = string!(parsed.hostname)
      }

      # --- Log ID ---
      if exists(parsed.log_id) {
          .ext.log_id = string!(parsed.log_id)
          .metadata.event_id = string!(parsed.log_id)
      }

      # --- Mobile ---
      if exists(parsed.isMobile) {
          .ext.is_mobile = to_string(parsed.isMobile) ?? ""
      }

      # --- Location info ---
      if exists(parsed.location_info) {
          loc = parsed.location_info
          if exists(loc.country_name) {
              .ext.geo_country = string!(loc.country_name)
          }
          if exists(loc.country_code) {
              .ext.geo_country_code = string!(loc.country_code)
          }
          if exists(loc.city_name) {
              .ext.geo_city = string!(loc.city_name)
          }
          if exists(loc.time_zone) {
              .ext.geo_timezone = string!(loc.time_zone)
          }
          if exists(loc.continent_code) {
              .ext.geo_continent = string!(loc.continent_code)
          }
          if exists(loc.latitude) {
              .ext.geo_lat = to_string(loc.latitude) ?? ""
          }
          if exists(loc.longitude) {
              .ext.geo_lon = to_string(loc.longitude) ?? ""
          }
      }

      # --- Details (MFA factor) ---
      if exists(parsed.details.factor.name) {
          .udm.auth_type = string!(parsed.details.factor.name)
          .udm.mfa_used = "true"
      }

      # --- Details (login stats) ---
      if exists(parsed.details.prompts) && is_array(parsed.details.prompts) {
          prompts = array!(parsed.details.prompts)
          if length(prompts) > 0 {
              p0 = prompts[0]
              if exists(p0.stats.loginsCount) {
                  .ext.logins_count = to_string(p0.stats.loginsCount) ?? ""
              }
              if exists(p0.elapsedTime) {
                  .ext.prompt_elapsed_time = to_string(p0.elapsedTime) ?? ""
              }
          }
      }

      # --- Details (API operations) ---
      if exists(parsed.details.request) {
          req = parsed.details.request
          if exists(req.method) {
              .udm.http_method = string!(req.method)
          }
          if exists(req.path) {
              .ext.api_path = string!(req.path)
          }
          if exists(req.body) {
              .ext.api_request_body = encode_json(req.body)
          }
      }
      if exists(parsed.details.response) {
          resp = parsed.details.response
          if exists(resp.statusCode) {
              .ext.api_response_status = to_string(resp.statusCode) ?? ""
          }
      }

  } else {
      .metadata.parse_error = to_string(err)
  }

  # Set parser name
  .metadata.parser = "auth0"

  # Preserve raw log
  .message = raw_log
