name: f5_waf
display_name: F5 BIG-IP ASM
version: "1.2.0"
description: "Parses F5 BIG-IP ASM (Web Application Firewall) logs with attack detection, violations, and security events"
match_values:
  - f5_waf
  - f5_asm
  - bigip_asm
category: security
vendor: "F5"
product: "BIG-IP ASM"
parser_vrl: |
  # F5 BIG-IP ASM (Web Application Firewall) Parser
  # Parses WAF logs with attack detection, violations, and security events
  # Handles both syslog-wrapped and raw key-value formats

  # Initialize required structures
  .udm = {}
  .ext = {}
  .metadata = {}

  # Set defaults
  .udm.timestamp = now()

  # Get raw log
  raw_log = string!(.message)

  # Try to parse syslog wrapper first: "Jan 15 14:32:01 hostname ASM: key=value,..."
  syslog_match, syslog_err = parse_regex(raw_log, r'^(?P<timestamp>\w+\s+\d+\s+\d+:\d+:\d+)\s+(?P<hostname>\S+)\s+(?P<component>\S+):\s+(?P<body>.*)$')

  body = ""
  if syslog_err == null && syslog_match != null {
      if exists(syslog_match.timestamp) {
          ts_str = string!(syslog_match.timestamp)
          current_year = format_timestamp!(now(), "%Y")
          full_ts = ts_str + " " + current_year
          ts, ts_err = parse_timestamp(full_ts, "%b %d %H:%M:%S %Y")
          if ts_err == null {
              .udm.timestamp = format_timestamp!(ts, format: "%Y-%m-%d %H:%M:%S")
          }
      }
      if exists(syslog_match.hostname) {
          .udm.dvc = string!(syslog_match.hostname)
      }
      if exists(syslog_match.component) {
          .metadata.component = string!(syslog_match.component)
      }
      if exists(syslog_match.body) {
          body = string!(syslog_match.body)
      }
  } else {
      body = raw_log
  }

  parsed = parse_key_value(body, key_value_delimiter: "=", field_delimiter: ",") ?? {}

  if exists(parsed.attack_type) {
      attack_type = string!(parsed.attack_type)
      .udm.signature = attack_type
      .udm.description = attack_type
      .udm.event_type = if contains(downcase(attack_type), "sql") {
          "sql_injection_attempt"
      } else if contains(downcase(attack_type), "xss") || contains(downcase(attack_type), "cross site") {
          "xss_attempt"
      } else if contains(downcase(attack_type), "traversal") {
          "path_traversal_attempt"
      } else if contains(downcase(attack_type), "bot") {
          "bot_detected"
      } else if contains(downcase(attack_type), "command") {
          "command_injection_attempt"
      } else if contains(downcase(attack_type), "csrf") {
          "csrf_attempt"
      } else if contains(downcase(attack_type), "buffer") {
          "buffer_overflow_attempt"
      } else {
          "waf_violation"
      }
  }

  if exists(parsed.policy_name) { .ext.policy_name = string!(parsed.policy_name) }
  if exists(parsed.src_ip) { .udm.src_ip = string!(parsed.src_ip) } else if exists(parsed.client_ip) { .udm.src_ip = string!(parsed.client_ip) } else if exists(parsed.source_ip) { .udm.src_ip = string!(parsed.source_ip) }
  if exists(parsed.dest_ip) { .udm.dest_ip = string!(parsed.dest_ip) } else if exists(parsed.server_ip) { .udm.dest_ip = string!(parsed.server_ip) }
  if exists(parsed.dest_port) { port_val = to_int(parsed.dest_port) ?? null; if port_val != null { .udm.dest_port = port_val } }
  if exists(parsed.method) { .udm.http_method = string!(parsed.method) } else if exists(parsed.http_method) { .udm.http_method = string!(parsed.http_method) }
  if exists(parsed.uri) { uri = string!(parsed.uri); .udm.uri_path = uri; .udm.url = uri } else if exists(parsed.url) { url = string!(parsed.url); .udm.url = url; .udm.uri_path = url }
  if exists(parsed.violations) { .ext.violations = string!(parsed.violations) }
  if exists(parsed.severity) { .udm.severity = downcase(string!(parsed.severity)) }

  if exists(parsed.action) {
      waf_action = string!(parsed.action)
      .ext.waf_action = waf_action
      if !exists(.udm.event_type) || .udm.event_type == "waf_violation" {
           if contains(downcase(waf_action), "block") { .udm.event_type = "blocked" } else if contains(downcase(waf_action), "allow") { .udm.event_type = "allowed" } else if contains(downcase(waf_action), "alert") { .udm.event_type = "alerted" }
      }
  }

  if exists(parsed.response_code) { .udm.http_status_code = to_int(parsed.response_code) ?? null } else if exists(parsed.status_code) { .udm.http_status_code = to_int(parsed.status_code) ?? null }
  if exists(parsed.user_agent) { .udm.http_user_agent = string!(parsed.user_agent) } else if exists(parsed.useragent) { .udm.http_user_agent = string!(parsed.useragent) }
  if exists(parsed.username) { .udm.user = string!(parsed.username) } else if exists(parsed.user) { .udm.user = string!(parsed.user) }
  if exists(parsed.session_id) { .udm.session_id = string!(parsed.session_id) }
  if exists(parsed.support_id) { .udm.id = string!(parsed.support_id) }
  if exists(parsed.violation_rating) { .ext.violation_rating = to_int(parsed.violation_rating) ?? null }
  if exists(parsed.sig_set_names) { .ext.signature_set = string!(parsed.sig_set_names) } else if exists(parsed.signature_set) { .ext.signature_set = string!(parsed.signature_set) }
  if exists(parsed.threat_campaign_names) { .ext.threat_campaign = string!(parsed.threat_campaign_names) } else if exists(parsed.threat_campaign) { .ext.threat_campaign = string!(parsed.threat_campaign) }
  if exists(parsed.bot_class) { .ext.bot_class = string!(parsed.bot_class) }
  if exists(parsed.bot_name) { .ext.bot_name = string!(parsed.bot_name) }
  if exists(parsed.param_name) { .ext.param_name = string!(parsed.param_name) }
  if exists(parsed.param_value) { .ext.param_value = string!(parsed.param_value) }
  if exists(parsed.request_status) { .ext.request_status = string!(parsed.request_status) }
  if exists(parsed.staged_sig) { .ext.staged_signature = string!(parsed.staged_sig) }
  if exists(parsed.violation_details) { .ext.violation_details = string!(parsed.violation_details) }
  if exists(parsed.request) { .ext.request = string!(parsed.request) }
  if exists(parsed.response) { .ext.response = string!(parsed.response) }
  if exists(parsed.virtual_server) { .ext.virtual_server = string!(parsed.virtual_server) }
  if exists(parsed.x_forwarded_for) { .ext.x_forwarded_for = string!(parsed.x_forwarded_for) }
  if exists(parsed.geo_location) { .ext.geo_location = string!(parsed.geo_location) }
  if exists(parsed.country) { .ext.country = string!(parsed.country) }
  if exists(parsed.bytes_in) { .udm.bytes_in = to_int(parsed.bytes_in) ?? null }
  if exists(parsed.bytes_out) { .udm.bytes_out = to_int(parsed.bytes_out) ?? null }
  if exists(parsed.duration) { .udm.duration = to_int(parsed.duration) ?? null }

  .message = raw_log
