name: defender_edr
display_name: Microsoft Defender for Endpoint
version: "1.1.0"
description: "Parses Microsoft Defender for Endpoint (EDR) events including process creation, network connections, file events, and logon activities"
match_values:
  - defender_edr
  - microsoft_defender
  - mde
category: endpoint
vendor: "Microsoft"
product: "Defender EDR"
parser_vrl: |
  # Microsoft Defender for Endpoint (EDR) Parser
  # Handles multiple event types: ConnectionSuccess, NetworkInfo, ProcessCreated, FileCreated, LogonSuccess
  # Initialize structures
  .udm = {}
  .ext = {}
  .metadata = {}
  # Get raw log content
  raw_log = string!(.message)
  # Parse JSON
  parsed, err = parse_json(raw_log)
  if err == null {
      # Extract common fields present in all events
      # Timestamp - ISO8601 format
      if exists(parsed.Timestamp) {
          ts, ts_err = parse_timestamp(string!(parsed.Timestamp), "%+")
          if ts_err == null {
              .udm.timestamp = ts
          } else {
              .udm.timestamp = now()
          }
      } else {
          .udm.timestamp = now()
      }
      # Device information
      if exists(parsed.DeviceId) {
          .ext.device_id = string!(parsed.DeviceId)
      }
      if exists(parsed.DeviceName) {
          .udm.src_host = string!(parsed.DeviceName)
      }
      if exists(parsed.ReportId) {
          .ext.report_id = to_int(parsed.ReportId) ?? null
      }
      # ActionType determines the event category
      action_type = if exists(parsed.ActionType) { string!(parsed.ActionType) } else { "unknown" }
      .ext.action_type = action_type
      # Process events based on ActionType
      if action_type == "ConnectionSuccess" {
          .udm.action = "network_connection"
          if exists(parsed.RemoteIP) {
              .udm.dest_ip = string!(parsed.RemoteIP)
          }
          if exists(parsed.RemotePort) {
              .udm.dest_port = to_int(parsed.RemotePort) ?? null
          }
          if exists(parsed.RemoteUrl) {
              .udm.dest_host = string!(parsed.RemoteUrl)
              .udm.url_domain = string!(parsed.RemoteUrl)
          }
          if exists(parsed.LocalIP) {
              .udm.src_ip = string!(parsed.LocalIP)
          }
          if exists(parsed.LocalPort) {
              .udm.src_port = to_int(parsed.LocalPort) ?? null
          }
          if exists(parsed.Protocol) {
              .udm.protocol = string!(parsed.Protocol)
          }
          if exists(parsed.InitiatingProcessId) {
              .udm.process_id = to_int(parsed.InitiatingProcessId) ?? null
          }
          if exists(parsed.InitiatingProcessFileName) {
              .udm.process_name = string!(parsed.InitiatingProcessFileName)
          }
          if exists(parsed.InitiatingProcessFolderPath) {
              folder_path = string!(parsed.InitiatingProcessFolderPath)
              if folder_path != "" {
                  .udm.process_path = folder_path
              }
          }
          if exists(parsed.InitiatingProcessCommandLine) {
              .udm.process = string!(parsed.InitiatingProcessCommandLine)
          }
          if exists(parsed.InitiatingProcessCreationTime) {
              ts, ts_err = parse_timestamp(string!(parsed.InitiatingProcessCreationTime), "%+")
              if ts_err == null {
                  .ext.process_creation_time = ts
              }
          }
          if exists(parsed.InitiatingProcessAccountDomain) {
              .udm.user_domain = string!(parsed.InitiatingProcessAccountDomain)
          }
          if exists(parsed.InitiatingProcessAccountName) {
              .udm.user = string!(parsed.InitiatingProcessAccountName)
          }
      } else if action_type == "NetworkInfo" {
          .udm.action = "network_info"
          if exists(parsed.NetworkAdapterName) {
              .ext.network_adapter_name = string!(parsed.NetworkAdapterName)
          }
          if exists(parsed.MacAddress) {
              .udm.mac = string!(parsed.MacAddress)
          }
          if exists(parsed.IPAddresses) {
              ip_addresses = parsed.IPAddresses
              if is_array(ip_addresses) {
                  ip_array = array!(ip_addresses)
                  if length(ip_array) > 0 {
                      .udm.src_ip = string!(ip_array[0])
                      .ext.ip_addresses = ip_array
                  }
              }
          }
          if exists(parsed.DefaultGateways) {
              default_gateways = parsed.DefaultGateways
              if is_array(default_gateways) {
                  .ext.default_gateways = array!(default_gateways)
              }
          }
          if exists(parsed.DnsAddresses) {
              dns_addresses = parsed.DnsAddresses
              if is_array(dns_addresses) {
                  .ext.dns_addresses = array!(dns_addresses)
              }
          }
          if exists(parsed.ConnectedNetworks) {
              .ext.connected_networks = string!(parsed.ConnectedNetworks)
          }
          if exists(parsed.NetworkAdapterType) {
              .ext.network_adapter_type = string!(parsed.NetworkAdapterType)
          }
          if exists(parsed.NetworkAdapterStatus) {
              .ext.network_adapter_status = string!(parsed.NetworkAdapterStatus)
          }
      } else if action_type == "ProcessCreated" {
          .udm.action = "process_create"
          if exists(parsed.FileName) {
              .udm.process_name = string!(parsed.FileName)
          }
          if exists(parsed.FolderPath) {
              folder_path = string!(parsed.FolderPath)
              if folder_path != "" {
                  .udm.process_path = folder_path
              }
          }
          if exists(parsed.SHA256) {
              .udm.file_hash = string!(parsed.SHA256)
          } else if exists(parsed.SHA1) {
              .udm.file_hash = string!(parsed.SHA1)
          } else if exists(parsed.MD5) {
              .udm.file_hash = string!(parsed.MD5)
          }
          if exists(parsed.SHA1) { .ext.sha1 = string!(parsed.SHA1) }
          if exists(parsed.MD5) { .ext.md5 = string!(parsed.MD5) }
          if exists(parsed.ProcessId) {
              .udm.process_id = to_int(parsed.ProcessId) ?? null
          }
          if exists(parsed.ProcessCommandLine) {
              .udm.process = string!(parsed.ProcessCommandLine)
          }
          if exists(parsed.ProcessIntegrityLevel) {
              .ext.process_integrity_level = string!(parsed.ProcessIntegrityLevel)
          }
          if exists(parsed.ProcessTokenElevation) {
              .ext.process_token_elevation = string!(parsed.ProcessTokenElevation)
          }
          if exists(parsed.ProcessCreationTime) {
              ts, ts_err = parse_timestamp(string!(parsed.ProcessCreationTime), "%+")
              if ts_err == null {
                  .ext.process_creation_time = ts
              }
          }
          if exists(parsed.AccountDomain) {
              .udm.user_domain = string!(parsed.AccountDomain)
          }
          if exists(parsed.AccountName) {
              .udm.user = string!(parsed.AccountName)
          }
          if exists(parsed.AccountSid) {
              .ext.account_sid = string!(parsed.AccountSid)
          }
          if exists(parsed.AccountUpn) {
              .ext.account_upn = string!(parsed.AccountUpn)
          }
          if exists(parsed.LogonId) {
              .ext.logon_id = to_int(parsed.LogonId) ?? null
          }
          if exists(parsed.InitiatingProcessId) {
              .udm.parent_process_id = to_int(parsed.InitiatingProcessId) ?? null
          }
          if exists(parsed.InitiatingProcessFileName) {
              .udm.parent_process_name = string!(parsed.InitiatingProcessFileName)
          }
          if exists(parsed.InitiatingProcessFolderPath) {
              folder_path = string!(parsed.InitiatingProcessFolderPath)
              if folder_path != "" {
                  .udm.parent_process_path = folder_path
              }
          }
          if exists(parsed.InitiatingProcessCommandLine) {
              .udm.parent_process = string!(parsed.InitiatingProcessCommandLine)
          }
          if exists(parsed.InitiatingProcessCreationTime) {
              ts, ts_err = parse_timestamp(string!(parsed.InitiatingProcessCreationTime), "%+")
              if ts_err == null {
                  .ext.parent_process_creation_time = ts
              }
          }
          if exists(parsed.InitiatingProcessAccountDomain) {
              .ext.parent_account_domain = string!(parsed.InitiatingProcessAccountDomain)
          }
          if exists(parsed.InitiatingProcessAccountName) {
              .udm.parent_user = string!(parsed.InitiatingProcessAccountName)
          }
      } else if action_type == "FileCreated" {
          .udm.action = "file_create"
          .udm.file_action = "created"
          if exists(parsed.FileName) {
              .udm.file_path = string!(parsed.FileName)
              file_path_str = string!(parsed.FileName)
              fname_match = parse_regex(file_path_str, r'[^\\/]+$') ?? {}
              if exists(fname_match."0") {
                  .udm.file_name = string!(fname_match."0")
              }
          }
          if exists(parsed.FolderPath) {
              folder_path = string!(parsed.FolderPath)
              if folder_path != "" {
                  .ext.folder_path = folder_path
              }
          }
          if exists(parsed.SHA256) {
              .udm.file_hash = string!(parsed.SHA256)
          } else if exists(parsed.SHA1) {
              .udm.file_hash = string!(parsed.SHA1)
          } else if exists(parsed.MD5) {
              .udm.file_hash = string!(parsed.MD5)
          }
          if exists(parsed.SHA1) { .ext.sha1 = string!(parsed.SHA1) }
          if exists(parsed.MD5) { .ext.md5 = string!(parsed.MD5) }
          if exists(parsed.FileSize) {
              .udm.file_size = to_int(parsed.FileSize) ?? null
          }
          if exists(parsed.InitiatingProcessId) {
              .udm.process_id = to_int(parsed.InitiatingProcessId) ?? null
          }
          if exists(parsed.InitiatingProcessFileName) {
              .udm.process_name = string!(parsed.InitiatingProcessFileName)
          }
          if exists(parsed.InitiatingProcessFolderPath) {
              folder_path = string!(parsed.InitiatingProcessFolderPath)
              if folder_path != "" {
                  .udm.process_path = folder_path
              }
          }
          if exists(parsed.InitiatingProcessCommandLine) {
              .udm.process = string!(parsed.InitiatingProcessCommandLine)
          }
          if exists(parsed.InitiatingProcessCreationTime) {
              ts, ts_err = parse_timestamp(string!(parsed.InitiatingProcessCreationTime), "%+")
              if ts_err == null {
                  .ext.process_creation_time = ts
              }
          }
          if exists(parsed.InitiatingProcessAccountDomain) {
              .udm.user_domain = string!(parsed.InitiatingProcessAccountDomain)
          }
          if exists(parsed.InitiatingProcessAccountName) {
              .udm.user = string!(parsed.InitiatingProcessAccountName)
          }
      } else if action_type == "LogonSuccess" {
          .udm.action = "login"
          .udm.status = "success"
          if exists(parsed.LogonType) {
              .udm.auth_type = string!(parsed.LogonType)
          }
          if exists(parsed.AccountDomain) {
              .udm.user_domain = string!(parsed.AccountDomain)
          }
          if exists(parsed.AccountName) {
              .udm.user = string!(parsed.AccountName)
          }
          if exists(parsed.AccountSid) {
              .ext.account_sid = string!(parsed.AccountSid)
          }
          if exists(parsed.LogonId) {
              .udm.session_id = to_int(parsed.LogonId) ?? null
          }
          if exists(parsed.RemoteIP) {
              remote_ip = string!(parsed.RemoteIP)
              if remote_ip != "" {
                  .udm.src_ip = remote_ip
              }
          }
          if exists(parsed.RemoteDeviceName) {
              remote_device = string!(parsed.RemoteDeviceName)
              if remote_device != "" {
                  .ext.remote_device_name = remote_device
              }
          }
          if exists(parsed.IsLocalAdmin) {
              .ext.is_local_admin = parsed.IsLocalAdmin
          }
      } else {
          .udm.action = downcase(action_type)
      }
  } else {
      .metadata.parse_error = to_string(err)
      .udm.timestamp = now()
      .udm.action = "unknown"
  }
  if !exists(.udm.timestamp) {
      .udm.timestamp = now()
  }
  .metadata.parser = "defender_edr"
  .message = raw_log
