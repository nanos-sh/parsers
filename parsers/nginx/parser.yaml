name: nginx
display_name: Nginx
version: "1.0.0"
description: "Parses Nginx access logs in combined, JSON, and custom formats"
match_values:
  - nginx
  - nginx_access
category: application
vendor: "Nginx"
product: "Nginx"

parser_vrl: |
  raw_log = string!(.message)

  # Try JSON format first
  parsed_json, json_err = parse_json(raw_log)

  if json_err == null {
    # JSON format nginx log
    .src_ip = to_string(parsed_json.remote_addr) ?? null
    .user = to_string(parsed_json.remote_user) ?? null
    .http_status_code = to_int(parsed_json.status) ?? null
    .bytes_out = to_int(parsed_json.body_bytes_sent) ?? null
    .http_referrer = to_string(parsed_json.http_referer) ?? null
    .http_user_agent = to_string(parsed_json.http_user_agent) ?? null
    .duration = to_float(parsed_json.request_time) ?? null
    .ext.upstream_response_time = to_string(parsed_json.upstream_response_time) ?? null
    .ext.request_length = to_int(parsed_json.request_length) ?? null
    .ext.xff = to_string(parsed_json.http_x_forwarded_for) ?? null

    # Parse upstream_addr into dest_ip and dest_port
    upstream = to_string(parsed_json.upstream_addr) ?? null
    if upstream != null {
      upstream_parts = split!(upstream, ":")
      if length(upstream_parts) == 2 {
        .dest_ip = get!(upstream_parts, [0])
        .dest_port = to_int!(get!(upstream_parts, [1]))
      }
    }

    # Parse the request line
    request_line = to_string(parsed_json.request) ?? ""
    req_parts = split(request_line, " ")
    if length(req_parts) >= 2 {
      .http_method = get!(req_parts, [0])
      full_uri = to_string!(get!(req_parts, [1]))
      # Split path from query string
      uri_parts = split(full_uri, "?", limit: 2)
      .uri_path = get!(uri_parts, [0])
      if length(uri_parts) == 2 {
        .ext.query_string = get!(uri_parts, [1])
      }
    }
    if length(req_parts) >= 3 {
      .ext.http_version = get!(req_parts, [2])
    }

    # Parse timestamp
    time_local = to_string(parsed_json.time_local) ?? null
    if time_local != null {
      ts, ts_err = parse_timestamp(time_local, format: "%d/%b/%Y:%H:%M:%S %z")
      if ts_err == null {
        .timestamp = ts
      }
    }

    # Handle user field
    if .user == "-" || .user == "" {
      .user = null
    }
  } else {
    # Try combined log format
    parsed_combined, combined_err = parse_nginx_log(raw_log, "combined")

    if combined_err == null {
      .src_ip = to_string(parsed_combined.client)
      .user = to_string(parsed_combined.user)
      .http_status_code = to_int(parsed_combined.status)
      .bytes_out = to_int(parsed_combined.size)
      .http_referrer = to_string(parsed_combined.referer)
      .http_user_agent = to_string(parsed_combined.agent)
      .timestamp = parsed_combined.timestamp

      # Parse request line: "METHOD /path HTTP/version"
      combined_request = to_string(parsed_combined.request)
      combined_req_parts = split(combined_request, " ")
      if length(combined_req_parts) >= 2 {
        .http_method = get!(combined_req_parts, [0])
        full_uri = to_string!(get!(combined_req_parts, [1]))
        uri_parts = split(full_uri, "?", limit: 2)
        .uri_path = get!(uri_parts, [0])
        if length(uri_parts) == 2 {
          .ext.query_string = get!(uri_parts, [1])
        }
      }
      if length(combined_req_parts) >= 3 {
        .ext.http_version = get!(combined_req_parts, [2])
      }

      # Handle user/referrer placeholders
      if .user == "-" || .user == "" {
        .user = null
      }
      if .http_referrer == "-" {
        .http_referrer = null
      }
    } else {
      # Try error log format
      error_match = parse_regex(raw_log, r'^(?P<timestamp>\d{4}/\d{2}/\d{2} \d{2}:\d{2}:\d{2}) \[(?P<level>\w+)\] (?P<pid>\d+)#(?P<tid>\d+): \*(?P<cid>\d+) (?P<error_message>.+?)(?:, client: (?P<client>[^,]+))?(?:, server: (?P<server>[^,]+))?(?:, request: "(?P<request>[^"]+)")?(?:, host: "(?P<host>[^"]+)")?$') ?? null

      if error_match != null {
        .severity = to_string(error_match.level)
        .ext.pid = to_string(error_match.pid)
        .ext.error_message = to_string(error_match.error_message)
        .src_ip = to_string(error_match.client)
        .dest_host = to_string(error_match.server)

        ts_str = to_string(error_match.timestamp)
        if ts_str != null {
          ts, ts_err = parse_timestamp(ts_str, format: "%Y/%m/%d %H:%M:%S")
          if ts_err == null {
            .timestamp = ts
          }
        }

        # Parse request line from error log
        req_str = to_string(error_match.request)
        if req_str != null {
          req_parts = split(req_str, " ")
          if length(req_parts) >= 2 {
            .http_method = get!(req_parts, [0])
            .uri_path = get!(req_parts, [1])
          }
        }

        host_str = to_string(error_match.host)
        if host_str != null {
          .url_domain = host_str
        }

        .category = "error"
      }
    }
  }

  # Build URL from available fields
  if .url_domain != null && .uri_path != null {
    .url = join!(["https://", to_string!(.url_domain), to_string!(.uri_path)])
  }

  .vendor = "Nginx"
  .product = "Nginx"
  if .category == null {
    .category = "web"
  }

  del(.message)
