name: zscaler_zia
display_name: Zscaler Internet Access
version: "1.0.0"
description: "Parses Zscaler Internet Access (ZIA) logs including web proxy, firewall, DNS, tunnel, eDLP, and audit events via NSS JSON feeds"
match_values:
  - zscaler
  - zscaler_zia
  - zscalernss
  - zscalernss-web
  - zscalernss-fw
  - zscalernss-dns
  - zscalernss-tunnel
category: network
vendor: "Zscaler"
product: "Internet Access"
parser_vrl: |
  # Zscaler Internet Access (ZIA) Parser
  # Handles NSS JSON feeds: web, firewall, DNS, tunnel, eDLP, and audit log types
  # Supports both envelope format {"sourcetype":"...","event":{...}} and flat JSON

  .udm = {}
  .ext = {}
  .metadata = {}

  .udm.timestamp = now()
  .udm.vendor = "Zscaler"
  .udm.product = "Internet Access"

  raw_log = string!(.message)

  parsed, err = parse_json(raw_log)
  if err == null {
      # Detect envelope: {"sourcetype":"zscalernss-web","event":{...}}
      sourcetype = ""
      evt = {}

      if exists(parsed.sourcetype) {
          sourcetype = downcase(string!(parsed.sourcetype))
      }

      if exists(parsed.event) {
          evt = object!(parsed.event)
      } else {
          # Flat JSON (no wrapper) — the parsed object IS the event
          evt = parsed
      }

      # Store envelope metadata
      if exists(parsed.version) { .ext.envelope_version = string!(parsed.version) }
      if exists(parsed.datetime) && sourcetype == "" {
          # Some flat formats use datetime at the top level
          sourcetype = "unknown"
      }

      .ext.sourcetype = sourcetype

      # ------------------------------------------------------------------
      # Timestamp parsing — try multiple field names and formats
      # ------------------------------------------------------------------
      ts_parsed = false

      # epochtime (web logs) — epoch seconds
      if !ts_parsed {
          if exists(evt.epochtime) {
              epoch_str = string!(evt.epochtime)
              epoch_int, ep_err = to_int(epoch_str)
              if ep_err == null {
                  ts, ts_err = from_unix_timestamp(epoch_int)
                  if ts_err == null {
                      .udm.timestamp = format_timestamp!(ts, format: "%Y-%m-%d %H:%M:%S")
                      ts_parsed = true
                  }
              }
          }
      }

      # "time" field (web logs) — "Mon Oct 16 22:55:48 2023"
      if !ts_parsed {
          if exists(evt.time) {
              time_str = string!(evt.time)
              ts, ts_err = parse_timestamp(time_str, "%a %b %d %H:%M:%S %Y")
              if ts_err == null {
                  .udm.timestamp = format_timestamp!(ts, format: "%Y-%m-%d %H:%M:%S")
                  ts_parsed = true
              }
          }
      }

      # "datetime" field (fw, dns, tunnel logs)
      if !ts_parsed {
          if exists(evt.datetime) {
              dt_str = string!(evt.datetime)
              ts, ts_err = parse_timestamp(dt_str, "%a %b %d %H:%M:%S %Y")
              if ts_err == null {
                  .udm.timestamp = format_timestamp!(ts, format: "%Y-%m-%d %H:%M:%S")
                  ts_parsed = true
              }
          }
      }

      # ------------------------------------------------------------------
      # Dispatch on sourcetype
      # ------------------------------------------------------------------

      if contains(sourcetype, "web") {
          # ============================================================
          # WEB PROXY LOG (zscalernss-web)
          # ============================================================
          .ext.log_type = "web"

          # Network
          if exists(evt.cltip) { .udm.src_ip = string!(evt.cltip) }
          if exists(evt.serverip) { .udm.dest_ip = string!(evt.serverip) }
          if exists(evt.cltintip) { .ext.client_internal_ip = string!(evt.cltintip) }
          if exists(evt.host) { .udm.dest_host = string!(evt.host) }
          if exists(evt.proto) { .udm.protocol = string!(evt.proto) }

          # Bytes
          if exists(evt.reqsize) { .udm.bytes_out = to_int(evt.reqsize) ?? null }
          if exists(evt.respsize) { .udm.bytes_in = to_int(evt.respsize) ?? null }

          # HTTP
          if exists(evt.reqmethod) { .udm.http_method = string!(evt.reqmethod) }
          if exists(evt.respcode) { .udm.http_status_code = to_int(evt.respcode) ?? null }
          if exists(evt.contenttype) { .udm.http_content_type = string!(evt.contenttype) }
          if exists(evt.useragent) { .udm.http_user_agent = string!(evt.useragent) }
          if exists(evt.referrer) { .udm.http_referrer = string!(evt.referrer) }

          # URL — decode base64-encoded URL
          if exists(evt.b64url) {
              b64_str = string!(evt.b64url)
              decoded, dec_err = decode_base64(b64_str)
              if dec_err == null {
                  url_str = string!(decoded)
                  .udm.url = url_str
                  # Extract domain from decoded URL
                  domain_match, dm_err = parse_regex(url_str, r'^(?:https?://)?(?P<domain>[^/:]+)')
                  if dm_err == null {
                      if exists(domain_match.domain) {
                          .udm.url_domain = string!(domain_match.domain)
                      }
                  }
              } else {
                  .ext.b64url = b64_str
              }
          }
          if exists(evt.url) {
              url_val = string!(evt.url)
              if !exists(.udm.url) { .udm.url = url_val }
              .ext.url_raw = url_val
          }

          # Auth / User
          if exists(evt.login) { .udm.user = string!(evt.login) }
          if exists(evt.dept) { .ext.department = string!(evt.dept) }
          if exists(evt.location) { .ext.location = string!(evt.location) }

          # Action / Status
          if exists(evt.action) { .udm.event_type = downcase(string!(evt.action)) }
          if exists(evt.reason) { .udm.result = string!(evt.reason) }
          if exists(evt.recordid) { .ext.record_id = string!(evt.recordid) }

          # Threat
          if exists(evt.threatname) {
              threat = string!(evt.threatname)
              if threat != "None" { .udm.signature = threat }
          }
          if exists(evt.threatseverity) {
              sev_raw = string!(evt.threatseverity)
              .ext.threat_severity_raw = sev_raw
              sev_lower = downcase(sev_raw)
              if contains(sev_lower, "critical") { .udm.severity = "critical" } else if contains(sev_lower, "high") { .udm.severity = "high" } else if contains(sev_lower, "medium") { .udm.severity = "medium" } else if contains(sev_lower, "low") { .udm.severity = "low" } else if contains(sev_lower, "info") { .udm.severity = "informational" } else { .udm.severity = sev_lower }
          }
          if exists(evt.threatcat) { .ext.threat_category = string!(evt.threatcat) }
          if exists(evt.malwarecategory) { .ext.malware_category = string!(evt.malwarecategory) }
          if exists(evt.malwareclass) { .ext.malware_class = string!(evt.malwareclass) }

          # URL classification
          if exists(evt.urlclass) { .ext.url_class = string!(evt.urlclass) }
          if exists(evt.urlsupercat) { .udm.category = string!(evt.urlsupercat) }
          if exists(evt.urlsubcat) { .ext.url_subcategory = string!(evt.urlsubcat) }
          if exists(evt.urlcatmethod) { .ext.url_category_method = string!(evt.urlcatmethod) }

          # Application
          if exists(evt.appname) { .ext.app_name = string!(evt.appname) }
          if exists(evt.appclass) { .ext.app_class = string!(evt.appclass) }
          if exists(evt.appriskscore) {
              ars = string!(evt.appriskscore)
              if ars != "None" { .ext.app_risk_score = ars }
          }

          # DLP
          if exists(evt.dlpeng) { .ext.dlp_engine = string!(evt.dlpeng) }
          if exists(evt.dlpdict) { .ext.dlp_dictionary = string!(evt.dlpdict) }
          if exists(evt.dlpdicthitcount) { .ext.dlp_dictionary_hit_count = to_int(evt.dlpdicthitcount) ?? null }
          if exists(evt.dlprulename) { .udm.rule_name = string!(evt.dlprulename) }

          # File
          if exists(evt.filename) { .udm.file_name = string!(evt.filename) }
          if exists(evt.filetype) { .ext.file_type = string!(evt.filetype) }
          if exists(evt.fileclass) { .ext.file_class = string!(evt.fileclass) }
          if exists(evt.sha256) { .udm.file_hash = string!(evt.sha256) }
          if exists(evt.bamd5) { .ext.ba_md5 = string!(evt.bamd5) }

          # Device
          if exists(evt.devicehostname) { .udm.src_host = string!(evt.devicehostname) }
          if exists(evt.deviceostype) { .ext.device_os_type = string!(evt.deviceostype) }
          if exists(evt.deviceosversion) { .ext.device_os_version = string!(evt.deviceosversion) }
          if exists(evt.deviceowner) { .ext.device_owner = string!(evt.deviceowner) }
          if exists(evt.devicemodel) { .ext.device_model = string!(evt.devicemodel) }

          # SSL/TLS
          if exists(evt.ssldecrypted) { .ext.ssl_decrypted = string!(evt.ssldecrypted) }
          if exists(evt.cltsslcipher) { .ext.client_ssl_cipher = string!(evt.cltsslcipher) }
          if exists(evt.clttlsversion) { .ext.client_tls_version = string!(evt.clttlsversion) }
          if exists(evt.srvsslcipher) { .ext.server_ssl_cipher = string!(evt.srvsslcipher) }
          if exists(evt.srvtlsversion) { .ext.server_tls_version = string!(evt.srvtlsversion) }
          if exists(evt.sslpinning) { .ext.ssl_pinning = string!(evt.sslpinning) }

          # Cloud / Location
          if exists(evt.cloudname) { .ext.cloud_name = string!(evt.cloudname) }
          if exists(evt.datacentercity) { .ext.datacenter_city = string!(evt.datacentercity) }
          if exists(evt.datacentercountry) { .ext.datacenter_country = string!(evt.datacentercountry) }
          if exists(evt.datacenter) { .ext.datacenter = string!(evt.datacenter) }
          if exists(evt.eedone) { .ext.eedone = string!(evt.eedone) }

          # Risk
          if exists(evt.riskscore) {
              rs = to_int(evt.riskscore) ?? null
              if rs != null { .udm.risk_score = rs }
          }

          # Bandwidth throttle
          if exists(evt.bwthrottle) { .ext.bandwidth_throttle = string!(evt.bwthrottle) }

          # Obfuscated fields (o-prefixed)
          if exists(evt.ologin) { .ext.ologin = string!(evt.ologin) }
          if exists(evt.odevicename) { .ext.odevicename = string!(evt.odevicename) }
          if exists(evt.odeviceowner) { .ext.odeviceowner = string!(evt.odeviceowner) }
          if exists(evt.odept) { .ext.odept = string!(evt.odept) }
          if exists(evt.olocation) { .ext.olocation = string!(evt.olocation) }
          if exists(evt.odevicehostname) { .ext.odevicehostname = string!(evt.odevicehostname) }
          if exists(evt.ourlcat) { .ext.ourlcat = string!(evt.ourlcat) }
          if exists(evt.oapprulelabel) { .ext.oapprulelabel = string!(evt.oapprulelabel) }
          if exists(evt.odlpdict) { .ext.odlpdict = string!(evt.odlpdict) }
          if exists(evt.odlpeng) { .ext.odlpeng = string!(evt.odlpeng) }
          if exists(evt.odlprulename) { .ext.odlprulename = string!(evt.odlprulename) }

          # Additional web fields
          if exists(evt.rulelabel) { .ext.rule_label = string!(evt.rulelabel) }
          if exists(evt.ruletype) { .ext.rule_type = string!(evt.ruletype) }
          if exists(evt.mobappname) { .ext.mobile_app_name = string!(evt.mobappname) }
          if exists(evt.mobappcat) { .ext.mobile_app_category = string!(evt.mobappcat) }
          if exists(evt.mobdevtype) { .ext.mobile_device_type = string!(evt.mobdevtype) }
          if exists(evt.reqheadersize) { .ext.request_header_size = to_int(evt.reqheadersize) ?? null }
          if exists(evt.respheadersize) { .ext.response_header_size = to_int(evt.respheadersize) ?? null }
          if exists(evt.reqbodysize) { .ext.request_body_size = to_int(evt.reqbodysize) ?? null }
          if exists(evt.respbodysize) { .ext.response_body_size = to_int(evt.respbodysize) ?? null }
          if exists(evt.totalsize) { .ext.total_size = to_int(evt.totalsize) ?? null }
          if exists(evt.unscannabletype) { .ext.unscannable_type = string!(evt.unscannabletype) }
          if exists(evt.keyprotectiontype) { .ext.key_protection_type = string!(evt.keyprotectiontype) }

      } else if contains(sourcetype, "fw") {
          # ============================================================
          # FIREWALL LOG (zscalernss-fw)
          # ============================================================
          .ext.log_type = "firewall"

          # Network — client-side IPs
          if exists(evt.csip) { .udm.src_ip = string!(evt.csip) }
          if exists(evt.cdip) { .udm.dest_ip = string!(evt.cdip) }
          if exists(evt.csport) { .udm.src_port = to_int(evt.csport) ?? null }
          if exists(evt.cdport) { .udm.dest_port = to_int(evt.cdport) ?? null }

          # Network — server-side IPs (translated)
          if exists(evt.ssip) { .udm.src_translated_ip = string!(evt.ssip) }
          if exists(evt.sdip) { .udm.dest_translated_ip = string!(evt.sdip) }
          if exists(evt.ssport) { .ext.server_src_port = to_int(evt.ssport) ?? null }
          if exists(evt.sdport) { .ext.server_dest_port = to_int(evt.sdport) ?? null }

          # Tunnel source IP
          if exists(evt.tsip) { .ext.tunnel_src_ip = string!(evt.tsip) }
          if exists(evt.tdip) { .ext.tunnel_dest_ip = string!(evt.tdip) }

          # Protocol
          if exists(evt.proto) { .udm.protocol = string!(evt.proto) }
          if exists(evt.ipcat) { .ext.ip_category = string!(evt.ipcat) }

          # Bytes / Duration / Sessions
          if exists(evt.inbytes) { .udm.bytes_in = to_int(evt.inbytes) ?? null }
          if exists(evt.outbytes) { .udm.bytes_out = to_int(evt.outbytes) ?? null }
          if exists(evt.duration) { .udm.duration = to_int(evt.duration) ?? null }
          if exists(evt.numsessions) { .ext.num_sessions = to_int(evt.numsessions) ?? null }

          # Auth / User
          if exists(evt.user) { .udm.user = string!(evt.user) }
          if exists(evt.dept) { .ext.department = string!(evt.dept) }
          if exists(evt.locationname) { .ext.location = string!(evt.locationname) }

          # Action
          if exists(evt.action) { .udm.event_type = downcase(string!(evt.action)) }

          # Rules
          if exists(evt.rule) { .udm.rule_name = string!(evt.rule) }
          if exists(evt.rulelabel) { .ext.rule_label = string!(evt.rulelabel) }
          if exists(evt.ipsrulelabel) { .ext.ips_rule_label = string!(evt.ipsrulelabel) }

          # Network service / app
          if exists(evt.nwsvc) { .ext.network_service = string!(evt.nwsvc) }
          if exists(evt.nwapp) { .ext.network_application = string!(evt.nwapp) }
          if exists(evt.appname) { .ext.app_name = string!(evt.appname) }
          if exists(evt.appclass) { .ext.app_class = string!(evt.appclass) }

          # Threat
          if exists(evt.threatcat) { .ext.threat_category = string!(evt.threatcat) }
          if exists(evt.threatname) {
              threat = string!(evt.threatname)
              if threat != "None" { .udm.signature = threat }
          }

          # Device
          if exists(evt.devicehostname) { .udm.src_host = string!(evt.devicehostname) }
          if exists(evt.deviceowner) { .ext.device_owner = string!(evt.deviceowner) }
          if exists(evt.deviceostype) { .ext.device_os_type = string!(evt.deviceostype) }

          # State / Tunnel
          if exists(evt.stateful) { .ext.stateful = string!(evt.stateful) }
          if exists(evt.tuntype) { .ext.tunnel_type = string!(evt.tuntype) }

          # Geo
          if exists(evt.srcipcountry) { .ext.src_country = string!(evt.srcipcountry) }
          if exists(evt.destcountry) { .ext.dest_country = string!(evt.destcountry) }
          if exists(evt.dstcountry) { .ext.dest_country = string!(evt.dstcountry) }

          # Aggregate / Flow
          if exists(evt.avgduration) { .ext.avg_duration = to_int(evt.avgduration) ?? null }
          if exists(evt.dnat) { .ext.dnat = string!(evt.dnat) }
          if exists(evt.flow_type) { .ext.flow_type = string!(evt.flow_type) }

          # Obfuscated fields
          if exists(evt.ouser) { .ext.ouser = string!(evt.ouser) }
          if exists(evt.odept) { .ext.odept = string!(evt.odept) }
          if exists(evt.olocationname) { .ext.olocationname = string!(evt.olocationname) }
          if exists(evt.odevicehostname) { .ext.odevicehostname = string!(evt.odevicehostname) }
          if exists(evt.odeviceowner) { .ext.odeviceowner = string!(evt.odeviceowner) }
          if exists(evt.orulelabel) { .ext.orulelabel = string!(evt.orulelabel) }
          if exists(evt.oipsrulelabel) { .ext.oipsrulelabel = string!(evt.oipsrulelabel) }

      } else if contains(sourcetype, "dns") {
          # ============================================================
          # DNS LOG (zscalernss-dns)
          # ============================================================
          .ext.log_type = "dns"

          # DNS query / response
          if exists(evt.dns_req) { .udm.query = string!(evt.dns_req) }
          if exists(evt.dns_resp) { .udm.answer = string!(evt.dns_resp) }
          if exists(evt.dns_reqtype) {
              reqtype = string!(evt.dns_reqtype)
              .udm.query_type = reqtype
          }
          if exists(evt.restype) { .udm.record_type = string!(evt.restype) }

          # Network
          if exists(evt.clt_sip) { .udm.src_ip = string!(evt.clt_sip) }
          if exists(evt.srv_dip) { .udm.dest_ip = string!(evt.srv_dip) }
          if exists(evt.srv_dport) { .udm.dest_port = to_int(evt.srv_dport) ?? null }
          if exists(evt.protocol) { .udm.protocol = string!(evt.protocol) }

          # Duration
          if exists(evt.durationms) { .udm.duration = to_int(evt.durationms) ?? null }

          # Auth / User
          if exists(evt.user) { .udm.user = string!(evt.user) }
          if exists(evt.dept) { .ext.department = string!(evt.dept) }
          if exists(evt.location) { .ext.location = string!(evt.location) }

          # Action
          if exists(evt.reqaction) {
              req_act = string!(evt.reqaction)
              .ext.request_action = req_act
              if contains(downcase(req_act), "allow") { .udm.event_type = "allowed" } else if contains(downcase(req_act), "block") { .udm.event_type = "blocked" } else { .udm.event_type = downcase(req_act) }
          }
          if exists(evt.resaction) { .ext.response_action = string!(evt.resaction) }

          # Category
          if exists(evt.category) { .udm.category = string!(evt.category) }
          if exists(evt.urlcat) { .ext.url_category = string!(evt.urlcat) }
          if exists(evt.urlsupercat) { .ext.url_super_category = string!(evt.urlsupercat) }
          if exists(evt.urlsubcat) { .ext.url_subcategory = string!(evt.urlsubcat) }

          # DNS application
          if exists(evt.dnsapp) { .ext.dns_application = string!(evt.dnsapp) }
          if exists(evt.dnsappcat) { .ext.dns_app_category = string!(evt.dnsappcat) }

          # Cloud
          if exists(evt.cloudname) { .ext.cloud_name = string!(evt.cloudname) }
          if exists(evt.datacentercity) { .ext.datacenter_city = string!(evt.datacentercity) }
          if exists(evt.datacentercountry) { .ext.datacenter_country = string!(evt.datacentercountry) }

          # Device
          if exists(evt.devicehostname) { .udm.src_host = string!(evt.devicehostname) }
          if exists(evt.deviceowner) { .ext.device_owner = string!(evt.deviceowner) }
          if exists(evt.deviceostype) { .ext.device_os_type = string!(evt.deviceostype) }

          # Threat / Rule
          if exists(evt.ecs_rule) { .ext.ecs_rule = string!(evt.ecs_rule) }
          if exists(evt.ecs_slot) { .ext.ecs_slot = string!(evt.ecs_slot) }

          # Obfuscated fields
          if exists(evt.ouser) { .ext.ouser = string!(evt.ouser) }
          if exists(evt.odept) { .ext.odept = string!(evt.odept) }
          if exists(evt.olocation) { .ext.olocation = string!(evt.olocation) }
          if exists(evt.odevicehostname) { .ext.odevicehostname = string!(evt.odevicehostname) }
          if exists(evt.odeviceowner) { .ext.odeviceowner = string!(evt.odeviceowner) }

      } else if contains(sourcetype, "tunnel") {
          # ============================================================
          # TUNNEL LOG (zscalernss-tunnel)
          # ============================================================
          .ext.log_type = "tunnel"

          # Network
          if exists(evt.sourceip) { .udm.src_ip = string!(evt.sourceip) }
          if exists(evt.destinationip) { .udm.dest_ip = string!(evt.destinationip) }
          if exists(evt.sourceport) { .udm.src_port = to_int(evt.sourceport) ?? null }
          if exists(evt.destinationport) { .udm.dest_port = to_int(evt.destinationport) ?? null }
          if exists(evt.protocol) { .udm.protocol = string!(evt.protocol) }

          # Bytes / Duration
          if exists(evt.rxbytes) { .udm.bytes_in = to_int(evt.rxbytes) ?? null }
          if exists(evt.txbytes) { .udm.bytes_out = to_int(evt.txbytes) ?? null }
          if exists(evt.rxpackets) { .ext.rx_packets = to_int(evt.rxpackets) ?? null }
          if exists(evt.txpackets) { .ext.tx_packets = to_int(evt.txpackets) ?? null }
          if exists(evt.dpdrec) { .ext.dpd_rec = to_int(evt.dpdrec) ?? null }

          # Auth / User
          if exists(evt.user) { .udm.user = string!(evt.user) }

          # Location
          if exists(evt.locationname) { .ext.location = string!(evt.locationname) }

          # Tunnel details
          if exists(evt.tunneltype) { .ext.tunnel_type = string!(evt.tunneltype) }
          if exists(evt.Recordtype) { .ext.record_type_tunnel = string!(evt.Recordtype) }
          if exists(evt.ikeversion) { .ext.ike_version = string!(evt.ikeversion) }
          if exists(evt.algo) { .ext.algorithm = string!(evt.algo) }
          if exists(evt.authentication) { .ext.authentication_method = string!(evt.authentication) }
          if exists(evt.authtype) { .udm.auth_type = string!(evt.authtype) }
          if exists(evt.lifetime) { .ext.lifetime = to_int(evt.lifetime) ?? null }
          if exists(evt.vendorname) { .ext.tunnel_vendor = string!(evt.vendorname) }
          if exists(evt.spi) { .ext.spi = string!(evt.spi) }
          if exists(evt.spi_in) { .ext.spi_in = string!(evt.spi_in) }
          if exists(evt.spi_out) { .ext.spi_out = string!(evt.spi_out) }

          # Event
          if exists(evt.event) { .ext.tunnel_event = string!(evt.event) }
          if exists(evt.eventreason) { .ext.event_reason = string!(evt.eventreason) }

          # Device
          if exists(evt.srciphost) { .udm.src_host = string!(evt.srciphost) }
          if exists(evt.destinationiphost) { .udm.dest_host = string!(evt.destinationiphost) }

          # Obfuscated fields
          if exists(evt.ouser) { .ext.ouser = string!(evt.ouser) }
          if exists(evt.olocationname) { .ext.olocationname = string!(evt.olocationname) }

      } else if contains(sourcetype, "dlp") || contains(sourcetype, "edlp") {
          # ============================================================
          # eDLP LOG (zscalernss-edlp)
          # ============================================================
          .ext.log_type = "dlp"

          # User / Auth
          if exists(evt.user) { .udm.user = string!(evt.user) }
          if exists(evt.login) { .udm.user = string!(evt.login) }
          if exists(evt.dept) { .ext.department = string!(evt.dept) }

          # Action / Policy
          if exists(evt.actiontaken) { .udm.event_type = downcase(string!(evt.actiontaken)) }
          if exists(evt.action) { .udm.event_type = downcase(string!(evt.action)) }
          if exists(evt.dlpeng) { .ext.dlp_engine = string!(evt.dlpeng) }
          if exists(evt.dlpdict) { .ext.dlp_dictionary = string!(evt.dlpdict) }
          if exists(evt.dlpdicthitcount) { .ext.dlp_dictionary_hit_count = to_int(evt.dlpdicthitcount) ?? null }
          if exists(evt.dlprulename) { .udm.rule_name = string!(evt.dlprulename) }
          if exists(evt.dlpidentifier) { .ext.dlp_identifier = to_int(evt.dlpidentifier) ?? null }

          # File
          if exists(evt.filename) { .udm.file_name = string!(evt.filename) }
          if exists(evt.filetype) { .ext.file_type = string!(evt.filetype) }
          if exists(evt.filetypecategory) { .ext.file_type_category = string!(evt.filetypecategory) }
          if exists(evt.sha256) { .udm.file_hash = string!(evt.sha256) }
          if exists(evt.md5) { .ext.md5 = string!(evt.md5) }

          # Severity
          if exists(evt.severity) { .udm.severity = downcase(string!(evt.severity)) }

          # URL / Destination
          if exists(evt.url) { .udm.url = string!(evt.url) }
          if exists(evt.hostname) { .udm.dest_host = string!(evt.hostname) }

          # Device
          if exists(evt.devicehostname) { .udm.src_host = string!(evt.devicehostname) }
          if exists(evt.deviceowner) { .ext.device_owner = string!(evt.deviceowner) }

          # Scan details
          if exists(evt.scantime) { .ext.scan_time = to_int(evt.scantime) ?? null }
          if exists(evt.scannedfiles) { .ext.scanned_files = to_int(evt.scannedfiles) ?? null }
          if exists(evt.scannedbytes) { .ext.scanned_bytes = to_int(evt.scannedbytes) ?? null }

          # Channel
          if exists(evt.channel) { .ext.dlp_channel = string!(evt.channel) }

          # Obfuscated fields
          if exists(evt.ologin) { .ext.ologin = string!(evt.ologin) }
          if exists(evt.ouser) { .ext.ouser = string!(evt.ouser) }
          if exists(evt.odlpdict) { .ext.odlpdict = string!(evt.odlpdict) }
          if exists(evt.odlpeng) { .ext.odlpeng = string!(evt.odlpeng) }
          if exists(evt.odlprulename) { .ext.odlprulename = string!(evt.odlprulename) }
          if exists(evt.odevicehostname) { .ext.odevicehostname = string!(evt.odevicehostname) }
          if exists(evt.odeviceowner) { .ext.odeviceowner = string!(evt.odeviceowner) }

      } else if contains(sourcetype, "audit") {
          # ============================================================
          # AUDIT LOG (zscalernss-audit)
          # ============================================================
          .ext.log_type = "audit"

          # Auth / User
          if exists(evt.adminid) { .udm.user = string!(evt.adminid) }
          if exists(evt.admin) { .udm.user = string!(evt.admin) }

          # Action
          if exists(evt.action) { .udm.event_type = downcase(string!(evt.action)) }
          if exists(evt.category) { .udm.category = string!(evt.category) }
          if exists(evt.subcategory) { .ext.subcategory = string!(evt.subcategory) }
          if exists(evt.result) { .udm.result = string!(evt.result) }

          # Resource
          if exists(evt.resource) { .ext.resource = string!(evt.resource) }
          if exists(evt.resourceid) { .ext.resource_id = string!(evt.resourceid) }
          if exists(evt.resourcetype) { .ext.resource_type = string!(evt.resourcetype) }

          # Network
          if exists(evt.clientip) { .udm.src_ip = string!(evt.clientip) }
          if exists(evt.interface) { .ext.interface = string!(evt.interface) }

          # Audit details
          if exists(evt.auditlogtype) { .ext.audit_log_type = string!(evt.auditlogtype) }
          if exists(evt.preaction) { .ext.pre_action = string!(evt.preaction) }
          if exists(evt.postaction) { .ext.post_action = string!(evt.postaction) }
          if exists(evt.errorcode) { .ext.error_code = string!(evt.errorcode) }
          if exists(evt.recordid) { .ext.record_id = string!(evt.recordid) }

      } else {
          # ============================================================
          # UNKNOWN / UNRECOGNIZED SOURCETYPE
          # ============================================================
          .ext.log_type = "unknown"

          # Best-effort extraction of common fields
          if exists(evt.user) { .udm.user = string!(evt.user) } else if exists(evt.login) { .udm.user = string!(evt.login) }

          if exists(evt.action) { .udm.event_type = downcase(string!(evt.action)) }
          if exists(evt.category) { .udm.category = string!(evt.category) }

          if exists(evt.cltip) { .udm.src_ip = string!(evt.cltip) } else if exists(evt.csip) { .udm.src_ip = string!(evt.csip) } else if exists(evt.sourceip) { .udm.src_ip = string!(evt.sourceip) } else if exists(evt.clientip) { .udm.src_ip = string!(evt.clientip) }

          if exists(evt.serverip) { .udm.dest_ip = string!(evt.serverip) } else if exists(evt.cdip) { .udm.dest_ip = string!(evt.cdip) } else if exists(evt.destinationip) { .udm.dest_ip = string!(evt.destinationip) }

          if exists(evt.devicehostname) { .udm.src_host = string!(evt.devicehostname) }
          if exists(evt.host) { .udm.dest_host = string!(evt.host) }
          if exists(evt.proto) { .udm.protocol = string!(evt.proto) }
          if exists(evt.severity) { .udm.severity = downcase(string!(evt.severity)) }
      }

      # ------------------------------------------------------------------
      # Set vendor_product
      # ------------------------------------------------------------------
      .udm.vendor_product = "Zscaler Internet Access"

  } else {
      .metadata.parse_error = to_string(err)
  }

  .message = raw_log
