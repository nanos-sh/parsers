name: sysmon
display_name: Microsoft Sysmon
version: "1.2.0"
description: "Parses Windows Sysmon XML events including process creation, network connections, file operations, registry changes, and DNS queries"
match_values:
  - sysmon
  - windows_sysmon
category: endpoint
vendor: "Microsoft"
product: "Sysmon"
parser_vrl: |
  # Initialize raw_log with a default, then update it
  raw_log = ""
  if exists(.message) {
      raw_log = string!(.message)
  }

  .message = raw_log

  # Initialize UDM structure
  .udm = {}
  .metadata = {}
  .ext = {}

  # Parse XML if we have content
  if raw_log != "" {
      parsed, err = parse_xml(raw_log)
      if err == null {
          event = parsed.Event
          if event != null {
              system = event.System
              event_data = event.EventData

              # Extract EventID early so it's available in all blocks
              event_id = if system != null {
                  to_int(system.EventID) ?? 0
              } else {
                  0
              }
              .udm.signature_id = string!(event_id)

              if system != null {

                  computer = system.Computer
                  if computer != null {
                      .udm.dvc = string!(computer)
                  }

                  provider = system.Provider
                  if provider != null {
                      provider_name = provider."@Name"
                      if provider_name != null {
                          .metadata.provider = string!(provider_name)
                      }
                  }

                  time_created = system.TimeCreated
                  if time_created != null {
                      system_time = time_created."@SystemTime"
                      if system_time != null {
                          system_time_str = string!(system_time)
                          ts, err = parse_timestamp(system_time_str, "%Y-%m-%dT%H:%M:%S.%f%Z")
                          if err != null {
                              ts, err = parse_timestamp(system_time_str, "%Y-%m-%dT%H:%M:%SZ")
                          }
                          if err == null {
                              .udm.timestamp = format_timestamp!(ts, format: "%Y-%m-%d %H:%M:%S")
                          } else {
                              .udm.timestamp = system_time_str
                          }
                      }
                  }

                  .udm.action = if event_id == 1 { "process_create" } else if event_id == 2 { "file_time_change" } else if event_id == 3 { "network_connection" } else if event_id == 4 { "sysmon_state_change" } else if event_id == 5 { "process_terminate" } else if event_id == 6 { "driver_load" } else if event_id == 7 { "image_load" } else if event_id == 8 { "create_remote_thread" } else if event_id == 9 { "raw_access_read" } else if event_id == 10 { "process_access" } else if event_id == 11 { "file_create" } else if event_id == 12 { "registry_event" } else if event_id == 13 { "registry_value_set" } else if event_id == 14 { "registry_rename" } else if event_id == 15 { "file_stream_create" } else if event_id == 17 { "pipe_create" } else if event_id == 18 { "pipe_connect" } else if event_id == 19 { "wmi_filter" } else if event_id == 20 { "wmi_consumer" } else if event_id == 21 { "wmi_binding" } else if event_id == 22 { "dns_query" } else if event_id == 23 { "file_delete" } else if event_id == 24 { "clipboard_change" } else if event_id == 25 { "process_tampering" } else if event_id == 26 { "file_delete_logged" } else { "sysmon_event" }

                  .udm.file_action = if event_id == 11 { "create" } else if event_id == 15 { "create" } else if event_id == 23 || event_id == 26 { "delete" } else if event_id == 2 { "modify" } else { null }

                  .udm.category = if event_id == 1 || event_id == 5 || event_id == 25 { "process" } else if event_id == 3 { "network" } else if event_id == 22 { "dns" } else if event_id == 2 || event_id == 11 || event_id == 15 || event_id == 23 || event_id == 26 { "file" } else if event_id == 12 || event_id == 13 || event_id == 14 { "registry" } else if event_id == 6 || event_id == 7 { "driver" } else if event_id == 8 || event_id == 10 { "process_injection" } else if event_id == 9 { "raw_access" } else if event_id == 17 || event_id == 18 { "pipe" } else if event_id == 19 || event_id == 20 || event_id == 21 { "wmi" } else { "endpoint" }
              }

              if event_data != null {
                  data_items = event_data.Data
                  if data_items != null {
                      items_array = []
                      if is_array(data_items) {
                          items_array = array!(data_items)
                      } else if is_object(data_items) {
                          items_array = [data_items]
                      }

                      for_each(items_array) -> |_idx, item| {
                          name = item."@Name"
                          value = item.text

                          if name != null && value != null {
                              name_str = string!(name)
                              val_str = string!(value)

                              if name_str == "User" { .udm.user = val_str }
                              if name_str == "Image" {
                                  .udm.process_path = val_str
                                  parts = split(val_str, "\\")
                                  if length(parts) > 0 {
                                      .udm.process_name = get(parts, [length(parts) - 1]) ?? null
                                  }
                              }
                              if name_str == "ProcessId" { .udm.process_id = to_int(val_str) ?? null }
                              if name_str == "ProcessGuid" { .udm.process_guid = val_str }
                              if name_str == "ParentImage" {
                                  .udm.parent_process_path = val_str
                                  parts = split(val_str, "\\")
                                  if length(parts) > 0 {
                                      .udm.parent_process_name = get(parts, [length(parts) - 1]) ?? null
                                  }
                              }
                              if name_str == "ParentProcessId" { .udm.parent_process_id = to_int(val_str) ?? null }
                              if name_str == "ParentProcessGuid" { .udm.parent_process_guid = val_str }
                              if name_str == "ParentCommandLine" { .udm.parent_command_line = val_str }
                              if name_str == "CommandLine" { .udm.command_line = val_str }
                              if name_str == "CurrentDirectory" { .udm.process_current_directory = val_str }
                              if name_str == "IntegrityLevel" { .udm.process_integrity_level = val_str }
                              if name_str == "SourceIp" { .udm.src_ip = val_str }
                              if name_str == "DestinationIp" { .udm.dest_ip = val_str }
                              if name_str == "SourceHostname" { .udm.src_host = val_str }
                              if name_str == "DestinationHostname" { .udm.dest_host = val_str }
                              if name_str == "SourcePort" { .udm.src_port = to_int(val_str) ?? null }
                              if name_str == "DestinationPort" { .udm.dest_port = to_int(val_str) ?? null }
                              if name_str == "Protocol" { .udm.protocol = val_str }
                              if name_str == "TargetFilename" {
                                  .udm.file_path = val_str
                                  parts = split(val_str, "\\")
                                  if length(parts) > 0 {
                                      .udm.file_name = get(parts, [length(parts) - 1]) ?? null
                                  }
                              }
                              if name_str == "Hashes" {
                                  sha256_match = parse_regex(val_str, r'SHA256=(?P<hash>[A-Fa-f0-9]+)') ?? null
                                  md5_match = parse_regex(val_str, r'MD5=(?P<hash>[A-Fa-f0-9]+)') ?? null
                                  sha1_match = parse_regex(val_str, r'SHA1=(?P<hash>[A-Fa-f0-9]+)') ?? null

                                  hash_value = if sha256_match != null { sha256_match.hash } else if sha1_match != null { sha1_match.hash } else if md5_match != null { md5_match.hash } else { null }

                                  if hash_value != null {
                                      if event_id == 1 || event_id == 5 || event_id == 6 || event_id == 7 {
                                          .udm.process_hash = hash_value
                                      } else if event_id == 11 || event_id == 23 || event_id == 26 {
                                          .udm.file_hash = hash_value
                                      } else {
                                          .udm.file_hash = hash_value
                                      }
                                  }

                                  .metadata.hashes = val_str
                              }
                              if name_str == "QueryName" { .udm.query = val_str }
                              if name_str == "QueryResults" { .udm.dns_answers = val_str }
                              if name_str == "QueryType" { .udm.query_type = val_str }
                              if name_str == "TargetObject" { .udm.registry_path = val_str }
                              if name_str == "Details" { .udm.registry_value_data = val_str }
                              if name_str == "LogonId" { .udm.session_id = val_str }
                              if name_str == "PipeName" { .udm.object = val_str }

                              # Process injection fields (Event 8: CreateRemoteThread, Event 10: ProcessAccess)
                              if (event_id == 8 || event_id == 10) {
                                  # Source process → UDM process fields (source is the actor)
                                  if name_str == "SourceImage" {
                                      .udm.process_path = val_str
                                      parts = split(val_str, "\\")
                                      if length(parts) > 0 {
                                          .udm.process_name = get(parts, [length(parts) - 1]) ?? null
                                      }
                                  }
                                  if name_str == "SourceProcessId" { .udm.process_id = to_int(val_str) ?? null }
                                  if name_str == "SourceUser" {
                                      user_parts = split(val_str, "\\")
                                      if length(user_parts) == 2 {
                                          .udm.user = string!(get!(user_parts, [1]))
                                      } else {
                                          .udm.user = val_str
                                      }
                                  }

                                  # Target process → ext (no UDM columns)
                                  if name_str == "TargetImage" { .ext.target_image = val_str }
                                  if name_str == "TargetProcessId" { .ext.target_process_id = to_int(val_str) ?? null }
                                  if name_str == "TargetUser" { .ext.target_user = val_str }
                                  if name_str == "SourceProcessGuid" { .ext.source_process_guid = val_str }
                                  if name_str == "TargetProcessGuid" { .ext.target_process_guid = val_str }
                                  if name_str == "GrantedAccess" { .ext.granted_access = val_str }
                                  if name_str == "CallTrace" { .ext.call_trace = val_str }
                                  if name_str == "StartAddress" { .ext.start_address = val_str }
                                  if name_str == "StartModule" { .ext.start_module = val_str }
                                  if name_str == "StartFunction" { .ext.start_function = val_str }
                              }
                          }
                      }
                  }
              }
          }
      }
  }

  if !exists(.udm.timestamp) {
      .udm.timestamp = now()
  }
