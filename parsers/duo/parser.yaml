name: duo
display_name: Duo Security
version: "1.0.0"
description: "Parses Duo Security authentication, admin, and telephony logs from the Admin API"
match_values:
  - duo
  - duo_security
  - duo_auth
category: security
vendor: "Cisco"
product: "Duo Security"
parser_vrl: |
  # Duo Security Parser
  # Parses JSON events from the Duo Admin API (auth, admin, telephony logs)

  # Initialize required structures
  .udm = {}
  .ext = {}
  .metadata = {}

  # Set defaults
  .udm.timestamp = now()
  .udm.vendor = "Cisco"
  .udm.product = "Duo Security"
  .udm.vendor_product = "Cisco Duo Security"

  # Get raw log content
  raw_log = to_string(.message) ?? ""

  # Parse JSON
  parsed, err = parse_json(raw_log)

  if err == null {
      # --- Determine event type ---
      event_type = to_string(parsed.eventtype) ?? to_string(parsed.event_type) ?? ""

      # --- Timestamp ---
      # Duo uses Unix epoch seconds
      if exists(parsed.isotimestamp) {
          ts, ts_err = parse_timestamp(string!(parsed.isotimestamp), "%+")
          if ts_err == null {
              .udm.timestamp = format_timestamp!(ts, format: "%Y-%m-%d %H:%M:%S")
          }
      } else if exists(parsed.timestamp) {
          epoch_val = to_int(parsed.timestamp) ?? 0
          if epoch_val > 0 {
              ts, ts_err2 = from_unix_timestamp(epoch_val)
              if ts_err2 == null {
                  .udm.timestamp = format_timestamp!(ts, format: "%Y-%m-%d %H:%M:%S")
              }
          }
      }

      # --- Username ---
      if exists(parsed.username) {
          .udm.user = string!(parsed.username)
      }

      # --- Email ---
      if exists(parsed.email) {
          .ext.email = string!(parsed.email)
      }

      # --- Source IP ---
      # For auth events: access_device.ip or top-level ip
      if exists(parsed.access_device.ip) {
          .udm.src_ip = string!(parsed.access_device.ip)
      } else if exists(parsed.ip) {
          .udm.src_ip = string!(parsed.ip)
      } else if exists(parsed.ip_address) {
          .udm.src_ip = string!(parsed.ip_address)
      }

      # --- Authentication events ---
      if event_type == "authentication" {
          .udm.category = "authentication"
          .udm.authentication_service = "Duo Security"

          # Factor -> auth_type
          if exists(parsed.factor) {
              .udm.auth_type = string!(parsed.factor)
              factor_val = downcase(string!(parsed.factor))
              if factor_val == "duo_push" || factor_val == "phone_call" || factor_val == "sms_passcode" || factor_val == "hardware_token" {
                  .udm.mfa_used = "true"
              }
          }

          # Result -> auth_result
          if exists(parsed.result) {
              raw_result = downcase(string!(parsed.result))
              if raw_result == "success" {
                  .udm.auth_result = "success"
                  .udm.status = "success"
              } else if raw_result == "denied" || raw_result == "fraud" {
                  .udm.auth_result = "failure"
                  .udm.status = "failure"
              } else {
                  .udm.auth_result = raw_result
                  .udm.status = raw_result
              }
              .udm.result = raw_result
          }

          # Reason
          if exists(parsed.reason) {
              .ext.reason = string!(parsed.reason)
          }

          # Application
          if exists(parsed.application.name) {
              .udm.app = string!(parsed.application.name)
          }
          if exists(parsed.application.key) {
              .udm.app_id = string!(parsed.application.key)
          }

          # Integration (fallback for app)
          if !exists(.udm.app) || .udm.app == null {
              if exists(parsed.integration) {
                  .udm.app = string!(parsed.integration)
              }
          }

          # Transaction ID -> session_id
          if exists(parsed.txid) {
              .udm.session_id = string!(parsed.txid)
          }

          # New enrollment flag
          if exists(parsed.new_enrollment) {
              .ext.new_enrollment = to_string(parsed.new_enrollment) ?? ""
          }

          # --- Auth device ---
          if exists(parsed.auth_device) {
              ad = parsed.auth_device
              if exists(ad.ip) {
                  .ext.auth_device_ip = string!(ad.ip)
              }
              if exists(ad.name) {
                  .ext.auth_device_name = string!(ad.name)
              }
              if exists(ad.type) {
                  .ext.auth_device_type = string!(ad.type)
              }
              if exists(ad.location.city) {
                  .ext.auth_device_city = string!(ad.location.city)
              }
              if exists(ad.location.state) {
                  .ext.auth_device_state = string!(ad.location.state)
              }
              if exists(ad.location.country) {
                  .ext.auth_device_country = string!(ad.location.country)
              }
          }

          # --- Access device ---
          if exists(parsed.access_device) {
              acd = parsed.access_device
              if exists(acd.hostname) {
                  .ext.access_device_hostname = string!(acd.hostname)
              }
              if exists(acd.os) {
                  .ext.access_device_os = string!(acd.os)
              }
              if exists(acd.os_version) {
                  .ext.access_device_os_version = string!(acd.os_version)
              }
              if exists(acd.browser) {
                  .ext.access_device_browser = string!(acd.browser)
              }
              if exists(acd.browser_version) {
                  .ext.access_device_browser_version = string!(acd.browser_version)
              }
              if exists(acd.is_encryption_enabled) {
                  .ext.encryption_enabled = to_string(acd.is_encryption_enabled) ?? ""
              }
              if exists(acd.is_firewall_enabled) {
                  .ext.firewall_enabled = to_string(acd.is_firewall_enabled) ?? ""
              }
              if exists(acd.is_password_set) {
                  .ext.password_set = to_string(acd.is_password_set) ?? ""
              }
              if exists(acd.location.city) {
                  .ext.geo_city = string!(acd.location.city)
              }
              if exists(acd.location.state) {
                  .ext.geo_state = string!(acd.location.state)
              }
              if exists(acd.location.country) {
                  .ext.geo_country = string!(acd.location.country)
              }
          }

          # --- User groups ---
          if exists(parsed.user.groups) && is_array(parsed.user.groups) {
              .ext.user_groups = encode_json(parsed.user.groups)
          }

          # User key
          if exists(parsed.user.key) {
              .udm.user_id = string!(parsed.user.key)
          }

      } else if event_type == "administrator" {
          # --- Admin events ---
          .udm.category = "admin"

          if exists(parsed.action) {
              .udm.event_type = string!(parsed.action)
          }

          if exists(parsed.description) {
              .ext.description = string!(parsed.description)
          }

          if exists(parsed.object) {
              obj_val = to_string(parsed.object) ?? ""
              if obj_val != "" {
                  .ext.object = obj_val
              }
          }

          # Admin events use ip_address
          if exists(parsed.ip_address) {
              .udm.src_ip = string!(parsed.ip_address)
          }

          .udm.status = "success"
          .udm.result = "success"

      } else {
          # Generic / telephony events
          .udm.category = "other"

          if exists(parsed.type) {
              .ext.telephony_type = to_string(parsed.type) ?? ""
          }
      }

  } else {
      .metadata.parse_error = to_string(err)
  }

  # Set parser name
  .metadata.parser = "duo"

  # Preserve raw log
  .message = raw_log
