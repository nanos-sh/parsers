name: sysmon_xml
display_name: Microsoft Sysmon (XML)
version: "1.0.0"
description: "Parses Sysmon XML events including process creation with hashes, network connections, DNS queries, file operations, registry changes, and driver loads"
match_values:
  - sysmon_xml
  - sysmon_raw
category: endpoint
vendor: "Microsoft"
product: "Sysmon"
parser_vrl: |
  raw_log = string(.message) ?? ""
  .message = raw_log

  .udm = {}
  .metadata = {}
  .ext = {}

  if raw_log != "" {
      parsed, err = parse_xml(raw_log)
      if err == null {
          event = parsed.Event
          if event != null {
              system = event.System
              event_data = event.EventData

              # -----------------------------------------------------------
              # System block
              # -----------------------------------------------------------
              event_id = 0
              if system != null {
                  eid_raw = system.EventID
                  if eid_raw != null {
                      event_id = to_int(eid_raw) ?? 0
                  }

                  computer = system.Computer
                  if computer != null {
                      .udm.dvc = string!(computer)
                      .udm.src_host = string!(computer)
                  }

                  provider = system.Provider
                  if provider != null {
                      pn = provider."@Name"
                      if pn != null {
                          .ext.provider_name = string!(pn)
                      }
                      pg = provider."@Guid"
                      if pg != null {
                          .ext.provider_guid = string!(pg)
                      }
                  }

                  level = system.Level
                  if level != null {
                      level_int = to_int(level) ?? -1
                      .udm.severity = if level_int == 1 { "critical" } else if level_int == 2 { "error" } else if level_int == 3 { "warning" } else if level_int == 4 { "informational" } else if level_int == 5 { "verbose" } else { "informational" }
                  }

                  channel = system.Channel
                  if channel != null {
                      .ext.channel = string!(channel)
                  }

                  time_created = system.TimeCreated
                  if time_created != null {
                      system_time = time_created."@SystemTime"
                      if system_time != null {
                          system_time_str = string!(system_time)
                          ts, err = parse_timestamp(system_time_str, "%+")
                          if err == null {
                              .udm.timestamp = format_timestamp!(ts, format: "%Y-%m-%d %H:%M:%S")
                          } else {
                              .udm.timestamp = system_time_str
                          }
                      }
                  }
              }

              .udm.signature_id = to_string(event_id)
              .udm.vendor = "Microsoft"
              .udm.product = "Sysmon"
              .udm.vendor_product = "Microsoft Sysmon"

              # -----------------------------------------------------------
              # Action name per event ID
              # -----------------------------------------------------------
              .udm.event_type = if event_id == 1 { "process_create" } else if event_id == 2 { "file_time_change" } else if event_id == 3 { "network_connection" } else if event_id == 4 { "sysmon_state_change" } else if event_id == 5 { "process_terminate" } else if event_id == 6 { "driver_load" } else if event_id == 7 { "image_load" } else if event_id == 8 { "create_remote_thread" } else if event_id == 9 { "raw_access_read" } else if event_id == 10 { "process_access" } else if event_id == 11 { "file_create" } else if event_id == 12 { "registry_create_delete" } else if event_id == 13 { "registry_value_set" } else if event_id == 14 { "registry_rename" } else if event_id == 15 { "file_stream_create" } else if event_id == 17 { "pipe_create" } else if event_id == 18 { "pipe_connect" } else if event_id == 19 { "wmi_filter" } else if event_id == 20 { "wmi_consumer" } else if event_id == 21 { "wmi_binding" } else if event_id == 22 { "dns_query" } else if event_id == 23 { "file_delete_archived" } else if event_id == 24 { "clipboard_change" } else if event_id == 25 { "process_tampering" } else if event_id == 26 { "file_delete_logged" } else if event_id == 27 { "file_block_executable" } else if event_id == 28 { "file_block_shredding" } else if event_id == 29 { "file_executable_detected" } else { "sysmon_event" }

              # Category by event type grouping
              .udm.category = if event_id == 1 || event_id == 5 || event_id == 8 || event_id == 10 || event_id == 25 { "process" } else if event_id == 3 { "network" } else if event_id == 22 { "dns" } else if event_id == 2 || event_id == 11 || event_id == 15 || event_id == 23 || event_id == 26 || event_id == 27 || event_id == 28 || event_id == 29 { "file" } else if event_id == 12 || event_id == 13 || event_id == 14 { "registry" } else if event_id == 6 || event_id == 7 { "driver" } else if event_id == 17 || event_id == 18 { "pipe" } else if event_id == 19 || event_id == 20 || event_id == 21 { "wmi" } else if event_id == 24 { "clipboard" } else { "system" }

              # File action
              .udm.file_action = if event_id == 11 { "create" } else if event_id == 15 { "create" } else if event_id == 23 || event_id == 26 { "delete" } else if event_id == 2 { "modify" } else if event_id == 27 || event_id == 28 { "block" } else if event_id == 29 { "detect" } else { null }

              # -----------------------------------------------------------
              # EventData: build key-value map
              # -----------------------------------------------------------
              if event_data != null {
                  data_items = event_data.Data
                  if data_items != null {
                      items_array = []
                      if is_array(data_items) {
                          items_array = array!(data_items)
                      } else if is_object(data_items) {
                          items_array = [data_items]
                      }

                      # Build a flat object from the Name/text pairs
                      kv = {}
                      for_each(items_array) -> |_idx, item| {
                          iname = item."@Name"
                          ivalue = item.text
                          if iname != null && ivalue != null {
                              kv = set!(kv, [to_string!(iname)], to_string!(ivalue))
                          }
                      }

                      # ---------------------------------------------------
                      # Common fields (present in most event types)
                      # ---------------------------------------------------

                      # User — split DOMAIN\user
                      user_raw = get(kv, ["User"]) ?? null
                      if user_raw != null {
                          user_str = string!(user_raw)
                          user_parts = split(user_str, "\\")
                          if length(user_parts) > 1 {
                              .udm.user_domain = get!(user_parts, [0])
                              .udm.user = get!(user_parts, [1])
                          } else {
                              .udm.user = user_str
                          }
                      }

                      # UtcTime
                      utc_time = get(kv, ["UtcTime"]) ?? null
                      if utc_time != null {
                          .ext.utc_time = string!(utc_time)
                      }

                      # ---------------------------------------------------
                      # Process fields (Image, ProcessId, ProcessGuid, CommandLine, etc.)
                      # ---------------------------------------------------
                      image = get(kv, ["Image"]) ?? null
                      if image != null {
                          image_str = string!(image)
                          .udm.process_path = image_str
                          parts = split(image_str, "\\")
                          if length(parts) > 0 {
                              .udm.process_name = get!(parts, [length(parts) - 1])
                          }
                      }

                      pid = get(kv, ["ProcessId"]) ?? null
                      if pid != null {
                          .udm.process_id = to_int(pid) ?? null
                      }

                      pguid = get(kv, ["ProcessGuid"]) ?? null
                      if pguid != null {
                          .udm.process_guid = string!(pguid)
                      }

                      cmdline = get(kv, ["CommandLine"]) ?? null
                      if cmdline != null {
                          .udm.command_line = string!(cmdline)
                      }

                      curdir = get(kv, ["CurrentDirectory"]) ?? null
                      if curdir != null {
                          .udm.process_current_directory = string!(curdir)
                      }

                      integrity = get(kv, ["IntegrityLevel"]) ?? null
                      if integrity != null {
                          .udm.process_integrity_level = string!(integrity)
                      }

                      # Parent process
                      pimage = get(kv, ["ParentImage"]) ?? null
                      if pimage != null {
                          pimage_str = string!(pimage)
                          .udm.parent_process_path = pimage_str
                          parts = split(pimage_str, "\\")
                          if length(parts) > 0 {
                              .udm.parent_process_name = get!(parts, [length(parts) - 1])
                          }
                      }

                      ppid = get(kv, ["ParentProcessId"]) ?? null
                      if ppid != null {
                          .udm.parent_process_id = to_int(ppid) ?? null
                      }

                      ppguid = get(kv, ["ParentProcessGuid"]) ?? null
                      if ppguid != null {
                          .ext.parent_process_guid = string!(ppguid)
                      }

                      pcmd = get(kv, ["ParentCommandLine"]) ?? null
                      if pcmd != null {
                          .udm.parent_command_line = string!(pcmd)
                      }

                      puser = get(kv, ["ParentUser"]) ?? null
                      if puser != null {
                          .ext.parent_user = string!(puser)
                      }

                      logon_id = get(kv, ["LogonId"]) ?? null
                      if logon_id != null {
                          .udm.session_id = string!(logon_id)
                      }

                      logon_guid = get(kv, ["LogonGuid"]) ?? null
                      if logon_guid != null {
                          .ext.logon_guid = string!(logon_guid)
                      }

                      term_sess = get(kv, ["TerminalSessionId"]) ?? null
                      if term_sess != null {
                          .ext.terminal_session_id = string!(term_sess)
                      }

                      # ---------------------------------------------------
                      # Hashes — split into individual algorithms
                      # ---------------------------------------------------
                      hashes_raw = get(kv, ["Hashes"]) ?? null
                      if hashes_raw != null {
                          hashes_str = string!(hashes_raw)
                          .ext.hashes_raw = hashes_str

                          sha256_match = parse_regex(hashes_str, r'SHA256=(?P<hash>[A-Fa-f0-9]+)') ?? null
                          md5_match = parse_regex(hashes_str, r'MD5=(?P<hash>[A-Fa-f0-9]+)') ?? null
                          sha1_match = parse_regex(hashes_str, r'SHA1=(?P<hash>[A-Fa-f0-9]+)') ?? null
                          imphash_match = parse_regex(hashes_str, r'IMPHASH=(?P<hash>[A-Fa-f0-9]+)') ?? null

                          if sha256_match != null {
                              .ext.sha256 = sha256_match.hash
                          }
                          if md5_match != null {
                              .ext.md5 = md5_match.hash
                          }
                          if sha1_match != null {
                              .ext.sha1 = sha1_match.hash
                          }
                          if imphash_match != null {
                              .ext.imphash = imphash_match.hash
                          }

                          # Primary hash for UDM: prefer SHA256 > SHA1 > MD5
                          primary_hash = if sha256_match != null { sha256_match.hash } else if sha1_match != null { sha1_match.hash } else if md5_match != null { md5_match.hash } else { null }

                          if primary_hash != null {
                              if event_id == 1 || event_id == 5 || event_id == 6 || event_id == 7 || event_id == 8 || event_id == 10 || event_id == 25 {
                                  .udm.process_hash = primary_hash
                              } else {
                                  .udm.file_hash = primary_hash
                              }
                          }
                      }

                      # ---------------------------------------------------
                      # RuleName — extract MITRE ATT&CK technique
                      # ---------------------------------------------------
                      rule_name_raw = get(kv, ["RuleName"]) ?? null
                      if rule_name_raw != null {
                          rule_name_str = string!(rule_name_raw)
                          if rule_name_str != "-" && rule_name_str != "" {
                              .udm.rule_name = rule_name_str
                              technique_match = parse_regex(rule_name_str, r'technique_id=(?P<tid>[^,\s]+)') ?? null
                              if technique_match != null {
                                  .udm.mitre_technique_id = technique_match.tid
                              }
                              technique_name_match = parse_regex(rule_name_str, r'technique_name=(?P<tname>[^,]+)') ?? null
                              if technique_name_match != null {
                                  .ext.mitre_technique_name = technique_name_match.tname
                              }
                          }
                      }

                      # ---------------------------------------------------
                      # Network connection fields (Event ID 3)
                      # ---------------------------------------------------
                      if event_id == 3 {
                          src_ip = get(kv, ["SourceIp"]) ?? null
                          if src_ip != null { .udm.src_ip = string!(src_ip) }

                          dest_ip = get(kv, ["DestinationIp"]) ?? null
                          if dest_ip != null { .udm.dest_ip = string!(dest_ip) }

                          src_host = get(kv, ["SourceHostname"]) ?? null
                          if src_host != null { .udm.src_host = string!(src_host) }

                          dest_host = get(kv, ["DestinationHostname"]) ?? null
                          if dest_host != null { .udm.dest_host = string!(dest_host) }

                          src_port = get(kv, ["SourcePort"]) ?? null
                          if src_port != null { .udm.src_port = to_int(src_port) ?? null }

                          dest_port = get(kv, ["DestinationPort"]) ?? null
                          if dest_port != null { .udm.dest_port = to_int(dest_port) ?? null }

                          proto = get(kv, ["Protocol"]) ?? null
                          if proto != null { .udm.protocol = string!(proto) }

                          initiated = get(kv, ["Initiated"]) ?? null
                          if initiated != null {
                              init_str = string!(initiated)
                              .ext.initiated = init_str
                              if init_str == "true" {
                                  .ext.direction = "outbound"
                              } else {
                                  .ext.direction = "inbound"
                              }
                          }

                          src_ipv6 = get(kv, ["SourceIsIpv6"]) ?? null
                          if src_ipv6 != null { .ext.source_is_ipv6 = string!(src_ipv6) }

                          dst_ipv6 = get(kv, ["DestinationIsIpv6"]) ?? null
                          if dst_ipv6 != null { .ext.destination_is_ipv6 = string!(dst_ipv6) }

                          src_port_name = get(kv, ["SourcePortName"]) ?? null
                          if src_port_name != null {
                              spn = string!(src_port_name)
                              if spn != "-" { .ext.src_port_name = spn }
                          }

                          dst_port_name = get(kv, ["DestinationPortName"]) ?? null
                          if dst_port_name != null {
                              dpn = string!(dst_port_name)
                              if dpn != "-" { .ext.dest_port_name = dpn }
                          }
                      }

                      # ---------------------------------------------------
                      # File fields (Event IDs 2, 11, 15, 23, 26, 27, 28, 29)
                      # ---------------------------------------------------
                      target_fn = get(kv, ["TargetFilename"]) ?? null
                      if target_fn != null {
                          tfn_str = string!(target_fn)
                          .udm.file_path = tfn_str
                          parts = split(tfn_str, "\\")
                          if length(parts) > 0 {
                              .udm.file_name = get!(parts, [length(parts) - 1])
                          }
                      }

                      creation_time = get(kv, ["CreationUtcTime"]) ?? null
                      if creation_time != null {
                          .udm.file_create_time = string!(creation_time)
                      }

                      prev_creation = get(kv, ["PreviousCreationUtcTime"]) ?? null
                      if prev_creation != null {
                          .ext.previous_creation_utc_time = string!(prev_creation)
                      }

                      # ---------------------------------------------------
                      # Image loaded / DLL fields (Event ID 7)
                      # ---------------------------------------------------
                      if event_id == 7 {
                          image_loaded = get(kv, ["ImageLoaded"]) ?? null
                          if image_loaded != null {
                              il_str = string!(image_loaded)
                              .udm.file_path = il_str
                              parts = split(il_str, "\\")
                              if length(parts) > 0 {
                                  .udm.file_name = get!(parts, [length(parts) - 1])
                              }
                          }
                          signed = get(kv, ["Signed"]) ?? null
                          if signed != null { .ext.signed = string!(signed) }
                          sig = get(kv, ["Signature"]) ?? null
                          if sig != null { .udm.signature = string!(sig) }
                          sig_status = get(kv, ["SignatureStatus"]) ?? null
                          if sig_status != null { .ext.signature_status = string!(sig_status) }

                          file_ver = get(kv, ["FileVersion"]) ?? null
                          if file_ver != null { .ext.file_version = string!(file_ver) }
                          desc = get(kv, ["Description"]) ?? null
                          if desc != null { .ext.description = string!(desc) }
                          prod = get(kv, ["Product"]) ?? null
                          if prod != null { .ext.product_name = string!(prod) }
                          comp = get(kv, ["Company"]) ?? null
                          if comp != null { .ext.company = string!(comp) }
                          orig_fn = get(kv, ["OriginalFileName"]) ?? null
                          if orig_fn != null { .ext.original_file_name = string!(orig_fn) }
                      }

                      # ---------------------------------------------------
                      # Driver loaded (Event ID 6)
                      # ---------------------------------------------------
                      if event_id == 6 {
                          image_loaded = get(kv, ["ImageLoaded"]) ?? null
                          if image_loaded != null {
                              il_str = string!(image_loaded)
                              .udm.file_path = il_str
                              parts = split(il_str, "\\")
                              if length(parts) > 0 {
                                  .udm.file_name = get!(parts, [length(parts) - 1])
                              }
                          }
                          signed = get(kv, ["Signed"]) ?? null
                          if signed != null { .ext.signed = string!(signed) }
                          sig = get(kv, ["Signature"]) ?? null
                          if sig != null { .udm.signature = string!(sig) }
                          sig_status = get(kv, ["SignatureStatus"]) ?? null
                          if sig_status != null { .ext.signature_status = string!(sig_status) }
                      }

                      # ---------------------------------------------------
                      # Process access (Event ID 10)
                      # ---------------------------------------------------
                      if event_id == 10 {
                          src_pid = get(kv, ["SourceProcessId"]) ?? null
                          if src_pid != null { .udm.process_id = to_int(src_pid) ?? null }
                          src_pguid = get(kv, ["SourceProcessGUID"]) ?? null
                          if src_pguid != null { .udm.process_guid = string!(src_pguid) }
                          src_image = get(kv, ["SourceImage"]) ?? null
                          if src_image != null {
                              si_str = string!(src_image)
                              .udm.process_path = si_str
                              parts = split(si_str, "\\")
                              if length(parts) > 0 {
                                  .udm.process_name = get!(parts, [length(parts) - 1])
                              }
                          }
                          src_tid = get(kv, ["SourceThreadId"]) ?? null
                          if src_tid != null { .ext.source_thread_id = to_int(src_tid) ?? null }

                          tgt_pid = get(kv, ["TargetProcessId"]) ?? null
                          if tgt_pid != null { .ext.target_process_id = to_int(tgt_pid) ?? null }
                          tgt_pguid = get(kv, ["TargetProcessGUID"]) ?? null
                          if tgt_pguid != null { .ext.target_process_guid = string!(tgt_pguid) }
                          tgt_image = get(kv, ["TargetImage"]) ?? null
                          if tgt_image != null {
                              ti_str = string!(tgt_image)
                              .ext.target_process_path = ti_str
                              parts = split(ti_str, "\\")
                              if length(parts) > 0 {
                                  .ext.target_process_name = get!(parts, [length(parts) - 1])
                              }
                          }

                          granted = get(kv, ["GrantedAccess"]) ?? null
                          if granted != null { .ext.granted_access = string!(granted) }
                          call_trace = get(kv, ["CallTrace"]) ?? null
                          if call_trace != null { .ext.call_trace = string!(call_trace) }

                          src_user = get(kv, ["SourceUser"]) ?? null
                          if src_user != null {
                              su_str = string!(src_user)
                              su_parts = split(su_str, "\\")
                              if length(su_parts) > 1 {
                                  .udm.user_domain = get!(su_parts, [0])
                                  .udm.user = get!(su_parts, [1])
                              } else {
                                  .udm.user = su_str
                              }
                          }
                          tgt_user = get(kv, ["TargetUser"]) ?? null
                          if tgt_user != null { .ext.target_user = string!(tgt_user) }
                      }

                      # ---------------------------------------------------
                      # Create remote thread (Event ID 8)
                      # ---------------------------------------------------
                      if event_id == 8 {
                          src_pid = get(kv, ["SourceProcessId"]) ?? null
                          if src_pid != null { .udm.process_id = to_int(src_pid) ?? null }
                          src_image = get(kv, ["SourceImage"]) ?? null
                          if src_image != null {
                              si_str = string!(src_image)
                              .udm.process_path = si_str
                              parts = split(si_str, "\\")
                              if length(parts) > 0 {
                                  .udm.process_name = get!(parts, [length(parts) - 1])
                              }
                          }
                          tgt_pid = get(kv, ["TargetProcessId"]) ?? null
                          if tgt_pid != null { .ext.target_process_id = to_int(tgt_pid) ?? null }
                          tgt_image = get(kv, ["TargetImage"]) ?? null
                          if tgt_image != null { .ext.target_process_path = string!(tgt_image) }
                          new_tid = get(kv, ["NewThreadId"]) ?? null
                          if new_tid != null { .ext.new_thread_id = to_int(new_tid) ?? null }
                          start_addr = get(kv, ["StartAddress"]) ?? null
                          if start_addr != null { .ext.start_address = string!(start_addr) }
                          start_mod = get(kv, ["StartModule"]) ?? null
                          if start_mod != null { .ext.start_module = string!(start_mod) }
                          start_func = get(kv, ["StartFunction"]) ?? null
                          if start_func != null { .ext.start_function = string!(start_func) }
                      }

                      # ---------------------------------------------------
                      # Registry events (Event IDs 12, 13, 14)
                      # ---------------------------------------------------
                      if event_id == 12 || event_id == 13 || event_id == 14 {
                          evt_type = get(kv, ["EventType"]) ?? null
                          if evt_type != null { .ext.event_type = string!(evt_type) }

                          target_obj = get(kv, ["TargetObject"]) ?? null
                          if target_obj != null {
                              to_str = string!(target_obj)
                              .udm.registry_path = to_str

                              # Split registry path: HKLM\SOFTWARE\Microsoft\...
                              # Last component is the key/value name
                              reg_parts = split(to_str, "\\")
                              if length(reg_parts) > 0 {
                                  .udm.registry_key_name = get!(reg_parts, [length(reg_parts) - 1])
                              }
                              if length(reg_parts) > 1 {
                                  .ext.registry_hive = get!(reg_parts, [0])
                              }
                          }

                          details = get(kv, ["Details"]) ?? null
                          if details != null { .udm.registry_value_data = string!(details) }

                          new_name = get(kv, ["NewName"]) ?? null
                          if new_name != null { .ext.registry_new_name = string!(new_name) }
                      }

                      # ---------------------------------------------------
                      # DNS query (Event ID 22)
                      # ---------------------------------------------------
                      if event_id == 22 {
                          qname = get(kv, ["QueryName"]) ?? null
                          if qname != null { .udm.query = string!(qname) }

                          qtype = get(kv, ["QueryType"]) ?? null
                          if qtype != null {
                              qt_int = to_int(qtype) ?? 0
                              .udm.query_type = if qt_int == 1 { "A" } else if qt_int == 2 { "NS" } else if qt_int == 5 { "CNAME" } else if qt_int == 6 { "SOA" } else if qt_int == 12 { "PTR" } else if qt_int == 15 { "MX" } else if qt_int == 16 { "TXT" } else if qt_int == 28 { "AAAA" } else if qt_int == 33 { "SRV" } else if qt_int == 65 { "HTTPS" } else if qt_int == 255 { "ANY" } else { to_string(qt_int) }
                          }

                          qstatus = get(kv, ["QueryStatus"]) ?? null
                          if qstatus != null {
                              qs_str = string!(qstatus)
                              .ext.query_status = qs_str
                              .udm.status = if qs_str == "0" { "success" } else { "failure" }
                          }

                          qresults = get(kv, ["QueryResults"]) ?? null
                          if qresults != null {
                              qr_str = string!(qresults)
                              .udm.dns_answers = qr_str
                              # Try to extract first IP from results
                              ip_match = parse_regex(qr_str, r'(?P<ip>\d+\.\d+\.\d+\.\d+)') ?? null
                              if ip_match != null {
                                  .udm.answer = ip_match.ip
                                  .udm.dest_ip = ip_match.ip
                              }
                          }
                      }

                      # ---------------------------------------------------
                      # File stream / ADS (Event ID 15)
                      # ---------------------------------------------------
                      if event_id == 15 {
                          target_fn2 = get(kv, ["TargetFilename"]) ?? null
                          if target_fn2 != null {
                              tf_str = string!(target_fn2)
                              .udm.file_path = tf_str
                              parts = split(tf_str, "\\")
                              if length(parts) > 0 {
                                  .udm.file_name = get!(parts, [length(parts) - 1])
                              }
                          }
                          contents = get(kv, ["Contents"]) ?? null
                          if contents != null { .ext.contents = string!(contents) }
                      }

                      # ---------------------------------------------------
                      # Pipe events (Event IDs 17, 18)
                      # ---------------------------------------------------
                      if event_id == 17 || event_id == 18 {
                          pipe_name = get(kv, ["PipeName"]) ?? null
                          if pipe_name != null { .ext.pipe_name = string!(pipe_name) }
                      }

                      # ---------------------------------------------------
                      # WMI events (Event IDs 19, 20, 21)
                      # ---------------------------------------------------
                      if event_id == 19 || event_id == 20 || event_id == 21 {
                          wmi_op = get(kv, ["Operation"]) ?? null
                          if wmi_op != null { .ext.wmi_operation = string!(wmi_op) }
                          wmi_ns = get(kv, ["EventNamespace"]) ?? null
                          if wmi_ns != null { .ext.wmi_namespace = string!(wmi_ns) }
                          wmi_name = get(kv, ["Name"]) ?? null
                          if wmi_name != null { .ext.wmi_name = string!(wmi_name) }
                          wmi_query = get(kv, ["Query"]) ?? null
                          if wmi_query != null { .ext.wmi_query = string!(wmi_query) }
                          wmi_type = get(kv, ["Type"]) ?? null
                          if wmi_type != null { .ext.wmi_type = string!(wmi_type) }
                          wmi_dest = get(kv, ["Destination"]) ?? null
                          if wmi_dest != null { .ext.wmi_destination = string!(wmi_dest) }
                          wmi_consumer = get(kv, ["Consumer"]) ?? null
                          if wmi_consumer != null { .ext.wmi_consumer = string!(wmi_consumer) }
                          wmi_filter = get(kv, ["Filter"]) ?? null
                          if wmi_filter != null { .ext.wmi_filter = string!(wmi_filter) }
                      }

                      # ---------------------------------------------------
                      # Clipboard change (Event ID 24)
                      # ---------------------------------------------------
                      if event_id == 24 {
                          clip_info = get(kv, ["ClientInfo"]) ?? null
                          if clip_info != null { .ext.client_info = string!(clip_info) }
                          archived = get(kv, ["Archived"]) ?? null
                          if archived != null { .ext.archived = string!(archived) }
                      }

                      # ---------------------------------------------------
                      # Process tampering (Event ID 25)
                      # ---------------------------------------------------
                      if event_id == 25 {
                          tamp_type = get(kv, ["Type"]) ?? null
                          if tamp_type != null { .ext.tampering_type = string!(tamp_type) }
                      }

                      # ---------------------------------------------------
                      # Raw access read (Event ID 9)
                      # ---------------------------------------------------
                      if event_id == 9 {
                          device = get(kv, ["Device"]) ?? null
                          if device != null { .ext.device = string!(device) }
                      }

                      # ---------------------------------------------------
                      # Event ID 1 extra: file version info
                      # ---------------------------------------------------
                      if event_id == 1 {
                          file_ver = get(kv, ["FileVersion"]) ?? null
                          if file_ver != null { .ext.file_version = string!(file_ver) }
                          desc = get(kv, ["Description"]) ?? null
                          if desc != null { .ext.description = string!(desc) }
                          prod = get(kv, ["Product"]) ?? null
                          if prod != null { .ext.product_name = string!(prod) }
                          comp = get(kv, ["Company"]) ?? null
                          if comp != null { .ext.company = string!(comp) }
                          orig_fn = get(kv, ["OriginalFileName"]) ?? null
                          if orig_fn != null { .ext.original_file_name = string!(orig_fn) }
                      }
                  }
              }
          }
      }
  }

  if !exists(.udm.timestamp) {
      .udm.timestamp = now()
  }
