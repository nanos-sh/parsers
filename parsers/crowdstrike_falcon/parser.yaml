  } else {
      .metadata.parse_error = to_string(err)
      .udm.timestamp = now()
      .udm.event_type = "unknown"
  }

  if !exists(.udm.timestamp) {
      .udm.timestamp = now()
  }
  .metadata.parser = "crowdstrike_falcon"
  .message = raw_log
