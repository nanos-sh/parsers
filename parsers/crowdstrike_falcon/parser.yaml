          if exists(parsed.SHA256HashData) {
              .udm.file_hash = to_string(parsed.SHA256HashData) ?? null
          }
          if exists(parsed.MD5HashData) {
              .ext.md5 = to_string(parsed.MD5HashData) ?? null
          }
          if exists(parsed.SignInfoFlags) {
