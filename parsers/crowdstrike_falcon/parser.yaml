              .ext.severity_number = severity_num
              if severity_num != null {
                  sev_int = to_int!(severity_num)
                  if sev_int >= 4 {
                      .udm.severity = "high"
                  } else if sev_int == 3 {
                      .udm.severity = "medium"
                  } else if sev_int == 2 {
