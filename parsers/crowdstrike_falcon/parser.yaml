          }
          if exists(parsed.ServicePackMajor) {
              .ext.service_pack_major = to_string(parsed.ServicePackMajor) ?? null
          }

      # ===== CATCH-ALL for other event types =====
      } else {
          # For unhandled event types, set action from event_simpleName
          event_action = downcase(event_name)
          .udm.event_type = event_action

          # Still try to extract common process fields if present
          if exists(parsed.ImageFileName) {
              image_file = to_string(parsed.ImageFileName) ?? ""
              .udm.process_path = image_file
              fname_match = parse_regex(image_file, r'[^\\/]+$') ?? {}
              if exists(fname_match."0") {
                  .udm.process_name = to_string!(fname_match."0")
              }
          }
          if exists(parsed.CommandLine) {
              .udm.command_line = to_string(parsed.CommandLine) ?? null
          }
          if exists(parsed.UserSid) {
