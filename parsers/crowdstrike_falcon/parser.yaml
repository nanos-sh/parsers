          }
          if exists(parsed.Technique) {
              .ext.mitre_technique = to_string(parsed.Technique) ?? null
          }
          if exists(parsed.PatternDispositionDescription) {
              .ext.pattern_disposition = to_string(parsed.PatternDispositionDescription) ?? null
          }
          if exists(parsed.PatternDispositionValue) {
              .ext.pattern_disposition_value = to_int(parsed.PatternDispositionValue) ?? null
          }
          if exists(parsed.PatternDispositionFlags) {
              .ext.pattern_disposition_flags = parsed.PatternDispositionFlags
          }
          if exists(parsed.ParentImageFileName) {
              parent_file = to_string(parsed.ParentImageFileName) ?? ""
              .udm.parent_process_path = parent_file
              pfname_match = parse_regex(parent_file, r'[^\\/]+$') ?? {}
              if exists(pfname_match."0") {
                  .udm.parent_process_name = to_string!(pfname_match."0")
              }
          }
          if exists(parsed.ParentCommandLine) {
              .udm.parent_command_line = to_string(parsed.ParentCommandLine) ?? null
          }
          if exists(parsed.ProcessStartTime) {
              pst_float = to_float(to_string(parsed.ProcessStartTime) ?? "") ?? null
              if pst_float != null {
                  pst_int = to_int!(pst_float)
                  if pst_int != null {
                      .ext.process_start_time = from_unix_timestamp(pst_int) ?? null
                  }
