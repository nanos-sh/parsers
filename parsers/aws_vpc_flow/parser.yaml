name: aws_vpc_flow
display_name: AWS VPC Flow Logs
version: "1.0.0"
description: "Parses AWS VPC Flow Logs v2-v5 in space-delimited and JSON formats"
match_values:
  - aws_vpc_flow
  - vpc_flow
  - aws_flow
category: cloud
vendor: "Amazon"
product: "VPC Flow Logs"

parser_vrl: |
  raw_log = string!(.message)

  # Try JSON format first
  parsed_json, json_err = parse_json(raw_log)

  if json_err == null {
    # JSON format (CloudWatch Logs)
    .src_ip = to_string(parsed_json.srcaddr) ?? null
    .dest_ip = to_string(parsed_json.dstaddr) ?? null
    .src_port = to_int(parsed_json.srcport) ?? null
    .dest_port = to_int(parsed_json.dstport) ?? null
    .bytes_out = to_int(parsed_json.bytes) ?? null
    .packets_out = to_int(parsed_json.packets) ?? null

    proto_num = to_int(parsed_json.protocol) ?? 0
    if proto_num == 6 {
      .protocol = "tcp"
    } else if proto_num == 17 {
      .protocol = "udp"
    } else if proto_num == 1 {
      .protocol = "icmp"
    } else {
      .protocol = to_string(proto_num)
    }

    raw_action = to_string(parsed_json.action) ?? ""
    if upcase(raw_action) == "ACCEPT" {
      .action = "allow"
    } else if upcase(raw_action) == "REJECT" {
      .action = "deny"
    } else {
      .action = downcase(raw_action)
    }

    start_ts = to_int(parsed_json.start) ?? null
    if start_ts != null {
      .timestamp = from_unix_timestamp!(start_ts)
    }

    .ext.interface_id = to_string(parsed_json.interface_id) ?? null
    .ext.account_id = to_string(parsed_json.account_id) ?? null
    .ext.log_status = to_string(parsed_json.log_status) ?? null
    .ext.vpc_flow_version = to_int(parsed_json.version) ?? null

    end_ts = to_int(parsed_json.end) ?? null
    if end_ts != null {
      .ext.end_time = from_unix_timestamp!(end_ts)
    }
  } else {
    # Space-delimited format
    parts = split(raw_log, " ")
    num_parts = length(parts)

    if num_parts >= 14 {
      .ext.vpc_flow_version = to_int!(get!(parts, [0]))
      .ext.account_id = get!(parts, [1])
      .ext.interface_id = get!(parts, [2])
      .src_ip = get!(parts, [3])
      .dest_ip = get!(parts, [4])
      .src_port = to_int!(get!(parts, [5]))
      .dest_port = to_int!(get!(parts, [6]))

      proto_num = to_int!(get!(parts, [7]))
      if proto_num == 6 {
        .protocol = "tcp"
      } else if proto_num == 17 {
        .protocol = "udp"
      } else if proto_num == 1 {
        .protocol = "icmp"
      } else {
        .protocol = to_string(proto_num)
      }

      .packets_out = to_int!(get!(parts, [8]))
      .bytes_out = to_int!(get!(parts, [9]))

      start_ts = to_int!(get!(parts, [10]))
      if start_ts != null {
        .timestamp = from_unix_timestamp!(start_ts)
      }

      end_ts = to_int!(get!(parts, [11]))
      if end_ts != null {
        .ext.end_time = from_unix_timestamp!(end_ts)
      }

      raw_action = to_string!(get!(parts, [12]))
      if upcase(raw_action) == "ACCEPT" {
        .action = "allow"
      } else if upcase(raw_action) == "REJECT" {
        .action = "deny"
      } else {
        .action = downcase(raw_action)
      }

      .ext.log_status = get!(parts, [13])

      # v3+ additional fields
      if num_parts >= 15 {
        .ext.vpc_id = get!(parts, [14])
      }
      if num_parts >= 16 {
        .ext.subnet_id = get!(parts, [15])
      }
      if num_parts >= 17 {
        .ext.instance_id = get!(parts, [16])
      }

      # Parse key:value pairs in v3+ extended fields
      if num_parts > 17 {
      for_each(array!(slice!(parts, start: 17))) -> |_idx, field| {
        kv = split(to_string!(field), ":", limit: 2)
        if length(kv) == 2 {
          k = to_string!(get!(kv, [0]))
          v = to_string!(get!(kv, [1]))
          if v != "-" {
            if k == "flow-direction" {
              .direction = v
            } else if k == "region" {
              .cloud_region = v
            } else if k == "az-id" {
              .ext.availability_zone = v
            } else if k == "pkt-srcaddr" {
              .ext.pkt_src_addr = v
            } else if k == "pkt-dstaddr" {
              .ext.pkt_dst_addr = v
            } else if k == "pkt-dst-aws-service" {
              .ext.dst_aws_service = v
            } else if k == "pkt-src-aws-service" {
              .ext.src_aws_service = v
            } else if k == "traffic-path" {
              .ext.traffic_path = v
            } else if k == "tcp-flags" {
              .ext.tcp_flags = v
            } else if k == "type" {
              .ext.ip_type = v
            }
          }
        }
      }
      }
    }
  }

  .cloud_provider = "aws"
  .cloud_service = "VPC Flow Logs"
  .vendor = "Amazon"
  .product = "VPC Flow Logs"
  .category = "network"

  if .src_ip == "-" { .src_ip = null }
  if .dest_ip == "-" { .dest_ip = null }

  del(.message)
