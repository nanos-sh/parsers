name: meraki
display_name: Cisco Meraki
version: "1.0.0"
description: "Parses Cisco Meraki MX firewall, MR wireless, and MS switch syslog events"
match_values:
  - meraki
  - cisco_meraki
category: network
vendor: "Cisco"
product: "Meraki"
parser_vrl: |
  # Cisco Meraki Parser
  # Handles MX flows, ids-alerts, urls, events (VPN, wireless, switch)
  # Format: <PRI>1 EPOCH DEVICE_NAME LOG_TYPE key=value...

  # Initialize required structures
  .udm = {}
  .ext = {}
  .metadata = {}

  # Set defaults
  .udm.timestamp = now()
  .udm.vendor = "Cisco"
  .udm.product = "Meraki"
  .udm.vendor_product = "Cisco Meraki"

  # Get raw log
  raw_log = string!(.message)

  # --- Parse header: <PRI>VERSION EPOCH DEVICE LOG_TYPE REST ---
  header_match, header_err = parse_regex(raw_log, r'^<(?P<pri>\d+)>\d*\s*(?P<epoch>[\d.]+)\s+(?P<device>\S+)\s+(?P<logtype>\S+)\s+(?P<rest>.*)$')
  if header_err != null {
      abort
  }

  # Parse PRI
  pri_val = to_int(header_match.pri) ?? null
  if pri_val != null {
      .ext.syslog_priority = pri_val
  }

  # Parse epoch timestamp
  epoch_str = string!(header_match.epoch)
  # Extract integer part of epoch
  epoch_parts, ep_err = parse_regex(epoch_str, r'^(?P<secs>\d+)')
  if ep_err == null {
      epoch_secs = to_int(epoch_parts.secs) ?? null
      if epoch_secs != null {
          ts, ts_err = from_unix_timestamp(epoch_secs)
          if ts_err == null {
              .udm.timestamp = format_timestamp!(ts, format: "%Y-%m-%d %H:%M:%S")
          }
      }
  }

  # Device name
  device_name = string!(header_match.device)
  .udm.dvc = device_name

  # Log type
  log_type = downcase(string!(header_match.logtype))
  .metadata.log_type = log_type

  rest = string!(header_match.rest)

  # ============================================================
  # FLOWS (MX firewall)
  # ============================================================
  if log_type == "flows" {
      .metadata.event_category = "network"

      # Parse key=value pairs from the flow line
      # First extract pattern at the end: "pattern: allow all" or "pattern: deny all"
      pattern_match, pattern_err = parse_regex(rest, r'(?P<kvpart>.*)\s+pattern:\s+(?P<pattern>.+)$')
      kv_str = rest
      if pattern_err == null && pattern_match != null {
          kv_str = string!(pattern_match.kvpart)
          pattern_val = downcase(string!(pattern_match.pattern))
          .ext.pattern = pattern_val
          # Derive action from pattern
          if contains(pattern_val, "allow") {
              .udm.action = "allow"
          } else if contains(pattern_val, "deny") {
              .udm.action = "deny"
          }
      }

      parsed = parse_key_value(kv_str, key_value_delimiter: "=", field_delimiter: " ") ?? {}

      if exists(parsed.src) { .udm.src_ip = string!(parsed.src) }
      if exists(parsed.dst) { .udm.dest_ip = string!(parsed.dst) }
      if exists(parsed.sport) { .udm.src_port = to_int(parsed.sport) ?? null }
      if exists(parsed.dport) { .udm.dest_port = to_int(parsed.dport) ?? null }
      if exists(parsed.protocol) { .udm.protocol = downcase(string!(parsed.protocol)) }
      if exists(parsed.mac) { .udm.src_mac = string!(parsed.mac) }
      if exists(parsed.type) { .ext.flow_type = string!(parsed.type) }
  }

  # ============================================================
  # IDS-ALERTS (MX IDS)
  # ============================================================
  if log_type == "ids-alerts" {
      .metadata.event_category = "intrusion"

      # Extract the message part after "message: "
      msg_match, msg_err = parse_regex(rest, r'(?P<kvpart>.*)\s+message:\s+(?P<message>.+)$')
      kv_str = rest
      if msg_err == null && msg_match != null {
          kv_str = string!(msg_match.kvpart)
          .udm.signature = string!(msg_match.message)
      }

      parsed = parse_key_value(kv_str, key_value_delimiter: "=", field_delimiter: " ") ?? {}

      if exists(parsed.signature) { .udm.signature_id = string!(parsed.signature) }
      if exists(parsed.priority) {
          pri = to_int(parsed.priority) ?? null
          if pri != null {
              if pri == 1 { .udm.severity = "critical" } else if pri == 2 { .udm.severity = "high" } else if pri == 3 { .udm.severity = "medium" } else { .udm.severity = "low" }
          }
      }
      if exists(parsed.direction) { .udm.direction = downcase(string!(parsed.direction)) }
      if exists(parsed.protocol) { .udm.protocol = downcase(string!(parsed.protocol)) }

      # Parse src and dst which have ip:port format
      if exists(parsed.src) {
          src_str = string!(parsed.src)
          src_parts, src_err = parse_regex(src_str, r'^(?P<ip>[^:]+):(?P<port>\d+)$')
          if src_err == null && src_parts != null {
              .udm.src_ip = string!(src_parts.ip)
              .udm.src_port = to_int(src_parts.port) ?? null
          } else {
              .udm.src_ip = src_str
          }
      }
      if exists(parsed.dst) {
          dst_str = string!(parsed.dst)
          dst_parts, dst_err = parse_regex(dst_str, r'^(?P<ip>[^:]+):(?P<port>\d+)$')
          if dst_err == null && dst_parts != null {
              .udm.dest_ip = string!(dst_parts.ip)
              .udm.dest_port = to_int(dst_parts.port) ?? null
          } else {
              .udm.dest_ip = dst_str
          }
      }

      .udm.action = "alert"
  }

  # ============================================================
  # URLS (MX URL filtering)
  # ============================================================
  if log_type == "urls" {
      .metadata.event_category = "web"

      # Format: src=IP:PORT dst=IP:PORT mac=MAC request: METHOD URL
      req_match, req_err = parse_regex(rest, r'(?P<kvpart>.*)\s+request:\s+(?P<method>\S+)\s+(?P<url>.+)$')
      kv_str = rest
      if req_err == null && req_match != null {
          kv_str = string!(req_match.kvpart)
          .udm.http_method = upcase(string!(req_match.method))
          .udm.url = string!(req_match.url)
          # Extract domain from URL
          domain_match, domain_err = parse_regex(string!(req_match.url), r'https?://(?P<domain>[^/]+)')
          if domain_err == null && domain_match != null {
              .udm.url_domain = string!(domain_match.domain)
          }
      }

      parsed = parse_key_value(kv_str, key_value_delimiter: "=", field_delimiter: " ") ?? {}

      # src and dst have ip:port format
      if exists(parsed.src) {
          src_str = string!(parsed.src)
          src_parts, src_err = parse_regex(src_str, r'^(?P<ip>[^:]+):(?P<port>\d+)$')
          if src_err == null && src_parts != null {
              .udm.src_ip = string!(src_parts.ip)
              .udm.src_port = to_int(src_parts.port) ?? null
          } else {
              .udm.src_ip = src_str
          }
      }
      if exists(parsed.dst) {
          dst_str = string!(parsed.dst)
          dst_parts, dst_err = parse_regex(dst_str, r'^(?P<ip>[^:]+):(?P<port>\d+)$')
          if dst_err == null && dst_parts != null {
              .udm.dest_ip = string!(dst_parts.ip)
              .udm.dest_port = to_int(dst_parts.port) ?? null
          } else {
              .udm.dest_ip = dst_str
          }
      }
      if exists(parsed.mac) { .udm.src_mac = string!(parsed.mac) }
  }

  # ============================================================
  # EVENTS (VPN, wireless, switch, 802.1x)
  # ============================================================
  if log_type == "events" {
      .metadata.event_category = "system"

      parsed = parse_key_value(rest, key_value_delimiter: "=", field_delimiter: " ") ?? {}

      if exists(parsed.type) {
          event_type = downcase(string!(parsed.type))
          .ext.event_type = event_type

          if event_type == "vpn_connectivity_change" {
              .metadata.event_category = "vpn"
              if exists(parsed.vpn_type) { .ext.vpn_type = string!(parsed.vpn_type) }
              if exists(parsed.peer_contact) { .ext.peer_contact = string!(parsed.peer_contact) }
              if exists(parsed.connectivity) {
                  conn = string!(parsed.connectivity)
                  if conn == "true" { .udm.action = "connected" } else { .udm.action = "disconnected" }
              }
          } else if event_type == "association" {
              .metadata.event_category = "wireless"
              .udm.action = "association"
              if exists(parsed.radio) { .ext.radio = string!(parsed.radio) }
              if exists(parsed.vap) { .ext.vap = string!(parsed.vap) }
              if exists(parsed.channel) { .ext.channel = string!(parsed.channel) }
              if exists(parsed.rssi) { .ext.rssi = to_int(parsed.rssi) ?? null }
              if exists(parsed.aid) { .ext.association_id = string!(parsed.aid) }
          } else if event_type == "8021x_auth" {
              .metadata.event_category = "authentication"
              .udm.auth_type = "802.1x"
              if exists(parsed.identity) { .udm.user = string!(parsed.identity) }
              if exists(parsed.radio) { .ext.radio = string!(parsed.radio) }
              if exists(parsed.vap) { .ext.vap = string!(parsed.vap) }
              if exists(parsed.aid) { .ext.association_id = string!(parsed.aid) }
              if exists(parsed.auth_neg_dur) { .ext.auth_neg_duration = string!(parsed.auth_neg_dur) }
              if exists(parsed.last_auth_ago) { .ext.last_auth_ago = string!(parsed.last_auth_ago) }
          }
      }

      # Check for switch port events (positional: "port N status STATE")
      port_match, port_err = parse_regex(rest, r'port\s+(?P<port>\d+)\s+status\s+(?P<status>\S+)')
      if port_err == null && port_match != null {
          .metadata.event_category = "switch"
          .ext.switch_port = to_int(port_match.port) ?? null
          .udm.status = string!(port_match.status)
          .udm.action = string!(port_match.status)
      }
  }

  # --- Final: set .message to raw log ---
  .message = raw_log
