name: syslog
display_name: Generic Syslog
version: "1.0.0"
description: "Parses RFC 3164 (BSD) and RFC 5424 syslog messages extracting facility, severity, hostname, app, PID, and structured data"
match_values:
  - syslog
  - syslog_rfc3164
  - syslog_rfc5424
  - generic_syslog
category: generic
vendor: "IETF"
product: "Syslog"
parser_vrl: |
  # Generic Syslog Parser
  # Supports: RFC 3164 (BSD) and RFC 5424

  .udm = {}
  .ext = {}
  .metadata = {}

  raw_log = string!(.message)

  # ------------------------------------------------------------------
  # Extract PRI value: <PRI>...
  # ------------------------------------------------------------------
  pri_match, pri_err = parse_regex(raw_log, r'^<(?P<pri>\d{1,3})>(?P<rest>.*)')

  if pri_err == null {
      pri_val = to_int(string!(pri_match.pri)) ?? 0
      rest = string!(pri_match.rest)

      # Decode facility and severity from PRI
      facility_num = pri_val / 8
      severity_num = pri_val - (facility_num * 8)

      # Map facility number to name
      facility_names = ["kern", "user", "mail", "daemon", "auth", "syslog", "lpr", "news",
                         "uucp", "cron", "authpriv", "ftp", "ntp", "audit", "alert", "clock",
                         "local0", "local1", "local2", "local3", "local4", "local5", "local6", "local7"]
      fac_name = get!(facility_names, [facility_num])
      if fac_name != null {
          .ext.facility = to_string!(fac_name)
      } else {
          .ext.facility = to_string(facility_num)
      }
      .ext.facility_num = facility_num

      # Map severity number to name
      severity_names = ["emergency", "alert", "critical", "error", "warning", "notice", "informational", "debug"]
      sev_name = get!(severity_names, [severity_num])
      if sev_name != null {
          .ext.syslog_severity = to_string!(sev_name)
      } else {
          .ext.syslog_severity = to_string(severity_num)
      }
      .ext.severity_num = severity_num

      # Map syslog severity to UDM severity
      if severity_num <= 2 {
          .udm.severity = "critical"
      } else if severity_num == 3 {
          .udm.severity = "high"
      } else if severity_num == 4 {
          .udm.severity = "medium"
      } else {
          .udm.severity = "low"
      }

      .udm.vendor_product = "Syslog"

      # ------------------------------------------------------------------
      # Detect RFC version: RFC 5424 starts with "1 " after PRI
      # ------------------------------------------------------------------
      is_rfc5424 = false
      rfc5424_match, r5_err = parse_regex(rest, r'^1\s+(?P<ts>\S+)\s+(?P<hostname>\S+)\s+(?P<app>\S+)\s+(?P<procid>\S+)\s+(?P<msgid>\S+)\s*(?P<remainder>.*)')

      if r5_err == null {
          is_rfc5424 = true
          .ext.rfc_version = "5424"

          ts_str = string!(rfc5424_match.ts)
          hostname = string!(rfc5424_match.hostname)
          app_name = string!(rfc5424_match.app)
          procid = string!(rfc5424_match.procid)
          msgid = string!(rfc5424_match.msgid)
          remainder = string!(rfc5424_match.remainder)

          # Timestamp
          if ts_str != "-" {
              ts, ts_err = parse_timestamp(ts_str, "%+")
              if ts_err == null {
                  .udm.timestamp = ts
              }
          }

          # Hostname
          if hostname != "-" { .udm.src_host = hostname }

          # App name / process name
          if app_name != "-" {
              .udm.process_name = app_name
              .ext.app_name = app_name
          }

          # Process ID
          if procid != "-" { .udm.process_id = procid }

          # Message ID
          if msgid != "-" { .ext.msgid = msgid }

          # Structured data: [sdid@enterprise key="val" key2="val2"]
          sd_match, sd_err = parse_regex(remainder, r'^\[(?P<sd>[^\]]+)\]\s*(?P<msg>.*)')
          if sd_err == null {
              .ext.structured_data = string!(sd_match.sd)
              msg_body = string!(sd_match.msg)
              if msg_body != "" {
                  .ext.message_body = msg_body
              }
          } else {
              # No structured data, remainder is the message
              trimmed = strip_whitespace(remainder)
              if trimmed != "" {
                  .ext.message_body = trimmed
              }
          }

      } else {
          # ------------------------------------------------------------------
          # RFC 3164 (BSD syslog)
          # Format: <PRI>Mon DD HH:MM:SS hostname app[pid]: message
          # ------------------------------------------------------------------
          .ext.rfc_version = "3164"

          rfc3164_match, r3_err = parse_regex(rest, r'^(?P<ts>[A-Z][a-z]{2}\s+\d{1,2}\s+\d{2}:\d{2}:\d{2})\s+(?P<hostname>\S+)\s+(?P<app>[^\[:\s]+)(?:\[(?P<pid>\d+)\])?:?\s*(?P<msg>.*)')

          if r3_err == null {
              ts_str = string!(rfc3164_match.ts)
              hostname = string!(rfc3164_match.hostname)
              app_name = string!(rfc3164_match.app)
              msg_body = string!(rfc3164_match.msg)

              # Timestamp — RFC 3164 has no year, use current year
              ts, ts_err = parse_timestamp(ts_str, "%b %d %H:%M:%S")
              if ts_err == null {
                  .udm.timestamp = ts
              }

              .udm.src_host = hostname
              .udm.process_name = app_name
              .ext.app_name = app_name

              # PID (optional)
              pid_val = string!(rfc3164_match.pid)
              if pid_val != "" {
                  .udm.process_id = pid_val
              }

              .ext.message_body = msg_body

              # ------------------------------------------------------------------
              # Application-specific parsing for known apps
              # ------------------------------------------------------------------
              app_lower = downcase(app_name)

              # --- sshd ---
              if app_lower == "sshd" {
                  # Accepted publickey/password for USER from IP port PORT
                  ssh_accept, ssh_a_err = parse_regex(msg_body, r'(?P<method>Accepted\s+\S+)\s+for\s+(?P<user>\S+)\s+from\s+(?P<ip>\S+)\s+port\s+(?P<port>\d+)')
                  if ssh_a_err == null {
                      .udm.user = string!(ssh_accept.user)
                      .udm.src_ip = string!(ssh_accept.ip)
                      .udm.src_port = to_int(string!(ssh_accept.port)) ?? null
                      .udm.auth_result = "success"
                      .udm.auth_type = "ssh"
                      .udm.action = "login"
                  } else {
                      # Failed password for USER from IP port PORT
                      ssh_fail, ssh_f_err = parse_regex(msg_body, r'Failed\s+(?P<method>\S+)\s+for\s+(?:invalid user\s+)?(?P<user>\S+)\s+from\s+(?P<ip>\S+)\s+port\s+(?P<port>\d+)')
                      if ssh_f_err == null {
                          .udm.user = string!(ssh_fail.user)
                          .udm.src_ip = string!(ssh_fail.ip)
                          .udm.src_port = to_int(string!(ssh_fail.port)) ?? null
                          .udm.auth_result = "failure"
                          .udm.auth_type = "ssh"
                          .udm.action = "login_failed"
                      }
                  }

              } else if app_lower == "sudo" {
                  # --- sudo ---
                  # user : TTY=tty ; PWD=pwd ; USER=target ; COMMAND=cmd
                  sudo_match, sudo_err = parse_regex(msg_body, r'(?P<user>\S+)\s+:\s+TTY=(?P<tty>\S+)\s*;\s*PWD=(?P<pwd>\S+)\s*;\s*USER=(?P<target_user>\S+)\s*;\s*COMMAND=(?P<command>.*)')
                  if sudo_err == null {
                      .udm.user = string!(sudo_match.user)
                      .udm.dest_user = string!(sudo_match.target_user)
                      .udm.command_line = string!(sudo_match.command)
                      .ext.tty = string!(sudo_match.tty)
                      .ext.working_directory = string!(sudo_match.pwd)
                      .udm.action = "sudo"
                      .udm.auth_type = "sudo"

                      # Extract command name
                      cmd_full = string!(sudo_match.command)
                      cmd_parts = split(cmd_full, " ")
                      cmd_path = get!(cmd_parts, [0])
                      if cmd_path != null {
                          path_parts = split(to_string!(cmd_path), "/")
                          cmd_name = get!(path_parts, [-1])
                          if cmd_name != null {
                              .udm.process_name = to_string!(cmd_name)
                          }
                      }
                  }

              } else if app_lower == "kernel" {
                  # --- kernel (iptables) ---
                  # [timestamp] iptables: IN=eth0 ... SRC=x DST=y PROTO=z SPT=a DPT=b
                  ipt_match, ipt_err = parse_regex(msg_body, r'(?:iptables|nftables|netfilter):\s*(?P<ipt_body>.*)')
                  if ipt_err == null {
                      ipt_body = string!(ipt_match.ipt_body)
                      ipt_kv, ipt_kv_err = parse_key_value(ipt_body, key_value_delimiter: "=", field_delimiter: " ")
                      if ipt_kv_err == null {
                          if exists(ipt_kv.SRC) { .udm.src_ip = to_string(ipt_kv.SRC) ?? null }
                          if exists(ipt_kv.DST) { .udm.dest_ip = to_string(ipt_kv.DST) ?? null }
                          if exists(ipt_kv.SPT) { .udm.src_port = to_int(ipt_kv.SPT) ?? null }
                          if exists(ipt_kv.DPT) { .udm.dest_port = to_int(ipt_kv.DPT) ?? null }
                          if exists(ipt_kv.PROTO) { .udm.protocol = to_string(ipt_kv.PROTO) ?? null }
                          if exists(ipt_kv.IN) { .ext.interface_in = to_string(ipt_kv.IN) ?? null }
                          if exists(ipt_kv.OUT) { .ext.interface_out = to_string(ipt_kv.OUT) ?? null }
                          if exists(ipt_kv.MAC) { .ext.mac_address = to_string(ipt_kv.MAC) ?? null }
                      }
                      .udm.action = "firewall"
                  }
              }

          } else {
              # Could not parse RFC 3164 format — store raw remainder
              .ext.message_body = rest
          }
      }

      # Default timestamp
      if !exists(.udm.timestamp) || .udm.timestamp == null {
          .udm.timestamp = now()
      }

  } else {
      # No PRI found — not a standard syslog message
      .udm.timestamp = now()
      .ext.raw_message = raw_log
      .ext.parse_error = "no syslog PRI header found"
  }
