name: azure_signin
display_name: Azure Sign-in Logs
version: "1.0.0"
description: "Parses Microsoft Entra ID (Azure AD) sign-in logs including interactive, non-interactive, and service principal sign-ins"
match_values:
  - azure_signin
  - azure_ad_signin
  - entra_id
  - azure_ad
category: cloud
vendor: "Microsoft"
product: "Entra ID"

parser_vrl: |
  raw_log = string!(.message)
  parsed = parse_json!(raw_log)

  props = parsed.properties
  if props == null {
    props = parsed
  }

  # Core identity fields
  .user = to_string(props.userPrincipalName) ?? null
  .ext.user_display_name = to_string(props.userDisplayName) ?? null
  .user_id = to_string(props.userId) ?? null
  .src_ip = to_string(props.ipAddress) ?? to_string(parsed.callerIpAddress) ?? null

  # Application
  .ext.app_id = to_string(props.appId) ?? null
  .ext.app_display_name = to_string(props.appDisplayName) ?? null
  .ext.resource_display_name = to_string(props.resourceDisplayName) ?? null
  .ext.resource_id = to_string(props.resourceId) ?? null

  # Authentication result
  status = props.status
  if status != null {
    error_code = to_int(status.errorCode) ?? -1
    if error_code == 0 {
      .auth_result = "success"
    } else {
      .auth_result = "failure"
      .ext.error_code = error_code
      .ext.failure_reason = to_string(status.failureReason) ?? null
      .ext.additional_details = to_string(status.additionalDetails) ?? null
    }
  } else {
    # Top-level resultType (0 = success)
    result_type = to_string(parsed.resultType) ?? ""
    if result_type == "0" {
      .auth_result = "success"
    } else if result_type != "" {
      .auth_result = "failure"
      .ext.error_code = to_int(result_type) ?? null
      .ext.result_description = to_string(parsed.resultDescription) ?? null
    }
  }

  # Authentication details
  .auth_type = to_string(props.authenticationRequirement) ?? null
  .ext.conditional_access_status = to_string(props.conditionalAccessStatus) ?? null
  .ext.is_interactive = to_bool(props.isInteractive) ?? null
  .ext.correlation_id = to_string(props.correlationId) ?? to_string(parsed.correlationId) ?? null

  # MFA details
  mfa_detail = props.mfaDetail
  if mfa_detail != null {
    mfa_method = to_string(mfa_detail.authMethod) ?? null
    if mfa_method != null {
      .mfa_used = true
      .ext.mfa_method = mfa_method
    } else {
      .mfa_used = false
    }
  }

  # Device details
  device = props.deviceDetail
  if device != null {
    .src_host = to_string(device.displayName) ?? null
    .ext.device_id = to_string(device.deviceId) ?? null
    .ext.device_os = to_string(device.operatingSystem) ?? null
    .ext.device_browser = to_string(device.browser) ?? null
    .ext.device_trust_type = to_string(device.trustType) ?? null
    .ext.device_is_compliant = to_bool(device.isCompliant) ?? null
    .ext.device_is_managed = to_bool(device.isManaged) ?? null
  }

  # Location
  location = props.location
  if location != null {
    .ext.city = to_string(location.city) ?? null
    .ext.state = to_string(location.state) ?? null
    .ext.country = to_string(location.countryOrRegion) ?? null

    geo = location.geoCoordinates
    if geo != null {
      .ext.latitude = to_float(geo.latitude) ?? null
      .ext.longitude = to_float(geo.longitude) ?? null
    }
  }

  # Risk assessment
  .ext.risk_level_during_signin = to_string(props.riskLevelDuringSignIn) ?? null
  .ext.risk_level_aggregated = to_string(props.riskLevelAggregated) ?? null
  .ext.risk_state = to_string(props.riskState) ?? null
  .ext.risk_detail = to_string(props.riskDetail) ?? null

  # Conditional access policies
  policies = array(props.appliedConditionalAccessPolicies) ?? []
  first_policy = get(policies, [0]) ?? null
  if first_policy != null {
    .ext.ca_policy_name = to_string(first_policy.displayName) ?? null
    .ext.ca_policy_result = to_string(first_policy.result) ?? null
  }

  # Network location
  net_locations = array(props.networkLocationDetails) ?? []
  first_net = get(net_locations, [0]) ?? null
  if first_net != null {
    .ext.network_type = to_string(first_net.networkType) ?? null
  }

  .ext.autonomous_system_number = to_int(props.autonomousSystemNumber) ?? null
  .ext.processing_time_ms = to_int(props.processingTimeInMs) ?? null

  # Cloud context
  .cloud_provider = "azure"
  .cloud_account_id = to_string(parsed.tenantId) ?? null
  .ext.tenant_id = to_string(parsed.tenantId) ?? null
  .ext.home_tenant_id = to_string(props.homeTenantId) ?? null

  # Timestamp
  time_str = to_string(parsed.time) ?? to_string(props.createdDateTime) ?? null
  if time_str != null {
    ts, ts_err = parse_timestamp(time_str, format: "%Y-%m-%dT%H:%M:%S%.fZ")
    if ts_err == null {
      .timestamp = ts
    }
  }

  .vendor = "Microsoft"
  .product = "Entra ID"
  .cloud_service = "Entra ID"
  .category = "authentication"

  del(.message)
