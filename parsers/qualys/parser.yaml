name: qualys
display_name: Qualys
version: "1.0.0"
description: "Parses Qualys vulnerability scan results, host detections, compliance findings, and web application scan events"
match_values:
  - qualys
  - qualys_vm
  - qualys_was
  - qualys_vuln
category: security
vendor: "Qualys"
product: "VMDR"
parser_vrl: |
  # Qualys Parser
  # Parses host detections (VM), knowledge base, WAS, and compliance findings

  # Initialize required structures
  .udm = {}
  .ext = {}
  .metadata = {}

  # Set defaults
  .udm.timestamp = now()
  .udm.vendor = "Qualys"
  .udm.product = "VMDR"
  .udm.vendor_product = "Qualys VMDR"

  # Get raw log content
  raw_log = to_string(.message) ?? ""

  # Parse JSON
  parsed, err = parse_json(raw_log)

  if err == null {
      # --- Determine event type ---
      # Host detection (VM): has DETECTION_LIST or IP+QID
      # Knowledge base: has QID+TITLE+VULN_TYPE, no IP
      # WAS: has webApp or vulnType=="VULNERABILITY" with uri
      # Compliance: has controlId or policyName

      is_host_detection = exists(parsed.DETECTION_LIST) || (exists(parsed.IP) && exists(parsed.QID))
      is_knowledge_base = exists(parsed.VULN_TYPE) && exists(parsed.QID) && exists(parsed.TITLE) && !exists(parsed.IP)
      is_was = exists(parsed.webApp) || (exists(parsed.vulnType) && exists(parsed.uri))
      is_compliance = exists(parsed.controlId) || exists(parsed.policyName)

      if is_host_detection {
          # --- Host Detection (VM) ---
          .udm.event_type = "vulnerability_detected"
          .udm.category = "vulnerability"

          if exists(parsed.IP) {
              .udm.dest_ip = string!(parsed.IP)
          }

          if exists(parsed.DNS) {
              .udm.dest_host = string!(parsed.DNS)
          } else if exists(parsed.NETBIOS) {
              .udm.dest_host = string!(parsed.NETBIOS)
          }

          if exists(parsed.OS) {
              .ext.os = string!(parsed.OS)
          }

          if exists(parsed.TRACKING_METHOD) {
              .ext.tracking_method = string!(parsed.TRACKING_METHOD)
          }

          # Parse timestamp from LAST_SCAN_DATETIME
          if exists(parsed.LAST_SCAN_DATETIME) {
              ts, ts_err = parse_timestamp(string!(parsed.LAST_SCAN_DATETIME), "%+")
              if ts_err == null {
                  .udm.timestamp = format_timestamp!(ts, format: "%Y-%m-%d %H:%M:%S")
              }
          }

          # Process detection list - take the first detection for primary fields
          if exists(parsed.DETECTION_LIST) && is_array(parsed.DETECTION_LIST) {
              detections = array!(parsed.DETECTION_LIST)
              det_count = length(detections)
              .ext.detection_count = to_string(det_count)

              if det_count > 0 {
                  d0 = detections[0]

                  if exists(d0.QID) {
                      .udm.signature_id = string!(d0.QID)
                  }

                  if exists(d0.SEVERITY) {
                      sev_raw = string!(d0.SEVERITY)
                      sev_mapped = if sev_raw == "1" {
                          "informational"
                      } else if sev_raw == "2" {
                          "low"
                      } else if sev_raw == "3" {
                          "medium"
                      } else if sev_raw == "4" {
                          "high"
                      } else if sev_raw == "5" {
                          "critical"
                      } else {
                          sev_raw
                      }
                      .udm.severity = sev_mapped
                  }

                  if exists(d0.PORT) {
                      port_str = string!(d0.PORT)
                      if port_str != "0" && port_str != "" {
                          port_num, port_err = to_int(port_str)
                          if port_err == null {
                              .udm.dest_port = port_num
                          }
                      }
                  }

                  if exists(d0.PROTOCOL) {
                      proto = string!(d0.PROTOCOL)
                      if proto != "" {
                          .udm.protocol = proto
                      }
                  }

                  if exists(d0.STATUS) {
                      .udm.status = string!(d0.STATUS)
                  }

                  if exists(d0.TYPE) {
                      .ext.detection_type = string!(d0.TYPE)
                  }

                  if exists(d0.RESULTS) {
                      .ext.results = string!(d0.RESULTS)
                  }

                  if exists(d0.SSL) {
                      .ext.ssl = string!(d0.SSL)
                  }

                  if exists(d0.FIRST_FOUND_DATETIME) {
                      .ext.first_found = string!(d0.FIRST_FOUND_DATETIME)
                  }

                  if exists(d0.LAST_FOUND_DATETIME) {
                      .ext.last_found = string!(d0.LAST_FOUND_DATETIME)
                  }

                  if exists(d0.TIMES_FOUND) {
                      .ext.times_found = string!(d0.TIMES_FOUND)
                  }
              }

              # Store full detection list as JSON for reference
              .ext.detection_list = encode_json(parsed.DETECTION_LIST)
          }

      } else if is_was {
          # --- Web Application Scan (WAS) ---
          .udm.event_type = "web_vuln_detected"
          .udm.category = "vulnerability"

          if exists(parsed.id) {
              .ext.event_id = string!(parsed.id)
          }

          if exists(parsed.qid) {
              .udm.signature_id = to_string(parsed.qid) ?? ""
          }

          if exists(parsed.title) {
              .udm.signature = string!(parsed.title)
          }

          if exists(parsed.severity) {
              sev_raw = to_string(parsed.severity) ?? ""
              sev_mapped = if sev_raw == "1" {
                  "informational"
              } else if sev_raw == "2" {
                  "low"
              } else if sev_raw == "3" {
                  "medium"
              } else if sev_raw == "4" {
                  "high"
              } else if sev_raw == "5" {
                  "critical"
              } else {
                  sev_raw
              }
              .udm.severity = sev_mapped
          }

          if exists(parsed.uri) {
              .udm.url = string!(parsed.uri)
          }

          if exists(parsed.method) {
              .udm.http_method = string!(parsed.method)
          }

          if exists(parsed.param) {
              .ext.param = string!(parsed.param)
          }

          if exists(parsed.status) {
              .udm.status = string!(parsed.status)
          }

          if exists(parsed.webApp) {
              wa = parsed.webApp
              if exists(wa.name) {
                  .ext.web_app_name = string!(wa.name)
              }
              if exists(wa.url) {
                  .ext.web_app_url = string!(wa.url)
              }
              if exists(wa.id) {
                  .ext.web_app_id = to_string(wa.id) ?? ""
              }
          }

          if exists(parsed.cvss_v3) {
              if exists(parsed.cvss_v3.base) {
                  .ext.cvss_v3 = string!(parsed.cvss_v3.base)
              }
              if exists(parsed.cvss_v3.temporal) {
                  .ext.cvss_v3_temporal = string!(parsed.cvss_v3.temporal)
              }
          }

          if exists(parsed.cwe) && is_array(parsed.cwe) {
              .ext.cwe = encode_json(parsed.cwe)
          }

          if exists(parsed.owasp) && is_array(parsed.owasp) {
              .ext.owasp = encode_json(parsed.owasp)
          }

          if exists(parsed.firstDetectedDate) {
              ts, ts_err = parse_timestamp(string!(parsed.firstDetectedDate), "%+")
              if ts_err == null {
                  .udm.timestamp = format_timestamp!(ts, format: "%Y-%m-%d %H:%M:%S")
              }
              .ext.first_detected = string!(parsed.firstDetectedDate)
          }

          if exists(parsed.lastDetectedDate) {
              .ext.last_detected = string!(parsed.lastDetectedDate)
          }

          if exists(parsed.timesDetected) {
              .ext.times_detected = to_string(parsed.timesDetected) ?? ""
          }

      } else if is_compliance {
          # --- Compliance Finding ---
          .udm.event_type = "compliance_finding"
          .udm.category = "compliance"

          if exists(parsed.id) {
              .ext.event_id = string!(parsed.id)
          }

          if exists(parsed.controlId) {
              .udm.rule_id = string!(parsed.controlId)
          }

          if exists(parsed.title) {
              .udm.signature = string!(parsed.title)
          }

          if exists(parsed.policyName) {
              .udm.rule_name = string!(parsed.policyName)
          }

          if exists(parsed.status) {
              raw_status = upcase(string!(parsed.status))
              .udm.result = if raw_status == "PASS" {
                  "success"
              } else if raw_status == "FAIL" {
                  "failure"
              } else {
                  downcase(raw_status)
              }
              .udm.status = string!(parsed.status)
          }

          if exists(parsed.severity) {
              .udm.severity = downcase(string!(parsed.severity))
          }

          if exists(parsed.hostIp) {
              .udm.dest_ip = string!(parsed.hostIp)
          }

          if exists(parsed.hostName) {
              .udm.dest_host = string!(parsed.hostName)
          }

          if exists(parsed.os) {
              .ext.os = string!(parsed.os)
          }

          if exists(parsed.technology) {
              .ext.technology = string!(parsed.technology)
          }

          if exists(parsed.rationale) {
              .ext.rationale = string!(parsed.rationale)
          }

          if exists(parsed.evidence) {
              .ext.evidence = string!(parsed.evidence)
          }

          if exists(parsed.lastEvaluated) {
              ts, ts_err = parse_timestamp(string!(parsed.lastEvaluated), "%+")
              if ts_err == null {
                  .udm.timestamp = format_timestamp!(ts, format: "%Y-%m-%d %H:%M:%S")
              }
          }

      } else if is_knowledge_base {
          # --- Knowledge Base (QID detail) ---
          .udm.event_type = "vulnerability_detected"
          .udm.category = "vulnerability"

          if exists(parsed.QID) {
              .udm.signature_id = to_string(parsed.QID) ?? ""
          }

          if exists(parsed.TITLE) {
              .udm.signature = string!(parsed.TITLE)
          }

          if exists(parsed.SEVERITY) {
              sev_raw = to_string(parsed.SEVERITY) ?? ""
              sev_mapped = if sev_raw == "1" {
                  "informational"
              } else if sev_raw == "2" {
                  "low"
              } else if sev_raw == "3" {
                  "medium"
              } else if sev_raw == "4" {
                  "high"
              } else if sev_raw == "5" {
                  "critical"
              } else {
                  sev_raw
              }
              .udm.severity = sev_mapped
          }

          if exists(parsed.CATEGORY) {
              .ext.vuln_category = string!(parsed.CATEGORY)
          }

          if exists(parsed.CVSS_BASE) {
              .ext.cvss = string!(parsed.CVSS_BASE)
          }

          if exists(parsed.CVSS_V3_BASE) {
              .ext.cvss_v3 = string!(parsed.CVSS_V3_BASE)
          }

          if exists(parsed.CVE_LIST) && is_array(parsed.CVE_LIST) {
              cve_arr = array!(parsed.CVE_LIST)
              if length(cve_arr) > 0 {
                  .udm.cve = to_string(get!(cve_arr, [0])) ?? ""
              }
              .ext.cve_list = encode_json(parsed.CVE_LIST)
          }

          if exists(parsed.SOLUTION) {
              .ext.solution = string!(parsed.SOLUTION)
          }

          if exists(parsed.CONSEQUENCE) {
              .ext.consequence = string!(parsed.CONSEQUENCE)
          }

          if exists(parsed.VULN_TYPE) {
              .ext.vuln_type = string!(parsed.VULN_TYPE)
          }

          if exists(parsed.DISCOVERY_METHOD) {
              .ext.discovery_method = string!(parsed.DISCOVERY_METHOD)
          }

          if exists(parsed.PATCHABLE) {
              .ext.patchable = string!(parsed.PATCHABLE)
          }

          if exists(parsed.PUBLISHED_DATETIME) {
              ts, ts_err = parse_timestamp(string!(parsed.PUBLISHED_DATETIME), "%+")
              if ts_err == null {
                  .udm.timestamp = format_timestamp!(ts, format: "%Y-%m-%d %H:%M:%S")
              }
          }

      } else {
          # Unknown Qualys event type - store everything in ext
          .udm.event_type = "unknown"
          .ext.raw_parsed = encode_json(parsed)
      }

  } else {
      .metadata.parse_error = to_string(err)
  }

  # Set parser name
  .metadata.parser = "qualys"

  # Preserve raw log
  .message = raw_log
